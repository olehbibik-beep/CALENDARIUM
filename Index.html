<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud Calendar 2026</title>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // КОНФИГ (Вставь сюда свои данные из Firebase)
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "ID",
        appId: "APP_ID"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // --- ЛОГИКА ИНТЕРФЕЙСА ---
      window.login = async () => {
          const email = document.getElementById('email').value;
          const pass = document.getElementById('pass').value;
          try {
              await signInWithEmailAndPassword(auth, email, pass);
          } catch (e) {
              await createUserWithEmailAndPassword(auth, email, pass);
          }
      };

      onAuthStateChanged(auth, (user) => {
          if (user) {
              document.getElementById('auth-page').classList.add('hidden');
              document.getElementById('year-page').classList.remove('hidden');
              renderYear();
          }
      });

      window.saveToCloud = async (dayId, text) => {
          const user = auth.currentUser;
          await setDoc(doc(db, "notes", `${user.uid}_${dayId}`), { text: text });
      };

      window.loadFromCloud = async (dayId, textarea) => {
          const user = auth.currentUser;
          const docSnap = await getDoc(doc(db, "notes", `${user.uid}_${dayId}`));
          if (docSnap.exists()) textarea.value = docSnap.data().text;
      };

      // Функции рендера (аналогично предыдущим, но с вызовом loadFromCloud)
      // ... (полный код отрисовки месяца и года остается прежним)
    </script>

    <style>
        /* Стильные плиточки */
        .year-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
        .month-card { 
            background: #fff; border-radius: 15px; height: 150px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s;
            border-bottom: 5px solid #4a90e2;
        }
        .month-card:hover { transform: scale(1.05); background: #4a90e2; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="auth-page" style="text-align: center; margin-top: 100px;">
        <h2>Вход в личный календарь</h2>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Пароль"><br>
        <button onclick="login()">Войти или Создать аккаунт</button>
    </div>

    <div id="year-page" class="hidden">
        <h1 style="text-align: center;">2026</h1>
        <div class="year-grid" id="year-grid">
            </div>
    </div>
</body>
</html>
