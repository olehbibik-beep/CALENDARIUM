<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Заметки</title>
    <style>
        :root { 
            --accent: #09e0e3; --bg: #71797E; --dark: #1a1d1f; --card-bg: #22272a;
            --ev-memorial: #ff7675; --ev-memorial-bg: #3b1e22; 
            --ev-meeting: #87CEEB; --weekend: #14161A; --text-main: #e0e6ed;
            --inner-border: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text-main); display: flex; align-items: center; justify-content: center; height: 100dvh; width: 100vw; overflow: hidden; }
        .app-container { width: 95vw; height: 90dvh; max-width: 1400px; max-height: 900px; background: #0f1112; border-radius: 30px; display: flex; flex-direction: row; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .sidebar { width: 25%; min-width: 220px; max-width: 320px; background: rgba(80,80,80,0.2); padding: 3vh 2vw; display: flex; flex-direction: column; border-right: 1px solid var(--inner-border); flex-shrink: 0; }
        .user-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2vh; width: 100%; position: relative; }
        .header-left, .header-right { display: flex; align-items: center; gap: 15px; z-index: 10; }
        .header-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; z-index: 5; }
        .icon-btn { background: none; border: none; padding: 5px; cursor: pointer; display: flex; align-items: center; }
        .icon-btn img { width: 25px; height: 25px; opacity: 0.5; transition: 0.3s; }
        .icon-btn:hover img { opacity: 1; filter: brightness(0) invert(1); }
        .user-name { font-weight: 700; text-transform: uppercase; font-size: 0.9rem; color: #fff; letter-spacing: 1px; }
        .preview-box { display: flex; flex-direction: column; margin-top: 1vh; flex: 1; overflow: hidden; }
        .preview { background: transparent; width: 100%; padding: 1vh 0; border-radius: 4px; flex: 1; overflow-y: auto; font-size: 0.9rem; line-height: 1.4; }
        .action-btn { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: 700; margin-top: 2vh; cursor: pointer; color: #fff; background: var(--accent); text-transform: uppercase; }
        .main-view { flex: 1; display: flex; flex-direction: column; padding: 3vh 3vw; position: relative; overflow: hidden; }
        .calendar-wrapper { max-width: 800px; width: 100%; height: 100%; margin: 0 auto; display: flex; flex-direction: column; }
        #m-name { font-size: clamp(1.5rem, 4vh, 2.5rem); text-align: center; margin-bottom: 2vh; font-weight: 300; letter-spacing: 2px; color: #fff; text-transform: uppercase; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.7rem; font-weight: 900; margin-bottom: 1vh; color: #7f8fa6; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex: 1; align-content: start; }
        .day-box { aspect-ratio: 1/1; background: var(--dark); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; position: relative; transition: 0.2s; border: 2px solid transparent; }
        .day-box:hover { background: #2b3236; }
        .day-box.weekend { background: var(--weekend); color: #636e72; }
        .day-box.selected { border-color: var(--accent) !important; }
        .day-box.today { color: var(--accent); font-weight: 700; border: 1px solid rgba(9, 224, 227, 0.2); }
        .day-box.has-memorial { background: var(--ev-memorial-bg) !important; color: var(--ev-memorial) !important; }
        .indicator-row { position: absolute; bottom: 8%; display: flex; gap: 3px; justify-content: center; width: 80%; }
        .mark { height: 3px; flex: 1; border-radius: 2px; }
        .m-meeting { background: var(--ev-meeting); }
        .m-personal { background: #888; }
        
        /* Конгресс линии */
        .day-box.c-start::after, .day-box.c-mid::after, .day-box.c-end::after, .day-box.c-single::after { content: ''; position: absolute; bottom: 0; height: 3px; background: #C0C0C0; width: 100%; }
        .day-box.c-start::after { left: 50%; width: 50%; }
        .day-box.c-end::after { left: 0; width: 50%; }
        .day-box.c-single::after { left: 25%; width: 50%; border-radius: 2px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; }
        .modal-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 800; margin-bottom: 8px; cursor: pointer; color: white; text-transform: uppercase; font-size: 0.7rem; }
        textarea { width: 100%; height: 80px; margin-bottom: 15px; padding: 12px; border-radius: 6px; border: 1px solid var(--inner-border); background: var(--dark); color: white; resize: none; }
        .note-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; margin-bottom: 8px; border-radius: 4px; }

        @media (orientation: portrait) {
            .app-container { flex-direction: column; border-radius: 0; width: 100vw; height: 100dvh; }
            .sidebar { width: 100%; max-width: 100%; border-right: none; border-bottom: 1px solid var(--inner-border); height: 30%; }
            .grid { gap: 4px; }
            .day-box { font-size: 1rem; border-radius: 6px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="user-header">
                <div class="header-left">
                    <button class="icon-btn" onclick="location.href='calendar.html'"><img src="BACK.png" alt="<"></button>
                </div>
                <div class="header-center">
                    <button id="admin-btn" class="icon-btn" onclick="location.href='admin.html'" style="display:none;"><img src="OPTION.png" alt="⚙"></button>
                </div>
                <div class="header-right">
                    <div id="user-display" class="user-name">...</div>
                </div>
            </div>
            <div class="preview-box">
                <div style="font-size:0.6rem; color:#7f8fa6; margin-bottom:10px; font-weight:800; letter-spacing:1px;">ДЕТАЛИ ДНЯ</div>
                <div id="preview" class="preview">Выберите день.</div>
                <button class="action-btn" id="edit-btn" style="display:none;" onclick="openModal()">+ ДОБАВИТЬ ПЛАН</button>
            </div>
        </div>

        <div class="main-view">
            <div class="calendar-wrapper">
                <div id="m-name">...</div>
                <div class="weekdays"><div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div></div>
                <div id="grid" class="grid"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h3 id="modal-title" style="margin:0 0 20px 0; text-align:center; color: var(--accent); text-transform: uppercase;"></h3>
            <div id="modal-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            <textarea id="note-input" placeholder="Текст заметки..."></textarea>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px;">
                <button id="btn-memorial" class="modal-btn" style="background:var(--ev-memorial);" onclick="save('memorial')">ВЕЧЕРЯ</button>
                <button id="btn-meeting" class="modal-btn" style="background:var(--ev-meeting); color:#000;" onclick="save('meeting')">ВСТРЕЧА</button>
                <button id="btn-congress" class="modal-btn" style="background:#555;" onclick="save('congress')">КОНГРЕСС</button>
                <button class="modal-btn" style="background:#333;" onclick="save('personal')">ЛИЧНОЕ</button>
            </div>
            <button class="modal-btn" style="background:none; border:1px solid #444; color:#888;" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. Авторизация
    const currentUserRaw = localStorage.getItem('currentUser');
    if (!currentUserRaw) window.location.replace('index.html');
    const currentUser = currentUserRaw.toLowerCase();
    const isAdmin = currentUser === 'admin';

    document.getElementById('user-display').innerText = currentUser;
    if (isAdmin) document.getElementById('admin-btn').style.display = 'flex';

    // 2. Firebase
    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));

    // 3. Состояние
    const mIdx = parseInt(localStorage.getItem('selectedMonth')) || 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    const docId = `${year}_${mIdx}`;
    const months = ["ЯНВАРЬ", "ФЕВРАЛЬ", "МАРТ", "АПРЕЛЬ", "МАЙ", "ИЮНЬ", "ИЮЛЬ", "АВГУСТ", "СЕНТЯБРЬ", "ОКТЯБРЬ", "НОЯБРЬ", "ДЕКАБРЬ"];
    
    document.getElementById('m-name').innerText = `${months[mIdx]} ${year}`;
    let dbData = {};
    let selectedDay = null;

    // 4. Функции (привязываем к window для доступа из HTML)
    window.selectDay = (d) => {
        if (!d) return;
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        const tile = document.getElementById(`tile-${d}`);
        if (tile) tile.classList.add('selected');
        
        document.getElementById('edit-btn').style.display = 'block';
        const notes = dbData[d] || [];
        
        const preview = document.getElementById('preview');
        preview.innerHTML = `<div style="color:var(--accent); font-weight:800; margin-bottom:10px;">${d} ${months[mIdx]}</div>` +
            (notes.map(n => {
                const col = n.category === 'memorial' ? 'var(--ev-memorial)' : (n.category === 'meeting' ? 'var(--ev-meeting)' : '#888');
                return `<div style="border-left: 3px solid ${col}; padding-left: 8px; margin-bottom: 8px;">${n.text}</div>`;
            }).join('') || '<div style="color:#555;">Планов нет</div>');
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = `${selectedDay} ${months[mIdx]}`;
        const list = document.getElementById('modal-list');
        const notes = dbData[selectedDay] || [];
        
        document.getElementById('btn-memorial').disabled = !isAdmin;
        document.getElementById('btn-meeting').disabled = !isAdmin;

        list.innerHTML = notes.map((n, idx) => `
            <div class="note-item">
                <span style="font-size:0.8rem;">${n.text}</span>
                ${(isAdmin || n.author === currentUser) ? `<b onclick="delNote(${idx})" style="color:red; cursor:pointer; padding:5px;">✕</b>` : ''}
            </div>
        `).join('');
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const input = document.getElementById('note-input');
        const text = input.value.trim() || cat.toUpperCase();
        const notes = [...(dbData[selectedDay] || [])];
        notes.push({ text, category: cat, author: currentUser });
        
        try {
            await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
            input.value = '';
            openModal();
        } catch (e) { alert("Ошибка доступа к базе!"); }
    };

    window.delNote = async (idx) => {
        const notes = [...(dbData[selectedDay] || [])];
        notes.splice(idx, 1);
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        openModal();
    };

    function updateUI() {
        document.querySelectorAll('.day-box').forEach(tile => {
            const d = tile.id.split('-')[1];
            tile.className = tile.className.split(' ').filter(c => ['day-box', 'weekend', 'today', 'selected'].includes(c)).join(' ');
            
            const marks = document.getElementById(`marks-${d}`);
            if (marks) marks.innerHTML = '';

            const notes = dbData[d] || [];
            const hasCongress = notes.some(n => n.category === 'congress');

            notes.forEach(n => {
                if (n.category === 'memorial') tile.classList.add('has-memorial');
                if (n.category === 'meeting' && marks) marks.innerHTML += '<div class="mark m-meeting"></div>';
                if (n.category === 'personal' && marks) marks.innerHTML += '<div class="mark m-personal"></div>';
            });

            if (hasCongress) {
                const hasPrev = (dbData[d-1] || []).some(n => n.category === 'congress');
                const hasNext = (dbData[parseInt(d)+1] || []).some(n => n.category === 'congress');
                if (!hasPrev && hasNext) tile.classList.add('c-start');
                else if (hasPrev && hasNext) tile.classList.add('c-mid');
                else if (hasPrev && !hasNext) tile.classList.add('c-end');
                else tile.classList.add('c-single');
            }
        });
        if (selectedDay) selectDay(selectedDay);
    }

    // 5. Запуск
    const gridEl = document.getElementById('grid');
    const firstDay = new Date(year, mIdx, 1).getDay();
    const shift = firstDay === 0 ? 6 : firstDay - 1;
    const totalDays = new Date(year, mIdx + 1, 0).getDate();
    const now = new Date();

    for (let i = 0; i < shift; i++) gridEl.innerHTML += '<div style="visibility:hidden"></div>';
    for (let d = 1; d <= totalDays; d++) {
        const isWE = new Date(year, mIdx, d).getDay() % 6 === 0;
        const isToday = (d === now.getDate() && mIdx === now.getMonth() && year === now.getFullYear());
        gridEl.innerHTML += `
            <div class="day-box ${isWE?'weekend':''} ${isToday?'today':''}" id="tile-${d}" onclick="selectDay(${d})">
                ${d}
                <div class="indicator-row" id="marks-${d}"></div>
            </div>`;
    }

    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });
</script>
</body>
</html>
