<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --main-bg: #f4f7f6;
            --sidebar-bg: #1e2122;
            --dark-card: #2d3436;
            --orange-weekend: #ff9f43;
            /* Цвета по твоему запросу */
            --ev-memorial: #ff0000; /* Вечеря - Красный прямоугольник */
            --ev-congress: #0984e3; /* Конгресс - Синий */
            --ev-meeting: #ffffff;  /* Собрания - Белый */
            --ev-personal: #27ae60; 
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        .sidebar { 
            width: 420px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; color: white;
            z-index: 100; flex-shrink: 0; box-sizing: border-box; 
            align-items: flex-end; text-align: right;
        }

        #month-title { font-size: 2.8rem; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 30px; }

        /* ЛЕГЕНДА */
        .side-label { color: #636e72; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; }
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-bottom: 10px; font-size: 0.9rem; color: #dfe6e9; }
        .rect-indicator { width: 24px; height: 8px; border-radius: 2px; }

        /* СЕТКА */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .weekdays-fixed { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; margin-bottom: 15px; }
        .weekday { font-size: 0.75rem; font-weight: 900; color: #b2bec3; text-transform: uppercase; text-align: center; }
        .weekday.we { color: var(--orange-weekend); }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; }

        .day-card { 
            background: var(--dark-card); width: 110px; height: 110px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.4rem; color: #ffffff; cursor: pointer; transition: 0.3s;
            position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .day-card.weekend { color: var(--orange-weekend); border: 1px solid rgba(255,159,67,0.2); }
        .day-card:hover { transform: translateY(-5px); background: #000; }
        .day-card.empty { background: transparent; box-shadow: none; cursor: default; }
        
        /* ПРЯМОУГОЛЬНИКИ ВМЕСТО ТОЧЕК */
        .marks-container { position: absolute; bottom: 12px; display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; width: 90%; }
        .mark-rect { width: 20px; height: 4px; border-radius: 1px; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 400px; color: #000; text-align: right; }
        .cat-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #eee; cursor: pointer; font-size: 9px; font-weight: 900; transition: 0.2s; }
        .cat-btn.active { border-color: var(--accent); background: #f0faff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="logout-btn" onclick="location.href='calendar.html'">Назад</button>
        <div id="display-year-static">2026</div>
        <div id="month-title">...</div>

        <div class="side-section" style="width: 100%;">
            <div class="side-label">Легенда</div>
            <div class="legend-item">Вечеря Воспоминания <div class="rect-indicator" style="background:var(--ev-memorial)"></div></div>
            <div class="legend-item">Конгресс <div class="rect-indicator" style="background:var(--ev-congress)"></div></div>
            <div class="legend-item">Собрания <div class="rect-indicator" style="background:var(--ev-meeting); border:1px solid #555;"></div></div>
            <div class="legend-item">Личное <div class="rect-indicator" style="background:var(--ev-personal)"></div></div>
        </div>
        
        <div id="live-preview" style="margin-top:30px; font-size:0.8rem; color:#888;">Наведи на число...</div>
    </div>

    <div class="main-content">
        <div class="weekdays-fixed">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div><div class="weekday">Чт</div><div class="weekday">Пт</div>
            <div class="weekday we">Сб</div><div class="weekday we">Вс</div>
        </div>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h2 id="modal-date-title" style="margin:0 0 15px 0;">Дата</h2>
            <div id="existing-notes" style="margin-bottom: 15px;"></div>
            <textarea id="note-text" style="width:100%; height:60px; border-radius:10px; padding:10px;" placeholder="Что добавим?"></textarea>
            <div style="display:flex; gap:5px; margin:10px 0;">
                <button class="cat-btn" id="btn-memorial" onclick="window.activeCat='memorial'">ВЕЧЕРЯ</button>
                <button class="cat-btn" id="btn-congress" onclick="window.activeCat='congress'">КОНГРЕСС</button>
                <button class="cat-btn" id="btn-meeting" onclick="window.activeCat='meeting'">СОБРАНИЕ</button>
                <button class="cat-btn" id="btn-personal" onclick="window.activeCat='personal'">ЛИЧНОЕ</button>
            </div>
            <button class="save-btn" onclick="window.saveNote()">СОХРАНИТЬ</button>
            <button onclick="window.closeModal()" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const currentUser = localStorage.getItem('currentUser') || 'ADMIN';
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = monthsNames[monthIdx];

        let currentMonthData = {};
        let selectedDay = null;
        window.activeCat = 'meeting';

        onSnapshot(doc(db, "calendar", `2026_${monthIdx}`), (snap) => {
            currentMonthData = snap.exists() ? snap.data() : {};
            renderGrid();
        });

        function renderGrid() {
            const container = document.getElementById('days-container');
            if(!container) return;
            container.innerHTML = '';
            
            const firstDay = new Date(2026, monthIdx, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

            for(let s=0; s<shift; s++) container.appendChild(Object.assign(document.createElement('div'), {className:'day-card empty'}));

            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(2026, monthIdx, i);
                const dayOfWeek = date.getDay();
                const card = document.createElement('div');
                card.className = 'day-card' + (dayOfWeek === 0 || dayOfWeek === 6 ? ' weekend' : '');
                card.innerHTML = `<span>${i}</span>`;
                
                if (currentMonthData[i]) {
                    const marks = document.createElement('div');
                    marks.className = 'marks-container';
                    currentMonthData[i].forEach(n => {
                        const m = document.createElement('div');
                        m.className = 'mark-rect';
                        m.style.background = `var(--ev-${n.category})`;
                        if(n.category === 'meeting') m.style.border = "1px solid #555";
                        marks.appendChild(m);
                    });
                    card.appendChild(marks);
                }

                card.onmouseover = () => {
                    document.getElementById('live-preview').innerHTML = currentMonthData[i] 
                        ? currentMonthData[i].map(n => `• ${n.text}`).join('<br>') 
                        : 'Событий нет';
                };
                card.onclick = () => window.openModal(i);
                container.appendChild(card);
            }
        }

        // ПРИВЯЗЫВАЕМ К WINDOW ДЛЯ МОДУЛЯ
        window.openModal = (day) => {
            selectedDay = day;
            document.getElementById('modal-date-title').innerText = day + ' ' + monthsNames[monthIdx];
            const list = document.getElementById('existing-notes');
            list.innerHTML = (currentMonthData[day] || []).map((n, idx) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:12px; background:#f9f9f9; padding:5px; border-radius:5px;">
                    <span>${n.text}</span>
                    <button onclick="window.deleteNote(${idx})" style="color:red; border:none; background:none; cursor:pointer;">×</button>
                </div>
            `).join('');
            document.getElementById('note-modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('note-modal').style.display = 'none';

        window.saveNote = async () => {
            const text = document.getElementById('note-text').value;
            if(!text) return;
            const notes = currentMonthData[selectedDay] || [];
            notes.push({text, category: window.activeCat, user: currentUser});
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: notes}, {merge:true});
            document.getElementById('note-text').value = '';
            window.openModal(selectedDay);
        };

        window.deleteNote = async (idx) => {
            currentMonthData[selectedDay].splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: currentMonthData[selectedDay]}, {merge:true});
            window.openModal(selectedDay);
        };
    </script>
</body>
</html>
