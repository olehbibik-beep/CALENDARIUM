<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Планы | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --main-bg: #f4f7f6;
            --sidebar-bg: #1e2122;
            --dark-card: #2d3436;
            --orange-weekend: #ff9f43;
            --ev-memorial: #ff4757;
            --ev-congress: #ff4757;
            --ev-meeting: #0984e3;
            --ev-personal: #27ae60;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        .sidebar { 
            width: 420px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; color: white;
            z-index: 100; flex-shrink: 0; align-items: flex-end; text-align: right;
            overflow-y: auto;
        }

        .logout-btn { background: #fff; color: #000; border: none; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .user-name { color: #fff; font-weight: 800; text-transform: uppercase; margin-left: 10px; }
        
        #display-year-static { font-size: 8rem; font-weight: 200; color: rgba(255,255,255,0.05); letter-spacing: -12px; line-height: 0.7; margin: 0; }
        #month-title { font-size: 2.8rem; font-weight: 800; color: #fff; letter-spacing: -2px; margin-bottom: 20px; text-transform: uppercase; }

        #live-preview { 
            font-size: 0.9rem; background: rgba(255, 255, 255, 0.05); padding: 20px; 
            border-radius: 15px 0 0 15px; line-height: 1.6; color: #dfe6e9; text-align: right; width: 100%; min-height: 100px; 
            border-right: 4px solid var(--accent); margin-bottom: 15px;
        }
        .preview-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 8px 0; }

        #edit-trigger-btn { display: none; width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 0.7rem; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .weekdays-fixed, .days-grid { display: grid; grid-template-columns: repeat(7, 100px); gap: 12px; }
        .weekday { font-size: 0.7rem; font-weight: 900; color: #b2bec3; text-transform: uppercase; text-align: center; }
        
        .day-card { 
            background: var(--dark-card); width: 100px; height: 100px; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.2rem; color: #ffffff; cursor: pointer; transition: 0.2s;
            position: relative;
        }
        .day-card.active-day { border: 3px solid var(--accent); transform: scale(1.05); }
        .day-card.weekend { color: var(--orange-weekend); }
        .day-card.empty { background: transparent; cursor: default; }
        
        .marks-row { position: absolute; bottom: 10px; display: flex; gap: 3px; justify-content: center; width: 100%; }
        .day-mark-rect { width: 18px; height: 4px; border-radius: 1px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 450px; text-align: right; color: #000; }
        .save-btn { width: 100%; background: #000; color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; padding: 20px; align-items: center; }
            .weekdays-fixed, .days-grid { grid-template-columns: repeat(7, 1fr); width: 100%; gap: 5px; }
            .day-card { width: 100%; height: 13vw; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="display:flex; align-items:center; margin-bottom: 15px;">
            <button class="logout-btn" onclick="location.href='calendar.html'">Назад</button>
            <div class="user-name" id="user-display">...</div>
        </div>
        <div id="display-year-static">...</div>
        <div id="month-title">...</div>
        <div style="width: 100%;">
            <div id="live-preview">Выберите дату</div>
            <button id="edit-trigger-btn" onclick="openEditModal()">РЕДАКТИРОВАТЬ</button>
        </div>
    </div>

    <div class="main-content">
        <div class="weekdays-fixed">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
        </div>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h2 id="modal-date-title">Редактирование</h2>
            <div id="existing-notes" style="max-height: 180px; overflow-y: auto; margin-bottom: 15px; text-align: left;"></div>
            <textarea id="note-text" style="width:100%; height:70px; border-radius:12px; padding:10px; margin-bottom:10px;" placeholder="Новая запись..."></textarea>
            <div style="display:flex; gap:5px; margin-bottom: 15px;" id="cat-btns">
                <button class="cat-btn" onclick="setActiveCat('memorial', this)" style="flex:1; background:var(--ev-memorial); color:white; border:none; padding:10px; border-radius:8px; font-size:10px; font-weight:900;">ВЕЧЕРЯ</button>
                <button class="cat-btn" onclick="setActiveCat('meeting', this)" style="flex:1; background:var(--ev-meeting); border:1px solid #ccc; padding:10px; border-radius:8px; font-size:10px; font-weight:900;">СОБРАНИЕ</button>
            </div>
            <button class="save-btn" onclick="saveNote()">ДОБАВИТЬ ЗАПИСЬ</button>
            <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#999; width:100%; cursor:pointer;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const currentYear = parseInt(localStorage.getItem('selectedYear') || 2026);
        const currentUser = localStorage.getItem('currentUser') || 'GUEST';
        const docPath = `${currentYear}_${monthIdx}`;

        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        document.getElementById('month-title').innerText = monthsNames[monthIdx];
        document.getElementById('display-year-static').innerText = currentYear;
        document.getElementById('user-display').innerText = currentUser;

        let currentMonthData = {};
        let selectedDay = null;
        window.activeCat = 'meeting';

        onSnapshot(doc(db, "calendar", docPath), (snap) => {
            currentMonthData = snap.exists() ? snap.data() : {};
            renderGrid();
            if(selectedDay) updatePreview(selectedDay);
        });

        function renderGrid() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            const firstDay = new Date(currentYear, monthIdx, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, monthIdx + 1, 0).getDate();

            for(let s=0; s<shift; s++) container.appendChild(Object.assign(document.createElement('div'), {className:'day-card empty'}));

            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(currentYear, monthIdx, i);
                const dayOfWeek = date.getDay();
                const card = document.createElement('div');
                card.id = `day-${i}`;
                card.className = 'day-card' + (dayOfWeek === 0 || dayOfWeek === 6 ? ' weekend' : '');
                card.innerHTML = `<span>${i}</span>`;
                
                if (currentMonthData[i] && currentMonthData[i].length > 0) {
                    const row = document.createElement('div');
                    row.className = 'marks-row';
                    currentMonthData[i].forEach(n => {
                        const m = document.createElement('div');
                        m.className = 'day-mark-rect';
                        m.style.background = `var(--ev-${n.category})`;
                        row.appendChild(m);
                    });
                    card.appendChild(row);
                }
                card.onclick = () => selectDay(i);
                container.appendChild(card);
            }
        }

        function selectDay(day) {
            selectedDay = day;
            document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active-day'));
            document.getElementById(`day-${day}`).classList.add('active-day');
            updatePreview(day);
            document.getElementById('edit-trigger-btn').style.display = 'block';
        }

        function updatePreview(day) {
            const preview = document.getElementById('live-preview');
            const notes = currentMonthData[day] || [];
            preview.innerHTML = notes.length > 0 ? notes.map(n => `<div class="preview-item">• ${n.text}</div>`).join('') : 'Записей нет';
        }

        window.openEditModal = () => {
            document.getElementById('modal-date-title').innerText = `${selectedDay} ${monthsNames[monthIdx]}`;
            const list = document.getElementById('existing-notes');
            list.innerHTML = (currentMonthData[selectedDay] || []).map((n, idx) => `
                <div style="display:flex; justify-content:space-between; padding:10px; background:#f9f9f9; margin-bottom:5px; border-radius:8px; border-right:4px solid var(--ev-${n.category})">
                    <span style="font-size:13px;">${n.text}</span>
                    <button onclick="deleteNote(${idx})" style="color:red; border:none; background:none; cursor:pointer;">&times;</button>
                </div>`).join('');
            document.getElementById('note-modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('note-modal').style.display = 'none';
        window.setActiveCat = (cat, btn) => {
            window.activeCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.style.outline = "none");
            btn.style.outline = "3px solid #000";
        };

        window.saveNote = async () => {
            const text = document.getElementById('note-text').value.trim();
            if(!text) return;
            const notes = [...(currentMonthData[selectedDay] || [])];
            notes.push({text, category: window.activeCat, user: currentUser});
            await setDoc(doc(db, "calendar", docPath), {[selectedDay]: notes}, {merge:true});
            document.getElementById('note-text').value = '';
            openEditModal();
        };

        window.deleteNote = async (idx) => {
            const notes = [...currentMonthData[selectedDay]];
            notes.splice(idx, 1);
            await setDoc(doc(db, "calendar", docPath), {[selectedDay]: notes}, {merge:true});
            openEditModal();
        };
    </script>
</body>
</html>
