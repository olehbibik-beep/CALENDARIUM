<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));
    const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
    const year = parseInt(localStorage.getItem('selectedYear') || 2026);
    const docId = `${year}_${mIdx}`;
    const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

    document.getElementById('m-name').innerText = months[mIdx] + " " + year;

    let dbData = {};
    let selectedDay = null;

    function createEmptyGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = ''; // Полная очистка

        // Находим день недели для 1-го числа выбранного месяца
        const firstDate = new Date(year, mIdx, 1);
        let firstDayOfWeek = firstDate.getDay(); // 0 - Вс, 1 - Пн...

        // Вычисляем сдвиг (сколько пустых клеток до Пн)
        // Пн=0, Вт=1, Ср=2, Чт=3, Пт=4, Сб=5, Вс=6
        const shift = (firstDayOfWeek === 0) ? 6 : firstDayOfWeek - 1;
        
        const totalDays = new Date(year, mIdx + 1, 0).getDate();

        // 1. Рисуем пустые клетки
        for (let i = 0; i < shift; i++) {
            const empty = document.createElement('div');
            grid.appendChild(empty);
        }
        
        // 2. Рисуем плитки дней
        for (let i = 1; i <= totalDays; i++) {
            const dayUnit = document.createElement('div');
            dayUnit.className = 'day-unit';
            
            const isWeekend = new Date(year, mIdx, i).getDay() % 6 === 0;
            
            dayUnit.innerHTML = `
                <div class="day-box ${isWeekend ? 'weekend' : ''}" id="tile-${i}" onclick="selectDay(${i})">${i}</div>
                <div class="indicator-row" id="marks-${i}"></div>
            `;
            grid.appendChild(dayUnit);
        }
    }

    function updateVisuals() {
        // Проходим по всем возможным дням месяца
        for (let i = 1; i <= 31; i++) {
            const tile = document.getElementById(`tile-${i}`);
            const row = document.getElementById(`marks-${i}`);
            if (!tile || !row) continue;

            const notes = dbData[i] || [];
            
            // Сброс класса Вечери
            tile.classList.remove('has-memorial');
            
            let html = '';
            notes.forEach(n => {
                if (n.category === 'memorial') {
                    tile.classList.add('has-memorial');
                } else if (n.category === 'meeting') {
                    html += '<div class="mark m-meeting"></div>';
                } else if (n.category === 'personal') {
                    html += '<div class="mark m-personal"></div>';
                }
            });
            row.innerHTML = html;
        }
        updatePreview();
    }

    window.selectDay = (i) => {
        selectedDay = i;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        const activeTile = document.getElementById(`tile-${i}`);
        if(activeTile) activeTile.classList.add('selected');
        document.getElementById('edit-btn').style.display = 'block';
        updatePreview();
    };

    function updatePreview() {
        const p = document.getElementById('preview');
        if (!selectedDay) return;
        const notes = dbData[selectedDay] || [];
        p.innerHTML = `<b>${selectedDay} ${months[mIdx]}:</b><br>` + 
            (notes.map(n => `• ${n.text}`).join('<br>') || 'Нет событий');
    }

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        list.innerHTML = (dbData[selectedDay] || []).map((n, idx) => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:#f0f0f0; padding:10px; margin-bottom:5px; border-radius:8px;">
                <span style="font-size:13px;">${n.text}</span>
                <b onclick="delNote(${idx})" style="color:red; padding:5px; cursor:pointer;">✕</b>
            </div>`).join('');
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const val = document.getElementById('note-input').value.trim();
        const text = val || (cat === 'memorial' ? 'ВЕЧЕРЯ' : cat === 'meeting' ? 'СОБРАНИЕ' : 'ЛИЧНОЕ');
        const notes = [...(dbData[selectedDay] || [])];
        notes.push({ text, category: cat });
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        document.getElementById('note-input').value = '';
        openModal();
    };

    window.delNote = async (idx) => {
        const notes = [...dbData[selectedDay]];
        notes.splice(idx, 1);
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        openModal();
    };

    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateVisuals();
    });

    createEmptyGrid();
</script>
