<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Планы | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0088cc; --bg: #f4f7f6; --dark: #2d3436;
            --ev-memorial: #ff4757; --ev-meeting: #0984e3; --ev-personal: #2ecc71;
            --weekend-bg: #3d4446;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; display: flex; min-height: 100vh; background: var(--bg); flex-direction: row; }

        .sidebar { 
            width: 300px; background: #1e2122; padding: 20px; color: white;
            display: flex; flex-direction: column; align-items: flex-end; text-align: right; 
            flex-shrink: 0; position: sticky; top: 0; height: 100vh; z-index: 10;
        }
        .back-btn { background: #fff; color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; margin-bottom: 20px; }
        #month-title { font-size: 2rem; font-weight: 800; text-transform: uppercase; margin: 0; }
        #year-label { font-size: 1rem; opacity: 0.3; margin-bottom: 20px; }

        #live-preview { 
            width: 100%; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px;
            border-right: 4px solid var(--accent); min-height: 60px; margin-bottom: 15px; font-size: 0.85rem;
            text-align: left; overflow-y: auto; color: #eee;
        }

        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; max-width: 500px; margin-bottom: 10px; }
        .wd { text-align: center; font-size: 0.7rem; font-weight: 900; color: var(--dark); opacity: 0.4; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; max-width: 500px; min-height: 350px; }
        
        .day { 
            background: var(--dark); aspect-ratio: 1/1; border-radius: 10px; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
            position: relative; font-weight: 800; font-size: 1rem; transition: 0.15s;
        }
        .day.empty { background: transparent; cursor: default; pointer-events: none; }
        .day.weekend { background: var(--weekend-bg); color: #aaa; }
        .day.selected { border: 3px solid var(--accent); transform: scale(1.05); z-index: 5; }
        .day.has-memorial { background: var(--ev-memorial) !important; color: white; }

        .dots { position: absolute; bottom: 4px; display: flex; gap: 2px; justify-content: center; width: 100%; height: 6px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }

        @media (max-width: 800px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 15px; align-items: center; text-align: center; }
            .main { padding: 10px; padding-bottom: 100px; }
            .grid, .weekdays { max-width: 100%; }
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 350px; color: black; }
        textarea { width: 100%; height: 70px; margin: 10px 0; padding: 10px; border-radius: 10px; border: 1px solid #ddd; resize: none; font-size: 1rem; }
        .btn-save { width: 100%; background: black; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .cat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .cat-opt { padding: 8px 2px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; font-weight: 800; font-size: 0.55rem; color: white; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="back-btn" onclick="location.href='calendar.html'">← НАЗАД</button>
        <div id="month-title">...</div>
        <div id="year-label">...</div>
        <div id="live-preview">Выберите дату</div>
        <button id="edit-btn" style="display:none; width:100%; padding:10px; background:var(--accent); border:none; color:white; border-radius:8px; font-weight:800; cursor:pointer;" onclick="window.openModal()">ИЗМЕНИТЬ</button>
    </div>

    <div class="main">
        <div class="weekdays">
            <div class="wd">Пн</div><div class="wd">Вт</div><div class="wd">Ср</div><div class="wd">Чт</div><div class="wd">Пт</div><div class="wd">Сб</div><div class="wd">Вс</div>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h3 id="modal-date" style="margin:0">Дата</h3>
            <div id="notes-list" style="margin:10px 0; max-height:120px; overflow-y:auto;"></div>
            <textarea id="note-input" placeholder="Запись..."></textarea>
            <div class="cat-row">
                <button class="cat-opt" id="opt-mem" style="background:var(--ev-memorial)" onclick="window.setCat('memorial')">ВЕЧЕРЯ</button>
                <button class="cat-opt" id="opt-meet" style="background:var(--ev-meeting)" onclick="window.setCat('meeting')">СОБРАНИЕ</button>
                <button class="cat-opt" id="opt-pers" style="background:var(--ev-personal)" onclick="window.setCat('personal')">ЛИЧНОЕ</button>
            </div>
            <button class="btn-save" onclick="window.save()">ДОБАВИТЬ</button>
            <button onclick="window.closeModal()" style="width:100%; border:none; background:none; margin-top:10px; color:#aaa; cursor:pointer;">ОТМЕНА</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const year = parseInt(localStorage.getItem('selectedYear') || 2026);
        const docId = `${year}_${monthIdx}`;
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        document.getElementById('month-title').innerText = months[monthIdx];
        document.getElementById('year-label').innerText = year;

        let data = {};
        let selDay = null;
        let curCat = 'meeting';

        // Стабильная функция отрисовки
        window.draw = () => {
            const container = document.getElementById('grid');
            if(!container) return;

            const d = new Date(year, monthIdx, 1);
            let dayOfWeek = d.getDay(); // Вс=0, Пн=1...
            let shift = (dayOfWeek === 0) ? 6 : dayOfWeek - 1;
            let total = new Date(year, monthIdx + 1, 0).getDate();

            container.innerHTML = '';

            // Пустые
            for(let i=0; i<shift; i++) {
                const div = document.createElement('div');
                div.className = 'day empty';
                container.appendChild(div);
            }

            // Дни
            for(let i=1; i<=total; i++) {
                const card = document.createElement('div');
                const dObj = new Date(year, monthIdx, i);
                const isWek = dObj.getDay() === 0 || dObj.getDay() === 6;
                const dayNotes = data[i] || [];
                const hasMem = dayNotes.some(n => n.category === 'memorial');

                card.className = 'day';
                if(selDay === i) card.classList.add('selected');
                if(isWek) card.classList.add('weekend');
                if(hasMem) card.classList.add('has-memorial');

                card.innerHTML = `<span>${i}</span>`;

                if(dayNotes.length > 0) {
                    const dBox = document.createElement('div');
                    dBox.className = 'dots';
                    dayNotes.forEach(n => {
                        const dot = document.createElement('div');
                        dot.className = 'dot';
                        // Белые точки на красном фоне, иначе цветные
                        dot.style.background = hasMem ? '#fff' : (n.category === 'personal' ? 'var(--ev-personal)' : 'var(--ev-meeting)');
                        dBox.appendChild(dot);
                    });
                    card.appendChild(dBox);
                }

                card.onclick = () => window.selectDay(i);
                container.appendChild(card);
            }
        };

        window.selectDay = (i) => {
            selDay = i;
            window.draw();
            window.updatePreview();
            document.getElementById('edit-btn').style.display = 'block';
        };

        window.updatePreview = () => {
            const notes = data[selDay] || [];
            document.getElementById('live-preview').innerHTML = notes.length ? notes.map(n => {
                let c = n.category === 'memorial' ? 'var(--ev-memorial)' : (n.category === 'personal' ? 'var(--ev-personal)' : 'var(--ev-meeting)');
                return `<div style="border-left:3px solid ${c}; padding-left:8px; margin-bottom:4px; font-weight:600;">${n.text}</div>`;
            }).join('') : 'Нет событий';
        };

        window.setCat = (c) => { 
            curCat = c; 
            const ids = { memorial: 'opt-mem', meeting: 'opt-meet', personal: 'opt-pers' };
            Object.values(ids).forEach(id => document.getElementById(id).style.borderColor = 'transparent');
            document.getElementById(ids[c]).style.borderColor = 'black';
        };

        window.openModal = () => {
            document.getElementById('modal-date').innerText = selDay + ' ' + months[monthIdx];
            document.getElementById('notes-list').innerHTML = (data[selDay] || []).map((n, idx) => `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#f0f0f0; padding:10px; border-radius:10px; margin-bottom:5px; border-left:4px solid ${n.category==='memorial'?'var(--ev-memorial)':(n.category==='personal'?'var(--ev-personal)':'var(--ev-meeting)')}">
                    <span style="font-size:0.9rem">${n.text}</span>
                    <button onclick="window.del(${idx})" style="color:red; border:none; background:none; font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
                </div>`).join('');
            document.getElementById('modal').style.display = 'flex';
            window.setCat('meeting');
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        window.save = async () => {
            const txt = document.getElementById('note-input').value.trim();
            if(!txt) return;
            const notes = [...(data[selDay] || [])];
            notes.push({ text: txt, category: curCat });
            await setDoc(doc(db, "calendar", docId), { [selDay]: notes }, { merge: true });
            document.getElementById('note-input').value = '';
            window.openModal();
        };

        window.del = async (idx) => {
            const notes = [...data[selDay]];
            notes.splice(idx, 1);
            await setDoc(doc(db, "calendar", docId), { [selDay]: notes }, { merge: true });
            window.openModal();
        };

        // Слушатель базы данных
        onSnapshot(doc(db, "calendar", docId), (s) => {
            data = s.exists() ? s.data() : {};
            window.draw(); // Перерисовываем при любых изменениях
            if(selDay) window.updatePreview();
        });

        // Первая отрисовка
        window.draw();
    </script>
</body>
</html>
