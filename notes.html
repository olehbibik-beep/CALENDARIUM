<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIUM | Fixed Edition</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --sidebar-bg: #1e2122;
            --dark-card: #2d3436;
            --orange-we: #ff9f43;
            --ev-memorial: #ff0000; /* Красный */
            --ev-congress: #0088cc; /* Синий */
            --ev-meeting: #ffffff;  /* Белый */
        }
        
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }

        /* САЙДБАР */
        .sidebar { 
            width: 400px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; color: white; flex-shrink: 0; text-align: right;
        }
        #month-title { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; margin: 10px 0 30px; }
        .legend { margin-top: 20px; }
        .leg-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-bottom: 8px; font-size: 0.85rem; color: #bbb; }
        .rect { width: 25px; height: 8px; border-radius: 2px; }

        /* ЦЕНТРАЛЬНАЯ ЧАСТЬ */
        .content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* СТАТИЧНАЯ ШАПКА (ЕЁ СКРИПТ НЕ ТРОГАЕТ) */
        .week-header { 
            display: grid; 
            grid-template-columns: repeat(7, 105px); 
            gap: 15px; 
            margin-bottom: 15px; 
        }
        .wh-day { text-align: center; font-weight: 900; color: #333; text-transform: uppercase; font-size: 0.75rem; width: 105px; }
        .wh-day.we { color: var(--orange-we); }

        /* ДИНАМИЧЕСКАЯ СЕТКА ЧИСЕЛ */
        #days-container { 
            display: grid; 
            grid-template-columns: repeat(7, 105px); 
            gap: 15px; 
        }

        .card { 
            width: 105px; height: 105px; background: var(--dark-card); border-radius: 18px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .card:hover { transform: translateY(-3px); background: #000; }
        .card.we-card { color: var(--orange-we); border: 1px solid rgba(255,159,67,0.2); }
        .card.empty { background: transparent; cursor: default; pointer-events: none; }
        .card-num { font-size: 1.5rem; font-weight: 800; color: inherit; }
        .card:not(.we-card) .card-num { color: #fff; }

        /* ПОЛОСКИ */
        .marks { position: absolute; bottom: 12px; display: flex; gap: 3px; }
        .m-rect { width: 20px; height: 5px; border-radius: 1px; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-inner { background: #fff; padding: 30px; border-radius: 20px; width: 350px; color: #333; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .c-btn { padding: 8px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .c-btn.active { border-color: var(--accent); background: #f0f7ff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button onclick="location.href='calendar.html'" style="cursor:pointer; padding:8px; border-radius:5px; border:none; font-weight:bold;">← НАЗАД</button>
        <h1 id="month-title">МЕСЯЦ</h1>
        
        <div class="legend">
            <div class="leg-item">Вечеря Воспоминания <div class="rect" style="background: var(--ev-memorial)"></div></div>
            <div class="leg-item">Конгресс <div class="rect" style="background: var(--ev-congress)"></div></div>
            <div class="leg-item">Собрания и ВПС <div class="rect" style="background: var(--ev-meeting); border: 1px solid #555;"></div></div>
        </div>

        <div id="preview" style="margin-top:40px; color:#888; font-style:italic;">Наведи на дату...</div>
    </div>

    <div class="content">
        <div class="week-header">
            <div class="wh-day">Пн</div><div class="wh-day">Вт</div><div class="wh-day">Ср</div>
            <div class="wh-day">Чт</div><div class="wh-day">Пт</div>
            <div class="wh-day we">Сб</div><div class="wh-day we">Вс</div>
        </div>
        
        <div id="days-container"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-inner">
            <h3 id="m-date" style="margin-top:0">00 Дата</h3>
            <div id="m-list" style="margin-bottom:15px; font-size:0.8rem;"></div>
            <textarea id="m-text" style="width:100%; height:50px; border-radius:8px; padding:8px; box-sizing:border-box;" placeholder="Событие..."></textarea>
            <div class="btn-grid">
                <div class="c-btn" id="b-memorial" onclick="selCat('memorial')">ВЕЧЕРЯ</div>
                <div class="c-btn" id="b-congress" onclick="selCat('congress')">КОНГРЕСС</div>
                <div class="c-btn" id="b-meeting" onclick="selCat('meeting')">СОБРАНИЕ</div>
                <div class="c-btn" id="b-other" onclick="selCat('other')">ПРОЧЕЕ</div>
            </div>
            <button onclick="save()" style="width:100%; padding:12px; background:#000; color:#fff; border:none; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer;">СОХРАНИТЬ</button>
            <button onclick="closeM()" style="width:100%; border:none; background:none; color:gray; margin-top:8px; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const user = localStorage.getItem('currentUser') || 'ADMIN';
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = months[mIdx];

        let dbData = {};
        let activeDay = null;
        let activeCat = 'meeting';

        window.selCat = (c) => { 
            activeCat = c; 
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('b-'+(c === 'other' ? 'other' : c)).classList.add('active');
        };

        onSnapshot(doc(db, "calendar", `2026_${mIdx}`), (snap) => {
            dbData = snap.exists() ? snap.data() : {};
            render();
        });

        function render() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            
            const first = new Date(2026, mIdx, 1).getDay();
            const shift = first === 0 ? 6 : first - 1;
            const total = new Date(2026, mIdx + 1, 0).getDate();

            for(let i=0; i<shift; i++) container.appendChild(Object.assign(document.createElement('div'), {className:'card empty'}));

            for(let i=1; i<=total; i++) {
                const d = new Date(2026, mIdx, i);
                const isWE = (d.getDay() === 0 || d.getDay() === 6);
                const card = document.createElement('div');
                card.className = 'card' + (isWE ? ' we-card' : '');
                card.innerHTML = `<span class="card-num">${i}</span>`;
                
                if(dbData[i]) {
                    const row = document.createElement('div');
                    row.className = 'marks';
                    dbData[i].forEach(n => {
                        const m = document.createElement('div');
                        m.className = 'm-rect';
                        m.style.background = n.category === 'other' ? '#27ae60' : `var(--ev-${n.category})`;
                        row.appendChild(m);
                    });
                    card.appendChild(row);
                }

                card.onmouseover = () => {
                    const p = document.getElementById('preview');
                    p.innerHTML = dbData[i] ? dbData[i].map(n => `• ${n.text}`).join('<br>') : 'Нет событий';
                };
                card.onclick = () => { activeDay = i; openM(i); };
                container.appendChild(card);
            }
        }

        window.openM = (day) => {
            document.getElementById('m-date').innerText = day + ' ' + months[mIdx];
            document.getElementById('m-list').innerHTML = (dbData[day] || []).map((n, idx) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid #eee;">
                    <span>${n.text}</span>
                    <button onclick="del(${day}, ${idx})" style="color:red; border:none; background:none; cursor:pointer;">×</button>
                </div>
            `).join('');
            selCat('meeting');
            document.getElementById('modal').style.display = 'flex';
        };

        window.closeM = () => document.getElementById('modal').style.display = 'none';

        window.save = async () => {
            const val = document.getElementById('m-text').value;
            if(!val) return;
            const list = dbData[activeDay] || [];
            list.push({text: val, category: activeCat, user: user});
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[activeDay]: list}, {merge:true});
            document.getElementById('m-text').value = '';
            closeM();
        };

        window.del = async (day, idx) => {
            const list = [...dbData[day]];
            list.splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[day]: list}, {merge:true});
            openM(day);
        };
    </script>
</body>
</html>
