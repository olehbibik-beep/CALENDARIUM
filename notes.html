<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --main-bg: #f4f7f6;
            --sidebar-bg: #1e2122;
            --dark-card: #2d3436;
            --orange-weekend: #ff9f43;
            /* НОВЫЕ ЦВЕТА КАТЕГОРИЙ */
            --ev-memorial: #ff0000; /* Вечеря - Красный */
            --ev-congress: #0984e3; /* Конгресс - Синий */
            --ev-meeting: #ffffff;  /* Собрания/ВПС - Белый */
            --ev-personal: #27ae60; /* Личное - Зеленый */
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        .sidebar { 
            width: 420px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; color: white;
            z-index: 100; flex-shrink: 0; box-sizing: border-box; 
            align-items: flex-end; text-align: right;
        }

        #month-title { font-size: 2.8rem; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 30px; }

        /* ЛЕГЕНДА С ПРЯМОУГОЛЬНИКАМИ */
        .side-label { color: #636e72; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px;}
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-bottom: 10px; font-size: 0.9rem; color: #dfe6e9; }
        .rect { width: 20px; height: 10px; border-radius: 2px; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* СЕТКА */
        .weekdays-fixed { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; margin-bottom: 15px; }
        .weekday { font-size: 0.75rem; font-weight: 900; color: #b2bec3; text-transform: uppercase; text-align: center; }
        .weekday.weekend { color: var(--orange-weekend); }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; }

        .day-card { 
            background: var(--dark-card); width: 110px; height: 110px; border-radius: 18px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.4rem; color: #ffffff; cursor: pointer; transition: 0.2s;
            position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .day-card.we-card { color: var(--orange-weekend); border: 1px solid rgba(255,159,67,0.2); }
        .day-card:hover { background: #000; transform: translateY(-3px); }
        .day-card.empty { background: transparent; box-shadow: none; cursor: default; }
        
        /* ПОЛОСКИ-ИНДИКАТОРЫ */
        .marks-row { position: absolute; bottom: 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 3px; width: 80%; }
        .mark-rect { height: 4px; width: 22px; border-radius: 1px; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 400px; color: #333; }
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .cat-btn { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.65rem; font-weight: bold; cursor: pointer; text-align: center; }
        .cat-btn.active { border-color: var(--accent); background: #e1f5fe; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button onclick="location.href='calendar.html'" style="background:#fff; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:20px;">НАЗАД</button>
        <div id="month-title">Апрель</div>

        <div class="side-section" style="width:100%">
            <div class="side-label">Легенда календаря</div>
            <div class="legend-item">Вечеря Воспоминания <div class="rect" style="background: var(--ev-memorial)"></div></div>
            <div class="legend-item">Конгресс <div class="rect" style="background: var(--ev-congress)"></div></div>
            <div class="legend-item">Собрания и ВПС <div class="rect" style="background: var(--ev-meeting)"></div></div>
            <div class="legend-item">Личное / Прочее <div class="rect" style="background: var(--ev-personal)"></div></div>
        </div>

        <div id="live-preview" style="margin-top:40px; font-size:0.9rem; color:#b2bec3; border-right:3px solid var(--accent); padding-right:15px;">
            Наведи на день, чтобы увидеть детали
        </div>
    </div>

    <div class="main-content">
        <div class="weekdays-fixed">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div><div class="weekday">Чт</div><div class="weekday">Пт</div>
            <div class="weekday weekend">Сб</div><div class="weekday weekend">Вс</div>
        </div>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h3 id="modal-date" style="margin-top:0">Дата</h3>
            <div id="existing-notes" style="margin-bottom:15px; font-size:0.85rem;"></div>
            <textarea id="note-text" style="width:100%; height:60px; margin-bottom:10px; border-radius:10px; padding:10px; border:1px solid #ccc;" placeholder="Описание события..."></textarea>
            
            <div class="cat-grid">
                <div class="cat-btn" id="btn-memorial" onclick="setCat('memorial')">ВЕЧЕРЯ (Красный)</div>
                <div class="cat-btn" id="btn-congress" onclick="setCat('congress')">КОНГРЕСС (Синий)</div>
                <div class="cat-btn" id="btn-meeting" onclick="setCat('meeting')">СОБРАНИЕ (Белый)</div>
                <div class="cat-btn" id="btn-personal" onclick="setCat('personal')">ЛИЧНОЕ (Зеленый)</div>
            </div>

            <button onclick="saveNote()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">ДОБАВИТЬ В КАЛЕНДАРЬ</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const currentUser = localStorage.getItem('currentUser') || 'ADMIN';
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        document.getElementById('month-title').innerText = months[monthIdx];
        
        let dbData = {};
        let activeDay = null;
        let selectedCat = 'meeting';

        window.setCat = (c) => { 
            selectedCat = c; 
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+c).classList.add('active');
        }

        onSnapshot(doc(db, "calendar", `2026_${monthIdx}`), (snap) => {
            dbData = snap.exists() ? snap.data() : {};
            render();
        });

        function render() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            const first = new Date(2026, monthIdx, 1).getDay();
            const shift = first === 0 ? 6 : first - 1;
            const daysCount = new Date(2026, monthIdx + 1, 0).getDate();

            for(let i=0; i<shift; i++) container.appendChild(Object.assign(document.createElement('div'), {className:'day-card empty'}));

            for(let i=1; i<=daysCount; i++) {
                const date = new Date(2026, monthIdx, i);
                const isWE = (date.getDay() === 0 || date.getDay() === 6);
                const card = document.createElement('div');
                card.className = 'day-card' + (isWE ? ' we-card' : '');
                card.innerHTML = `<span>${i}</span>`;
                
                if(dbData[i]) {
                    const row = document.createElement('div');
                    row.className = 'marks-row';
                    dbData[i].forEach(n => {
                        const m = document.createElement('div');
                        m.className = 'mark-rect';
                        m.style.background = `var(--ev-${n.category})`;
                        row.appendChild(m);
                    });
                    card.appendChild(row);
                }

                card.onmouseover = () => {
                    const p = document.getElementById('live-preview');
                    if(dbData[i]) p.innerHTML = dbData[i].map(n => `• ${n.text}`).join('<br>');
                    else p.innerText = 'Нет событий';
                };
                card.onclick = () => { activeDay = i; openModal(i); };
                container.appendChild(card);
            }
        }

        window.openModal = (day) => {
            document.getElementById('modal-date').innerText = day + ' ' + months[monthIdx];
            const list = document.getElementById('existing-notes');
            list.innerHTML = (dbData[day] || []).map((n, idx) => `
                <div style="display:flex; justify-content:space-between; background:#f9f9f9; padding:5px; margin-bottom:3px; border-radius:5px;">
                    <span style="border-left:3px solid var(--ev-${n.category}); padding-left:5px;">${n.text}</span>
                    <button onclick="deleteNote(${day}, ${idx})" style="border:none; color:red; cursor:pointer;">×</button>
                </div>
            `).join('');
            setCat('meeting');
            document.getElementById('note-modal').style.display = 'flex';
        }

        window.closeModal = () => document.getElementById('note-modal').style.display = 'none';

        window.saveNote = async () => {
            const txt = document.getElementById('note-text').value;
            if(!txt) return;
            const list = dbData[activeDay] || [];
            list.push({text: txt, category: selectedCat, user: currentUser});
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[activeDay]: list}, {merge:true});
            document.getElementById('note-text').value = '';
            closeModal();
        }

        window.deleteNote = async (day, idx) => {
            const list = [...dbData[day]];
            list.splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[day]: list}, {merge:true});
            openModal(day);
        }
    </script>
</body>
</html>
