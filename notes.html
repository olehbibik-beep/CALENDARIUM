<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Заметки</title>
    <style>
        :root { 
            --accent: #0088cc; --bg: #3e3e3e; --dark: #1a1d1f; --card-bg: #22272a;
            --ev-memorial: #ff7675; --ev-memorial-bg: #3b1e22; 
            --ev-meeting: #09e0e3; --weekend: #1a1e20; --text-main: #e0e6ed;
            --inner-border: rgba(255, 255, 255, 0.05);
        }
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; 
        }

        .app-container {
            width: 95%; max-width: 1200px; height: 85%;
            background: #0f1112; border-radius: 30px;
            border: 1px solid var(--inner-border);
            display: flex; position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* ЛЕВАЯ ПАНЕЛЬ — ФИКСИРОВАННАЯ */
        .sidebar { 
            width: 300px; flex: 0 0 300px; /* Запрещаем прыгать ширине */
            background: rgba(80,80,80,0.2); 
            padding: 25px; display: flex; flex-direction: column; 
            border-right: 1px solid var(--inner-border);
            height: 100%;
        }

        .user-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: var(--dark); color: #fff; border: 1px solid #333; padding: 8px 12px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; cursor: pointer; }

        /* Область деталей дня со скроллом */
        .details-container {
            flex: 1; display: flex; flex-direction: column; 
            min-height: 0; /* Важно для скролла внутри flex */
        }
        .preview-label { font-size: 0.6rem; color: var(--accent); margin-bottom: 10px; font-weight: 800; letter-spacing: 1px; }
        
        .preview { 
            background: var(--card-bg); padding: 15px; border-radius: 15px; 
            overflow-y: auto; flex: 1; border: 1px solid var(--inner-border);
            font-size: 0.85rem;
        }

        /* Кнопка ВСЕГДА снизу сайдбара */
        .action-btn { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            font-weight: 800; margin-top: 15px; cursor: pointer; color: white; 
            background: var(--accent); font-size: 0.75rem; 
        }

        /* ПРАВАЯ ЧАСТЬ — КАЛЕНДАРЬ */
        .main-view { 
            flex: 1; display: flex; flex-direction: column; 
            padding: 20px; position: relative; height: 100%;
        }

        #m-name { font-size: 2.5rem; font-weight: 900; text-align: center; margin-bottom: 15px; letter-spacing: -1px; }

        .calendar-content {
            flex: 1; display: flex; flex-direction: column; min-height: 0;
            width: 100%; max-width: 700px; margin: 0 auto;
        }

        .weekdays { 
            display: grid; grid-template-columns: repeat(7, 1fr); 
            text-align: center; font-size: 0.65rem; font-weight: 900; 
            color: #555; margin-bottom: 10px; 
        }

        .grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); 
            grid-template-rows: repeat(6, 1fr); /* 6 строк, чтобы все влезло */
            gap: 8px; flex: 1; min-height: 0;
        }
        
        .day-box { 
            background: var(--dark); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1rem; cursor: pointer; 
            border: 1px solid transparent; position: relative;
        }
        .day-box.selected { border-color: var(--accent); background: #222; }
        .day-box.today { background: rgba(255,255,255,0.05); color: var(--accent); }
        .day-box.weekend { color: #555; }
        .day-box.has-memorial { background: var(--ev-memorial-bg); color: var(--ev-memorial); border-color: var(--ev-memorial); }

        .indicator-row { position: absolute; bottom: 5px; display: flex; gap: 2px; justify-content: center; width: 80%; }
        .mark { height: 3px; flex: 1; border-radius: 2px; }
        .m-meeting { background: var(--ev-meeting); }
        .m-personal { background: #555; }

        /* ЕДИНЫЙ ФУТЕР */
        .inner-footer {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(90, 90, 90, 0.4); height: 40px;
            padding: 0 30px; border-top: 1px solid var(--inner-border);
        }
        .footer-text { font-size: 9px; color: #fff; text-transform: uppercase; font-weight: 700; }

        /* МОБИЛКИ */
        @media (max-width: 850px) {
            body { overflow: auto; height: auto; }
            .app-container { flex-direction: column; height: auto; border-radius: 0; width: 100vw; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--inner-border); order: 3; }
            .main-view { order: 2; height: 500px; }
            .user-header { order: 1; width: 100%; position: sticky; top: 0; background: #0f1112; z-index: 10; padding: 15px; border-bottom: 1px solid var(--inner-border); }
            .inner-footer { position: static; order: 4; }
            .grid { aspect-ratio: 1/1; }
        }

        /* Стили для модалки из твоего кода остаются без изменений */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #1e2224; padding: 25px; border-radius: 24px; width: 92%; max-width: 380px; }
        textarea { width: 100%; height: 70px; background: #0f1112; color: white; border: none; padding: 10px; border-radius: 10px; margin: 10px 0; }
        .note-item { display: flex; justify-content: space-between; padding: 10px; background: #14171a; margin-bottom: 5px; border-radius: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="user-header">
            <button class="back-btn" onclick="location.href='calendar.html'">← НАЗАД</button>
            <div id="user-display" class="user-name">...</div>
        </div>

        <div class="details-container">
            <div class="preview-label">СОБЫТИЯ ДНЯ</div>
            <div id="preview" class="preview">Нажмите на дату...</div>
            <button class="action-btn" id="edit-btn" style="display:none;" onclick="openModal()">+ ДОБАВИТЬ ПЛАН</button>
        </div>
    </div>

    <div class="main-view">
        <div id="m-name">...</div>
        <div class="calendar-content">
            <div class="weekdays"><div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div></div>
            <div id="grid" class="grid"></div>
        </div>
    </div>

    <div class="inner-footer">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width:6px; height:6px; background:#2ecc71; border-radius:50%;"></div>
            <div class="footer-text">Group 5 • v2.6.16</div>
        </div>
        <div class="footer-text">© 2026 CALENDARIUM</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="modal-title" style="margin:0; color:var(--accent); text-align:center; font-size:1rem;"></h3>
        <div id="modal-list" style="margin-top:15px; max-height:150px; overflow-y:auto;"></div>
        <textarea id="note-input" placeholder="Введите текст..."></textarea>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <button class="action-btn" style="background:var(--ev-memorial); margin:0;" onclick="save('memorial')">ВЕЧЕРЯ</button>
            <button class="action-btn" style="background:var(--ev-meeting); margin:0;" onclick="save('meeting')">ВСТРЕЧА</button>
            <button class="action-btn" style="background:#555; margin:0;" onclick="save('personal')">ЛИЧНОЕ</button>
        </div>
        <button class="action-btn" style="background:transparent; color:#888;" onclick="closeModal()">ЗАКРЫТЬ</button>
    </div>
</div>

<script type="module">

</body>
</html>
