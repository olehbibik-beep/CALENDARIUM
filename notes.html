<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Планы | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0088cc; --bg: #f4f7f6; --dark: #2d3436;
            --ev-memorial: #ff4757; --ev-meeting: #0984e3;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Левая панель */
        .sidebar { 
            width: 350px; background: #1e2122; padding: 30px; color: white;
            display: flex; flex-direction: column; align-items: flex-end; text-align: right;
        }
        .back-btn { background: #fff; color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; margin-bottom: 20px; }
        #month-title { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; margin: 0; }
        #year-label { font-size: 1.2rem; opacity: 0.3; margin-bottom: 30px; }

        #live-preview { 
            width: 100%; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px;
            border-right: 4px solid var(--accent); min-height: 100px; margin-bottom: 20px;
        }

        /* Календарная сетка */
        .main { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; width: 100%; max-width: 800px; }
        .day { 
            background: var(--dark); height: 90px; border-radius: 15px; color: white;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            position: relative; font-weight: 800; font-size: 1.2rem;
        }
        .day.empty { background: transparent; cursor: default; }
        .day.selected { border: 3px solid var(--accent); transform: scale(1.05); }
        .dots { position: absolute; bottom: 8px; display: flex; gap: 3px; }
        .dot-line { width: 15px; height: 3px; border-radius: 2px; }

        /* Модальное окно */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            z-index: 1000; align-items: center; justify-content: center; 
        }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 400px; color: black; }
        textarea { width: 100%; height: 80px; margin: 10px 0; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .btn-save { width: 100%; background: black; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        
        .cat-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .cat-opt { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 800; font-size: 0.7rem; color: white; }

        @media (max-width: 800px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; align-items: center; }
            .grid { grid-template-columns: repeat(7, 1fr); }
            .day { height: 12vw; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="back-btn" onclick="location.href='calendar.html'">← НАЗАД</button>
        <div id="month-title">...</div>
        <div id="year-label">...</div>
        <div style="width:100%; text-align:right; font-size:0.7rem; opacity:0.5; margin-bottom:5px;">ЗАПИСИ НА ДЕНЬ:</div>
        <div id="live-preview">Выберите дату</div>
        <button id="edit-btn" style="display:none; width:100%; padding:10px; background:var(--accent); border:none; color:white; border-radius:8px; font-weight:800; cursor:pointer;" onclick="openModal()">РЕДАКТИРОВАТЬ</button>
    </div>

    <div class="main">
        <div class="grid" id="grid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h3 id="modal-date" style="margin-top:0">Дата</h3>
            <div id="notes-list" style="margin-bottom:15px"></div>
            <textarea id="note-input" placeholder="Введите текст..."></textarea>
            <div class="cat-row">
                <button class="cat-opt" id="opt-mem" style="background:var(--ev-memorial)" onclick="setCat('memorial')">ВЕЧЕРЯ</button>
                <button class="cat-opt" id="opt-meet" style="background:var(--ev-meeting)" onclick="setCat('meeting')">СОБРАНИЕ</button>
            </div>
            <button class="btn-save" onclick="save()">СОХРАНИТЬ</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; color:#aaa; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const year = parseInt(localStorage.getItem('selectedYear') || 2026);
        const docId = `${year}_${monthIdx}`;
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        document.getElementById('month-title').innerText = months[monthIdx];
        document.getElementById('year-label').innerText = year;

        let data = {};
        let selDay = null;
        let curCat = 'meeting';

        onSnapshot(doc(db, "calendar", docId), (s) => {
            data = s.exists() ? s.data() : {};
            draw();
            if(selDay) updatePreview();
        });

        function draw() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            const first = new Date(year, monthIdx, 1).getDay();
            const shift = first === 0 ? 6 : first - 1;
            const total = new Date(year, monthIdx + 1, 0).getDate();

            for(let i=0; i<shift; i++) container.innerHTML += '<div class="day empty"></div>';

            for(let i=1; i<=total; i++) {
                const card = document.createElement('div');
                card.className = 'day' + (selDay === i ? ' selected' : '');
                card.innerHTML = `<span>${i}</span>`;
                
                if(data[i] && data[i].length > 0) {
                    const dBox = document.createElement('div');
                    dBox.className = 'dots';
                    data[i].forEach(n => {
                        const dot = document.createElement('div');
                        dot.className = 'dot-line';
                        dot.style.background = n.category === 'memorial' ? 'var(--ev-memorial)' : 'var(--ev-meeting)';
                        dBox.appendChild(dot);
                    });
                    card.appendChild(dBox);
                }
                card.onclick = () => { selDay = i; draw(); updatePreview(); document.getElementById('edit-btn').style.display='block'; };
                container.appendChild(card);
            }
        }

        function updatePreview() {
            const p = document.getElementById('live-preview');
            const notes = data[selDay] || [];
            p.innerHTML = notes.length ? notes.map(n => `<div>• ${n.text}</div>`).join('') : 'Нет записей';
        }

        window.setCat = (c) => { 
            curCat = c; 
            document.getElementById('opt-mem').style.outline = c === 'memorial' ? '3px solid black' : 'none';
            document.getElementById('opt-meet').style.outline = c === 'meeting' ? '3px solid black' : 'none';
        };

        window.openModal = () => {
            document.getElementById('modal-date').innerText = selDay + ' ' + months[monthIdx];
            const list = document.getElementById('notes-list');
            list.innerHTML = (data[selDay] || []).map((n, idx) => `
                <div style="display:flex; justify-content:space-between; background:#eee; padding:8px; border-radius:5px; margin-bottom:5px">
                    <span>${n.text}</span>
                    <button onclick="del(${idx})" style="color:red; border:none; background:none; cursor:pointer">×</button>
                </div>`).join('');
            document.getElementById('modal').style.display = 'flex';
            setCat('meeting');
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        window.save = async () => {
            const txt = document.getElementById('note-input').value.trim();
            if(!txt) return;
            const notes = [...(data[selDay] || [])];
            notes.push({ text: txt, category: curCat });
            await setDoc(doc(db, "calendar", docId), { [selDay]: notes }, { merge: true });
            document.getElementById('note-input').value = '';
            openModal();
        };

        window.del = async (idx) => {
            const notes = [...data[selDay]];
            notes.splice(idx, 1);
            await setDoc(doc(db, "calendar", docId), { [selDay]: notes }, { merge: true });
            openModal();
        };

        draw();
    </script>
</body>
</html>
