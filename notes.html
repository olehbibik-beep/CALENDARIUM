<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="apple-mobile-web-app-title" content="Calendarium">
    <meta name="application-name" content="Calendarium">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121416">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Заметки</title>
    <style>
    :root { 
        --accent: #09e0e3; --bg: #71797E; --dark: #1a1d1f; --card-bg: #22272a;
        --ev-memorial: #ff7675; --ev-memorial-bg: #3b1e22; 
        --ev-meeting: #87CEEB; --weekend: #14161A; --text-main: #e0e6ed;
        --inner-border: rgba(255, 255, 255, 0.05);
    }
    
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
        margin: 0; background: var(--bg); color: var(--text-main); 
        display: flex; align-items: center; justify-content: center; 
        height: 100vh; overflow: hidden; 
    }

    .app-container {
        width: 90%; max-width: 95%; height: 85%; background: #0f1112; border-radius: 30px;
        border: 0px solid var(--inner-border); display: flex; position: relative; overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .sidebar { 
        width: 320px; background: rgba(80,80,80,0.2); 
        padding: 30px; display: flex; flex-direction: column; 
        border-right: 0px solid var(--inner-border); flex-shrink: 0;
    }

    .user-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .back-btn { background: rgba(0,0,0,0.5); color: #fff; border: 0px solid #333; padding: 8px 16px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
    .back-btn:hover { background: var(--accent); border-color: #555; }
    .user-name { font-weight: 700; text-transform: uppercase; font-size: 0.7rem; color: #fff; letter-spacing: 1px; }

    .preview-box { display: flex; flex-direction: column; margin-top: 10px; flex: 1; }
    /* УБРАЛИ border-left ОТСЮДА */
    .preview { background: transparent; width: 100%; padding: 15px 0; border-radius: 4px; min-height: 100px; flex: 1; overflow-y: auto; font-size: 0.9rem; line-height: 1.5; }
    
    .action-btn { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: 700; margin-top: 20px; cursor: pointer; color: #fff; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem; background: var(--accent); }
    .action-btn:active { transform: scale(0.96); }

    .main-view { 
        flex: 1; display: flex; flex-direction: column; 
        padding: 30px 20px; position: relative; overflow-y: auto;
    }

    .month-title-wrapper { text-align: center; margin-bottom: 25px; }
    #m-name { font-size: 2rem; font-weight: 300; letter-spacing: 2px; color: #fff; text-transform: uppercase; }

    .calendar-wrapper { max-width: 600px; width: 100%; margin: 0 auto; }
    
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.7rem; font-weight: 900; margin-bottom: 15px; color: #7f8fa6; letter-spacing: 1px; }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    
    .day-box { 
        width: 100%; aspect-ratio: 1/1; background: var(--dark); border-radius: 12px; 
        display: flex; align-items: center; justify-content: center;
        font-weight: 300; font-size: 1.1rem; cursor: pointer; border: 0px solid transparent;
        position: relative; transition: 0.2s; overflow: hidden;
    }
    
    .day-box:hover { background: #2b3236; }
    .day-box.weekend { background: var(--weekend); color: #636e72; }
    .day-box.weekend:hover { background: #2b3236; color: #636e72; }
    .day-box.selected { border-color: var(--accent) !important; background: transparent; z-index: 1; }
    .day-box.selected::before { content: ''; position: absolute; inset: 0; background: transparent; border-radius: 10px; z-index: -1; }
    
    .day-box.has-memorial { background: var(--ev-memorial-bg) !important; color: var(--ev-memorial) !important; }
    .day-box.today { font-size: 2.2rem; color: #fff;}

    .indicator-row { position: absolute; bottom: 10px; display: flex; gap: 4px; justify-content: center; width: 60%; z-index: 5; }
    .mark { height: 4px; width: 25%; border-radius: 4px; }
    .m-meeting { background: var(--ev-meeting); }
    .m-personal { background: #888; }

    /* --- ЛЕНТА МНОГОДНЕВНОГО СОБЫТИЯ --- */
    .day-box.c-start::after,
    .day-box.c-mid::after,
    .day-box.c-end::after,
    .day-box.c-single::after {
        content: ''; position: absolute; bottom: 0px; height: 5px;
        background: #0f1112; z-index: 5;
    }
    .day-box.c-single::after { left: 40%; right: 40%; border-radius: 2px; }
    .day-box.c-start::after { left: 70%; right: 0; border-radius: 2px 0 0 2px; }
    .day-box.c-mid::after { left: 0; right: 0; border-radius: 0; }
    .day-box.c-end::after { left: 0; right: 70%; border-radius: 0 2px 2px 0; }

    .inner-footer { position: absolute; bottom: 10px; left: 70px; right: 70px; display: flex; align-items: center; justify-content: space-between; background: transparent; padding: 5px 20px; border-top: 0px solid var(--inner-border); }
    .footer-text { font-size: 9px; color: #555; text-transform: uppercase; font-weight: 300; letter-spacing: 1px; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
    .modal-box { background: var(--card-bg); padding: 25px; border-radius: 8px; width: 90%; max-width: 400px; border: 0px solid var(--inner-border); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    .modal-btn { width: 100%; padding: 14px; border: none; border-radius: 4px; font-weight: 800; margin-bottom: 8px; cursor: pointer; color: white; transition: 0.2s; text-transform: uppercase; font-size: 0.7rem; }
    .modal-btn:active { transform: scale(0.96); }
    .modal-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    
    textarea { width: 100%; height: 80px; margin-bottom: 15px; padding: 15px; border-radius: 4px; border: 0px solid var(--inner-border); background: var(--dark); color: white; resize: none; outline: none; font-size: 0.9rem; }
    textarea:focus { border-color: var(--accent); }
    
    #modal-list { margin-bottom: 20px; max-height: 200px; overflow-y: auto; padding-right: 5px; }
    .note-item { display: flex; justify-content: space-between; align-items: center; background: transparent; padding: 12px 15px; margin-bottom: 8px; border-radius: 4px; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    @media (max-width: 850px) {
        body { overflow-x: hidden; overflow-y: auto; height: auto; padding: 0; display: flex; flex-direction: column; }
        .app-container { flex-direction: column; height: auto; min-height: auto; width: 100vw; border-radius: 0; display: flex; flex: none; }
        .sidebar { display: contents; }
        .user-header { order: 1; width: 100%; padding: 20px; background: #0f1112; border-bottom: 1px solid var(--inner-border); margin-bottom: 0; display: flex; flex-direction: row; align-items: center; justify-content: space-between; }
        .main-view { order: 2; padding: 15px; width: 100%; flex: none; }
        .month-title-wrapper { margin-bottom: 15px; }
        #m-name { font-size: 1.8rem; }
        .grid { gap: 3px; } 
        .day-box { font-size: 0.9rem; border-radius: 6px; }
        .preview-box { order: 3; display: flex; width: 100%; padding: 20px; background: rgba(255, 255, 255, 0.02); border-top: 1px solid var(--inner-border); margin-top: 10px; flex: none; }
        .preview { flex: none; min-height: 120px; height: auto; }
        .inner-footer { order: 4; position: static; padding: 20px; width: 100%; }
    }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="user-header">
                <button class="back-btn" onclick="location.href='calendar.html'">НАЗАД</button>
                <div id="user-display" class="user-name">...</div>
            </div>
            
            <div class="preview-box">
                <div style="font-size:0.6rem; color:#7f8fa6; margin-bottom:10px; font-weight:800; letter-spacing:1px;">ДЕТАЛИ ДНЯ</div>
                <div id="preview" class="preview">
                    <span style="color:#7f8fa6;">Выберите день в календаре, чтобы посмотреть планы.</span>
                </div>
                <button class="action-btn" id="edit-btn" style="display:none;" onclick="openModal()">+ ДОБАВИТЬ ПЛАН</button>
            </div>
        </div>

        <div class="main-view">
            <div class="calendar-wrapper">
                <div class="month-title-wrapper">
                    <div id="m-name">...</div>
                </div>
                
                <div class="weekdays">
                    <div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div>
                </div>
                <div id="grid" class="grid"></div>
            </div>
        </div>
    </div>

    <div class="inner-footer">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="footer-dot"></div>
            <div class="footer-text">Group 5 • v2.6.16</div>
        </div>
        <div class="footer-text">ЗАМЕТКИ</div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h3 id="modal-title" style="margin:0 0 20px 0; text-align:center; color: var(--accent); text-transform: uppercase;"></h3>
            
            <div id="modal-list"></div>
            
            <textarea id="note-input" placeholder="Опишите план..."></textarea>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <button id="btn-memorial" class="modal-btn" style="background:var(--ev-memorial);" onclick="save('memorial')">ВЕЧЕРЯ</button>
                <button id="btn-meeting" class="modal-btn" style="background:var(--ev-meeting); color: #000;" onclick="save('meeting')">ВСТРЕЧА</button>
                <button id="btn-congress" class="modal-btn" style="background:transparent; border: 1px solid #aaa; color: #fff;" onclick="save('congress')">КОНГРЕСС</button>
                <button class="modal-btn" style="background:#444;" onclick="save('personal')">ЛИЧНОЕ</button>
            </div>
            <button class="modal-btn" style="background:transparent; border: 1px solid #444; color:#aaa;" onclick="closeModal()">ОТМЕНА</button>
        </div>
    </div>

<script type="module">
    const currentUserRaw = localStorage.getItem('currentUser');
    if (!currentUserRaw) {
        window.location.replace('index.html');
    }
    const currentUser = currentUserRaw.toLowerCase();
    document.getElementById('user-display').innerText = currentUser;

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));
    const isAdmin = currentUser === 'admin';

    const mIdx = parseInt(localStorage.getItem('selectedMonth')) || 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    const docId = `${year}_${mIdx}`;
    const months = ["ЯНВАРЬ", "ФЕВРАЛЬ", "МАРТ", "АПРЕЛЬ", "МАЙ", "ИЮНЬ", "ИЮЛЬ", "АВГУСТ", "СЕНТЯБРЬ", "ОКТЯБРЬ", "НОЯБРЬ", "ДЕКАБРЬ"];
    
    document.getElementById('m-name').innerText = months[mIdx] + " " + year;

    let dbData = {};
    let selectedDay = null;

    function renderGrid() {
        const grid = document.getElementById('grid');
        const firstDay = new Date(year, mIdx, 1).getDay();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        const totalDays = new Date(year, mIdx + 1, 0).getDate();
        
        const now = new Date();
        const tDay = now.getDate();
        const tMonth = now.getMonth();
        const tYear = now.getFullYear();

        grid.innerHTML = '';
        
        for (let i = 0; i < shift; i++) {
            grid.innerHTML += `<div class="day-box" style="visibility:hidden"></div>`;
        }

        for (let d = 1; d <= totalDays; d++) {
            const isWeekend = new Date(year, mIdx, d).getDay() % 6 === 0;
            const isToday = (d === tDay && mIdx === tMonth && year === tYear);
            
            grid.innerHTML += `
                <div class="day-box ${isWeekend ? 'weekend' : ''} ${isToday ? 'today' : ''}" 
                     id="tile-${d}" onclick="selectDay(${d})">
                    ${d}
                    <div class="indicator-row" id="marks-${d}"></div>
                </div>`;
        }
    }

    function updateUI() {
        document.querySelectorAll('.day-box').forEach(b => {
            b.classList.remove('c-start', 'c-mid', 'c-end', 'c-single', 'has-memorial');
        });

        const hasCongress = (day) => {
            return Array.isArray(dbData[day]) && dbData[day].some(n => n.category === 'congress');
        };

        for (let d = 1; d <= 31; d++) {
            const tile = document.getElementById(`tile-${d}`);
            const row = document.getElementById(`marks-${d}`);
            if (!tile || !row) continue;
            
            const notes = Array.isArray(dbData[d]) ? dbData[d] : [];
            row.innerHTML = '';
            
            notes.forEach(n => {
                if (n.category === 'memorial') tile.classList.add('has-memorial');
                else if (n.category === 'meeting') row.innerHTML += '<div class="mark m-meeting"></div>';
                else if (n.category === 'personal') row.innerHTML += '<div class="mark m-personal"></div>';
            });

            if (hasCongress(d)) {
                const prev = hasCongress(d - 1);
                const next = hasCongress(d + 1);
                
                const isSunday = new Date(year, mIdx, d).getDay() === 0;
                const isMonday = new Date(year, mIdx, d).getDay() === 1;

                if (!prev && next) {
                    if (isSunday) tile.classList.add('c-single'); 
                    else tile.classList.add('c-start');
                } else if (prev && next) {
                    if (isMonday) tile.classList.add('c-start'); 
                    else if (isSunday) tile.classList.add('c-end'); 
                    else tile.classList.add('c-mid');
                } else if (prev && !next) {
                    if (isMonday) tile.classList.add('c-single');
                    else tile.classList.add('c-end');
                } else {
                    tile.classList.add('c-single'); 
                }
            }
        }
        if (selectedDay) selectDay(selectedDay);
    }

    window.selectDay = (d) => {
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        const activeTile = document.getElementById(`tile-${d}`);
        if(activeTile) activeTile.classList.add('selected');
        
        document.getElementById('edit-btn').style.display = 'block';
        const notes = Array.isArray(dbData[d]) ? dbData[d] : []; 
        
        // ЗДЕСЬ ОБНОВИЛИ ОТРИСОВКУ КАЖДОГО СОБЫТИЯ
        document.getElementById('preview').innerHTML = `<div style="color:var(--accent); font-weight: 800; font-size: 1.2rem; margin-bottom: 15px;">${d} ${months[mIdx]}</div>` + 
            (notes.map(n => {
                const borderCol = n.category === 'memorial' ? 'var(--ev-memorial)' : (n.category === 'meeting' ? 'var(--ev-meeting)' : (n.category === 'congress' ? '#aaa' : '#888'));
                return `<div style="margin-bottom:12px; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 4px; border-left: 4px solid ${borderCol};">
                            ${n.text}
                        </div>`;
            }).join('') || '<span style="color:#555;">Нет запланированных событий</span>');
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        const notes = Array.isArray(dbData[selectedDay]) ? dbData[selectedDay] : []; 
        
        document.getElementById('btn-memorial').disabled = !isAdmin;
        document.getElementById('btn-meeting').disabled = !isAdmin;

        list.innerHTML = notes.map((n, idx) => {
            const isOwner = n.author === currentUser;
            const canDelete = isAdmin || isOwner;
            const borderCol = n.category === 'memorial' ? 'var(--ev-memorial)' : (n.category === 'meeting' ? 'var(--ev-meeting)' : (n.category === 'congress' ? '#aaa' : '#888'));

            return `
            <div class="note-item" style="border-left: 4px solid ${borderCol}">
                <div style="font-size:0.85rem; font-weight:500; color:#eee;">${n.text}</div>
                ${canDelete ? `<div onclick="delNote(${idx})" style="color:#ff7675; cursor:pointer; padding:5px 10px; font-size:1.2rem; font-weight: bold;">✕</div>` : ''}
            </div>`
        }).join('');
        
        document.getElementById('modal').style.display = 'flex';
        list.scrollTop = list.scrollHeight;
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const val = document.getElementById('note-input').value.trim();
        const text = val || (cat === 'memorial' ? 'ВЕЧЕРЯ' : cat === 'meeting' ? 'ВСТРЕЧА' : cat === 'congress' ? 'КОНГРЕСС' : 'ЛИЧНОЕ');
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        notes.push({ text, category: cat, author: currentUser });
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        document.getElementById('note-input').value = '';
        openModal();
    };

    window.delNote = async (idx) => {
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        const noteAuthor = notes[idx].author ? notes[idx].author.toLowerCase() : '';
        const isOwner = noteAuthor === currentUser;

        if (isAdmin || isOwner) {
            notes.splice(idx, 1);
            await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
            openModal();
        }
    };

    renderGrid();
    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });
</script>
</body>
</html>
