<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --main-bg: #121415; /* Глубокий черный фон */
            --sidebar-bg: #1e2122; /* Темный сайдбар */
            --dark-card: #2d3436; 
            --text-bright: #ffffff;
            --text-dim: #b2bec3;
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); color: var(--text-bright); overflow: hidden; }

        /* ТЕМНЫЙ САЙДБАР */
        .sidebar { 
            width: 420px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; border-right: 1px solid #2d3436; 
            z-index: 10; flex-shrink: 0; box-sizing: border-box; 
            align-items: flex-end; text-align: right;
        }

        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logout-btn { 
            background: var(--text-bright); color: #000; border: none; padding: 6px 14px; border-radius: 8px; 
            font-size: 0.75rem; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        .user-name { font-size: 1.1rem; font-weight: 800; color: var(--text-bright); text-transform: uppercase; }
        .user-icon { color: var(--accent); display: flex; align-items: center; }

        #display-year-static { 
            font-size: 8rem; font-weight: 200; color: #2d3436; 
            letter-spacing: -12px; line-height: 0.7; margin: 0; 
        }
        #month-title { 
            font-size: 2.8rem; font-weight: 800; color: var(--text-bright); 
            letter-spacing: -2px; line-height: 1; margin-bottom: 40px; text-transform: uppercase;
        }

        .side-section { width: 100%; margin-bottom: 30px; }
        .side-label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        
        /* ТЕМНЫЙ РОЗОВЫЙ БЛОК */
        #live-preview { 
            font-size: 0.85rem; background: #2d1a24; padding: 20px; 
            border-radius: 15px 0 0 15px; position: relative;
            line-height: 1.5; color: #fab1a0; text-align: right; width: 100%; box-sizing: border-box;
            min-height: 100px; transition: 0.2s; border: 1px solid #4a2334;
        }
        #live-preview::after {
            content: ''; position: absolute; right: -10px; top: -5px; bottom: -5px; width: 10px;
            border-right: 3px solid #e6007e; border-top: 3px solid #e6007e;
            border-bottom: 3px solid #e6007e; border-radius: 0 10px 10px 0;
        }

        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 0.95rem; font-weight: 600; color: var(--text-dim); margin-bottom: 10px; }
        .color-bar { width: 4px; height: 16px; border-radius: 2px; }

        /* ОСНОВНАЯ СЕТКА */
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; margin-bottom: 15px; }
        .weekday { font-size: 0.7rem; font-weight: 900; color: #4b4b4b; text-transform: uppercase; text-align: center; }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; }

        .day-card { 
            background: var(--dark-card); 
            height: 110px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.3rem; color: #ffffff; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        .day-card:hover { 
            transform: translateY(-5px); 
            background: #404b4d; 
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }
        .day-card.empty { background: transparent; box-shadow: none; cursor: default; border: none; }
        
        .dots-row { position: absolute; bottom: 15px; display: flex; gap: 4px; }
        .day-mark { width: 6px; height: 6px; border-radius: 50%; }

        /* МОДАЛКА (Светлая для акцента или Темная) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #1e2122; padding: 35px; border-radius: 30px; width: 480px; text-align: right; border: 1px solid #333; }
        .entry-item { background: #2d3436; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #eee; }
        textarea { width: 100%; height: 90px; border: 1px solid #333; border-radius: 12px; padding: 12px; font-family: inherit; margin: 10px 0; outline: none; background: #121415; color: #fff; }
        .save-btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; }
        .cat-select { display: flex; gap: 6px; margin-bottom: 15px; direction: rtl; }
        .cat-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; cursor: pointer; font-size: 0.6rem; font-weight: 900; color: #fff; background: #2d3436; }
        .cat-btn.active { border-color: var(--accent); background: #004a70; }
        .del-x { color: #d63031; border: none; background: none; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="logout-btn" onclick="location.href='calendar.html'">Назад</button>
            <div class="user-name" id="user-display">ADMIN</div>
            <div class="user-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" fill="currentColor"></path>
                    <circle cx="12" cy="7" r="4" fill="currentColor"></circle>
                </svg>
            </div>
        </div>
        
        <div id="display-year-static">2026</div>
        <div id="month-title">...</div>

        <div class="side-section">
            <div class="side-label">События дня</div>
            <div id="live-preview">Наведите на карту дня...</div>
        </div>

        <div class="side-section">
            <div class="side-label">Категории</div>
            <div class="legend-item">Работа <div class="color-bar" style="background: var(--ev-work);"></div></div>
            <div class="legend-item">Важное <div class="color-bar" style="background: var(--ev-important);"></div></div>
            <div class="legend-item">Личное <div class="color-bar" style="background: var(--ev-personal);"></div></div>
        </div>
    </div>

    <div class="main-content">
        <div class="weekdays">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
        </div>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h2 id="modal-date-title" style="margin:0 0 20px 0; font-weight: 900; color: #fff;">Дата</h2>
            <div id="existing-notes" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            <div style="border-top: 1px solid #333; padding-top: 15px;">
                <textarea id="note-text" placeholder="Запишите что-нибудь..."></textarea>
                <div class="cat-select">
                    <div class="cat-btn" id="btn-personal" onclick="selectCat('personal')">ЛИЧНОЕ</div>
                    <div class="cat-btn" id="btn-important" onclick="selectCat('important')">ВАЖНОЕ</div>
                    <div class="cat-btn" id="btn-work" onclick="selectCat('work')">РАБОТА</div>
                </div>
                <button class="save-btn" onclick="saveNote()">ДОБАВИТЬ В СПИСОК</button>
            </div>
            <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:#555; cursor:pointer; font-weight:600;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const currentUser = localStorage.getItem('currentUser');
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = monthsNames[monthIdx];
        document.getElementById('user-display').innerText = currentUser;

        let currentMonthData = {};
        let selectedDay = null;
        let activeCat = 'work';

        onSnapshot(doc(db, "calendar", `2026_${monthIdx}`), (snap) => {
            currentMonthData = snap.exists() ? snap.data() : {};
            renderGrid();
        });

        function renderGrid() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            const firstDay = new Date(2026, monthIdx, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

            for(let s=0; s<shift; s++) container.appendChild(Object.assign(document.createElement('div'), {className:'day-card empty'}));

            for (let i = 1; i <= daysInMonth; i++) {
                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = i;
                
                if (currentMonthData[i]) {
                    const dots = document.createElement('div');
                    dots.className = 'dots-row';
                    currentMonthData[i].forEach(n => {
                        const d = document.createElement('div');
                        d.className = 'day-mark';
                        d.style.background = `var(--ev-${n.category})`;
                        dots.appendChild(d);
                    });
                    card.appendChild(dots);
                }

                card.onmouseover = () => {
                    const prev = document.getElementById('live-preview');
                    if (currentMonthData[i] && currentMonthData[i].length > 0) {
                        prev.innerHTML = currentMonthData[i].map(n => `<b>${n.user}:</b> ${n.text}`).join('<br>');
                    } else { prev.innerText = 'Нет запланированных событий'; }
                };

                card.onclick = () => openModal(i);
                container.appendChild(card);
            }
        }

        window.openModal = (day) => {
            selectedDay = day;
            document.getElementById('modal-date-title').innerText = day + ' ' + monthsNames[monthIdx];
            const list = document.getElementById('existing-notes');
            list.innerHTML = '';
            (currentMonthData[day] || []).forEach((n, idx) => {
                const canDel = n.user === currentUser || currentUser === 'admin';
                list.innerHTML += `<div class="entry-item" style="border-right:4px solid var(--ev-${n.category})">
                    <span><b>${n.user}:</b> ${n.text}</span>
                    ${canDel ? `<button class="del-x" onclick="deleteNote(${idx})">×</button>` : '🔒'}
                </div>`;
            });
            document.getElementById('note-modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('note-modal').style.display = 'none';
        window.selectCat = (cat) => { activeCat = cat; document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); document.getElementById(`btn-${cat}`).classList.add('active'); };

        window.saveNote = async () => {
            const text = document.getElementById('note-text').value;
            if(!text) return;
            const notes = currentMonthData[selectedDay] || [];
            notes.push({text, category: activeCat, user: currentUser});
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: notes}, {merge:true});
            await addDoc(collection(db, "logs"), {user: currentUser, action: "добавил событие", month: monthsNames[monthIdx], timestamp: serverTimestamp()});
            document.getElementById('note-text').value = '';
            openModal(selectedDay);
        };

        window.deleteNote = async (idx) => {
            currentMonthData[selectedDay].splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: currentMonthData[selectedDay]}, {merge:true});
            openModal(selectedDay);
        };
    </script>
</body>
</html>
