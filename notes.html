<style>
    /* ... (предыдущие стили сайдбара остаются) ... */

    /* ТЕМНЫЕ КАРТОЧКИ ДНЕЙ */
    .day-card { 
        background: #2d3436; /* Темный цвет */
        height: 110px; 
        border-radius: 20px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        font-weight: 800; 
        font-size: 1.2rem; 
        color: #ffffff; /* Белый текст */
        cursor: pointer; 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        border: 1px solid rgba(255,255,255,0.1); 
        position: relative; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .day-card:hover { 
        transform: translateY(-7px) scale(1.02); 
        background: #000000; 
        border-color: var(--accent);
        box-shadow: 0 15px 30px rgba(0, 136, 204, 0.2); /* Синее свечение при наведении */
    }

    .day-card.empty { 
        background: transparent; 
        box-shadow: none; 
        cursor: default; 
        border: none; 
    }
    
    /* ЯРКИЕ ТОЧКИ НА ТЕМНОМ */
    .dots-row { 
        position: absolute; 
        bottom: 15px; 
        display: flex; 
        gap: 4px; 
    }
    .day-mark { 
        width: 6px; 
        height: 6px; 
        border-radius: 50%; 
        box-shadow: 0 0 5px rgba(255,255,255,0.2); /* Легкий отсвет точек */
    }

    /* СТИЛЬ ВЫХОДНЫХ (Опционально: можно подсветить субботу и воскресенье) */
    .day-card:nth-child(7n), .day-card:nth-child(7n-1) {
        color: #ff7675; /* Розоватый цвет для выходных */
    }
</style>

<script>
    // В функции renderGrid() убедись, что логика наведения (mouseover) 
    // меняет цвет текста в превью так же четко.
    
    card.onmouseover = () => {
        const prev = document.getElementById('live-preview');
        // Добавим небольшую анимацию появления текста в сайдбаре
        prev.style.opacity = '0';
        setTimeout(() => {
            if (currentMonthData[i] && currentMonthData[i].length > 0) {
                prev.innerHTML = currentMonthData[i].map(n => 
                    `<div style="margin-bottom:10px; border-bottom:1px solid rgba(230,0,126,0.1); padding-bottom:5px;">
                        <b style="color:#e6007e; font-size:0.7rem; text-transform:uppercase;">${n.user}:</b><br>${n.text}
                    </div>`
                ).join('');
            } else { 
                prev.innerHTML = '<span style="opacity:0.5">Событий не запланировано</span>'; 
            }
            prev.style.opacity = '1';
        }, 50);
    };
</script>
