<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        messagingSenderId: "204240857105",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
    const year = parseInt(localStorage.getItem('selectedYear') || 2026);
    const docId = `${year}_${monthIdx}`;
    const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

    document.getElementById('month-title').innerText = months[monthIdx];
    document.getElementById('year-label').innerText = year;

    let data = {};
    let selDay = null;
    let curCat = 'meeting';

    // 1. ПЕРВЫЙ ШАГ: Сразу рисуем пустые плитки (они никуда не исчезнут)
    drawEmptyCalendar();

    // 2. ВТОРОЙ ШАГ: Ждем данные из Firebase и просто "навешиваем" точки
    onSnapshot(doc(db, "calendar", docId), (s) => {
        if (s.exists()) {
            data = s.data();
        } else {
            data = {}; // Если в базе пусто, данные обнуляются, но календарь не стирается
        }
        renderDotsAndColors(); // Обновляем только точки и цвета!
        if(selDay) updatePreview();
    });

    // Рисует каркас календаря (числа от 1 до 30/31)
    function drawEmptyCalendar() {
        const container = document.getElementById('grid');
        if (!container) return;
        container.innerHTML = '';

        const firstDay = new Date(year, monthIdx, 1).getDay();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        const total = new Date(year, monthIdx + 1, 0).getDate();

        // Пустые ячейки
        for (let i = 0; i < shift; i++) {
            const empty = document.createElement('div');
            empty.className = 'day empty';
            container.appendChild(empty);
        }

        // Плитки дней
        for (let i = 1; i <= total; i++) {
            const card = document.createElement('div');
            const dObj = new Date(year, monthIdx, i);
            const isWeekend = dObj.getDay() === 0 || dObj.getDay() === 6;

            card.className = 'day';
            card.id = `day-cell-${i}`; // Даем каждой плитке уникальный ID
            if (isWeekend) card.classList.add('weekend');

            card.innerHTML = `<span>${i}</span><div class="dots" id="dots-cell-${i}"></div>`;

            card.onclick = () => {
                selDay = i;
                // Снимаем выделение со всех
                document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
                // Добавляем выделение нажатой плитке
                card.classList.add('selected');

                updatePreview();
                document.getElementById('edit-btn').style.display = 'block';
            };

            container.appendChild(card);
        }
    }

    // Отрисовывает только точки внутри готовых плиток
    function renderDotsAndColors() {
        const total = new Date(year, monthIdx + 1, 0).getDate();

        for (let i = 1; i <= total; i++) {
            const cell = document.getElementById(`day-cell-${i}`);
            const dotsContainer = document.getElementById(`dots-cell-${i}`);

            if (!cell || !dotsContainer) continue;

            // Сбрасываем старые точки и класс Вечери
            dotsContainer.innerHTML = '';
            cell.classList.remove('has-memorial');

            if (data[i] && data[i].length > 0) {
                const hasMemorial = data[i].some(n => n.category === 'memorial');
                if (hasMemorial) {
                    cell.classList.add('has-memorial');
                }

                data[i].forEach(n => {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    if (n.category === 'memorial') dot.style.background = '#fff';
                    else if (n.category === 'personal') dot.style.background = 'var(--ev-personal)';
                    else dot.style.background = 'var(--ev-meeting)';
                    dotsContainer.appendChild(dot);
                });
            }
        }
    }

    window.updatePreview = () => {
        const p = document.getElementById('live-preview');
        const notes = data[selDay] || [];
        p.innerHTML = notes.length ? notes.map(n => {
            let color = n.category === 'memorial' ? 'var(--ev-memorial)' : (n.category === 'personal' ? 'var(--ev-personal)' : 'var(--ev-meeting)');
            return `<div style="border-left: 3px solid ${color}; padding-left: 8px; margin-bottom: 5px; font-weight:600;">${n.text}</div>`;
        }).join('') : 'Нет записей';
    };

    window.setCat = (c) => {
        curCat = c;
        const ids = { 'memorial': 'opt-mem', 'meeting': 'opt-meet', 'personal': 'opt-pers' };
        Object.values(ids).forEach(id => document.getElementById(id).style.borderColor = 'transparent');
        document.getElementById(ids[c]).style.borderColor = 'black';
    };

    window.openModal = () => {
        document.getElementById('modal-date').innerText = selDay + ' ' + months[monthIdx];
        const list = document.getElementById('notes-list');
        list.innerHTML = (data[selDay] || []).map((n, idx) => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:#f8f8f8; padding:10px; border-radius:8px; margin-bottom:5px; border-left: 4px solid ${n.category==='memorial'?'var(--ev-memorial)':(n.category==='personal'?'var(--ev-personal)':'var(--ev-meeting)')}">
                <span style="font-size:0.9rem">${n.text}</span>
                <button onclick="del(${idx})" style="color:#ff4757; border:none; background:none; cursor:pointer; font-size:1.2rem; font-weight:bold;">×</button>
            </div>`).join('');
        document.getElementById('modal').style.display = 'flex';
        setCat('meeting');
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async () => {
        const txt = document.getElementById('note-input').value.trim();
        if (!txt) return;
        const notes = [...(data[selDay] || [])];
        notes.push({ text: txt, category: curCat });
        await setDoc(doc(db, "calendar", docId), { [selDay]: notes }, { merge: true });
        document.getElementById('note-input').value = '';
        openModal();
    };

    window.del = async (idx) => {
        const notes = [...data[selDay]];
        notes.splice(idx, 1);
        await setDoc(doc(db, "calendar", docId), { [selDay]: notes }, { merge: true });
        openModal();
    };
</script>
