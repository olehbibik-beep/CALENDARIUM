<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIUM | Base Version</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; 
            height: 100vh; background: #f4f7f6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        /* Светлый Сайдбар */
        .sidebar { 
            width: 350px; background: #ffffff; padding: 40px; 
            border-right: 1px solid #ddd; display: flex; flex-direction: column; 
            box-sizing: border-box; flex-shrink: 0;
        }

        .back-btn { 
            background: #000; color: #fff; border: none; padding: 10px; 
            border-radius: 5px; cursor: pointer; margin-bottom: 20px; 
        }

        #month-title { font-size: 2.5rem; font-weight: 800; margin: 0 0 20px 0; color: #333; }

        /* Контентная область */
        .main { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }

        .weekdays { 
            display: grid; grid-template-columns: repeat(7, 100px); 
            gap: 10px; margin-bottom: 10px; 
        }
        .weekday { text-align: center; font-weight: bold; color: #999; text-transform: uppercase; font-size: 0.8rem; }

        .grid { 
            display: grid; grid-template-columns: repeat(7, 100px); 
            gap: 10px; 
        }

        /* Плитки дней */
        .day { 
            width: 100px; height: 100px; background: #fff; 
            border: 1px solid #eee; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; font-weight: bold; color: #333; 
            cursor: pointer; transition: 0.2s; 
        }
        .day:hover { background: #f0f0f0; transform: scale(1.05); }
        .day.empty { background: transparent; border: none; cursor: default; }

        /* Модалка */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.5); align-items: center; justify-content: center; 
        }
        .modal-content { background: #fff; padding: 20px; border-radius: 10px; width: 300px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="back-btn" onclick="location.href='calendar.html'">← НАЗАД</button>
        <div id="user-name" style="color: #666; font-weight: bold;">ADMIN</div>
        <h1 id="month-title">АПРЕЛЬ</h1>
        <div id="live-info" style="margin-top: 20px; color: #888;">Наведите на дату...</div>
    </div>

    <div class="main">
        <div class="weekdays">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="m-date">Дата</h3>
            <textarea id="m-input" style="width:100%; height:60px;"></textarea>
            <button onclick="save()" style="width:100%; padding:10px; background:#000; color:#fff; border:none; margin-top:10px;">СОХРАНИТЬ</button>
            <button onclick="closeM()" style="width:100%; border:none; background:none; color:red; margin-top:5px; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const user = localStorage.getItem('currentUser') || 'ADMIN';
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = months[mIdx];
        document.getElementById('user-name').innerText = user;

        let currentData = {};
        let activeDay = null;

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const first = new Date(2026, mIdx, 1).getDay();
            const shift = first === 0 ? 6 : first - 1;
            const daysInMonth = new Date(2026, mIdx + 1, 0).getDate();

            for(let i=0; i<shift; i++) {
                grid.innerHTML += `<div class="day empty"></div>`;
            }

            for(let i=1; i<=daysInMonth; i++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.innerText = i;
                
                dayEl.onmouseover = () => {
                    document.getElementById('live-info').innerText = currentData[i] ? currentData[i].map(d => d.text).join(', ') : 'Нет записей';
                };

                dayEl.onclick = () => {
                    activeDay = i;
                    document.getElementById('m-date').innerText = i + ' ' + months[mIdx];
                    document.getElementById('modal').style.display = 'flex';
                };
                grid.appendChild(dayEl);
            }
        }

        onSnapshot(doc(db, "calendar", `2026_${mIdx}`), (snap) => {
            currentData = snap.exists() ? snap.data() : {};
            render();
        });

        window.closeM = () => document.getElementById('modal').style.display = 'none';
        window.save = async () => {
            const text = document.getElementById('m-input').value;
            if(!text) return;
            const list = currentData[activeDay] || [];
            list.push({text, user});
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[activeDay]: list}, {merge:true});
            document.getElementById('m-input').value = '';
            closeM();
        };

        render();
    </script>
</body>
</html>
