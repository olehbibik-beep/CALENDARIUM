<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="view-transition" content="same-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM</title>
    <style>
    :root { 
        --color-accent: #09e0e3;              
        --color-bg-main: #71797E;             
        --color-bg-app: #0f1112;              
        --color-bg-nav: rgba(120, 120, 120, 0.15); 
        --color-bg-sidebar: rgba(80, 80, 80, 0.1);
        --color-bg-month: #00D18F;            
        --color-bg-month-hover: #B8FFE8;      
        --color-text-main: #e0e6ed;           
        --color-text-white: #ffffff;          
        --color-text-black: #000000;          
        --color-text-muted: #7f8fa6;          
        --color-text-year: #3d444b;           
        --color-ev-memorial: #D10000;         
        --color-ev-congress: #8E44AD;         
        --color-ev-meeting: #056D71;          
        --color-border-inner: rgba(255, 255, 255, 0.05);
        --size-app-width: 98vw;
        --size-app-height: 94dvh;
        --size-app-radius: 30px;
        --size-nav-width: 70px;
        --size-sidebar-width: 240px;
    }

    * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
        margin: 0; padding: 0; background: var(--color-bg-main); 
        display: flex; align-items: center; justify-content: center; 
        height: 100dvh; width: 100vw; overflow: hidden; 
    }

    .app-container {
        width: var(--size-app-width); height: var(--size-app-height); 
        max-width: 1600px; background: var(--color-bg-app);
        border-radius: var(--size-app-radius); display: flex; 
        overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    /* Навигация */
    .nav-bar {
        width: var(--size-nav-width); background: var(--color-bg-nav);
        display: flex; flex-direction: column; align-items: center; 
        justify-content: space-between; padding: 30px 0; flex-shrink: 0;
        border-right: 1px solid var(--color-border-inner);
    }
    .nav-group { display: flex; flex-direction: column; gap: 25px; }

    /* Сайдбар */
    .sidebar { 
        width: var(--size-sidebar-width); background: var(--color-bg-sidebar);
        padding: 30px 15px; display: flex; flex-direction: column; 
        border-right: 1px solid var(--color-border-inner); flex-shrink: 0;
    }
    .section-title { font-size: 0.7rem; letter-spacing: 2px; color: var(--color-text-muted); margin-bottom: 20px; }
    .upcoming-box { overflow-y: auto; flex: 1; }

    /* Основной вид */
    .main-view { 
        flex: 1; display: flex; align-items: center; 
        padding: 40px; position: relative; gap: 40px;
    }

    /* Картинка по центру */
    .illustration-box {
        flex: 0 0 25%; display: flex; justify-content: center; align-items: center;
    }
    .illustration-box img {
        max-width: 100%; height: auto; object-fit: contain;
        filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    .calendar-wrapper { flex: 1; display: flex; flex-direction: column; height: 100%; }

    /* Сетка месяцев */
    .months-grid { 
        display: grid; grid-template-columns: repeat(4, 1fr); 
        grid-template-rows: repeat(3, 1fr); gap: 15px; flex: 1; 
    }
    
    .month-card { 
        background: var(--color-bg-month); border-radius: 20px;
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        color: var(--color-text-black); font-weight: 700; cursor: pointer; 
        position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-transform: uppercase; font-size: 0.9rem; overflow: hidden;
    }

    .month-card:hover { transform: translateY(-5px); background: var(--color-bg-month-hover); }
    
    /* Активный день/месяц */
    .month-card.current-active { 
        outline: 3px solid var(--color-accent); 
        outline-offset: -3px; background: var(--color-bg-month-hover);
    }
    .month-card.current-active::after {
        content: 'СЕГОДНЯ'; position: absolute; top: 8px; font-size: 0.5rem; 
        background: var(--color-accent); color: var(--color-bg-app); padding: 2px 6px; border-radius: 4px;
    }

    /* Год */
    .year-switcher { display: flex; align-items: center; justify-content: flex-end; gap: 20px; margin-bottom: 20px; }
    #display-year { font-size: 4rem; font-weight: 200; color: var(--color-text-white); letter-spacing: -2px; }
    .year-side { cursor: pointer; color: var(--color-text-year); font-size: 1.5rem; transition: 0.3s; }
    .year-side:hover { color: var(--color-accent); }

    /* Иконки */
    .ui-icon { font-size: 24px; color: var(--color-text-white); opacity: 0.4; transition: 0.3s; cursor: pointer; }
    .icon-btn:hover .ui-icon { opacity: 1; color: var(--color-accent); }
    .icon-btn { background: none; border: none; padding: 0; }

    /* События в сайдбаре */
    .event-card-mini {
        background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px;
        margin-bottom: 10px; border-left: 4px solid var(--color-accent);
        transition: 0.2s; cursor: pointer;
    }
    .event-card-mini:hover { background: rgba(255,255,255,0.08); }
    .ev-title { font-size: 0.85rem; color: #fff; margin-bottom: 4px; }
    .ev-date { font-size: 0.7rem; color: var(--color-text-muted); }

    /* Индикаторы */
    .month-indicator { position: absolute; bottom: 12px; display: flex; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot.red { background: var(--color-ev-memorial); }
    .dot.congress { background: var(--color-ev-congress); }
    .dot.blue { background: var(--color-ev-meeting); }

    /* Панель объявлений */
    .board-toggle-btn {
        position: absolute; right: 0; top: 50%; transform: translateY(-50%);
        background: var(--color-bg-nav); border: none; padding: 20px 6px;
        border-radius: 10px 0 0 10px; cursor: pointer; color: var(--color-accent);
    }

    .announcements-overlay {
        position: absolute; inset: 0; background: rgba(15, 17, 18, 0.98);
        backdrop-filter: blur(15px); z-index: 200; padding: 40px;
        transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .announcements-overlay.active { transform: translateX(0); }

    /* Адаптивность */
    @media (max-width: 1000px) {
        .illustration-box { display: none; }
        .app-container { flex-direction: column; width: 100vw; height: 100dvh; border-radius: 0; }
        .nav-bar { width: 100%; height: 60px; flex-direction: row; padding: 0 20px; }
        .nav-group { flex-direction: row; }
        .sidebar { width: 100%; height: 180px; }
        .main-view { padding: 20px; }
        .months-grid { grid-template-columns: repeat(3, 1fr); }
    }
    </style>
</head>
<body>

    <div class="app-container">
        <nav class="nav-bar">
            <div class="nav-group">
                <button class="icon-btn" onclick="localStorage.clear(); location.href='index.html'"><span class="ui-icon">✕</span></button>
                <button class="icon-btn"><span class="ui-icon">👤</span></button>
                <button id="admin-btn" class="icon-btn" onclick="location.href='admin.html'" style="display:none;"><span class="ui-icon">⚙</span></button>
            </div>
            <div class="nav-group">
                <button class="icon-btn"><span class="ui-icon">ⓘ</span></button>
            </div>
        </nav>

        <aside class="sidebar">
            <div class="section-title">АКТУАЛЬНОЕ</div>
            <div class="upcoming-box" id="next-event-container">
                <div style="opacity:0.2; font-size: 0.7rem;">Загрузка событий...</div>
            </div>
        </aside>

        <main class="main-view" id="main-view">
            
            <div class="illustration-box">
                <img src="TABL.png" alt="Illustration" onerror="this.style.display='none'">
            </div>

            <div class="calendar-wrapper">
                <div class="year-switcher">
                    <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
                    <div id="display-year"></div>
                    <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
                </div>
                <div class="months-grid" id="months"></div>
            </div>

            <button class="board-toggle-btn" onclick="toggleBoard()">◀</button>

            <div id="announcements-panel" class="announcements-overlay">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                    <h2 style="color:var(--color-accent); font-weight:200; margin:0;">ОБЪЯВЛЕНИЯ</h2>
                    <button class="icon-btn" onclick="toggleBoard()" style="font-size:2rem; color:#fff;">✕</button>
                </div>
                <div id="board-content" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; overflow-y:auto; height:80%;">
                    </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || new Date().getFullYear();

        // Проверка входа
        const user = localStorage.getItem('currentUser');
        if (!user) window.location.replace('index.html');
        if (user?.toLowerCase() === 'admin') document.getElementById('admin-btn').style.display = 'block';

        // Инициализация сетки
        function initGrid() {
            const grid = document.getElementById('months');
            const now = new Date();
            let html = '';

            monthsNames.forEach((name, i) => {
                const isCurrent = (i === now.getMonth() && currentYear === now.getFullYear());
                html += `
                    <div class="month-card ${isCurrent ? 'current-active' : ''}" onclick="goToMonth(${i})">
                        <span>${name}</span>
                        <div class="month-indicator" id="ind-${i}"></div>
                    </div>`;
            });
            grid.innerHTML = html;
            updateDisp();
        }

        window.goToMonth = (i) => {
            localStorage.setItem('selectedMonth', i);
            localStorage.setItem('selectedYear', currentYear);
            window.location.href = 'notes.html';
        };

        window.changeYear = (dir) => {
            currentYear += dir;
            initGrid();
            loadData();
        };

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        window.toggleBoard = () => {
            const panel = document.getElementById('announcements-panel');
            panel.classList.toggle('active');
            if(panel.classList.contains('active')) loadBoardData();
        };

        // Загрузка событий для точек и сайдбара
        async function loadData() {
            const container = document.getElementById('next-event-container');
            let upcoming = [];
            
            const monthPromises = Array.from({length: 12}, (_, i) => getDoc(doc(db, "calendar", `${currentYear}_${i}`)));
            const snaps = await Promise.all(monthPromises);

            snaps.forEach((snap, i) => {
                const ind = document.getElementById(`ind-${i}`);
                if (!ind) return;
                ind.innerHTML = '';

                if (snap.exists()) {
                    const data = snap.data();
                    let cats = new Set();
                    
                    Object.entries(data).forEach(([day, notes]) => {
                        notes.forEach(n => {
                            cats.add(n.category);
                            upcoming.push({ ...n, day, month: monthsNames[i], stamp: new Date(currentYear, i, day) });
                        });
                    });

                    if (cats.has('memorial')) ind.innerHTML += '<div class="dot red"></div>';
                    if (cats.has('congress')) ind.innerHTML += '<div class="dot congress"></div>';
                    if (cats.has('meeting') || cats.size > 0) ind.innerHTML += '<div class="dot blue"></div>';
                }
            });

            // Рендер сайдбара
            upcoming.sort((a,b) => a.stamp - b.stamp);
            const future = upcoming.filter(e => e.stamp >= new Date().setHours(0,0,0,0)).slice(0, 5);
            
            container.innerHTML = future.length ? future.map(e => `
                <div class="event-card-mini">
                    <div class="ev-title">${e.text}</div>
                    <div class="ev-date">${e.day} ${e.month}</div>
                </div>
            `).join('') : '<div style="opacity:0.2; font-size:0.7rem;">Нет ближайших событий</div>';
        }

        async function loadBoardData() {
            const content = document.getElementById('board-content');
            const snap = await getDoc(doc(db, "board", "main"));
            if (snap.exists()) {
                const posts = snap.data().posts || [];
                content.innerHTML = posts.reverse().map(p => `
                    <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px;">
                        <div style="font-size:0.7rem; color:var(--color-accent); margin-bottom:10px;">${p.date}</div>
                        <div style="font-size:0.9rem; line-height:1.4;">${p.text}</div>
                        ${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%; border-radius:10px; margin-top:15px;">` : ''}
                    </div>
                `).join('');
            }
        }

        initGrid();
        loadData();
    </script>
</body>
</html>
