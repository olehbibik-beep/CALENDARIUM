<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Note Terminal</title>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));
    
    // ПРОВЕРКА РОЛИ
    const currentUser = (localStorage.getItem('currentUser') || 'гость').toLowerCase();
    const isAdmin = currentUser === 'admin';

    const mIdx = parseInt(localStorage.getItem('selectedMonth')) || 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    const docId = `${year}_${mIdx}`;
    const months = ["ЯНВАРЬ", "ФЕВРАЛЬ", "МАРТ", "АПРЕЛЬ", "МАЙ", "ИЮНЬ", "ИЮЛЬ", "АВГУСТ", "СЕНТЯБРЬ", "ОКТЯБРЬ", "НОЯБРЬ", "ДЕКАБРЬ"];
    
    document.getElementById('m-name').innerText = months[mIdx] + " " + year;

    let dbData = {};
    let selectedDay = null;

    function renderGrid() {
        const grid = document.getElementById('grid');
        const firstDay = new Date(year, mIdx, 1).getDay();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        const totalDays = new Date(year, mIdx + 1, 0).getDate();
        grid.innerHTML = '';
        for (let i = 0; i < shift; i++) grid.innerHTML += `<div class="day-box" style="visibility:hidden"></div>`;
        for (let d = 1; d <= totalDays; d++) {
            const isWeekend = new Date(year, mIdx, d).getDay() % 6 === 0;
            grid.innerHTML += `<div class="day-box ${isWeekend ? 'weekend' : ''}" id="tile-${d}" onclick="selectDay(${d})">${d}<div class="indicator-row" id="marks-${d}"></div></div>`;
        }
    }

    function updateUI() {
        for (let d = 1; d <= 31; d++) {
            const tile = document.getElementById(`tile-${d}`);
            const row = document.getElementById(`marks-${d}`);
            if (!tile || !row) continue;
            const notes = Array.isArray(dbData[d]) ? dbData[d] : [];
            tile.classList.remove('has-memorial');
            row.innerHTML = '';
            notes.forEach(n => {
                if (n.category === 'memorial') tile.classList.add('has-memorial');
                else if (n.category === 'meeting') row.innerHTML += '<div class="mark m-meeting"></div>';
                else if (n.category === 'personal') row.innerHTML += '<div class="mark m-personal"></div>';
            });
        }
        if (selectedDay) selectDay(selectedDay);
    }

    window.selectDay = (d) => {
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        const activeTile = document.getElementById(`tile-${d}`);
        if(activeTile) activeTile.classList.add('selected');
        document.getElementById('edit-btn').style.display = 'block';
        const notes = Array.isArray(dbData[d]) ? dbData[d] : []; 
        document.getElementById('preview').innerHTML = `<b style="color:var(--accent)">${d} ${months[mIdx]}:</b><br><br>` + 
                           (notes.map(n => `• ${n.text}`).join('<br>') || '<span style="color:#555;">Нет планов</span>');
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        const notes = Array.isArray(dbData[selectedDay]) ? dbData[selectedDay] : []; 
        
        document.getElementById('btn-memorial').disabled = !isAdmin;
        document.getElementById('btn-meeting').disabled = !isAdmin;

        list.innerHTML = notes.map((n, idx) => {
            const isOwner = n.author === currentUser;
            const canDelete = isAdmin || isOwner;
            const borderCol = n.category === 'memorial' ? 'var(--ev-mem)' : (n.category === 'meeting' ? 'var(--ev-meet)' : '#444');

            return `
            <div class="note-item" style="border-left: 3px solid ${borderCol}; animation: slideIn 0.2s ease forwards;">
                <span style="font-size:13px; color:#ccc;">${n.text}</span>
                ${canDelete ? `<b onclick="delNote(${idx})" style="color:#ff7675; cursor:pointer; padding:5px 10px; font-size:18px; transition: 0.2s;" onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1">✕</b>` : ''}
            </div>`
        }).join('');
        document.getElementById('modal').style.display = 'flex';
        list.scrollTop = list.scrollHeight; // Скролл вниз
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const val = document.getElementById('note-input').value.trim();
        const text = val || (cat === 'memorial' ? 'ВЕЧЕРЯ' : cat === 'meeting' ? 'СОБРАНИЕ' : 'ЛИЧНОЕ');
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        notes.push({ text, category: cat, author: currentUser });
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        document.getElementById('note-input').value = '';
        openModal();
    };

    window.delNote = async (idx) => {
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        const isOwner = notes[idx].author === currentUser;

        if (isAdmin || isOwner) {
            notes.splice(idx, 1);
            await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
            openModal();
        }
    };

    renderGrid();
    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });
</script>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='calendar.html'">←</button>
    <div id="m-name" style="font-size: 18px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">...</div>
</div>

<div class="main">
    <div class="weekdays"><div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div></div>
    <div id="grid" class="grid"></div>
    <div id="preview" class="preview">Нажмите на дату</div>
    <button class="btn" id="edit-btn" style="display:none; background: var(--accent); margin-top:15px;" onclick="openModal()">+ ДОБАВИТЬ ЗАМЕТКУ</button>
</div>

<footer>
    <div class="footer-dot"></div>
    <div class="footer-text">Cloud Plan Ecosystem — Note Terminal v2.0</div>
</footer>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="modal-title" style="margin:0 0 15px 0; text-align:center;"></h3>
        <div id="modal-list" style="margin-bottom:15px; max-height:200px; overflow-y:auto;"></div>
        <textarea id="note-input" placeholder="Текст заметки..."></textarea>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <button id="btn-memorial" class="btn" style="background:var(--ev-mem); font-size: 9px;" onclick="save('memorial')">ВЕЧЕРЯ</button>
            <button id="btn-meeting" class="btn" style="background:var(--ev-meet); font-size: 9px;" onclick="save('meeting')">СОБРАНИЕ</button>
            <button class="btn" style="background:#555; font-size: 9px;" onclick="save('personal')">ЛИЧНОЕ</button>
        </div>
        <button class="btn" style="background:#0f1112; margin-top:10px;" onclick="closeModal()">ЗАКРЫТЬ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));
    
    // ПРОВЕРКА ПРАВ: Теперь жестко по имени из авторизации
    const currentUser = localStorage.getItem('currentUser') || 'гость';
    const isAdmin = currentUser.toLowerCase() === 'admin';

    const mIdx = parseInt(localStorage.getItem('selectedMonth')) || 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    const docId = `${year}_${mIdx}`;
    const months = ["ЯНВАРЬ", "ФЕВРАЛЬ", "МАРТ", "АПРЕЛЬ", "МАЙ", "ИЮНЬ", "ИЮЛЬ", "АВГУСТ", "СЕНТЯБРЬ", "ОКТЯБРЬ", "НОЯБРЬ", "ДЕКАБРЬ"];
    
    document.getElementById('m-name').innerText = months[mIdx] + " " + year;

    let dbData = {};
    let selectedDay = null;

    function renderGrid() {
        const grid = document.getElementById('grid');
        const firstDay = new Date(year, mIdx, 1).getDay();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        const totalDays = new Date(year, mIdx + 1, 0).getDate();
        grid.innerHTML = '';
        for (let i = 0; i < shift; i++) grid.innerHTML += `<div class="day-box" style="visibility:hidden"></div>`;
        for (let d = 1; d <= totalDays; d++) {
            const isWeekend = new Date(year, mIdx, d).getDay() % 6 === 0;
            grid.innerHTML += `<div class="day-box ${isWeekend ? 'weekend' : ''}" id="tile-${d}" onclick="selectDay(${d})">${d}<div class="indicator-row" id="marks-${d}"></div></div>`;
        }
    }

    function updateUI() {
        for (let d = 1; d <= 31; d++) {
            const tile = document.getElementById(`tile-${d}`);
            const row = document.getElementById(`marks-${d}`);
            if (!tile || !row) continue;
            const notes = Array.isArray(dbData[d]) ? dbData[d] : [];
            tile.classList.remove('has-memorial');
            row.innerHTML = '';
            notes.forEach(n => {
                if (n.category === 'memorial') tile.classList.add('has-memorial');
                else if (n.category === 'meeting') row.innerHTML += '<div class="mark m-meeting"></div>';
                else if (n.category === 'personal') row.innerHTML += '<div class="mark m-personal"></div>';
            });
        }
        if (selectedDay) selectDay(selectedDay);
    }

    window.selectDay = (d) => {
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        document.getElementById(`tile-${d}`).classList.add('selected');
        document.getElementById('edit-btn').style.display = 'block';
        const notes = Array.isArray(dbData[d]) ? dbData[d] : []; 
        document.getElementById('preview').innerHTML = `<b style="color:var(--accent)">${d} ${months[mIdx]}:</b><br><br>` + 
                           (notes.map(n => `• ${n.text}`).join('<br>') || '<span style="color:#555;">Нет планов</span>');
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        const notes = Array.isArray(dbData[selectedDay]) ? dbData[selectedDay] : []; 
        
        // Блокируем кнопки Вечеря/Собрание для обычных пользователей
        document.getElementById('btn-memorial').disabled = !isAdmin;
        document.getElementById('btn-meeting').disabled = !isAdmin;

        list.innerHTML = notes.map((n, idx) => {
            // Кнопка удаления видна Админу (всегда) или Автору (только на его заметках)
            const canDelete = isAdmin || (n.author === currentUser.toLowerCase());
            const borderCol = n.category === 'memorial' ? 'var(--ev-mem)' : (n.category === 'meeting' ? 'var(--ev-meet)' : '#444');

            return `
            <div class="note-item" style="border-left: 3px solid ${borderCol}">
                <span style="font-size:13px; color:#ccc;">${n.text}</span>
                ${canDelete ? `<b onclick="delNote(${idx})" style="color:#ff7675; cursor:pointer; padding:5px 10px; font-size:18px;">✕</b>` : ''}
            </div>`
        }).join('');
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const val = document.getElementById('note-input').value.trim();
        const text = val || (cat === 'memorial' ? 'ВЕЧЕРЯ' : cat === 'meeting' ? 'СОБРАНИЕ' : 'ЛИЧНОЕ');
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        notes.push({ text, category: cat, author: currentUser.toLowerCase() });
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        document.getElementById('note-input').value = '';
        openModal();
    };

    window.delNote = async (idx) => {
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        if (!isAdmin && notes[idx].author !== currentUser.toLowerCase()) return;

        if (confirm("Удалить эту запись?")) {
            notes.splice(idx, 1);
            await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
            openModal();
        }
    };

    renderGrid();
    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });
</script>
</body>
</html>
