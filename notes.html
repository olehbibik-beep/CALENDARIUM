<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Заметки | CALENDARIUM</title>
    <style>
    /* =========================================
       1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ (Из Главной)
       ========================================= */
    :root { 
        --color-accent: #09e0e3;
        --color-bg-main: #71797E;
        --color-bg-app: #0f1112;
        --color-bg-nav: rgba(120, 120, 120, 0.3);
        --color-bg-sidebar: rgba(80, 80, 80, 0.2);
        --color-bg-card: #22272a;
        --color-bg-board-card: rgba(255,255,255,0.03);
        
        --color-text-main: #e0e6ed;
        --color-text-white: #ffffff;
        --color-text-muted: #7f8fa6;
        --color-text-transparent: rgba(255, 255, 255, 0.1);

        /* Цвета событий */
        --color-ev-memorial: #D10000;
        --color-ev-congress: #8E44AD;
        --color-ev-meeting: #056D71;
        --color-ev-personal: #52525C;

        /* Размеры */
        --size-app-width: 95vw;
        --size-app-height: 90dvh;
        --size-app-max-width: 1400px;
        --size-app-max-height: 900px;
        --size-app-radius: 30px;
        --size-sidebar-width: 20%;
        --size-sidebar-min-width: 200px;
        --size-sidebar-max-width: 220px;
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

    body { 
        margin: 0; padding: 0; background: var(--color-bg-main); color: var(--color-text-main); 
        display: flex; align-items: center; justify-content: center; height: 100dvh; width: 100vw; overflow: hidden; 
    }

    /* =========================================
       2. КАРКАС (Идентичен Главной)
       ========================================= */
    .app-container {
        width: var(--size-app-width); height: var(--size-app-height); 
        max-width: var(--size-app-max-width); max-height: var(--size-app-max-height);
        background: var(--color-bg-app); border-radius: var(--size-app-radius); 
        display: flex; flex-direction: row; overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* Боковая панель */
    .sidebar { 
        width: var(--size-sidebar-width); min-width: var(--size-sidebar-min-width); max-width: var(--size-sidebar-max-width); 
        background: var(--color-bg-sidebar); padding: 3vh 15px; 
        display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
    }

    /* Главная область */
    .main-view { flex: 1; display: flex; flex-direction: column; padding: 3vh 3vw; position: relative; overflow: hidden; }

    /* =========================================
       3. КОМПОНЕНТЫ ИНТЕРФЕЙСА
       ========================================= */
    .user-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .user-name { font-size: 0.75rem; font-weight: 700; color: var(--color-accent); text-transform: uppercase; letter-spacing: 1px; }

    /* Кнопки как в навигации */
    .ui-icon {
        font-family: "Segoe UI Symbol", sans-serif; font-size: 20px; color: var(--color-text-white); opacity: 0.5; transition: 0.3s;
    }
    .icon-btn:hover .ui-icon { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 5px; display: flex; align-items: center; }

    /* Детали дня (Sidebar) */
    .preview-box { flex: 1; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
    .note-card {
        background: var(--color-bg-board-card); padding: 12px; border-radius: 8px; margin-bottom: 10px;
        border-left: 4px solid var(--color-ev-personal); border-top: 1px solid rgba(255,255,255,0.05);
    }
    .note-cat { font-size: 0.6rem; text-transform: uppercase; font-weight: 800; opacity: 0.5; margin-bottom: 5px; }
    .note-text { font-size: 0.85rem; line-height: 1.4; color: var(--color-text-white); }

    /* Кнопка действия */
    .action-btn {
        width: 100%; padding: 14px; border: none; border-radius: 12px;
        background: var(--color-accent); color: #000; font-weight: 800;
        text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px;
    }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(9, 224, 227, 0.3); }

    /* =========================================
       4. СЕТКА КАЛЕНДАРЯ
       ========================================= */
    #m-name { font-size: clamp(1.8rem, 5vh, 3rem); font-weight: 300; margin-bottom: 2vh; letter-spacing: -1px; text-align: left; }
    
    .weekdays {
        display: grid; grid-template-columns: repeat(7, 1fr);
        text-align: center; color: var(--color-text-muted);
        font-size: 0.7rem; font-weight: 900; margin-bottom: 15px;
    }

    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; flex: 1; align-content: start; }

    .day-box {
        aspect-ratio: 1/1; background: var(--color-bg-board-card); border-radius: 15px;
        display: flex; align-items: center; justify-content: center;
        font-size: clamp(1rem, 2vh, 1.3rem); font-weight: 400; cursor: pointer;
        position: relative; transition: 0.2s; border: 1px solid rgba(255,255,255,0.03);
    }
    .day-box:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
    .day-box.weekend { color: var(--color-text-muted); background: rgba(0,0,0,0.2); }
    .day-box.today { color: var(--color-accent); font-weight: 800; outline: 2px solid var(--color-accent); outline-offset: -4px; }
    .day-box.selected { background: var(--color-accent) !important; color: #000 !important; font-weight: 800; }

    /* Индикаторы */
    .indicator-row { position: absolute; bottom: 10%; display: flex; gap: 3px; justify-content: center; width: 100%; }
    .dot { width: 5px; height: 5px; border-radius: 50%; }
    
    /* Линия Конгресса */
    .day-box.c-start::after, .day-box.c-mid::after, .day-box.c-end::after, .day-box.c-single::after {
        content: ''; position: absolute; bottom: 0; height: 4px; background: var(--color-ev-congress); border-radius: 2px;
    }
    .day-box.c-start::after { left: 50%; right: 0; border-radius: 2px 0 0 2px; }
    .day-box.c-mid::after { left: 0; right: 0; border-radius: 0; }
    .day-box.c-end::after { left: 0; right: 50%; border-radius: 0 2px 2px 0; }
    .day-box.c-single::after { left: 30%; right: 30%; }

    .day-box.has-memorial { background: rgba(209, 0, 0, 0.15) !important; color: #ff7675 !important; }

    /* =========================================
       5. МОДАЛЬНОЕ ОКНО
       ========================================= */
    .modal { 
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
        z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); 
    }
    .modal-box { 
        background: #1a1d1f; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; 
        border: 1px solid rgba(255,255,255,0.1);
    }
    .modal-btn { 
        width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 700; 
        margin-bottom: 8px; cursor: pointer; color: #fff; font-size: 0.8rem;
    }
    textarea {
        width: 100%; height: 100px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; resize: none; outline: none;
    }

    /* Адаптив под мобилки */
    @media (orientation: portrait) {
        .app-container { flex-direction: column; width: 100vw; height: 100dvh; border-radius: 0; }
        .sidebar { width: 100%; max-width: 100%; height: 35%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .main-view { padding: 2vh 4vw; }
        .grid { gap: 6px; }
        .day-box { border-radius: 10px; }
    }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="user-header">
                <button class="icon-btn" onclick="location.href='calendar.html'" title="Назад">
                    <span class="ui-icon">◀</span>
                </button>
                <div id="user-display" class="user-name">...</div>
                <button id="admin-btn" class="icon-btn" style="display:none;" onclick="location.href='admin.html'">
                    <span class="ui-icon" style="color:var(--color-accent)">⚙</span>
                </button>
            </div>
            
            <div class="preview-box">
                <div style="font-size:0.6rem; color:var(--color-text-muted); margin-bottom:15px; font-weight:800; letter-spacing:1px; text-transform:uppercase;">ДЕТАЛИ ВЫБРАННОГО ДНЯ</div>
                <div id="preview" class="preview">
                    <span style="color:var(--color-text-transparent); font-size: 0.9rem;">Нажмите на дату в календаре...</span>
                </div>
            </div>
            <button class="action-btn" id="edit-btn" style="display:none;" onclick="openModal()">+ Добавить план</button>
        </div>

        <div class="main-view">
            <div id="m-name">...</div>
            <div class="weekdays">
                <div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div>
            </div>
            <div id="grid" class="grid"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h3 id="modal-title" style="margin: 0 0 20px 0; font-weight: 300; text-align: center; color: var(--color-accent);"></h3>
            <div id="modal-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 15px;"></div>
            <textarea id="note-input" placeholder="Введите текст события..."></textarea>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                <button class="modal-btn" style="background:var(--color-ev-memorial)" onclick="save('memorial')">ВЕЧЕРЯ</button>
                <button class="modal-btn" style="background:var(--color-ev-meeting)" onclick="save('meeting')">ВСТРЕЧА</button>
                <button class="modal-btn" style="background:var(--color-ev-congress)" onclick="save('congress')">КОНГРЕСС</button>
                <button class="modal-btn" style="background:var(--color-ev-personal)" onclick="save('personal')">ЛИЧНОЕ</button>
            </div>
            <button class="modal-btn" style="background:none; border:1px solid rgba(255,255,255,0.1); color:var(--color-text-muted);" onclick="closeModal()">ОТМЕНА</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));
    const currentUser = (localStorage.getItem('currentUser') || 'guest').toLowerCase();
    const isAdmin = currentUser === 'admin';
    
    document.getElementById('user-display').innerText = currentUser;
    if (isAdmin) document.getElementById('admin-btn').style.display = 'flex';

    const mIdx = parseInt(localStorage.getItem('selectedMonth')) || 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    
    document.getElementById('m-name').innerText = months[mIdx] + " " + year;

    let dbData = {};
    let selectedDay = null;

    function renderGrid() {
        const grid = document.getElementById('grid');
        const firstDay = new Date(year, mIdx, 1).getDay();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        const totalDays = new Date(year, mIdx + 1, 0).getDate();
        const now = new Date();
        const isThisMonth = (mIdx === now.getMonth() && year === now.getFullYear());

        grid.innerHTML = '';
        for (let i = 0; i < shift; i++) grid.innerHTML += `<div class="day-box" style="visibility:hidden"></div>`;

        for (let d = 1; d <= totalDays; d++) {
            const isWeekend = new Date(year, mIdx, d).getDay() % 6 === 0;
            const isToday = isThisMonth && d === now.getDate();
            grid.innerHTML += `
                <div class="day-box ${isWeekend ? 'weekend' : ''} ${isToday ? 'today' : ''}" id="tile-${d}" onclick="selectDay(${d})">
                    ${d}
                    <div class="indicator-row" id="marks-${d}"></div>
                </div>`;
        }
    }

    function updateUI() {
        document.querySelectorAll('.day-box').forEach(b => {
            b.classList.remove('c-start', 'c-mid', 'c-end', 'c-single', 'has-memorial');
        });

        for (let d = 1; d <= 31; d++) {
            const tile = document.getElementById(`tile-${d}`);
            const row = document.getElementById(`marks-${d}`);
            if (!tile) continue;

            const notes = dbData[d] || [];
            row.innerHTML = '';

            notes.forEach(n => {
                if (n.category === 'memorial') tile.classList.add('has-memorial');
                if (n.category === 'meeting') row.innerHTML += `<div class="dot" style="background:var(--color-ev-meeting)"></div>`;
                if (n.category === 'personal') row.innerHTML += `<div class="dot" style="background:var(--color-ev-personal)"></div>`;
            });

            const hasC = (day) => (dbData[day] || []).some(n => n.category === 'congress');
            if (hasC(d)) {
                const prev = hasC(d-1), next = hasC(d+1);
                const isSun = new Date(year, mIdx, d).getDay() === 0;
                const isMon = new Date(year, mIdx, d).getDay() === 1;

                if (!prev && next) tile.classList.add(isSun ? 'c-single' : 'c-start');
                else if (prev && next) tile.classList.add(isMon ? 'c-start' : (isSun ? 'c-end' : 'c-mid'));
                else if (prev && !next) tile.classList.add(isMon ? 'c-single' : 'c-end');
                else tile.classList.add('c-single');
            }
        }
        if (selectedDay) selectDay(selectedDay);
    }

    window.selectDay = (d) => {
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        document.getElementById(`tile-${d}`)?.classList.add('selected');
        document.getElementById('edit-btn').style.display = 'block';

        const notes = dbData[d] || [];
        const preview = document.getElementById('preview');
        preview.innerHTML = `<div style="color:var(--color-accent); font-weight:800; margin-bottom:15px; font-size:1.1rem; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:10px;">${d} ${months[mIdx]}</div>`;
        
        if (notes.length === 0) {
            preview.innerHTML += `<span style="color:var(--color-text-transparent)">Нет запланированных событий</span>`;
        } else {
            notes.forEach(n => {
                const colors = { memorial: 'var(--color-ev-memorial)', meeting: 'var(--color-ev-meeting)', congress: 'var(--color-ev-congress)', personal: 'var(--color-ev-personal)' };
                preview.innerHTML += `
                    <div class="note-card" style="border-left-color: ${colors[n.category]}">
                        <div class="note-cat">${n.category}</div>
                        <div class="note-text">${n.text}</div>
                    </div>`;
            });
        }
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        const notes = dbData[selectedDay] || [];
        list.innerHTML = notes.map((n, idx) => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); padding:10px; margin-bottom:6px; border-radius:8px; font-size:0.8rem;">
                <span style="flex:1; margin-right:10px;">${n.text}</span>
                ${(isAdmin || n.author === currentUser) ? `<span onclick="delNote(${idx})" style="color:#ff4757; cursor:pointer; font-weight:bold; padding:5px;">✕</span>` : ''}
            </div>
        `).join('');
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const input = document.getElementById('note-input');
        const text = input.value.trim() || cat.toUpperCase();
        const notes = [...(dbData[selectedDay] || [])];
        notes.push({ text, category: cat, author: currentUser });
        await setDoc(doc(db, "calendar", `${year}_${mIdx}`), { [selectedDay]: notes }, { merge: true });
        input.value = '';
        closeModal();
    };

    window.delNote = async (idx) => {
        const notes = [...dbData[selectedDay]];
        notes.splice(idx, 1);
        await setDoc(doc(db, "calendar", `${year}_${mIdx}`), { [selectedDay]: notes }, { merge: true });
        openModal();
    };

    renderGrid();
    onSnapshot(doc(db, "calendar", `${year}_${mIdx}`), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });

</script>
</body>
</html>
