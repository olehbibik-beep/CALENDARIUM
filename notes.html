<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIUM | Fixed</title>
    <style>
        :root { 
            --bg: #f4f7f6; 
            --side: #1e2122; 
            --card: #2d3436; 
        }

        body { margin: 0; display: flex; height: 100vh; background: var(--bg); font-family: sans-serif; overflow: hidden; }

        /* САЙДБАР */
        .sidebar { 
            width: 380px; background: var(--side); color: white; padding: 40px;
            display: flex; flex-direction: column; align-items: flex-end; text-align: right; flex-shrink: 0;
        }

        .btn-back { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        #month-name { font-size: 3rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        
        #preview-box { 
            width: 100%; min-height: 80px; background: rgba(255,255,255,0.05); 
            margin: 20px 0; padding: 15px; border-right: 4px solid #e6007e; border-radius: 10px 0 0 10px; font-size: 0.9rem;
        }

        /* ОСНОВНАЯ ЧАСТЬ */
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .week-header { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; margin-bottom: 15px; }
        .week-day { color: #2d3436; font-weight: 900; text-transform: uppercase; text-align: center; font-size: 0.8rem; }

        .grid-container { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; }

        /* ТЕМНЫЕ ПЛИТКИ */
        .cell { 
            width: 110px; height: 110px; background: var(--card); border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s;
        }
        .cell:hover { background: #000; transform: translateY(-3px); }
        .cell.empty { background: transparent; box-shadow: none; cursor: default; }
        .cell-num { font-size: 1.8rem; font-weight: 800; color: #ffffff; }

        .dot-box { display: flex; gap: 4px; margin-top: 5px; height: 6px; }
        .dot-item { width: 6px; height: 6px; border-radius: 50%; background: #0088cc; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-inner { background: white; padding: 30px; border-radius: 20px; width: 300px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="btn-back" onclick="location.href='calendar.html'">НАЗАД</button>
        <div id="user-tag" style="font-weight: bold; opacity: 0.7;">ADMIN</div>
        <h1 id="month-name">АПРЕЛЬ</h1>
        <div id="preview-box">Наведите на дату...</div>
    </div>

    <div class="main">
        <div class="week-header">
            <div class="week-day">Пн</div><div class="week-day">Вт</div><div class="week-day">Ср</div>
            <div class="week-day">Чт</div><div class="week-day">Пт</div><div class="week-day">Сб</div><div class="week-day">Вс</div>
        </div>
        <div class="grid-container" id="calendar-grid"></div>
    </div>

    <div class="modal" id="pop-up">
        <div class="modal-inner">
            <h3 id="pop-date">Дата</h3>
            <textarea id="pop-input" style="width:100%; height:60px;"></textarea>
            <button onclick="save()" style="width:100%; padding:10px; background:black; color:white; border:none; border-radius:5px; cursor:pointer;">OK</button>
            <button onclick="closePop()" style="width:100%; background:none; border:none; color:gray; cursor:pointer; margin-top:10px;">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const user = localStorage.getItem('currentUser') || 'ADMIN';
        const names = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-name').innerText = names[mIdx];
        document.getElementById('user-tag').innerText = user;

        let dbData = {};
        let curDay = null;

        function draw() {
            const grid = document.getElementById('calendar-grid');
            if(!grid) return;
            grid.innerHTML = '';
            
            const first = new Date(2026, mIdx, 1).getDay();
            const shift = first === 0 ? 6 : first - 1;
            const daysCount = new Date(2026, mIdx + 1, 0).getDate();

            for(let i=0; i<shift; i++) {
                const e = document.createElement('div');
                e.className = 'cell empty';
                grid.appendChild(e);
            }

            for(let i=1; i<=daysCount; i++) {
                const c = document.createElement('div');
                c.className = 'cell';
                c.innerHTML = `<div class="cell-num">${i}</div>`;
                
                const dBox = document.createElement('div');
                dBox.className = 'dot-box';
                if(dbData[i]) {
                    dbData[i].forEach(() => {
                        const d = document.createElement('div');
                        d.className = 'dot-item';
                        dBox.appendChild(d);
                    });
                }
                c.appendChild(dBox);

                c.onmouseover = () => {
                    document.getElementById('preview-box').innerHTML = dbData[i] ? dbData[i].map(x => `<b>${x.user}:</b> ${x.text}`).join('<br>') : 'Нет записей';
                };

                c.onclick = () => {
                    curDay = i;
                    document.getElementById('pop-date').innerText = i + ' ' + names[mIdx];
                    document.getElementById('pop-up').style.display = 'flex';
                };
                grid.appendChild(c);
            }
        }

        onSnapshot(doc(db, "calendar", `2026_${mIdx}`), (s) => {
            dbData = s.exists() ? s.data() : {};
            draw();
        });

        window.closePop = () => document.getElementById('pop-up').style.display = 'none';
        window.save = async () => {
            const val = document.getElementById('pop-input').value;
            if(!val) return;
            const list = dbData[curDay] || [];
            list.push({text: val, user: user});
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[curDay]: list}, {merge:true});
            document.getElementById('pop-input').value = '';
            closePop();
        };

        // Запуск сразу
        document.addEventListener('DOMContentLoaded', draw);
        draw();
    </script>
</body>
</html>
