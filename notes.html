<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы | CALENDARIUM Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { 
            --accent: #0088cc; 
            --main-bg: #f4f7f6;
            --sidebar-bg: #1e2122;
            --dark-card: #2d3436;
            --orange-weekend: #ff9f43;
            /* Цвета категорий */
            --ev-memorial: #ff0000; /* Вечеря */
            --ev-congress: #0984e3; /* Конгресс */
            --ev-meeting: #ffffff;  /* Собрания */
            --ev-other: #27ae60;    /* Другое */
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        .sidebar { 
            width: 420px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; color: white;
            z-index: 100; flex-shrink: 0; box-sizing: border-box; 
            align-items: flex-end; text-align: right;
        }

        .logout-btn { background: #fff; color: #000; border: none; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #month-title { font-size: 2.8rem; font-weight: 800; color: #fff; letter-spacing: -2px; margin-bottom: 40px; text-transform: uppercase; }

        /* ЛЕГЕНДА С ПРЯМОУГОЛЬНИКАМИ */
        .side-label { color: #636e72; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; }
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-bottom: 10px; font-size: 0.85rem; color: #b2bec3; }
        .rect { width: 25px; height: 8px; border-radius: 2px; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .weekdays-fixed { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; margin-bottom: 15px; }
        .weekday { font-size: 0.75rem; font-weight: 900; color: #b2bec3; text-transform: uppercase; text-align: center; }
        .weekday.we-label { color: var(--orange-weekend); }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; }

        .day-card { 
            background: var(--dark-card); width: 110px; height: 110px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.4rem; color: #ffffff; cursor: pointer; transition: 0.3s;
            position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .day-card.weekend { color: var(--orange-weekend); border: 1px solid rgba(255, 159, 67, 0.3); }
        .day-card:hover { transform: translateY(-5px); background: #000; }
        .day-card.empty { background: transparent; box-shadow: none; cursor: default; }

        /* ПОЛОСКИ ПОД ЧИСЛОМ */
        .marks-row { position: absolute; bottom: 12px; display: flex; gap: 3px; justify-content: center; width: 100%; }
        .mark-line { width: 22px; height: 4px; border-radius: 1px; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 400px; text-align: right; }
        .cat-btn { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 9px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="logout-btn" onclick="location.href='calendar.html'">Назад</button>
        <div id="display-year-static" style="font-size: 5rem; opacity: 0.1; line-height: 1;">2026</div>
        <div id="month-title">Апрель</div>

        <div class="side-section" style="width: 100%;">
            <div class="side-label">Легенда</div>
            <div class="legend-item">Вечеря Воспоминания <div class="rect" style="background:var(--ev-memorial)"></div></div>
            <div class="legend-item">Конгресс <div class="rect" style="background:var(--ev-congress)"></div></div>
            <div class="legend-item">Собрания <div class="rect" style="background:var(--ev-meeting); border:1px solid #555;"></div></div>
            <div class="legend-item">Другое <div class="rect" style="background:var(--ev-other)"></div></div>
        </div>
        
        <div id="live-preview" style="margin-top:40px; color:#888; font-size:0.8rem;">Наведите на число...</div>
    </div>

    <div class="main-content">
        <div class="weekdays-fixed">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div><div class="weekday">Чт</div><div class="weekday">Пт</div>
            <div class="weekday we-label">Сб</div><div class="weekday we-label">Вс</div>
        </div>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h2 id="modal-date-title" style="margin:0 0 15px 0;">Дата</h2>
            <div id="existing-notes" style="margin-bottom:15px; font-size:13px;"></div>
            <textarea id="note-text" style="width:100%; height:60px; border-radius:10px; padding:10px; border:1px solid #ddd;"></textarea>
            <div style="display:flex; gap:5px; margin:10px 0;">
                <button class="cat-btn" onclick="activeCat='memorial'">ВЕЧЕРЯ</button>
                <button class="cat-btn" onclick="activeCat='congress'">КОНГРЕСС</button>
                <button class="cat-btn" onclick="activeCat='meeting'">СОБРАНИЕ</button>
                <button class="cat-btn" onclick="activeCat='other'">ДРУГОЕ</button>
            </div>
            <button onclick="saveNote()" style="width:100%; padding:14px; background:#000; color:#fff; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">СОХРАНИТЬ</button>
            <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script>
        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 3);
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        document.getElementById('month-title').innerText = monthsNames[monthIdx];

        let currentData = {};
        let selectedDay = null;
        let activeCat = 'meeting';

        // Слушаем базу
        db.collection("calendar").doc(`2026_${monthIdx}`).onSnapshot((doc) => {
            currentData = doc.exists ? doc.data() : {};
            renderGrid();
        });

        function renderGrid() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            
            const firstDay = new Date(2026, monthIdx, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

            for(let s=0; s<shift; s++) {
                const empty = document.createElement('div');
                empty.className = 'day-card empty';
                container.appendChild(empty);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(2026, monthIdx, i);
                const isWE = (date.getDay() === 0 || date.getDay() === 6);
                
                const card = document.createElement('div');
                card.className = 'day-card' + (isWE ? ' weekend' : '');
                card.innerHTML = `<span>${i}</span>`;
                
                if (currentData[i]) {
                    const marks = document.createElement('div');
                    marks.className = 'marks-row';
                    currentData[i].forEach(n => {
                        const m = document.createElement('div');
                        m.className = 'mark-line';
                        m.style.background = `var(--ev-${n.category})`;
                        if(n.category === 'meeting') m.style.border = "1px solid #555";
                        marks.appendChild(m);
                    });
                    card.appendChild(marks);
                }

                card.onmouseover = () => {
                    document.getElementById('live-preview').innerHTML = currentData[i] 
                        ? currentData[i].map(n => `• ${n.text}`).join('<br>') 
                        : 'Событий нет';
                };
                card.onclick = () => openModal(i);
                container.appendChild(card);
            }
        }

        function openModal(day) {
            selectedDay = day;
            document.getElementById('modal-date-title').innerText = day + ' ' + monthsNames[monthIdx];
            const list = document.getElementById('existing-notes');
            list.innerHTML = (currentData[day] || []).map((n, idx) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#f5f5f5; padding:5px; border-radius:5px;">
                    <span style="border-left:3px solid var(--ev-${n.category}); padding-left:5px;">${n.text}</span>
                    <button onclick="deleteNote(${idx})" style="color:red; border:none; background:none; cursor:pointer;">×</button>
                </div>
            `).join('');
            document.getElementById('note-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('note-modal').style.display = 'none'; }

        async function saveNote() {
            const txt = document.getElementById('note-text').value;
            if(!txt) return;
            const notes = currentData[selectedDay] || [];
            notes.push({text: txt, category: activeCat, user: 'ADMIN'});
            await db.collection("calendar").doc(`2026_${monthIdx}`).set({[selectedDay]: notes}, {merge:true});
            document.getElementById('note-text').value = '';
            closeModal();
        }

        async function deleteNote(idx) {
            const notes = [...currentData[selectedDay]];
            notes.splice(idx, 1);
            await db.collection("calendar").doc(`2026_${monthIdx}`).set({[selectedDay]: notes}, {merge:true});
            openModal(selectedDay);
        }
    </script>
</body>
</html>
