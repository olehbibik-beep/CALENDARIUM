<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Заметки</title>
    <style>
        :root {
            /* ЦВЕТОВАЯ ПАЛИТРА */
            --accent: #09e0e3;
            --bg-main: #0f1112;
            --bg-sidebar: rgba(80, 80, 80, 0.15);
            --card-bg: #22272a;
            --dark-tile: #1a1d1f;
            --weekend-tile: #14161a;
            --text-main: #e0e6ed;
            --text-muted: #7f8fa6;
            --inner-border: rgba(255, 255, 255, 0.05);

            /* КАТЕГОРИИ СОБЫТИЙ */
            --color-memorial: #ff7675;      /* Красный */
            --bg-memorial: #3b1e22;
            --color-meeting: #3498db;       /* Синий */
            --color-congress: #8e44ad;      /* Фиолетовый */
            --color-personal: #95a5a6;      /* Серый */

            /* РАЗМЕРЫ */
            --radius-main: 24px;
            --radius-tile: 12px;
            --dot-size: 6px;
            --line-height: 4px;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: #71797E; /* Внешний фон как в оригинале */
            color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
            height: 100dvh; width: 100vw; overflow: hidden;
        }

        /* === КОНТЕЙНЕР ПРИЛОЖЕНИЯ === */
        .app-container {
            width: 95vw; height: 90dvh;
            max-width: 1400px; max-height: 900px;
            background: var(--bg-main);
            border-radius: var(--radius-main);
            display: flex; flex-direction: row; position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* === БОКОВАЯ ПАНЕЛЬ === */
        .sidebar {
            width: 28%; min-width: 260px; max-width: 350px;
            background: var(--bg-sidebar);
            padding: 3vh 2vw;
            display: flex; flex-direction: column;
            border-right: 1px solid var(--inner-border);
        }

        .user-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2vh; position: relative; min-height: 40px;
        }

        .header-center {
            position: absolute; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 5;
        }

        .user-name {
            font-weight: 700; text-transform: uppercase;
            font-size: 0.85rem; letter-spacing: 1px; color: #fff;
        }

        .preview-box { display: flex; flex-direction: column; flex: 1; overflow: hidden; margin-top: 10px; }
        
        .preview { 
            flex: 1; overflow-y: auto; padding-right: 5px; 
            font-size: 0.95rem; line-height: 1.5;
        }

        .note-card {
            margin-bottom: 12px; padding: 12px;
            background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--color-personal);
            border-radius: 4px;
        }

        .action-btn {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            background: var(--accent); color: #000; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            margin-top: 15px;
        }

        /* === ОСНОВНОЙ ВИД КАЛЕНДАРЯ === */
        .main-view { flex: 1; display: flex; flex-direction: column; padding: 3vh 3vw; position: relative; }
        .calendar-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; }

        #m-name { 
            font-size: clamp(1.5rem, 4vh, 2.5rem); font-weight: 300; 
            text-align: center; margin-bottom: 2vh; letter-spacing: 2px;
        }

        .weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr);
            text-align: center; color: var(--text-muted);
            font-size: 0.7rem; font-weight: 900; margin-bottom: 10px;
        }

        .grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 8px; flex: 1; align-content: start;
        }

        /* === ЯЧЕЙКА ДНЯ === */
        .day-box {
            aspect-ratio: 1/1; background: var(--dark-tile);
            border-radius: var(--radius-tile);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1rem, 2vh, 1.4rem); font-weight: 300;
            cursor: pointer; position: relative;
            border: 2px solid transparent; transition: all 0.2s;
        }

        .day-box:hover { background: #2b3236; }
        .day-box.weekend { background: var(--weekend-tile); color: var(--text-muted); }
        .day-box.today { font-weight: 800; color: var(--accent); font-size: 1.6rem; }
        .day-box.selected { border-color: var(--accent); background: transparent; }

        /* ИНДИКАТОРЫ ТОЧКИ (Встречи / Личное) */
        .indicator-row {
            position: absolute; bottom: 12%; 
            display: flex; gap: 4px; justify-content: center; width: 100%;
        }
        .dot {
            width: var(--dot-size); height: var(--dot-size);
            border-radius: 50%;
        }

        /* ИНДИКАТОР ЛИНИЯ (Конгресс) */
        .day-box.c-start::after, .day-box.c-mid::after, .day-box.c-end::after, .day-box.c-single::after {
            content: ''; position: absolute; bottom: 0; height: var(--line-height);
            background: var(--color-congress); z-index: 5;
        }
        .day-box.c-start::after { left: 50%; right: 0; border-radius: 2px 0 0 2px; }
        .day-box.c-mid::after   { left: 0; right: 0; }
        .day-box.c-end::after   { left: 0; right: 50%; border-radius: 0 2px 2px 0; }
        .day-box.c-single::after { left: 25%; right: 25%; border-radius: 2px; }

        /* ВЕЧЕРЯ (МЕМОРИАЛ) */
        .day-box.has-memorial { background: var(--bg-memorial) !important; color: var(--color-memorial) !important; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (orientation: portrait) {
            .app-container { flex-direction: column; width: 100vw; height: 100dvh; border-radius: 0; }
            .sidebar { 
                width: 100%; max-width: 100%; height: 35%; 
                border-right: none; border-bottom: 1px solid var(--inner-border); 
            }
            .main-view { padding: 2vh 2vw; }
            .day-box { aspect-ratio: auto; min-height: 50px; border-radius: 8px; }
            .grid { gap: 4px; }
        }

        /* Кнопки управления */
        .icon-btn { background: none; border: none; cursor: pointer; padding: 5px; }
        .icon-btn img { width: 24px; height: 24px; opacity: 0.6; transition: 0.3s; }
        .icon-btn:hover img { opacity: 1; filter: brightness(0) invert(1); }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; }
        .modal-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 700; margin-bottom: 8px; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="user-header">
                <button class="icon-btn" onclick="location.href='calendar.html'"><img src="BACK.png"></button>
                <div class="header-center">
                    <button id="admin-btn" class="icon-btn" style="display:none;" onclick="location.href='admin.html'"><img src="OPTION.png"></button>
                </div>
                <div id="user-display" class="user-name">...</div>
            </div>
            
            <div class="preview-box">
                <div style="font-size:0.65rem; color:var(--text-muted); margin-bottom:15px; font-weight:800; letter-spacing:1px; text-transform:uppercase;">Детали дня</div>
                <div id="preview" class="preview">
                    <span style="color:var(--text-muted);">Выберите дату...</span>
                </div>
                <button class="action-btn" id="edit-btn" style="display:none;" onclick="openModal()">+ Добавить план</button>
            </div>
        </div>

        <div class="main-view">
            <div class="calendar-wrapper">
                <div id="m-name">...</div>
                <div class="weekdays">
                    <div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div>
                </div>
                <div id="grid" class="grid"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h3 id="modal-title" style="margin-top:0; text-align:center;"></h3>
            <div id="modal-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            <textarea id="note-input" style="width:100%; height:80px; background:#1a1d1f; border:1px solid #333; color:#fff; padding:10px; border-radius:5px; margin-bottom:15px; resize:none;" placeholder="Текст заметки..."></textarea>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                <button class="modal-btn" style="background:var(--color-memorial)" onclick="save('memorial')">ВЕЧЕРЯ</button>
                <button class="modal-btn" style="background:var(--color-meeting)" onclick="save('meeting')">ВСТРЕЧА</button>
                <button class="modal-btn" style="background:var(--color-congress)" onclick="save('congress')">КОНГРЕСС</button>
                <button class="modal-btn" style="background:var(--color-personal)" onclick="save('personal')">ЛИЧНОЕ</button>
            </div>
            <button class="modal-btn" style="background:none; border:1px solid #444; color:#888;" onclick="closeModal()">ОТМЕНА</button>
        </div>
    </div>

<script type="module">
    // --- ИНИЦИАЛИЗАЦИЯ И FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));
    const currentUser = (localStorage.getItem('currentUser') || 'guest').toLowerCase();
    const isAdmin = currentUser === 'admin';
    
    document.getElementById('user-display').innerText = currentUser;
    if (isAdmin) document.getElementById('admin-btn').style.display = 'flex';

    const mIdx = parseInt(localStorage.getItem('selectedMonth')) || 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    
    document.getElementById('m-name').innerText = months[mIdx] + " " + year;

    let dbData = {};
    let selectedDay = null;

    // --- ОТРИСОВКА СЕТКИ ---
    function renderGrid() {
        const grid = document.getElementById('grid');
        const firstDay = new Date(year, mIdx, 1).getDay();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        const totalDays = new Date(year, mIdx + 1, 0).getDate();
        
        const now = new Date();
        const isThisMonth = (mIdx === now.getMonth() && year === now.getFullYear());

        grid.innerHTML = '';
        for (let i = 0; i < shift; i++) grid.innerHTML += `<div class="day-box" style="visibility:hidden"></div>`;

        for (let d = 1; d <= totalDays; d++) {
            const isWeekend = new Date(year, mIdx, d).getDay() % 6 === 0;
            const isToday = isThisMonth && d === now.getDate();
            
            grid.innerHTML += `
                <div class="day-box ${isWeekend ? 'weekend' : ''} ${isToday ? 'today' : ''}" id="tile-${d}" onclick="selectDay(${d})">
                    ${d}
                    <div class="indicator-row" id="marks-${d}"></div>
                </div>`;
        }
    }

    // --- ОБНОВЛЕНИЕ ИНДИКАТОРОВ ---
    function updateUI() {
        document.querySelectorAll('.day-box').forEach(b => {
            b.classList.remove('c-start', 'c-mid', 'c-end', 'c-single', 'has-memorial');
        });

        for (let d = 1; d <= 31; d++) {
            const tile = document.getElementById(`tile-${d}`);
            const row = document.getElementById(`marks-${d}`);
            if (!tile) continue;

            const notes = dbData[d] || [];
            row.innerHTML = '';

            notes.forEach(n => {
                if (n.category === 'memorial') tile.classList.add('has-memorial');
                if (n.category === 'meeting') row.innerHTML += `<div class="dot" style="background:var(--color-meeting)"></div>`;
                if (n.category === 'personal') row.innerHTML += `<div class="dot" style="background:var(--color-personal)"></div>`;
            });

            // Логика Конгресса (линии)
            const hasC = (day) => (dbData[day] || []).some(n => n.category === 'congress');
            if (hasC(d)) {
                const prev = hasC(d-1), next = hasC(d+1);
                const isSun = new Date(year, mIdx, d).getDay() === 0;
                const isMon = new Date(year, mIdx, d).getDay() === 1;

                if (!prev && next) tile.classList.add(isSun ? 'c-single' : 'c-start');
                else if (prev && next) tile.classList.add(isMon ? 'c-start' : (isSun ? 'c-end' : 'c-mid'));
                else if (prev && !next) tile.classList.add(isMon ? 'c-single' : 'c-end');
                else tile.classList.add('c-single');
            }
        }
        if (selectedDay) selectDay(selectedDay);
    }

    window.selectDay = (d) => {
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        document.getElementById(`tile-${d}`)?.classList.add('selected');
        document.getElementById('edit-btn').style.display = 'block';

        const notes = dbData[d] || [];
        const preview = document.getElementById('preview');
        
        preview.innerHTML = `<div style="color:var(--accent); font-weight:800; margin-bottom:15px; font-size:1.2rem;">${d} ${months[mIdx]}</div>`;
        
        if (notes.length === 0) {
            preview.innerHTML += `<span style="color:var(--text-muted)">Нет событий</span>`;
        } else {
            notes.forEach(n => {
                const colors = { memorial: 'var(--color-memorial)', meeting: 'var(--color-meeting)', congress: 'var(--color-congress)', personal: 'var(--color-personal)' };
                preview.innerHTML += `
                    <div class="note-card" style="border-left-color: ${colors[n.category]}">
                        <div style="font-size:0.7rem; opacity:0.5; text-transform:uppercase; margin-bottom:4px;">${n.category}</div>
                        ${n.text}
                    </div>`;
            });
        }
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        const notes = dbData[selectedDay] || [];
        
        list.innerHTML = notes.map((n, idx) => `
            <div style="display:flex; justify-content:space-between; background:rgba(0,0,0,0.2); padding:8px; margin-bottom:5px; border-radius:4px;">
                <span>${n.text}</span>
                ${(isAdmin || n.author === currentUser) ? `<span onclick="delNote(${idx})" style="color:red; cursor:pointer;">✕</span>` : ''}
            </div>
        `).join('');
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const input = document.getElementById('note-input');
        const text = input.value.trim() || cat.toUpperCase();
        const notes = [...(dbData[selectedDay] || [])];
        notes.push({ text, category: cat, author: currentUser });
        
        await setDoc(doc(db, "calendar", `${year}_${mIdx}`), { [selectedDay]: notes }, { merge: true });
        input.value = '';
        closeModal();
    };

    window.delNote = async (idx) => {
        const notes = [...dbData[selectedDay]];
        notes.splice(idx, 1);
        await setDoc(doc(db, "calendar", `${year}_${mIdx}`), { [selectedDay]: notes }, { merge: true });
        openModal();
    };

    // Слушатель базы
    renderGrid();
    onSnapshot(doc(db, "calendar", `${year}_${mIdx}`), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });

</script>
</body>
</html>
