<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIUM | Pro Edition</title>
    <style>
        :root {
            --bg-page: #f4f7f6;    
            --sidebar-bg: #1e2122; 
            --card-bg: #2d3436;    
            --weekend-card: #34495e; /* Чуть светлее для выходных */
            --accent: #0088cc;
            --text-white: #ffffff;
            --text-dark: #2d3436;
        }

        body { 
            margin: 0; padding: 0; display: flex; 
            height: 100vh; background: var(--bg-page); 
            font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        /* ТЕМНЫЙ САЙДБАР */
        .sidebar { 
            width: 380px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; align-items: flex-end; 
            text-align: right; flex-shrink: 0; box-sizing: border-box;
            color: white; z-index: 10;
        }

        .back-btn { 
            background: #fff; color: #000; border: none; padding: 10px 20px; 
            border-radius: 8px; font-weight: 900; cursor: pointer; margin-bottom: 20px;
        }

        #month-title { font-size: 3rem; font-weight: 900; text-transform: uppercase; margin: 0; color: #fff; }
        #user-name { font-weight: 800; color: #636e72; margin-bottom: 5px; text-transform: uppercase; }

        /* СПИСОК ЗАМЕТОК В САЙДБАРЕ */
        #live-info { 
            width: 100%; min-height: 120px; background: rgba(255,255,255,0.05); border-radius: 15px; 
            padding: 15px; border-right: 5px solid #e6007e; color: #fff;
            margin-top: 30px; font-size: 0.9rem; box-sizing: border-box; overflow-y: auto;
        }

        .note-item { 
            background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: flex-start;
            gap: 10px; text-align: left;
        }
        .del-btn { 
            color: #ff7675; cursor: pointer; font-weight: 900; border: none; 
            background: none; padding: 0 5px; font-size: 1.1rem;
        }
        .del-btn:hover { color: #d63031; }

        /* КОНТЕНТ (СВЕТЛЫЙ) */
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .weekdays { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; margin-bottom: 15px; }
        .weekday { color: var(--text-dark); font-weight: 900; text-transform: uppercase; text-align: center; font-size: 0.8rem; opacity: 0.6; }

        .grid { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; }

        /* ТЕМНЫЕ ПЛИТКИ */
        .day { 
            width: 110px; height: 110px; background: var(--card-bg); border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.3s; position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        /* СТИЛЬ ДЛЯ ВЫХОДНЫХ */
        .day.weekend { 
            background: var(--weekend-card); 
            box-shadow: 0 0 15px rgba(0, 136, 204, 0.4); 
        }
        
        .day:hover { transform: translateY(-5px); background: #000; }
        .day.empty { background: transparent; box-shadow: none; cursor: default; }

        .day-num { font-size: 1.8rem; font-weight: 900; color: #fff; }

        /* ИНДИКАТОР ЗАМЕТКИ */
        .dots { display: flex; gap: 4px; margin-top: 8px; height: 6px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 350px; text-align: right; color: #000; }
        textarea { width: 100%; height: 80px; margin-top: 15px; border-radius: 10px; padding: 10px; border: 1px solid #ddd; font-family: inherit; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="back-btn" onclick="location.href='calendar.html'">НАЗАД</button>
        <div id="user-name">ADMIN</div>
        <h1 id="month-title">АПРЕЛЬ</h1>
        <div id="live-info">Наведите на число...</div>
    </div>

    <div class="main">
        <div class="weekdays">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
        </div>
        <div id="grid" class="grid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="m-date" style="margin:0">Дата</h2>
            <textarea id="m-input" placeholder="Введите заметку..."></textarea>
            <button onclick="save()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; border-radius:12px; font-weight:900; margin-top:10px; cursor:pointer;">СОХРАНИТЬ</button>
            <button onclick="closeM()" style="background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const user = localStorage.getItem('currentUser') || 'ADMIN';
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = months[mIdx];
        document.getElementById('user-name').innerText = user;

        let dbData = {};
        let activeDay = null;

        function render() {
            const grid = document.getElementById('grid');
            if(!grid) return;
            grid.innerHTML = '';
            
            const first = new Date(2026, mIdx, 1).getDay();
            const shift = first === 0 ? 6 : first - 1;
            const totalDays = new Date(2026, mIdx + 1, 0).getDate();

            for(let i=0; i<shift; i++) {
                grid.innerHTML += `<div class="day empty"></div>`;
            }

            for(let i=1; i<=totalDays; i++) {
                const dayDate = new Date(2026, mIdx, i);
                const dayOfWeek = dayDate.getDay(); // 0 - Вс, 6 - Сб
                
                const day = document.createElement('div');
                day.className = 'day' + (dayOfWeek === 0 || dayOfWeek === 6 ? ' weekend' : '');
                
                const num = document.createElement('div');
                num.className = 'day-num';
                num.innerText = i;
                day.appendChild(num);

                const dotsCont = document.createElement('div');
                dotsCont.className = 'dots';
                if(dbData[i] && dbData[i].length > 0) {
                    dbData[i].forEach(() => {
                        const dot = document.createElement('div');
                        dot.className = 'dot';
                        dotsCont.appendChild(dot);
                    });
                }
                day.appendChild(dotsCont);

                day.onmouseover = () => {
                    updatePreview(i);
                };

                day.onclick = () => {
                    activeDay = i;
                    document.getElementById('m-date').innerText = i + ' ' + months[mIdx];
                    document.getElementById('modal').style.display = 'flex';
                };

                grid.appendChild(day);
            }
        }

        function updatePreview(dayNum) {
            const info = document.getElementById('live-info');
            if(dbData[dayNum] && dbData[dayNum].length > 0) {
                info.innerHTML = '';
                dbData[dayNum].forEach((note, index) => {
                    const item = document.createElement('div');
                    item.className = 'note-item';
                    
                    const textSpan = document.createElement('span');
                    textSpan.innerHTML = `<b>${note.user}:</b> ${note.text}`;
                    item.appendChild(textSpan);

                    // Удалять можно только свои заметки
                    if(note.user === user) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'del-btn';
                        delBtn.innerText = '×';
                        delBtn.onclick = (e) => {
                            e.stopPropagation();
                            deleteNote(dayNum, index);
                        };
                        item.appendChild(delBtn);
                    }
                    info.appendChild(item);
                });
            } else {
                info.innerText = 'Событий нет';
            }
        }

        async function deleteNote(day, index) {
            const list = dbData[day];
            list.splice(index, 1); // Удаляем элемент из массива
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[day]: list}, {merge:true});
            updatePreview(day);
        }

        onSnapshot(doc(db, "calendar", `2026_${mIdx}`), (snap) => {
            dbData = snap.exists() ? snap.data() : {};
            render();
        });

        window.closeM = () => document.getElementById('modal').style.display = 'none';
        window.save = async () => {
            const text = document.getElementById('m-input').value;
            if(!text) return;
            const list = dbData[activeDay] || [];
            list.push({text, user});
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[activeDay]: list}, {merge:true});
            document.getElementById('m-input').value = '';
            closeM();
        };

        render();
    </script>
</body>
</html>
