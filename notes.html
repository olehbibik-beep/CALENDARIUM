<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Заметки</title>
    <style>
        :root { 
            --accent: #0088cc; --bg: #121416; --dark: #22272a; 
            --ev-mem: #ff7675; --ev-mem-bg: #3b1e22; --ev-meet: #0984e3; 
            --weekend: #1a1e20; --text-main: #e0e6ed;
            --footer-bg: #0f1112; --footer-border: #222;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding-bottom: 80px; overflow-x: hidden;
        }
        
        /* ШАПКА */
        .header { 
            width: 100%; background: #0f1112; padding: 18px; 
            text-align: center; position: relative; border-bottom: 1px solid #222; 
        }
        .back-btn { 
            position: absolute; left: 15px; top: 14px; background: #2d3436; 
            border: none; padding: 8px 14px; border-radius: 8px; 
            color: white; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .back-btn:active { transform: scale(0.9); }
        
        /* СЕТКА КАЛЕНДАРЯ */
        .main { width: 100%; max-width: 500px; padding: 15px; }
        .weekdays { 
            display: grid; grid-template-columns: repeat(7, 1fr); 
            text-align: center; font-size: 11px; font-weight: 800; 
            margin-bottom: 15px; color: #576574; letter-spacing: 1px;
        }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px 8px; }
        .day-box { 
            width: 100%; aspect-ratio: 1/1; background: var(--dark); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 18px; cursor: pointer; border: 2px solid transparent;
            position: relative; transition: 0.2s;
        }
        .day-box.weekend { background: var(--weekend); color: #636e72; }
        .day-box.selected { border-color: var(--accent) !important; background: #1e272e; }
        .day-box.has-memorial { background: var(--ev-mem-bg) !important; color: var(--ev-mem) !important; border-color: var(--ev-mem) !important; }
.day-box.today {
    background: rgba(223, 230, 233, 0.6) !important; /* Очень прозрачный оранжевый */
    border: 0px solid rgba(230, 126, 34, 0.25) !important; /* Тонкая рамка в цвет */
}

/* Чтобы выделение не пропадало на выходных */
.day-box.today.weekend {
    color: #ffaa66 !important;
}
        /* ИНДИКАТОРЫ НА ПЛИТКАХ */
        .indicator-row { position: absolute; bottom: 8px; display: flex; gap: 3px; justify-content: center; width: 100%; }
        .mark { height: 4px; width: 8px; border-radius: 2px; }
        .m-meeting { background: var(--ev-meet); }
        .m-personal { background: #555; }

        /* ПРЕВЬЮ ПОД КАЛЕНДАРЕМ */
        .preview { 
            background: #1e2224; width: 100%; padding: 18px; margin-top: 25px; 
            border-radius: 15px; border: 1px solid #2d3436; min-height: 90px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        /* ФУТЕР */
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--footer-bg); padding: 15px 25px;
            display: flex; align-items: center; box-sizing: border-box; 
            border-top: 1px solid var(--footer-border); z-index: 100;
        }
        .footer-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-right: 12px; box-shadow: 0 0 10px #2ecc71; }
        .footer-text { font-size: 10px; color: #576574; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        /* МОДАЛЬНОЕ ОКНО */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #1e2224; padding: 25px; border-radius: 24px; width: 92%; max-width: 380px; border: 1px solid #333; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 800; margin-bottom: 8px; cursor: pointer; color: white; transition: 0.2s; text-transform: uppercase; font-size: 11px; }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { background: #2d3436 !important; color: #555 !important; cursor: not-allowed; }
        
        textarea { 
            width: 100%; height: 70px; margin-bottom: 15px; padding: 12px; 
            border-radius: 10px; border: none; background: #0f1112; color: white; 
            resize: none; outline: none; font-size: 14px;
        }
        
        /* СПИСОК ЗАМЕТОК В МОДАЛКЕ */
        #modal-list { margin-bottom: 20px; max-height: 220px; overflow-y: auto; padding-right: 5px; }
        .note-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #14171a; padding: 12px; margin-bottom: 8px; border-radius: 10px; 
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='calendar.html'">←</button>
    <div id="m-name" style="font-size: 18px; font-weight: 900; letter-spacing: 1.5px;">...</div>
</div>

<div class="main">
    <div class="weekdays"><div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div></div>
    <div id="grid" class="grid"></div>
    <div id="preview" class="preview">Нажмите на дату</div>
    <button class="btn" id="edit-btn" style="display:none; background: var(--accent); margin-top:20px; box-shadow: 0 5px 15px rgba(0,136,204,0.3);" onclick="openModal()">+ ДОБАВИТЬ ПЛАН</button>
</div>

<footer>
    <div class="footer-dot"></div>
    <div class="footer-text">Cloud Plan Ecosystem • Note Terminal v2.1</div>
</footer>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="modal-title" style="margin:0 0 20px 0; text-align:center; color: var(--accent); text-transform: uppercase;"></h3>
        <div id="modal-list"></div>
        <textarea id="note-input" placeholder="Введите текст..."></textarea>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <button id="btn-memorial" class="btn" style="background:var(--ev-mem);" onclick="save('memorial')">ВЕЧЕРЯ</button>
            <button id="btn-meeting" class="btn" style="background:var(--ev-meet);" onclick="save('meeting')">ВСТРЕЧА</button>
            <button class="btn" style="background:#4b4b4b;" onclick="save('personal')">ЛИЧНОЕ</button>
        </div>
        <button class="btn" style="background:transparent; color:#888; margin-top:10px;" onclick="closeModal()">ЗАКРЫТЬ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));
    
    // ПРАВА ДОСТУПА ИЗ ЛОКАЛЬНОГО ХРАНИЛИЩА
    const currentUser = (localStorage.getItem('currentUser') || 'гость').toLowerCase();
    const isAdmin = currentUser === 'admin';

    const mIdx = parseInt(localStorage.getItem('selectedMonth')) || 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    const docId = `${year}_${mIdx}`;
    const months = ["ЯНВАРЬ", "ФЕВРАЛЬ", "МАРТ", "АПРЕЛЬ", "МАЙ", "ИЮНЬ", "ИЮЛЬ", "АВГУСТ", "СЕНТЯБРЬ", "ОКТЯБРЬ", "НОЯБРЬ", "ДЕКАБРЬ"];
    
    document.getElementById('m-name').innerText = months[mIdx] + " " + year;

    let dbData = {};
    let selectedDay = null;

   function renderGrid() {
    const grid = document.getElementById('grid');
    const firstDay = new Date(year, mIdx, 1).getDay();
    const shift = firstDay === 0 ? 6 : firstDay - 1;
    const totalDays = new Date(year, mIdx + 1, 0).getDate();
    
    // Получаем реальную дату сегодня
    const now = new Date();
    const tDay = now.getDate();
    const tMonth = now.getMonth();
    const tYear = now.getFullYear();

    grid.innerHTML = '';
    
    for (let i = 0; i < shift; i++) {
        grid.innerHTML += `<div class="day-box" style="visibility:hidden"></div>`;
    }

    for (let d = 1; d <= totalDays; d++) {
        const isWeekend = new Date(year, mIdx, d).getDay() % 6 === 0;
        
        // Проверяем: это число 'd' совпадает с сегодняшним днем, выбранным месяцем и годом?
        const isToday = (d === tDay && mIdx === tMonth && year === tYear);
        
        // Если это сегодня, добавляем класс 'today'
        grid.innerHTML += `
            <div class="day-box ${isWeekend ? 'weekend' : ''} ${isToday ? 'today' : ''}" 
                 id="tile-${d}" 
                 onclick="selectDay(${d})">
                ${d}
                <div class="indicator-row" id="marks-${d}"></div>
            </div>`;
    }
}

    function updateUI() {
        for (let d = 1; d <= 31; d++) {
            const tile = document.getElementById(`tile-${d}`);
            const row = document.getElementById(`marks-${d}`);
            if (!tile || !row) continue;
            const notes = Array.isArray(dbData[d]) ? dbData[d] : [];
            tile.classList.remove('has-memorial');
            row.innerHTML = '';
            notes.forEach(n => {
                if (n.category === 'memorial') tile.classList.add('has-memorial');
                else if (n.category === 'meeting') row.innerHTML += '<div class="mark m-meeting"></div>';
                else if (n.category === 'personal') row.innerHTML += '<div class="mark m-personal"></div>';
            });
        }
        if (selectedDay) selectDay(selectedDay);
    }

    window.selectDay = (d) => {
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        const activeTile = document.getElementById(`tile-${d}`);
        if(activeTile) activeTile.classList.add('selected');
        document.getElementById('edit-btn').style.display = 'block';
        const notes = Array.isArray(dbData[d]) ? dbData[d] : []; 
        document.getElementById('preview').innerHTML = `<b style="color:var(--accent)">${d} ${months[mIdx]}:</b><br><br>` + 
                           (notes.map(n => `• ${n.text}`).join('<br>') || '<span style="color:#555;">Нет планов</span>');
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        const notes = Array.isArray(dbData[selectedDay]) ? dbData[selectedDay] : []; 
        
        document.getElementById('btn-memorial').disabled = !isAdmin;
        document.getElementById('btn-meeting').disabled = !isAdmin;

        list.innerHTML = notes.map((n, idx) => {
            const isOwner = n.author === currentUser;
            const canDelete = isAdmin || isOwner;
            const borderCol = n.category === 'memorial' ? 'var(--ev-mem)' : (n.category === 'meeting' ? 'var(--ev-meet)' : '#444');

            return `
            <div class="note-item" style="border-left: 4px solid ${borderCol}">
                <span style="font-size:13px; font-weight:500; color:#eee;">${n.text}</span>
                ${canDelete ? `<b onclick="delNote(${idx})" style="color:#ff7675; cursor:pointer; padding:5px 10px; font-size:18px;">✕</b>` : ''}
            </div>`
        }).join('');
        document.getElementById('modal').style.display = 'flex';
        list.scrollTop = list.scrollHeight;
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const val = document.getElementById('note-input').value.trim();
        const text = val || (cat === 'memorial' ? 'ВЕЧЕРЯ' : cat === 'meeting' ? 'ВСТРЕЧА' : 'ЛИЧНОЕ');
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        notes.push({ text, category: cat, author: currentUser });
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        document.getElementById('note-input').value = '';
        openModal();
    };

    window.delNote = async (idx) => {
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        const isOwner = notes[idx].author === currentUser;

        if (isAdmin || isOwner) {
            notes.splice(idx, 1);
            await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
            // Мгновенная перерисовка модалки для "бесшовности"
            openModal();
        }
    };

    renderGrid();
    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });
</script>
</body>
</html>
