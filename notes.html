<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --main-bg: #f4f7f6;
            --sidebar-bg: #ffffff;
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        /* САЙДБАР */
        .sidebar { 
            width: 400px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.03); z-index: 10; flex-shrink: 0; 
            box-sizing: border-box; align-items: flex-end; text-align: right;
        }

        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { 
            background: #000; color: #fff; border: none; padding: 7px 16px; 
            border-radius: 8px; font-size: 0.7rem; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s;
        }
        
        /* Исправленные титры */
        #display-year-static { font-size: 5rem; font-weight: 200; color: #dfe6e9; letter-spacing: -8px; line-height: 0.6; margin-bottom: 5px; }
        #month-title { 
            font-size: 3.5rem; font-weight: 800; color: #2d3436; 
            letter-spacing: -3px; line-height: 0.8; margin-bottom: 40px; text-transform: uppercase;
        }

        .side-section { width: 100%; margin-bottom: 30px; }
        .side-label { font-size: 0.7rem; font-weight: 800; color: #b2bec3; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 0.85rem; color: #636e72; margin-bottom: 8px; }
        .color-bar { width: 4px; height: 15px; border-radius: 2px; }

        /* Динамический блок просмотра (Твоя розовая скобка) */
        #live-preview { 
            font-size: 0.9rem; background: #ffe6f2; padding: 20px; 
            border-radius: 15px 0 0 15px; position: relative;
            line-height: 1.4; color: #2d3436; text-align: right; width: 100%; box-sizing: border-box;
            min-height: 100px; transition: 0.2s;
        }
        #live-preview::after {
            content: ''; position: absolute; right: -10px; top: -5px; bottom: -5px; width: 10px;
            border-right: 4px solid #e6007e; border-top: 4px solid #e6007e;
            border-bottom: 4px solid #e6007e; border-radius: 0 10px 10px 0;
        }
        #preview-user { font-size: 0.65rem; font-weight: 900; color: #e6007e; text-transform: uppercase; display: block; margin-bottom: 5px; }

        /* СЕТКА КАЛЕНДАРЯ */
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; margin-bottom: 15px; text-align: center; }
        .weekday { font-size: 0.7rem; font-weight: 900; color: #b2bec3; text-transform: uppercase; }

        .days-grid { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; }

        .day-card { 
            background: #fff; height: 110px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.1rem; color: #2d3436; cursor: pointer;
            transition: 0.3s; border: 1px solid rgba(0,0,0,0.02);
            position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .day-card:hover { transform: translateY(-5px); border-color: var(--accent); z-index: 5; }
        .day-card.empty { background: transparent; box-shadow: none; cursor: default; border: none; }
        
        .day-mark { position: absolute; bottom: 12px; width: 6px; height: 6px; border-radius: 50%; }

        /* МОДАЛКА (для редактирования) */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-content { background: #fff; padding: 40px; border-radius: 30px; width: 450px; text-align: right; }
        textarea { width: 100%; height: 120px; border: 1px solid #f0f0f0; border-radius: 15px; padding: 15px; font-family: inherit; margin: 15px 0; outline: none; }
        .cat-select { display: flex; gap: 8px; margin-bottom: 20px; direction: rtl; }
        .cat-btn { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #f0f0f0; cursor: pointer; font-size: 0.6rem; font-weight: 900; }
        .cat-btn.active { border-color: var(--accent); background: #f0f9ff; }
        .save-btn { width: 100%; background: #000; color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="back-btn" onclick="location.href='calendar.html'">Назад</button>
            <div class="user-name" id="user-display">ADMIN</div>
        </div>
        
        <div id="display-year-static">2026</div>
        <div id="month-title">МАРТ</div>

        <div class="side-section">
            <div class="side-label">Просмотр события</div>
            <div id="live-preview">
                <span id="preview-user">System</span>
                <span id="preview-text">Наведите на день, чтобы увидеть детали...</span>
            </div>
        </div>

        <div class="side-section">
            <div class="side-label">Категории</div>
            <div class="legend-item">Работа <div class="color-bar" style="background: var(--ev-work);"></div></div>
            <div class="legend-item">Важное <div class="color-bar" style="background: var(--ev-important);"></div></div>
            <div class="legend-item">Личное <div class="color-bar" style="background: var(--ev-personal);"></div></div>
        </div>
    </div>

    <div class="main-content">
        <div class="weekdays">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
        </div>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h2 id="modal-date-title" style="margin:0; font-weight:900;">Дата</h2>
            <textarea id="note-text" placeholder="Что планируем?"></textarea>
            <div class="cat-select">
                <div class="cat-btn" id="btn-personal" onclick="selectCat('personal')">ЛИЧНОЕ</div>
                <div class="cat-btn" id="btn-important" onclick="selectCat('important')">ВАЖНОЕ</div>
                <div class="cat-btn" id="btn-work" onclick="selectCat('work')">РАБОТА</div>
            </div>
            <button class="save-btn" onclick="saveNote()">ОБНОВИТЬ</button>
            <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#b2bec3; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const currentUser = localStorage.getItem('currentUser');
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = monthsNames[monthIdx];
        document.getElementById('user-display').innerText = currentUser;

        let selectedDay = null;
        let activeCat = 'work';

        const firstDay = new Date(2026, monthIdx, 1).getDay();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();
        const container = document.getElementById('days-container');

        onSnapshot(doc(db, "calendar", `2026_${monthIdx}`), (snap) => {
            container.innerHTML = '';
            const data = snap.exists() ? snap.data() : {};
            
            for(let s=0; s<shift; s++) {
                const empty = document.createElement('div');
                empty.className = 'day-card empty';
                container.appendChild(empty);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = i;
                
                if (data[i]) {
                    const dot = document.createElement('div');
                    dot.className = 'day-mark';
                    dot.style.background = `var(--ev-${data[i].category})`;
                    card.appendChild(dot);
                }

                // СОБЫТИЯ НАВЕДЕНИЯ
                card.onmouseover = () => {
                    if (data[i]) {
                        document.getElementById('preview-user').innerText = data[i].user || 'System';
                        document.getElementById('preview-text').innerText = data[i].text;
                        document.getElementById('live-preview').style.background = '#fff5f9';
                    } else {
                        document.getElementById('preview-user').innerText = 'Пусто';
                        document.getElementById('preview-text').innerText = 'Нет запланированных событий';
                        document.getElementById('live-preview').style.background = '#f9f9f9';
                    }
                };

                // Открытие модалки по клику
                card.onclick = () => openModal(i, data[i]);
                container.appendChild(card);
            }
        });

        window.openModal = (day, existing) => {
            selectedDay = day;
            document.getElementById('modal-date-title').innerText = `${day} ${monthsNames[monthIdx]}`;
            document.getElementById('note-text').value = existing ? existing.text : '';
            selectCat(existing ? existing.category : 'work');
            document.getElementById('note-modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('note-modal').style.display = 'none';

        window.selectCat = (cat) => {
            activeCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${cat}`).classList.add('active');
        };

        window.saveNote = async () => {
            const text = document.getElementById('note-text').value;
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {
                [selectedDay]: { text, category: activeCat, user: currentUser }
            }, { merge: true });

            await addDoc(collection(db, "logs"), {
                user: currentUser, action: "изменил запись", month: monthsNames[monthIdx], timestamp: serverTimestamp()
            });
            closeModal();
        };
    </script>
</body>
</html>
