<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIUM | Emergency Fix</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --sidebar: #1e2122;
            --card: #2d3436;
            --orange: #ff9f43;
        }

        body { margin: 0; display: flex; height: 100vh; background: var(--bg); font-family: sans-serif; overflow: hidden; }

        /* САЙДБАР - ТУТ НИЧЕГО НЕ МЕНЯЕМ */
        .sidebar { 
            width: 350px; background: var(--sidebar); padding: 40px; 
            display: flex; flex-direction: column; color: white; flex-shrink: 0; box-sizing: border-box;
        }
        .back-btn { background: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        #month-title { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; margin: 0; }
        #live-info { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; min-height: 120px; border-left: 4px solid var(--orange); font-size: 0.9rem; }
        .note-item { display: flex; justify-content: space-between; background: rgba(255,255,255,0.1); padding: 8px; margin-bottom: 5px; border-radius: 5px; }

        /* ОСНОВНАЯ ЗОНА */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ФИКСИРОВАННАЯ ШАПКА - ОНА ВНЕ СКРИПТА */
        .header-days { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 15px;
        }
        .hd-cell { width: 100px; text-align: center; font-weight: bold; color: #333; text-transform: uppercase; font-size: 0.8rem; }
        .hd-cell.we { color: var(--orange); }

        /* СЕТКА ЧИСЕЛ */
        #calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 100px); 
            gap: 15px; 
        }

        .day { 
            width: 100px; height: 100px; background: var(--card); border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s;
        }
        .day:hover { background: #000; transform: translateY(-2px); }
        .day.empty { background: transparent; cursor: default; pointer-events: none; }
        .day-num { font-size: 1.6rem; font-weight: bold; color: #fff; }
        .day.weekend .day-num { color: var(--orange); }

        .dots { display: flex; gap: 3px; margin-top: 5px; }
        .dot { width: 5px; height: 5px; background: #0088cc; border-radius: 50%; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
        .modal-box { background: #fff; padding: 25px; border-radius: 15px; width: 300px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="back-btn" onclick="location.href='calendar.html'">НАЗАД</button>
        <div id="user-display" style="color: #666; font-size: 0.8rem; font-weight: bold;">ADMIN</div>
        <h1 id="month-title">МЕСЯЦ</h1>
        <div id="live-info">Наведи на дату</div>
    </div>

    <div class="main-content">
        <div class="header-days">
            <div class="hd-cell">Пн</div>
            <div class="hd-cell">Вт</div>
            <div class="hd-cell">Ср</div>
            <div class="hd-cell">Чт</div>
            <div class="hd-cell">Пт</div>
            <div class="hd-cell we">Сб</div>
            <div class="hd-cell we">Вс</div>
        </div>
        
        <div id="calendar-grid"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h3 id="m-date" style="margin:0">00 Дата</h3>
            <textarea id="m-input" style="width:100%; height:60px; margin:10px 0; padding:5px; box-sizing: border-box;"></textarea>
            <button onclick="save()" style="width:100%; padding:10px; background:#000; color:#fff; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">СОХРАНИТЬ</button>
            <button onclick="closeM()" style="width:100%; border:none; background:none; color:gray; margin-top:5px; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const user = localStorage.getItem('currentUser') || 'ADMIN';
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = months[mIdx];
        document.getElementById('user-display').innerText = user;

        let dbData = {};
        let activeDay = null;

        function drawGrid() {
            const grid = document.getElementById('calendar-grid');
            if(!grid) return;
            grid.innerHTML = ''; // Очищаем только числа!

            const first = new Date(2026, mIdx, 1).getDay();
            const shift = first === 0 ? 6 : first - 1;
            const daysCount = new Date(2026, mIdx + 1, 0).getDate();

            for(let i=0; i<shift; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                grid.appendChild(empty);
            }

            for(let i=1; i<=daysCount; i++) {
                const date = new Date(2026, mIdx, i);
                const isWE = (date.getDay() === 0 || date.getDay() === 6);
                
                const dayEl = document.createElement('div');
                dayEl.className = 'day' + (isWE ? ' weekend' : '');
                dayEl.innerHTML = `<div class="day-num">${i}</div>`;
                
                const dots = document.createElement('div');
                dots.className = 'dots';
                if(dbData[i]) dbData[i].forEach(() => {
                    const d = document.createElement('div');
                    d.className = 'dot';
                    dots.appendChild(d);
                });
                dayEl.appendChild(dots);

                dayEl.onmouseover = () => { activeDay = i; updatePreview(i); };
                dayEl.onclick = () => { activeDay = i; document.getElementById('m-date').innerText = i+' '+months[mIdx]; document.getElementById('modal').style.display='flex'; };
                grid.appendChild(dayEl);
            }
        }

        function updatePreview(day) {
            const info = document.getElementById('live-info');
            if(dbData[day] && dbData[day].length > 0) {
                info.innerHTML = '';
                dbData[day].forEach((n, idx) => {
                    const row = document.createElement('div');
                    row.className = 'note-item';
                    row.innerHTML = `<span><b>${n.user}:</b> ${n.text}</span>`;
                    if(n.user === user) {
                        const del = document.createElement('span');
                        del.style.color = '#ff4757'; del.style.cursor = 'pointer'; del.style.fontWeight='bold'; del.innerText = ' [×]';
                        del.onclick = (e) => { e.stopPropagation(); deleteNote(day, idx); };
                        row.appendChild(del);
                    }
                    info.appendChild(row);
                });
            } else { info.innerText = 'Нет заметок'; }
        }

        async function deleteNote(day, idx) {
            const list = [...dbData[day]];
            list.splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[day]: list}, {merge:true});
        }

        onSnapshot(doc(db, "calendar", `2026_${mIdx}`), (snap) => {
            dbData = snap.exists() ? snap.data() : {};
            drawGrid();
            if(activeDay) updatePreview(activeDay);
        });

        window.closeM = () => document.getElementById('modal').style.display='none';
        window.save = async () => {
            const val = document.getElementById('m-input').value;
            if(!val) return;
            const list = dbData[activeDay] || [];
            list.push({text: val, user: user});
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[activeDay]: list}, {merge:true});
            document.getElementById('m-input').value = '';
            closeM();
        };

        drawGrid();
    </script>
</body>
</html>
