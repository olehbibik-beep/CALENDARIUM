<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIUM | Static Edition</title>
    <style>
        :root {
            --bg-page: #f4f7f6;
            --sidebar-bg: #1e2122;
            --card-bg: #2d3436;
            --orange: #ff9f43;
        }

        body { 
            margin: 0; padding: 0; display: flex; 
            height: 100vh; background: var(--bg-page); 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
        }

        /* САЙДБАР */
        .sidebar { 
            width: 350px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; color: white; flex-shrink: 0;
            box-sizing: border-box; z-index: 100;
        }

        .back-btn { background: #fff; color: #000; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 25px; font-weight: bold; }
        #month-title { font-size: 2.6rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        
        #live-info { 
            margin-top: 30px; padding: 15px; background: rgba(255,255,255,0.05); 
            border-radius: 12px; font-size: 0.9rem; min-height: 120px; border-left: 4px solid var(--orange);
        }

        .note-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 8px; background: rgba(255,255,255,0.08); border-radius: 6px; }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .main { flex-grow: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ЖЕСТКАЯ ШАПКА (БЕЗ ДИНАМИКИ) */
        .static-weekdays { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 15px;
            pointer-events: none; /* Чтобы не мешали кликам */
        }
        .wd { 
            width: 105px; text-align: center; font-weight: 900; 
            color: #444; text-transform: uppercase; font-size: 0.8rem; 
        }
        .wd.we { color: var(--orange); }

        /* СЕТКА КАЛЕНДАРЯ */
        .grid { display: grid; grid-template-columns: repeat(7, 105px); gap: 15px; }

        .day { 
            width: 105px; height: 105px; background: var(--card-bg); border-radius: 18px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .day:hover { background: #000; transform: translateY(-3px); }
        .day.empty { background: transparent; box-shadow: none; cursor: default; pointer-events: none; }

        .day-num { font-size: 1.7rem; font-weight: 800; color: #fff; }
        .day.weekend .day-num { color: var(--orange); }

        .dots { display: flex; gap: 4px; margin-top: 6px; height: 6px; }
        .dot { width: 6px; height: 6px; background: #0088cc; border-radius: 50%; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 320px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="back-btn" onclick="location.href='calendar.html'">← НАЗАД</button>
        <div id="user-tag" style="color: #888; font-weight: bold; margin-bottom: 5px;">ADMIN</div>
        <h1 id="month-title">МЕСЯЦ</h1>
        <div id="live-info">Загрузка данных...</div>
    </div>

    <div class="main">
        <div class="static-weekdays">
            <div class="wd">Пн</div>
            <div class="wd">Вт</div>
            <div class="wd">Ср</div>
            <div class="wd">Чт</div>
            <div class="wd">Пт</div>
            <div class="wd we">Сб</div>
            <div class="wd we">Вс</div>
        </div>

        <div class="grid" id="grid">
            </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="m-date" style="margin:0; color: #000;">Дата</h3>
            <textarea id="m-input" style="width:100%; height:80px; margin-top:15px; border-radius:10px; padding:10px; border:1px solid #ddd; font-family: inherit;"></textarea>
            <button onclick="save()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; margin-top:15px; border-radius:12px; font-weight:bold; cursor:pointer;">СОХРАНИТЬ</button>
            <button onclick="closeM()" style="width:100%; border:none; background:none; color:gray; margin-top:10px; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const user = localStorage.getItem('currentUser') || 'ADMIN';
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = months[mIdx];
        document.getElementById('user-tag').innerText = user;

        let dbData = {};
        let activeDay = null;

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const first = new Date(2026, mIdx, 1).getDay();
            const offset = first === 0 ? 6 : first - 1;
            const total = new Date(2026, mIdx + 1, 0).getDate();

            for(let i=0; i<offset; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                grid.appendChild(empty);
            }

            for(let i=1; i<=total; i++) {
                const d = new Date(2026, mIdx, i);
                const isWE = (d.getDay() === 0 || d.getDay() === 6);
                const day = document.createElement('div');
                day.className = 'day' + (isWE ? ' weekend' : '');
                day.innerHTML = `<div class="day-num">${i}</div>`;
                
                const dots = document.createElement('div');
                dots.className = 'dots';
                if(dbData[i]) dbData[i].forEach(() => dots.appendChild(Object.assign(document.createElement('div'), {className: 'dot'})));
                day.appendChild(dots);

                day.onmouseover = () => { activeDay = i; showInfo(i); };
                day.onclick = () => { activeDay = i; openModal(i); };
                grid.appendChild(day);
            }
        }

        function showInfo(day) {
            const info = document.getElementById('live-info');
            if(dbData[day] && dbData[day].length > 0) {
                info.innerHTML = '';
                dbData[day].forEach((n, idx) => {
                    const row = document.createElement('div');
                    row.className = 'note-item';
                    row.innerHTML = `<span><b>${n.user}:</b> ${n.text}</span>`;
                    if(n.user === user) {
                        const del = document.createElement('span');
                        del.style.color = '#ff4757'; del.style.cursor = 'pointer'; del.style.fontWeight = '900'; del.innerText = ' [×]';
                        del.onclick = (e) => { e.stopPropagation(); deleteNote(day, idx); };
                        row.appendChild(del);
                    }
                    info.appendChild(row);
                });
            } else { info.innerText = 'Заметок нет'; }
        }

        async function deleteNote(day, idx) {
            const list = [...dbData[day]];
            list.splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[day]: list}, {merge:true});
        }

        function openModal(day) {
            document.getElementById('m-date').innerText = day + ' ' + months[mIdx];
            document.getElementById('modal').style.display = 'flex';
        }

        window.closeM = () => document.getElementById('modal').style.display = 'none';
        window.save = async () => {
            const val = document.getElementById('m-input').value;
            if(!val) return;
            const list = dbData[activeDay] || [];
            list.push({text: val, user: user});
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[activeDay]: list}, {merge:true});
            document.getElementById('m-input').value = '';
            closeM();
        };

        onSnapshot(doc(db, "calendar", `2026_${mIdx}`), (snap) => {
            dbData = snap.exists() ? snap.data() : {};
            renderGrid();
            if(activeDay) showInfo(activeDay);
        });

        renderGrid();
    </script>
</body>
</html>
