<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Modern & Secure</title>
    <style>
        :root { 
            --accent: #00a8ff; --bg: #0f1113; --panel: #1c1f22; 
            --ev-mem: #ff5252; --ev-meet: #00a8ff; --ev-pers: #95a5a6;
            --text: #f5f6fa;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .header { width: 100%; padding: 20px; text-align: center; background: rgba(15,17,19,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2d3436; }
        .back-btn { position: absolute; left: 15px; top: 18px; background: var(--panel); border: 1px solid #3d444b; padding: 8px 15px; border-radius: 12px; color: white; cursor: pointer; }
        
        .main { width: 100%; max-width: 450px; padding: 10px; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 10px; font-weight: 800; color: #576574; text-transform: uppercase; margin-bottom: 15px; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-box { 
            aspect-ratio: 1/1; background: var(--panel); border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 17px; cursor: pointer; position: relative; border: 1px solid transparent; transition: 0.3s;
        }
        .day-box.weekend { color: #576574; background: #16191c; }
        .day-box.selected { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,168,255,0.2); transform: scale(1.05); }
        .day-box.has-memorial { background: rgba(255,82,82,0.1) !important; color: var(--ev-mem); border-color: rgba(255,82,82,0.3); }

        .indicator-row { position: absolute; bottom: 8px; display: flex; gap: 3px; }
        .mark { width: 6px; height: 6px; border-radius: 50%; }
        
        .preview { background: var(--panel); width: 100%; padding: 20px; margin-top: 25px; border-radius: 20px; border: 1px solid #2d3436; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* СОВРЕМЕННОЕ МОДАЛЬНОЕ ОКНО */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: flex-end; justify-content: center; }
        .modal-box { 
            background: #1c1f22; width: 100%; max-width: 500px; padding: 25px; 
            border-radius: 30px 30px 0 0; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid #3d444b;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .note-card { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #252a2e; padding: 12px 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #555;
        }
        
        textarea { 
            width: 100%; height: 80px; background: #0f1113; border: 1px solid #3d444b; border-radius: 15px; 
            color: white; padding: 15px; margin: 15px 0; resize: none; font-size: 16px;
        }

        .type-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .type-btn { 
            padding: 15px 5px; border: none; border-radius: 15px; color: white; font-size: 10px; font-weight: bold;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s;
        }
        .type-btn:active { transform: scale(0.95); }
        .type-btn:disabled { opacity: 0.2; filter: grayscale(1); }

        .close-btn { width: 100%; padding: 15px; background: none; border: 1px solid #3d444b; color: #95a5a6; border-radius: 15px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='calendar.html'">←</button>
    <div id="m-name" onclick="checkAdmin()" style="font-size: 20px; font-weight: 800; letter-spacing: 2px;">...</div>
</div>

<div class="main">
    <div class="weekdays"><div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div></div>
    <div id="grid" class="grid"></div>
    <div id="preview" class="preview">Выберите дату</div>
    <button id="edit-btn" style="display:none; width:100%; padding:18px; background:var(--accent); border:none; border-radius:18px; color:white; font-weight:bold; margin-top:15px; box-shadow: 0 5px 15px rgba(0,168,255,0.3);" onclick="openModal()">+ ДОБАВИТЬ ЗАПИСЬ</button>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-box">
        <div style="width:40px; height:4px; background:#3d444b; border-radius:2px; margin: 0 auto 20px;"></div>
        <h3 id="modal-title" style="margin:0; font-size:22px;"></h3>
        <div id="modal-list" style="margin-top:20px; max-height:200px; overflow-y:auto;"></div>
        
        <textarea id="note-input" placeholder="Введите описание..."></textarea>
        
        <div class="type-selector">
            <button id="btn-memorial" class="type-btn" style="background:#c0392b;" onclick="save('memorial')"><span>🔴</span>ВЕЧЕРЯ</button>
            <button id="btn-meeting" class="type-btn" style="background:#2980b9;" onclick="save('meeting')"><span>🔵</span>СОБРАНИЕ</button>
            <button class="type-btn" style="background:#2d3436; border:1px solid #3d444b;" onclick="save('personal')"><span>⚪</span>ЛИЧНОЕ</button>
        </div>
        <button class="close-btn" onclick="closeModal()">ГОТОВО</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));
    
    // Идентификация пользователя
    if(!localStorage.getItem('userId')) localStorage.setItem('userId', 'user_' + Math.random().toString(36).substr(2, 9));
    const myId = localStorage.getItem('userId');
    let isAdmin = localStorage.getItem('isAdmin') === 'true';
    let clickCount = 0;

    window.checkAdmin = () => {
        if(++clickCount >= 5) {
            isAdmin = !isAdmin;
            localStorage.setItem('isAdmin', isAdmin);
            alert(isAdmin ? "Вход выполнен" : "Выход выполнен");
            location.reload();
        }
    };

    const savedMonth = localStorage.getItem('selectedMonth');
    const mIdx = (savedMonth !== null) ? parseInt(savedMonth) : 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    const docId = `${year}_${mIdx}`;
    const months = ["ЯНВАРЬ", "ФЕВРАЛЬ", "МАРТ", "АПРЕЛЬ", "МАЙ", "ИЮНЬ", "ИЮЛЬ", "АВГУСТ", "СЕНТЯБРЬ", "ОКТЯБРЬ", "НОЯБРЬ", "ДЕКАБРЬ"];
    
    document.getElementById('m-name').innerText = months[mIdx];

    let dbData = {};
    let selectedDay = null;

    function renderGrid() {
        const grid = document.getElementById('grid');
        const firstDay = new Date(year, mIdx, 1).getDay();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        const total = new Date(year, mIdx + 1, 0).getDate();
        grid.innerHTML = '';
        for (let i = 0; i < shift; i++) grid.innerHTML += `<div class="day-box" style="visibility:hidden"></div>`;
        for (let d = 1; d <= total; d++) {
            const isW = new Date(year, mIdx, d).getDay() % 6 === 0;
            grid.innerHTML += `<div class="day-box ${isW ? 'weekend' : ''}" id="tile-${d}" onclick="selectDay(${d})">${d}<div class="indicator-row" id="marks-${d}"></div></div>`;
        }
    }

    function updateUI() {
        for (let d = 1; d <= 31; d++) {
            const tile = document.getElementById(`tile-${d}`);
            const row = document.getElementById(`marks-${d}`);
            if (!tile || !row) continue;
            const notes = Array.isArray(dbData[d]) ? dbData[d] : [];
            tile.className = tile.className.replace('has-memorial', '');
            row.innerHTML = '';
            notes.forEach(n => {
                if (n.category === 'memorial') tile.classList.add('has-memorial');
                const color = n.category === 'memorial' ? '#ff5252' : n.category === 'meeting' ? '#00a8ff' : '#95a5a6';
                row.innerHTML += `<div class="mark" style="background:${color}"></div>`;
            });
        }
        if (selectedDay) selectDay(selectedDay);
    }

    window.selectDay = (d) => {
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        document.getElementById(`tile-${d}`).classList.add('selected');
        document.getElementById('edit-btn').style.display = 'block';
        const notes = Array.isArray(dbData[d]) ? dbData[d] : [];
        document.getElementById('preview').innerHTML = `<h4 style="margin:0 0 10px; color:var(--accent)">${d} ${months[mIdx]}</h4>` + 
            (notes.map(n => `<div style="font-size:14px; margin-bottom:5px; opacity:0.9">• ${n.text}</div>`).join('') || 'Нет планов');
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        const notes = Array.isArray(dbData[selectedDay]) ? dbData[selectedDay] : [];
        
        document.getElementById('btn-memorial').disabled = !isAdmin;
        document.getElementById('btn-meeting').disabled = !isAdmin;

        list.innerHTML = notes.map((n, idx) => {
            const canDelete = isAdmin || n.author === myId;
            const borderCol = n.category === 'memorial' ? 'var(--ev-mem)' : n.category === 'meeting' ? 'var(--ev-meet)' : '#555';
            return `
            <div class="note-card" style="border-left-color:${borderCol}">
                <span>${n.text}</span>
                ${canDelete ? `<b onclick="delNote(${idx})" style="color:#ff5252; cursor:pointer; font-size:20px;">×</b>` : ''}
            </div>`;
        }).join('');
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        if((cat === 'memorial' || cat === 'meeting') && !isAdmin) return;
        const val = document.getElementById('note-input').value.trim();
        const text = val || (cat === 'memorial' ? 'ВЕЧЕРЯ' : cat === 'meeting' ? 'СОБРАНИЕ' : 'ЗАМЕТКА');
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        
        // К каждой заметке приклеиваем ID автора
        notes.push({ text, category: cat, author: myId });
        
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        document.getElementById('note-input').value = '';
        openModal();
    };

    window.delNote = async (idx) => {
        const notes = [...dbData[selectedDay]];
        // Проверка на всякий случай перед удалением в базе
        if(!isAdmin && notes[idx].author !== myId) return;
        
        notes.splice(idx, 1);
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        openModal();
    };

    renderGrid();
    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });
</script>
</body>
</html>
