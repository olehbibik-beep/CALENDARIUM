<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Pro & Safe</title>
    <style>
        :root { 
            --accent: #0088cc; --bg: #f4f7f6; --dark: #2d3436; 
            --ev-mem: #ff4757; --ev-mem-bg: #ffebeb;
            --ev-meet: #0984e3; --weekend: #4a5558;
        }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { width: 100%; background: #1e2122; color: white; padding: 15px; text-align: center; position: relative; }
        .back-btn { position: absolute; left: 15px; top: 12px; background: white; border: none; padding: 5px 10px; border-radius: 5px; color: black; font-weight: bold; cursor: pointer;}
        .main { width: 100%; max-width: 500px; padding: 10px; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; font-weight: bold; margin-bottom: 10px; color: #666; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px 5px; }
        .day-unit { display: flex; flex-direction: column; align-items: center; min-height: 60px; }
        .day-box { 
            width: 100%; aspect-ratio: 1/1; background: var(--dark); border-radius: 8px; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; border: 2px solid transparent; transition: 0.2s;
        }
        .day-box.weekend { background: var(--weekend); color: #ccc; }
        .day-box.selected { border-color: var(--accent) !important; box-shadow: 0 0 8px rgba(0,136,204,0.4); }
        .day-box.has-memorial { background: var(--ev-mem-bg) !important; color: var(--ev-mem) !important; }
        .indicator-row { height: 6px; width: 100%; margin-top: 4px; display: flex; gap: 2px; justify-content: center; min-height: 6px; }
        .mark { height: 6px; width: 12px; border-radius: 2px; }
        .m-meeting { background: var(--ev-meet) !important; }
        .m-personal { background: #555 !important; }
        .preview { background: white; width: 100%; padding: 15px; margin-top: 20px; border-radius: 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 350px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='calendar.html'">←</button>
    <div id="m-name" style="font-size: 18px; font-weight: bold;">...</div>
</div>

<div class="main">
    <div class="weekdays"><div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div></div>
    <div id="grid" class="grid"></div>
    <div id="preview" class="preview">Нажмите на дату</div>
    <button class="btn" id="edit-btn" style="display:none; background: #000; color:white; margin-top:10px;" onclick="openModal()">РЕДАКТИРОВАТЬ</button>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="modal-title" style="margin:0 0 10px 0"></h3>
        <div id="modal-list" style="margin-bottom:10px; max-height:150px; overflow-y:auto;"></div>
        <textarea id="note-input" style="width:100%; height:60px; margin-bottom:10px; padding:8px; border-radius:8px; border:1px solid #ddd;" placeholder="Заметка..."></textarea>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <button class="btn" style="background:#ff4757; color:white; font-size: 9px;" onclick="save('memorial')">ВЕЧЕРЯ</button>
            <button class="btn" style="background:#0984e3; color:white; font-size: 9px;" onclick="save('meeting')">СОБРАНИЕ</button>
            <button class="btn" style="background:#eee; color: black; font-size: 9px; border: 1px solid #ccc;" onclick="save('personal')">ЛИЧНОЕ</button>
        </div>
        <button class="btn" style="background:#000; color:white; margin-top:10px;" onclick="closeModal()">ЗАКРЫТЬ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));
    
    // Безопасное получение данных месяца
    const savedMonth = localStorage.getItem('selectedMonth');
    const mIdx = (savedMonth !== null && savedMonth !== '') ? parseInt(savedMonth) : 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    
    const docId = `${year}_${mIdx}`;
    const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    
    document.getElementById('m-name').innerText = months[mIdx] + " " + year;

    let dbData = {};
    let selectedDay = null;

    // Элегантная и быстрая отрисовка сетки
    function renderGrid() {
        const grid = document.getElementById('grid');
        const firstDay = new Date(year, mIdx, 1).getDay();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        const totalDays = new Date(year, mIdx + 1, 0).getDate();

        let html = '';
        
        // Пустые клетки
        for (let i = 0; i < shift; i++) html += `<div></div>`;
        
        // Дни месяца
        for (let d = 1; d <= totalDays; d++) {
            const isWeekend = new Date(year, mIdx, d).getDay() % 6 === 0;
            html += `
                <div class="day-unit">
                    <div class="day-box ${isWeekend ? 'weekend' : ''}" id="tile-${d}" onclick="selectDay(${d})">${d}</div>
                    <div class="indicator-row" id="marks-${d}"></div>
                </div>`;
        }
        grid.innerHTML = html;
    }

    // Синхронизация интерфейса с защитой от "битых" данных
    function updateUI() {
        for (let d = 1; d <= 31; d++) {
            const tile = document.getElementById(`tile-${d}`);
            const row = document.getElementById(`marks-${d}`);
            if (!tile || !row) continue;

            // ГЛАВНАЯ ЗАЩИТА: Если в базе лежит мусор, превращаем его в пустой массив
            const notes = Array.isArray(dbData[d]) ? dbData[d] : [];
            
            // Сброс стилей
            tile.classList.remove('has-memorial');
            row.innerHTML = '';

            // Отрисовка индикаторов
            let marksHtml = '';
            notes.forEach(n => {
                if (!n) return; // Пропуск пустых объектов
                if (n.category === 'memorial') tile.classList.add('has-memorial');
                else if (n.category === 'meeting') marksHtml += '<div class="mark m-meeting"></div>';
                else if (n.category === 'personal') marksHtml += '<div class="mark m-personal"></div>';
            });
            row.innerHTML = marksHtml;
        }
        
        // Обновляем превью, если день выбран
        if (selectedDay) selectDay(selectedDay);
    }

    window.selectDay = (d) => {
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        const activeTile = document.getElementById(`tile-${d}`);
        if(activeTile) activeTile.classList.add('selected');
        
        document.getElementById('edit-btn').style.display = 'block';
        
        const preview = document.getElementById('preview');
        const notes = Array.isArray(dbData[d]) ? dbData[d] : []; // Защита
        
        preview.innerHTML = `<b>${d} ${months[mIdx]}:</b><br>` + 
                           (notes.map(n => `• ${n.text}`).join('<br>') || 'Нет событий');
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        const notes = Array.isArray(dbData[selectedDay]) ? dbData[selectedDay] : []; // Защита
        
        list.innerHTML = notes.map((n, idx) => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:#f0f0f0; padding:8px; margin-bottom:5px; border-radius:8px;">
                <span style="font-size:13px;">${n.text}</span>
                <b onclick="delNote(${idx})" style="color:red; cursor:pointer; padding:5px;">✕</b>
            </div>`).join('');
            
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const val = document.getElementById('note-input').value.trim();
        const text = val || (cat === 'memorial' ? 'ВЕЧЕРЯ' : cat === 'meeting' ? 'СОБРАНИЕ' : 'ЛИЧНОЕ');
        
        // Берем существующие данные или создаем чистый массив
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        notes.push({ text, category: cat });
        
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        document.getElementById('note-input').value = '';
        closeModal();
    };

    window.delNote = async (idx) => {
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        notes.splice(idx, 1);
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        closeModal();
    };

    // Сначала рисуем чистую сетку, чтобы цифры 100% появились
    renderGrid();

    // Потом загружаем данные и безопасно их накладываем
    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });

</script>
</body>
</html>
