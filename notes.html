<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Планы | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --main-bg: #f4f7f6;
            --sidebar-bg: #1e2122;
            --dark-card: #2d3436;
            --orange-weekend: #ff9f43;
            --ev-memorial: #ff0000;
            --ev-congress: #0984e3;
            --ev-meeting: #ffffff;
            --ev-personal: #27ae60;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; display: flex; 
            height: 100vh; background: var(--main-bg); overflow: hidden; 
        }

        /* --- САЙДБАР --- */
        .sidebar { 
            width: 420px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; color: white;
            flex-shrink: 0; align-items: flex-end; text-align: right;
        }

        #display-year-static { font-size: 8rem; font-weight: 200; color: rgba(255,255,255,0.05); letter-spacing: -12px; line-height: 0.7; margin: 0; }
        #month-title { font-size: 2.8rem; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 20px; }
        
        #live-preview { 
            font-size: 0.85rem; background: rgba(255, 255, 255, 0.05); padding: 15px; 
            border-radius: 10px; border-right: 3px solid var(--accent); color: #dfe6e9; width: 100%;
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        .main-content { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
        }

        /* Базовая сетка (ПК) */
        .weekdays-fixed, .days-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 110px); 
            gap: 12px; 
        }

        .day-card { 
            background: var(--dark-card); width: 110px; height: 110px; 
            border-radius: 15px; display: flex; align-items: center; 
            justify-content: center; font-weight: 800; font-size: 1.2rem; 
            color: #fff; cursor: pointer; position: relative;
        }
        
        .day-card.weekend { color: var(--orange-weekend); border: 1px solid rgba(255,159,67,0.2); }
        .day-card.empty { background: transparent; cursor: default; }

        .marks-row { position: absolute; bottom: 10px; display: flex; gap: 3px; justify-content: center; width: 100%; }
        .day-mark-rect { width: 18px; height: 4px; border-radius: 1px; }

        /* --- МОДАЛКА --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }

        /* --- МОБИЛЬНАЯ АДАПТАЦИЯ (Медиа-запрос в конце) --- */
        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; padding: 20px; align-items: center; text-align: center; }
            #display-year-static { font-size: 3rem; letter-spacing: -2px; }
            #month-title { font-size: 1.5rem; margin-bottom: 10px; }
            
            .main-content { padding: 10px 5px; }
            
            /* Главное исправление: форсируем сетку */
            .weekdays-fixed, .days-grid { 
                grid-template-columns: repeat(7, 1fr) !important; 
                width: 100% !important; 
                gap: 5px !important;
            }

            .day-card { 
                width: 100% !important; 
                height: 60px !important; /* Фиксированная высота для мобилки */
                font-size: 1rem; 
                border-radius: 8px;
            }
            .day-mark-rect { width: 12px; height: 3px; }
            .weekday { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <button onclick="location.href='calendar.html'" style="cursor:pointer; padding: 5px 15px; border-radius: 5px; border:none; margin-bottom: 10px;">Назад</button>
        <div id="display-year-static">2026</div>
        <div id="month-title">Март</div>
        <div id="live-preview">Планы на день...</div>
    </div>

    <div class="main-content">
        <div class="weekdays-fixed">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div>
            <div class="weekday weekend-label">Сб</div><div class="weekday weekend-label">Вс</div>
        </div>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h2 id="modal-date-title" style="margin-top:0;">Дата</h2>
            <div id="existing-notes" style="margin-bottom:10px;"></div>
            <textarea id="note-text" style="width:100%; height:60px; margin-bottom:10px;" placeholder="Текст заметки..."></textarea>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <button onclick="window.activeCat='memorial'" style="background:red; color:white; border:none; padding:5px; flex:1; font-size:10px;">ВЕЧЕРЯ</button>
                <button onclick="window.activeCat='congress'" style="background:blue; color:white; border:none; padding:5px; flex:1; font-size:10px;">КОНГРЕСС</button>
                <button onclick="window.activeCat='meeting'" style="background:#ddd; border:none; padding:5px; flex:1; font-size:10px;">СОБРАНИЕ</button>
            </div>
            <button onclick="saveNote()" style="width:100%; background:black; color:white; border:none; padding:10px; font-weight:bold; cursor:pointer;">СОХРАНИТЬ</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 3);
        const currentUser = localStorage.getItem('currentUser') || 'ADMIN';
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        document.getElementById('month-title').innerText = monthsNames[monthIdx];
        let currentMonthData = {};
        let selectedDay = null;
        window.activeCat = 'meeting';

        onSnapshot(doc(db, "calendar", `2026_${monthIdx}`), (snap) => {
            currentMonthData = snap.exists() ? snap.data() : {};
            renderGrid();
        });

        function renderGrid() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            
            const firstDay = new Date(2026, monthIdx, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

            for(let s=0; s<shift; s++) {
                const empty = document.createElement('div');
                empty.className = 'day-card empty';
                container.appendChild(empty);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(2026, monthIdx, i);
                const card = document.createElement('div');
                card.className = 'day-card';
                if(date.getDay() === 0 || date.getDay() === 6) card.classList.add('weekend');
                
                card.innerHTML = `<span>${i}</span>`;
                
                if (currentMonthData[i]) {
                    const row = document.createElement('div');
                    row.className = 'marks-row';
                    currentMonthData[i].forEach(n => {
                        const m = document.createElement('div');
                        m.className = 'day-mark-rect';
                        m.style.background = `var(--ev-${n.category})`;
                        row.appendChild(m);
                    });
                    card.appendChild(row);
                }

                card.onmouseover = () => {
                    document.getElementById('live-preview').innerHTML = currentMonthData[i] 
                        ? currentMonthData[i].map(n => `• ${n.text}`).join('<br>') 
                        : 'Событий нет';
                };

                card.onclick = () => window.openModal(i);
                container.appendChild(card);
            }
        }

        window.openModal = (day) => {
            selectedDay = day;
            document.getElementById('modal-date-title').innerText = day + ' ' + monthsNames[monthIdx];
            const list = document.getElementById('existing-notes');
            list.innerHTML = (currentMonthData[day] || []).map((n, idx) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:12px; border-bottom:1px solid #eee;">
                    <span>${n.text}</span>
                    <button onclick="deleteNote(${idx})" style="color:red; border:none; background:none; cursor:pointer;">×</button>
                </div>
            `).join('');
            document.getElementById('note-modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('note-modal').style.display = 'none';

        window.saveNote = async () => {
            const text = document.getElementById('note-text').value;
            if(!text) return;
            const notes = currentMonthData[selectedDay] || [];
            notes.push({text, category: window.activeCat, user: currentUser});
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: notes}, {merge:true});
            document.getElementById('note-text').value = '';
            window.openModal(selectedDay);
        };

        window.deleteNote = async (idx) => {
            const notes = [...currentMonthData[selectedDay]];
            notes.splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: notes}, {merge:true});
            window.openModal(selectedDay);
        };
    </script>
</body>
</html>
