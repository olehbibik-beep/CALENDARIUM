<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --main-bg: #f4f7f6;
            --sidebar-bg: #ffffff;
            --dark-card: #2d3436;
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        /* САЙДБАР */
        .sidebar { 
            width: 420px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; border-right: 1px solid #eee; 
            z-index: 100; flex-shrink: 0; box-sizing: border-box; 
            align-items: flex-end; text-align: right;
        }

        .logout-btn { background: #000; color: #fff; border: none; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #display-year-static { font-size: 8rem; font-weight: 200; color: #dfe6e9; letter-spacing: -12px; line-height: 0.7; margin: 0; }
        #month-title { font-size: 2.8rem; font-weight: 800; color: #2d3436; letter-spacing: -2px; margin-bottom: 40px; text-transform: uppercase; }

        /* РОЗОВЫЙ БЛОК ПРОСМОТРА */
        #live-preview { 
            font-size: 0.85rem; background: #ffe6f2; padding: 20px; 
            border-radius: 15px 0 0 15px; position: relative;
            line-height: 1.5; color: #2d3436; text-align: right; width: 100%; box-sizing: border-box;
            min-height: 100px;
        }
        #live-preview::after {
            content: ''; position: absolute; right: -10px; top: -5px; bottom: -5px; width: 10px;
            border-right: 3px solid #e6007e; border-top: 3px solid #e6007e;
            border-bottom: 3px solid #e6007e; border-radius: 0 10px 10px 0;
        }

        /* ОСНОВНАЯ СЕТКА */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* ФИКСИРОВАННЫЕ ДНИ НЕДЕЛИ (НЕ ИСЧЕЗАЮТ) */
        .weekdays-fixed { 
            display: grid; 
            grid-template-columns: repeat(7, 110px); 
            gap: 15px; 
            margin-bottom: 15px; 
            pointer-events: none;
        }
        .weekday { font-size: 0.75rem; font-weight: 900; color: #b2bec3; text-transform: uppercase; text-align: center; width: 110px; }
        
        /* КОНТЕЙНЕР ТОЛЬКО ДЛЯ ЧИСЕЛ */
        .days-grid { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; }

        .day-card { 
            background: var(--dark-card); 
            width: 110px; height: 110px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.3rem; color: #ffffff; 
            cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .day-card:hover { transform: translateY(-5px); background: #000; box-shadow: 0 15px 30px rgba(0, 136, 204, 0.2); z-index: 5; }
        .day-card.empty { background: transparent; box-shadow: none; cursor: default; }
        
        .dots-row { position: absolute; bottom: 15px; display: flex; gap: 4px; }
        .day-mark { width: 6px; height: 6px; border-radius: 50%; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 35px; border-radius: 30px; width: 480px; text-align: right; }
        .entry-item { background: #fdfdfd; padding: 10px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f0f0f0; }
        textarea { width: 100%; height: 80px; border: 1px solid #eee; border-radius: 12px; padding: 12px; margin: 10px 0; outline: none; background: #fafafa; box-sizing: border-box; }
        .save-btn { width: 100%; background: #000; color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; }
        .cat-select { display: flex; gap: 6px; margin-bottom: 15px; direction: rtl; }
        .cat-btn { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #f0f0f0; cursor: pointer; font-size: 0.65rem; font-weight: 900; }
        .cat-btn.active { border-color: var(--accent); background: #f0f9ff; }
        .del-x { color: #d63031; border: none; background: none; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="logout-btn" onclick="location.href='calendar.html'">Назад</button>
            <div class="user-name" id="user-display">ADMIN</div>
        </div>
        
        <div id="display-year-static">2026</div>
        <div id="month-title">...</div>

        <div class="side-section" style="width: 100%;">
            <div class="side-label">События дня</div>
            <div id="live-preview">Наведите на число...</div>
        </div>

        <div class="side-section" style="width: 100%; margin-top: 20px;">
            <div class="side-label">Категории</div>
            <div class="legend-item">Работа <span style="color:var(--ev-work)">●</span></div>
            <div class="legend-item">Важное <span style="color:var(--ev-important)">●</span></div>
            <div class="legend-item">Личное <span style="color:var(--ev-personal)">●</span></div>
        </div>
    </div>

    <div class="main-content">
        <div class="weekdays-fixed">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
        </div>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h2 id="modal-date-title" style="margin:0 0 20px 0; font-weight: 900;">Дата</h2>
            <div id="existing-notes" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            <textarea id="note-text" placeholder="Что добавим в планы?"></textarea>
            <div class="cat-select">
                <div class="cat-btn" id="btn-personal" onclick="selectCat('personal')">ЛИЧНОЕ</div>
                <div class="cat-btn" id="btn-important" onclick="selectCat('important')">ВАЖНОЕ</div>
                <div class="cat-btn" id="btn-work" onclick="selectCat('work')">РАБОТА</div>
            </div>
            <button class="save-btn" onclick="saveNote()">ДОБАВИТЬ</button>
            <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#bbb; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const currentUser = localStorage.getItem('currentUser') || 'ADMIN';
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = monthsNames[monthIdx];
        document.getElementById('user-display').innerText = currentUser;

        let currentMonthData = {};
        let selectedDay = null;
        let activeCat = 'work';

        onSnapshot(doc(db, "calendar", `2026_${monthIdx}`), (snap) => {
            currentMonthData = snap.exists() ? snap.data() : {};
            renderGrid();
        });

        function renderGrid() {
            const container = document.getElementById('days-container');
            if(!container) return;
            container.innerHTML = '';
            
            const firstDay = new Date(2026, monthIdx, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

            for(let s=0; s<shift; s++) container.appendChild(Object.assign(document.createElement('div'), {className:'day-card empty'}));

            for (let i = 1; i <= daysInMonth; i++) {
                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = `<span>${i}</span>`;
                
                if (currentMonthData[i] && currentMonthData[i].length > 0) {
                    const dots = document.createElement('div');
                    dots.className = 'dots-row';
                    currentMonthData[i].forEach(n => {
                        const d = document.createElement('div');
                        d.className = 'day-mark';
                        d.style.background = `var(--ev-${n.category})`;
                        dots.appendChild(d);
                    });
                    card.appendChild(dots);
                }

                card.onmouseover = () => {
                    const prev = document.getElementById('live-preview');
                    if (currentMonthData[i] && currentMonthData[i].length > 0) {
                        prev.innerHTML = currentMonthData[i].map(n => `<b>${n.user}:</b> ${n.text}`).join('<br>');
                    } else { prev.innerText = 'Нет событий'; }
                };

                card.onclick = () => openModal(i);
                container.appendChild(card);
            }
        }

        window.openModal = (day) => {
            selectedDay = day;
            document.getElementById('modal-date-title').innerText = day + ' ' + monthsNames[monthIdx];
            const list = document.getElementById('existing-notes');
            list.innerHTML = '';
            (currentMonthData[day] || []).forEach((n, idx) => {
                list.innerHTML += `<div class="entry-item" style="border-right:4px solid var(--ev-${n.category})">
                    <span><b>${n.user}:</b> ${n.text}</span>
                    <button class="del-x" onclick="deleteNote(${idx})">×</button>
                </div>`;
            });
            document.getElementById('note-modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('note-modal').style.display = 'none';
        window.selectCat = (cat) => { activeCat = cat; document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); document.getElementById(`btn-${cat}`).classList.add('active'); };

        window.saveNote = async () => {
            const text = document.getElementById('note-text').value;
            if(!text) return;
            const notes = currentMonthData[selectedDay] || [];
            notes.push({text, category: activeCat, user: currentUser});
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: notes}, {merge:true});
            document.getElementById('note-text').value = '';
            openModal(selectedDay);
        };

        window.deleteNote = async (idx) => {
            currentMonthData[selectedDay].splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: currentMonthData[selectedDay]}, {merge:true});
            openModal(selectedDay);
        };
    </script>
</body>
</html>
