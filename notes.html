<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Pro Black</title>
    <style>
        :root { 
            --accent: #00a8ff; 
            --bg: #0b0d0e; 
            --panel: #16191b; 
            --border: #262a2d;
            --ev-mem: #ff5252; --ev-meet: #00a8ff; --ev-pers: #95a5a6;
            --text: #f5f6fa;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 80px; }
        
        /* HEADER */
        .header { width: 100%; padding: 20px; text-align: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .back-btn { position: absolute; left: 20px; top: 22px; background: none; border: none; color: #576574; font-size: 20px; cursor: pointer; }
        
        .main { width: 100%; max-width: 450px; padding: 0 15px; }
        
        /* GRID */
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 10px; font-weight: 800; color: #444; text-transform: uppercase; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-box { 
            aspect-ratio: 1/1; background: var(--panel); border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 16px; cursor: pointer; position: relative; border: 1px solid var(--border); transition: 0.2s;
        }
        .day-box.weekend { color: #555; background: #0f1112; }
        .day-box.selected { border-color: var(--accent); background: #1a2024; color: var(--accent); }
        .day-box.has-memorial { border-color: var(--ev-mem); color: var(--ev-mem); }

        .indicator-row { position: absolute; bottom: 6px; display: flex; gap: 3px; }
        .mark { width: 5px; height: 5px; border-radius: 50%; }
        
        /* PREVIEW */
        .preview { background: var(--panel); width: 100%; padding: 15px; margin-top: 20px; border-radius: 15px; border: 1px solid var(--border); min-height: 80px; }

        /* BOTTOM NAV - как на авторизации */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 500px; height: 70px; 
            background: var(--panel); display: grid; grid-template-columns: 1fr 1fr 1fr; 
            border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #576574; font-size: 10px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--panel); width: 100%; max-width: 380px; padding: 25px; border-radius: 25px; border: 1px solid var(--border); }
        
        .note-card { display: flex; justify-content: space-between; align-items: center; background: #202428; padding: 12px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; }
        textarea { width: 100%; height: 70px; background: #0b0d0e; border: 1px solid var(--border); border-radius: 12px; color: white; padding: 12px; margin: 15px 0; resize: none; }

        .type-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .type-btn { padding: 12px 5px; border: none; border-radius: 12px; color: white; font-size: 9px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .type-btn:disabled { opacity: 0.1; cursor: not-allowed; }
        
        .action-btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='index.html'">✕</button>
    <div id="m-name" onclick="checkAdmin()" style="font-size: 18px; font-weight: 900; letter-spacing: 2px; color: #eee;">...</div>
</div>

<div class="main">
    <div class="weekdays"><div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div></div>
    <div id="grid" class="grid"></div>
    <div id="preview" class="preview">Нажмите на дату...</div>
    <button id="add-trigger" style="display:none; width:100%; padding:16px; background:var(--accent); border:none; border-radius:15px; color:white; font-weight:bold; margin-top:15px;" onclick="openModal()">+ ДОБАВИТЬ ЗАПИСЬ</button>
</div>

<nav class="bottom-nav">
    <a href="calendar.html" class="nav-item active">
        <span class="nav-icon">📅</span>
        <span>ПЛАН</span>
    </a>
    <a href="index.html" class="nav-item">
        <span class="nav-icon">🏠</span>
        <span>ГЛАВНАЯ</span>
    </a>
    <a href="#" class="nav-item" onclick="alert('Версия 2.0')">
        <span class="nav-icon">⚙️</span>
        <span>ИНФО</span>
    </a>
</nav>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="modal-title" style="margin:0; font-size:20px; text-align:center;"></h3>
        <div id="modal-list" style="margin-top:15px; max-height:150px; overflow-y:auto;"></div>
        
        <textarea id="note-input" placeholder="Текст..."></textarea>
        
        <div class="type-selector">
            <button id="btn-memorial" class="type-btn" style="background:#d63031;" onclick="save('memorial')">ВЕЧЕРЯ</button>
            <button id="btn-meeting" class="type-btn" style="background:#0984e3;" onclick="save('meeting')">СОБРАНИЕ</button>
            <button class="type-btn" style="background:#2d3436; border:1px solid var(--border);" onclick="save('personal')">ЛИЧНОЕ</button>
        </div>
        <button class="action-btn" style="background:none; color:#576574;" onclick="closeModal()">ЗАКРЫТЬ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));
    
    if(!localStorage.getItem('userId')) localStorage.setItem('userId', 'u' + Date.now().toString(36));
    const myId = localStorage.getItem('userId');
    let isAdmin = localStorage.getItem('isAdmin') === 'true';
    let clickCount = 0;

    window.checkAdmin = () => {
        if(++clickCount >= 5) {
            isAdmin = !isAdmin;
            localStorage.setItem('isAdmin', isAdmin);
            alert(isAdmin ? "Админ: ВКЛ" : "Админ: ВЫКЛ");
            location.reload();
        }
    };

    const mIdx = parseInt(localStorage.getItem('selectedMonth')) || 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    const docId = `${year}_${mIdx}`;
    const months = ["ЯНВАРЬ", "ФЕВРАЛЬ", "МАРТ", "АПРЕЛЬ", "МАЙ", "ИЮНЬ", "ИЮЛЬ", "АВГУСТ", "СЕНТЯБРЬ", "ОКТЯБРЬ", "НОЯБРЬ", "ДЕКАБРЬ"];
    
    document.getElementById('m-name').innerText = months[mIdx];

    let dbData = {};
    let selectedDay = null;

    function renderGrid() {
        const grid = document.getElementById('grid');
        const firstDay = new Date(year, mIdx, 1).getDay();
        const shift = firstDay === 0 ? 6 : firstDay - 1;
        const total = new Date(year, mIdx + 1, 0).getDate();
        grid.innerHTML = '';
        for (let i = 0; i < shift; i++) grid.innerHTML += `<div class="day-box" style="visibility:hidden"></div>`;
        for (let d = 1; d <= total; d++) {
            const isW = new Date(year, mIdx, d).getDay() % 6 === 0;
            grid.innerHTML += `<div class="day-box ${isW ? 'weekend' : ''}" id="tile-${d}" onclick="selectDay(${d})">${d}<div class="indicator-row" id="marks-${d}"></div></div>`;
        }
    }

    function updateUI() {
        for (let d = 1; d <= 31; d++) {
            const tile = document.getElementById(`tile-${d}`);
            const row = document.getElementById(`marks-${d}`);
            if (!tile || !row) continue;
            const notes = Array.isArray(dbData[d]) ? dbData[d] : [];
            tile.classList.remove('has-memorial');
            row.innerHTML = '';
            notes.forEach(n => {
                if (n.category === 'memorial') tile.classList.add('has-memorial');
                const col = n.category === 'memorial' ? 'var(--ev-mem)' : n.category === 'meeting' ? 'var(--ev-meet)' : '#555';
                row.innerHTML += `<div class="mark" style="background:${col}"></div>`;
            });
        }
        if (selectedDay) selectDay(selectedDay);
    }

    window.selectDay = (d) => {
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        document.getElementById(`tile-${d}`).classList.add('selected');
        document.getElementById('add-trigger').style.display = 'block';
        const notes = Array.isArray(dbData[d]) ? dbData[d] : [];
        document.getElementById('preview').innerHTML = `<div style="font-weight:900; color:var(--accent); margin-bottom:8px">${d} ${months[mIdx]}</div>` + 
            (notes.map(n => `<div style="font-size:13px; margin-bottom:4px; color:#ccc;">• ${n.text}</div>`).join('') || 'Событий нет');
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        const notes = Array.isArray(dbData[selectedDay]) ? dbData[selectedDay] : [];
        
        document.getElementById('btn-memorial').disabled = !isAdmin;
        document.getElementById('btn-meeting').disabled = !isAdmin;

        list.innerHTML = notes.map((n, idx) => {
            const canDelete = isAdmin || n.author === myId;
            return `<div class="note-card"><span>${n.text}</span>
                ${canDelete ? `<b onclick="delNote(${idx})" style="color:var(--ev-mem); padding-left:10px; cursor:pointer">✕</b>` : ''}
            </div>`;
        }).join('');
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        if((cat === 'memorial' || cat === 'meeting') && !isAdmin) return;
        const val = document.getElementById('note-input').value.trim();
        const text = val || (cat === 'memorial' ? 'ВЕЧЕРЯ' : cat === 'meeting' ? 'СОБРАНИЕ' : 'ЗАМЕТКА');
        const notes = Array.isArray(dbData[selectedDay]) ? [...dbData[selectedDay]] : [];
        notes.push({ text, category: cat, author: myId });
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        document.getElementById('note-input').value = '';
        openModal();
    };

    window.delNote = async (idx) => {
        const notes = [...dbData[selectedDay]];
        if(!isAdmin && notes[idx].author !== myId) return;
        notes.splice(idx, 1);
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        openModal();
    };

    renderGrid();
    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });
</script>
</body>
</html>
