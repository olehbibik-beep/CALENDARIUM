<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --main-bg: #f4f7f6; 
            --sidebar-bg: #1e2122; 
            --dark-card: #2d3436; 
        }
        
        /* Базовый макет */
        body { 
            margin: 0; 
            padding: 0;
            font-family: 'Inter', sans-serif; 
            display: flex; 
            width: 100vw;
            height: 100vh; 
            background: var(--main-bg); 
            overflow: hidden; 
        }

        /* ТЕМНЫЙ САЙДБАР (Слева) */
        .sidebar { 
            width: 420px; 
            height: 100vh;
            background: var(--sidebar-bg); 
            padding: 50px 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            text-align: right; 
            color: white;
            box-sizing: border-box;
            flex-shrink: 0;
            z-index: 100;
        }

        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { 
            background: #fff; color: #000; border: none; padding: 6px 16px; border-radius: 8px; 
            font-size: 0.75rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        #display-year-static { font-size: 8rem; font-weight: 200; color: rgba(255,255,255,0.05); margin: 0; line-height: 0.7; letter-spacing: -10px;}
        #month-title { font-size: 3.5rem; font-weight: 900; color: #fff; text-transform: uppercase; margin-top: -10px; margin-bottom: 30px;}

        #live-preview { 
            width: 100%; min-height: 100px; background: rgba(230, 0, 126, 0.1); 
            border-radius: 15px 0 0 15px; padding: 15px; border-right: 4px solid #e6007e;
            color: #ff9fcf; font-size: 0.9rem; margin-bottom: 30px; box-sizing: border-box;
        }

        /* КОНТЕНТ (Справа) */
        .main-content { 
            flex-grow: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            background: var(--main-bg); /* Светлый фон */
        }

        /* СЕТКА КАЛЕНДАРЯ */
        .weekdays { 
            display: grid; 
            grid-template-columns: repeat(7, 110px); 
            gap: 15px; 
            margin-bottom: 15px;
        }
        .weekday { 
            font-size: 0.9rem; 
            font-weight: 900; 
            color: #2d3436; /* ЧЕРНЫЙ ЦВЕТ ДЛЯ ДНЕЙ НЕДЕЛИ */
            text-transform: uppercase; 
            text-align: center;
        }
        
        .days-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 110px); 
            gap: 15px; 
        }

        /* КАРТОЧКА ДНЯ */
        .day-card { 
            width: 110px;
            height: 110px; 
            background: var(--dark-card); 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .day-card:hover { transform: translateY(-5px); background: #000; }
        .day-card.empty { background: transparent; box-shadow: none; cursor: default; }
        .day-number { font-weight: 800; font-size: 1.8rem; color: #fff; }

        .dots-row { margin-top: 5px; display: flex; gap: 4px; height: 6px; }
        .day-mark { width: 6px; height: 6px; border-radius: 50%; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 400px; color: #000; text-align: right; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="back-btn" onclick="location.href='calendar.html'">Назад</button>
            <div class="user-name" id="user-display">ADMIN</div>
        </div>
        <div id="display-year-static">2026</div>
        <div id="month-title">АПРЕЛЬ</div>
        <div id="live-preview">Наведите на дату...</div>
        <div style="color: #636e72; font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 10px;">ЛЕГЕНДА</div>
        <div style="font-size: 0.9rem; color: #b2bec3;">Работа <span style="color: var(--ev-work)">●</span></div>
        <div style="font-size: 0.9rem; color: #b2bec3;">Важное <span style="color: var(--ev-important)">●</span></div>
        <div style="font-size: 0.9rem; color: #b2bec3;">Личное <span style="color: var(--ev-personal)">●</span></div>
    </div>

    <div class="main-content">
        <div class="weekdays">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
        </div>
        <div class="days-grid" id="days-container">
            </div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h2 id="modal-date-title">Дата</h2>
            <textarea id="note-text" style="width:100%; height:100px; margin:15px 0; border-radius:10px; padding:10px;"></textarea>
            <button onclick="saveNote()" style="width:100%; background:#000; color:#fff; border:none; padding:15px; border-radius:10px; font-weight:900; cursor:pointer;">СОХРАНИТЬ</button>
            <button onclick="closeModal()" style="background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const currentUser = localStorage.getItem('currentUser') || 'GUEST';
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = monthsNames[monthIdx];
        document.getElementById('user-display').innerText = currentUser;

        let currentMonthData = {};
        let selectedDay = null;

        // Следим за базой
        onSnapshot(doc(db, "calendar", `2026_${monthIdx}`), (snap) => {
            currentMonthData = snap.exists() ? snap.data() : {};
            renderGrid();
        });

        function renderGrid() {
            const container = document.getElementById('days-container');
            if (!container) return;
            container.innerHTML = '';
            
            const firstDay = new Date(2026, monthIdx, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

            // Пустые ячейки
            for(let s=0; s<shift; s++) {
                const empty = document.createElement('div');
                empty.className = 'day-card empty';
                container.appendChild(empty);
            }

            // Реальные дни
            for (let i = 1; i <= daysInMonth; i++) {
                const card = document.createElement('div');
                card.className = 'day-card';
                
                const num = document.createElement('div');
                num.className = 'day-number';
                num.innerText = i;
                
                const dots = document.createElement('div');
                dots.className = 'dots-row';
                if (currentMonthData[i]) {
                    currentMonthData[i].forEach(n => {
                        const d = document.createElement('div');
                        d.className = 'day-mark';
                        d.style.background = n.category === 'work' ? '#0984e3' : (n.category === 'important' ? '#d63031' : '#27ae60');
                        dots.appendChild(d);
                    });
                }

                card.appendChild(num);
                card.appendChild(dots);

                card.onmouseover = () => {
                    const prev = document.getElementById('live-preview');
                    if (currentMonthData[i] && currentMonthData[i].length > 0) {
                        prev.innerHTML = currentMonthData[i].map(n => `<b>${n.user}:</b> ${n.text}`).join('<br>');
                    } else { prev.innerText = 'Событий нет'; }
                };

                card.onclick = () => {
                    selectedDay = i;
                    document.getElementById('modal-date-title').innerText = i + ' ' + monthsNames[monthIdx];
                    document.getElementById('note-modal').style.display = 'flex';
                };
                
                container.appendChild(card);
            }
        }

        window.closeModal = () => document.getElementById('note-modal').style.display = 'none';
        
        window.saveNote = async () => {
            const text = document.getElementById('note-text').value;
            if(!text) return;
            const notes = currentMonthData[selectedDay] || [];
            notes.push({text, category: 'work', user: currentUser});
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: notes}, {merge:true});
            document.getElementById('note-text').value = '';
            closeModal();
        };

        // Запуск при загрузке
        renderGrid();
    </script>
</body>
</html>
