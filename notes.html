<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Индикаторы</title>
    <style>
        :root { 
            --accent: #0088cc; --bg: #f4f7f6; --dark: #2d3436; 
            --ev-memorial: #ff4757; --ev-memorial-bg: #ffebeb;
            --ev-meeting: #0984e3; --ev-personal: #ffffff;
            --weekend: #4a5558;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; background: #1e2122; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; }
        .back-btn { position: absolute; left: 15px; background: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; color: black; font-weight: bold; }
        
        .main { width: 100%; max-width: 500px; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        
        .day { 
            background: var(--dark); aspect-ratio: 1/1; border-radius: 8px; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; font-weight: bold; cursor: pointer; font-size: 16px; border: 2px solid transparent;
        }
        .day.empty { background: transparent; pointer-events: none; }
        .day.weekend { background: var(--weekend); color: #d1d8db; }
        .day.selected { border-color: var(--accent) !important; transform: scale(1.02); }
        .day.has-memorial { background: var(--ev-memorial-bg) !important; color: var(--ev-memorial) !important; }
        
        /* КОНТЕЙНЕР ЧЕРТОЧЕК */
        .lines-stack { 
            position: absolute; 
            bottom: 5px; 
            left: 15%; 
            width: 70%; 
            display: flex; 
            flex-direction: column; 
            gap: 2px; 
        }
        .u-line { 
            width: 100%; 
            height: 3px; 
            border-radius: 10px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .preview { background: white; width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='calendar.html'">←</button>
    <div id="m-name" style="font-size: 18px; font-weight: 900;">ЗАГРУЗКА...</div>
</div>

<div class="main">
    <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 10px; font-weight: 900; margin-bottom: 5px; opacity: 0.5;">
        <div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="preview" id="preview">Выберите дату</div>
    <button class="btn" id="edit-btn" style="display:none; background: #1e2122; color:white; margin-top:10px;" onclick="openModal()">+ ДОБАВИТЬ / ИЗМЕНИТЬ</button>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h3 id="modal-title" style="margin-top:0"></h3>
        <div id="modal-list" style="max-height: 120px; overflow-y: auto; margin-bottom: 10px;"></div>
        <textarea id="note-input" placeholder="Текст..." style="width:100%; height:50px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <button class="btn" style="background:var(--ev-memorial); color:white; font-size: 9px;" onclick="save('memorial')">ВЕЧЕРЯ</button>
            <button class="btn" style="background:var(--ev-meeting); color:white; font-size: 9px;" onclick="save('meeting')">СОБРАНИЕ</button>
            <button class="btn" style="background:#f0f0f0; color: black; font-size: 9px; border: 1px solid #ccc;" onclick="save('personal')">ЛИЧНОЕ</button>
        </div>
        <button class="btn" style="background:#000; color:white; margin-top:10px;" onclick="closeModal()">ЗАКРЫТЬ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
    const year = parseInt(localStorage.getItem('selectedYear') || 2026);
    const docId = `${year}_${mIdx}`;
    const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

    document.getElementById('m-name').innerText = months[mIdx] + " " + year;

    let dbData = {};
    let selectedDay = null;

    function initGrid() {
        const grid = document.getElementById('grid');
        const first = new Date(year, mIdx, 1).getDay();
        const shift = first === 0 ? 6 : first - 1;
        const total = new Date(year, mIdx + 1, 0).getDate();

        grid.innerHTML = '';
        for (let i = 0; i < shift; i++) grid.innerHTML += '<div class="day empty"></div>';
        for (let i = 1; i <= total; i++) {
            const dObj = new Date(year, mIdx, i);
            const isWeekend = (dObj.getDay() === 0 || dObj.getDay() === 6);
            grid.innerHTML += `
                <div class="day ${isWeekend ? 'weekend' : ''}" id="day-${i}" onclick="selectDay(${i})">
                    <span>${i}</span>
                    <div class="lines-stack"></div>
                </div>`;
        }
    }

    window.selectDay = (i) => {
        selectedDay = i;
        document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
        const el = document.getElementById(`day-${i}`);
        if(el) el.classList.add('selected');
        document.getElementById('edit-btn').style.display = 'block';
        updatePreview();
    };

    function updateVisuals() {
        for (let i = 1; i <= 31; i++) {
            const el = document.getElementById(`day-${i}`);
            if (!el) continue;

            const notes = dbData[i] || [];
            const hasMem = notes.some(n => n.category === 'memorial');
            
            el.classList.toggle('has-memorial', hasMem);
            
            const stack = el.querySelector('.lines-stack');
            stack.innerHTML = '';
            notes.forEach(n => {
                if (n.category !== 'memorial') {
                    const line = document.createElement('div');
                    line.className = 'u-line';
                    // Если фон розовый, белую черточку (личную) делаем чуть темнее, чтобы была видна
                    if (n.category === 'personal') line.style.background = hasMem ? '#ccc' : 'white';
                    else line.style.background = 'var(--ev-meeting)';
                    stack.appendChild(line);
                }
            });
        }
        updatePreview();
    }

    function updatePreview() {
        const p = document.getElementById('preview');
        if (!selectedDay) return;
        const notes = dbData[selectedDay] || [];
        p.innerHTML = `<div style="font-weight:900; margin-bottom:5px;">${selectedDay} ${months[mIdx]}</div>` + 
            (notes.length ? notes.map(n => `<div style="font-size:14px; margin-bottom:2px;">• ${n.text}</div>`).join('') : 'Нет событий');
    }

    window.openModal = () => {
        document.getElementById('modal-title').innerText = selectedDay + " " + months[mIdx];
        const list = document.getElementById('modal-list');
        list.innerHTML = (dbData[selectedDay] || []).map((n, idx) => `
            <div style="display:flex; justify-content:space-between; background:#f8f9fa; padding:8px; margin-bottom:4px; border-radius:8px;">
                <span style="font-weight:600; font-size:13px;">${n.text}</span>
                <b onclick="delNote(${idx})" style="color:red; cursor:pointer;">✕</b>
            </div>`).join('');
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const val = document.getElementById('note-input').value.trim();
        const text = val || (cat === 'memorial' ? 'ВЕЧЕРЯ' : cat === 'meeting' ? 'СОБРАНИЕ' : 'ЛИЧНОЕ');
        const notes = [...(dbData[selectedDay] || [])];
        notes.push({ text: text, category: cat });
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        document.getElementById('note-input').value = '';
        openModal();
    };

    window.delNote = async (idx) => {
        const notes = [...dbData[selectedDay]];
        notes.splice(idx, 1);
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        openModal();
    };

    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateVisuals();
    });

    initGrid();
</script>
</body>
</html>
