<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIUM | Final Stable</title>
    <style>
        :root {
            --bg-page: #f4f7f6;    
            --sidebar-bg: #1e2122; 
            --card-bg: #2d3436;    
            --weekend-text: #ff9f43; 
            --accent: #0088cc;
        }

        body { margin: 0; padding: 0; display: flex; height: 100vh; background: var(--bg-page); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* САЙДБАР */
        .sidebar { 
            width: 380px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; align-items: flex-end; 
            text-align: right; flex-shrink: 0; box-sizing: border-box; color: white;
            z-index: 10;
        }

        .back-btn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 900; cursor: pointer; margin-bottom: 20px; }
        #month-title { font-size: 3rem; font-weight: 900; text-transform: uppercase; margin: 0; }

        #live-info { 
            width: 100%; min-height: 150px; background: rgba(255,255,255,0.05); border-radius: 15px; 
            padding: 15px; border-right: 5px solid #ff9f43; color: #fff;
            margin-top: 30px; font-size: 0.9rem; box-sizing: border-box; overflow-y: auto;
        }

        .note-item { 
            background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; 
            margin-bottom: 10px; display: flex; flex-direction: column; align-items: flex-end;
        }
        .del-btn { 
            background: #ff4757; color: white; border: none; border-radius: 5px; 
            padding: 4px 10px; cursor: pointer; font-size: 0.7rem; margin-top: 5px; font-weight: bold;
        }

        /* КОНТЕНТ */
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; }
        
        /* ЖЕСТКАЯ СЕТКА ДНЕЙ НЕДЕЛИ */
        .weekdays { 
            display: grid; grid-template-columns: repeat(7, 110px); 
            gap: 15px; margin-bottom: 15px; width: fit-content;
        }
        .weekday { color: #2d3436; font-weight: 900; text-transform: uppercase; text-align: center; font-size: 0.8rem; }

        .grid { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; width: fit-content; }

        .day { 
            width: 110px; height: 110px; background: var(--card-bg); border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; position: relative; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .day:hover { background: #000; transform: translateY(-3px); }
        .day.empty { background: transparent; box-shadow: none; cursor: default; pointer-events: none; }

        .day-num { font-size: 1.8rem; font-weight: 900; color: #fff; }
        .day.weekend .day-num { color: var(--weekend-text); }

        .dots { display: flex; gap: 4px; margin-top: 8px; height: 6px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 350px; text-align: right; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="back-btn" onclick="location.href='calendar.html'">НАЗАД</button>
        <div id="user-name" style="color: #636e72; font-weight: 800;">ADMIN</div>
        <h1 id="month-title">АПРЕЛЬ</h1>
        <div id="live-info">Наведите на дату...</div>
    </div>

    <div class="main">
        <div class="weekdays">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday" style="color: var(--weekend-text)">Сб</div><div class="weekday" style="color: var(--weekend-text)">Вс</div>
        </div>
        <div id="grid" class="grid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="m-date" style="margin:0">Дата</h2>
            <textarea id="m-input" style="width:100%; height:80px; margin-top:15px; border-radius:10px; padding:10px; border:1px solid #ddd; font-family: inherit;"></textarea>
            <button onclick="save()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; border-radius:12px; font-weight:900; margin-top:10px; cursor:pointer;">СОХРАНИТЬ</button>
            <button onclick="closeM()" style="background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const currentUser = localStorage.getItem('currentUser') || 'ADMIN';
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = months[mIdx];
        document.getElementById('user-name').innerText = currentUser;

        let dbData = {};
        let activeHoverDay = null;

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const first = new Date(2026, mIdx, 1).getDay();
            const shift = first === 0 ? 6 : first - 1;
            const totalDays = new Date(2026, mIdx + 1, 0).getDate();

            for(let i=0; i<shift; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                grid.appendChild(empty);
            }

            for(let i=1; i<=totalDays; i++) {
                const dDate = new Date(2026, mIdx, i);
                const isWeekend = dDate.getDay() === 0 || dDate.getDay() === 6;
                
                const day = document.createElement('div');
                day.className = 'day' + (isWeekend ? ' weekend' : '');
                day.innerHTML = `<div class="day-num">${i}</div>`;

                const dotsCont = document.createElement('div');
                dotsCont.className = 'dots';
                if(dbData[i]) dbData[i].forEach(() => {
                    const d = document.createElement('div');
                    d.className = 'dot';
                    dotsCont.appendChild(d);
                });
                day.appendChild(dotsCont);

                day.onmouseover = () => {
                    activeHoverDay = i;
                    showNotes(i);
                };

                day.onclick = () => {
                    activeHoverDay = i;
                    document.getElementById('m-date').innerText = i + ' ' + months[mIdx];
                    document.getElementById('modal').style.display = 'flex';
                };
                grid.appendChild(day);
            }
        }

        window.showNotes = (day) => {
            const info = document.getElementById('live-info');
            info.innerHTML = '';
            if(dbData[day] && dbData[day].length > 0) {
                dbData[day].forEach((n, idx) => {
                    const item = document.createElement('div');
                    item.className = 'note-item';
                    item.innerHTML = `<span><b>${n.user}:</b> ${n.text}</span>`;
                    
                    if(n.user === currentUser) {
                        const btn = document.createElement('button');
                        btn.className = 'del-btn';
                        btn.innerText = 'Удалить свою';
                        btn.onclick = (e) => {
                            e.stopPropagation();
                            deleteNote(day, idx);
                        };
                        item.appendChild(btn);
                    }
                    info.appendChild(item);
                });
            } else { info.innerText = 'Нет заметок'; }
        };

        async function deleteNote(day, idx) {
            const newList = [...dbData[day]];
            newList.splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[day]: newList}, {merge:true});
            // После удаления принудительно обновляем превью для этого дня
            setTimeout(() => showNotes(day), 100);
        }

        onSnapshot(doc(db, "calendar", `2026_${mIdx}`), (snap) => {
            dbData = snap.exists() ? snap.data() : {};
            render();
            if(activeHoverDay) showNotes(activeHoverDay);
        });

        window.closeM = () => document.getElementById('modal').style.display = 'none';
        
        window.save = async () => {
            const text = document.getElementById('m-input').value;
            if(!text) return;
            const list = dbData[activeHoverDay] || [];
            list.push({text, user: currentUser});
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[activeHoverDay]: list}, {merge:true});
            document.getElementById('m-input').value = '';
            closeM();
        };

        render();
    </script>
</body>
</html>
