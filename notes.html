<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы | CALENDARIUM Terminal</title>
    <style>
        /* АДАПТАЦИЯ ДЛЯ МОБИЛЬНЫХ (Экран меньше 800px) */
@media (max-width: 800px) {
    body { 
        flex-direction: column; /* Сайдбар теперь сверху, календарь снизу */
        overflow-y: auto; 
    }

    .sidebar { 
        width: 100%; 
        height: auto; 
        padding: 20px; 
        align-items: center; 
        text-align: center;
        flex-shrink: 1;
    }

    #display-year-static { font-size: 3rem; letter-spacing: -2px; }
    #month-title { font-size: 1.8rem; margin-bottom: 15px; }
    
    #live-preview { 
        border-radius: 10px; 
        border-right: none; 
        border-bottom: 3px solid var(--accent);
        min-height: auto;
        padding: 10px;
    }

    .main-content { 
        padding: 10px; 
        justify-content: flex-start; 
    }

    /* Сетка становится резиновой */
    .weekdays-fixed, .days-grid { 
        grid-template-columns: repeat(7, 1fr); 
        gap: 5px; 
        width: 100%;
        max-width: 100%;
    }

    .day-card { 
        width: auto; 
        height: 60px; /* Уменьшаем высоту, чтобы не скроллить вечно */
        border-radius: 10px;
        font-size: 1rem;
    }

    .day-mark-rect {
        width: 15px; /* Полоски поменьше */
        height: 3px;
    }

    .modal-content {
        width: 90%; /* Модалка на весь экран */
        padding: 20px;
    }
    
    .cat-btn {
        padding: 6px;
        font-size: 8px;
    }
}
        :root { 
            --accent: #0088cc; 
            --main-bg: #f4f7f6;
            --sidebar-bg: #1e2122;
            --dark-card: #2d3436;
            --orange-weekend: #ff9f43;
            /* ЦВЕТА КАТЕГОРИЙ */
            --ev-memorial: #ff0000; /* Вечеря */
            --ev-congress: #0984e3; /* Конгресс */
            --ev-meeting: #ffffff;  /* Собрания */
            --ev-personal: #27ae60; /* Личное */
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        .sidebar { 
            width: 420px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; color: white;
            z-index: 100; flex-shrink: 0; box-sizing: border-box; 
            align-items: flex-end; text-align: right;
        }

        .logout-btn { background: #fff; color: #000; border: none; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .user-name { color: #fff; font-weight: 800; text-transform: uppercase; margin-left: 10px; }
        
        #display-year-static { font-size: 8rem; font-weight: 200; color: rgba(255,255,255,0.05); letter-spacing: -12px; line-height: 0.7; margin: 0; }
        #month-title { font-size: 2.8rem; font-weight: 800; color: #fff; letter-spacing: -2px; margin-bottom: 40px; text-transform: uppercase; }

        .side-label { color: #636e72; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

        #live-preview { 
            font-size: 0.85rem; background: rgba(255, 255, 255, 0.05); padding: 20px; 
            border-radius: 15px 0 0 15px; position: relative;
            line-height: 1.5; color: #dfe6e9; text-align: right; width: 100%; box-sizing: border-box;
            min-height: 100px; border-right: 3px solid var(--accent);
        }

        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; color: #b2bec3; font-size: 0.9rem; margin-bottom: 8px; }
        .rect { width: 25px; height: 8px; border-radius: 2px; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .weekdays-fixed { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; margin-bottom: 15px; }
        .weekday { font-size: 0.75rem; font-weight: 900; color: #b2bec3; text-transform: uppercase; text-align: center; }
        .weekday.weekend-label { color: var(--orange-weekend); }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; }

        .day-card { 
            background: var(--dark-card); 
            width: 110px; height: 110px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.3rem; color: #ffffff; 
            cursor: pointer; transition: 0.3s;
            position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .day-card.weekend { 
            border: 2px solid rgba(255, 159, 67, 0.3);
            color: var(--orange-weekend);
        }
        
        .day-card:hover { transform: translateY(-5px); background: #000; box-shadow: 0 15px 30px rgba(0, 136, 204, 0.2); }
        .day-card.empty { background: transparent; box-shadow: none; cursor: default; border: none; }
        
        /* ПОЛОСКИ ВМЕСТО ТОЧЕК */
        .marks-row { position: absolute; bottom: 12px; display: flex; gap: 4px; justify-content: center; width: 100%; }
        .day-mark-rect { width: 22px; height: 5px; border-radius: 1px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 35px; border-radius: 30px; width: 480px; text-align: right; color: #000; }
        .save-btn { width: 100%; background: #000; color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .cat-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #eee; font-size: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header" style="display:flex; align-items:center; margin-bottom: 20px;">
            <button class="logout-btn" onclick="location.href='calendar.html'">Назад</button>
            <div class="user-name" id="user-display">ADMIN</div>
        </div>
        
        <div id="display-year-static">2026</div>
        <div id="month-title">...</div>

        <div class="side-section" style="width: 100%;">
            <div class="side-label">Планы на день</div>
            <div id="live-preview">Наведите на число...</div>
        </div>

        <div class="side-section" style="width: 100%; margin-top: 30px;">
            <div class="side-label">Легенда</div>
            <div class="legend-item">Вечеря <div class="rect" style="background:var(--ev-memorial)"></div></div>
            <div class="legend-item">Конгресс <div class="rect" style="background:var(--ev-congress)"></div></div>
            <div class="legend-item">Собрание <div class="rect" style="background:var(--ev-meeting); border: 1px solid #666;"></div></div>
            <div class="legend-item">Личное <div class="rect" style="background:var(--ev-personal)"></div></div>
        </div>
    </div>

    <div class="main-content">
        <div class="weekdays-fixed">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div>
            <div class="weekday weekend-label">Сб</div><div class="weekday weekend-label">Вс</div>
        </div>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h2 id="modal-date-title" style="margin:0 0 20px 0; font-weight: 900;">Дата</h2>
            <div id="existing-notes" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            <textarea id="note-text" style="width:100%; height:80px; border-radius:12px; padding:10px; border:1px solid #eee; background:#fafafa;" placeholder="Добавить запись..."></textarea>
            <div style="display:flex; gap:5px; margin: 10px 0;" id="cat-btns">
                <button class="cat-btn" onclick="window.activeCat='memorial'" style="background:var(--ev-memorial); color:white; border:none;">ВЕЧЕРЯ</button>
                <button class="cat-btn" onclick="window.activeCat='congress'" style="background:var(--ev-congress); color:white; border:none;">КОНГРЕСС</button>
                <button class="cat-btn" onclick="window.activeCat='meeting'" style="background:#eee;">СОБРАНИЕ</button>
                <button class="cat-btn" onclick="window.activeCat='personal'" style="background:var(--ev-personal); color:white; border:none;">ЛИЧНОЕ</button>
            </div>
            <button class="save-btn" onclick="saveNote()">СОХРАНИТЬ</button>
            <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#bbb; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 3); // По умолчанию Апрель
        const currentUser = localStorage.getItem('currentUser') || 'ADMIN';
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = monthsNames[monthIdx];
        document.getElementById('user-display').innerText = currentUser;

        let currentMonthData = {};
        let selectedDay = null;
        window.activeCat = 'meeting';

        onSnapshot(doc(db, "calendar", `2026_${monthIdx}`), (snap) => {
            currentMonthData = snap.exists() ? snap.data() : {};
            renderGrid();
        });

        function renderGrid() {
            const container = document.getElementById('days-container');
            if(!container) return;
            container.innerHTML = '';
            
            const firstDay = new Date(2026, monthIdx, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

            for(let s=0; s<shift; s++) container.appendChild(Object.assign(document.createElement('div'), {className:'day-card empty'}));

            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(2026, monthIdx, i);
                const dayOfWeek = date.getDay();
                
                const card = document.createElement('div');
                card.className = 'day-card' + (dayOfWeek === 0 || dayOfWeek === 6 ? ' weekend' : '');
                card.innerHTML = `<span>${i}</span>`;
                
                if (currentMonthData[i] && currentMonthData[i].length > 0) {
                    const row = document.createElement('div');
                    row.className = 'marks-row';
                    currentMonthData[i].forEach(n => {
                        const m = document.createElement('div');
                        m.className = 'day-mark-rect';
                        m.style.background = `var(--ev-${n.category})`;
                        if(n.category === 'meeting') m.style.border = "1px solid #666";
                        row.appendChild(m);
                    });
                    card.appendChild(row);
                }

                card.onmouseover = () => {
                    const prev = document.getElementById('live-preview');
                    prev.innerHTML = (currentMonthData[i] && currentMonthData[i].length > 0) 
                        ? currentMonthData[i].map(n => `• ${n.text}`).join('<br>') 
                        : 'Событий нет';
                };

                card.onclick = () => window.openModal(i);
                container.appendChild(card);
            }
        }

        window.openModal = (day) => {
            selectedDay = day;
            document.getElementById('modal-date-title').innerText = day + ' ' + monthsNames[monthIdx];
            const list = document.getElementById('existing-notes');
            list.innerHTML = '';
            (currentMonthData[day] || []).forEach((n, idx) => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee; font-size:12px; background:#f9f9f9; margin-bottom:4px; border-radius:5px;">
                    <span style="border-left:3px solid var(--ev-${n.category}); padding-left:8px;">${n.text}</span>
                    <button onclick="deleteNote(${idx})" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">×</button>
                </div>`;
            });
            document.getElementById('note-modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('note-modal').style.display = 'none';

        window.saveNote = async () => {
            const text = document.getElementById('note-text').value;
            if(!text) return;
            const notes = currentMonthData[selectedDay] || [];
            notes.push({text, category: window.activeCat, user: currentUser});
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: notes}, {merge:true});
            document.getElementById('note-text').value = '';
            window.openModal(selectedDay);
        };

        window.deleteNote = async (idx) => {
            const notes = [...currentMonthData[selectedDay]];
            notes.splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: notes}, {merge:true});
            window.openModal(selectedDay);
        };
    </script>
</body>
</html>
