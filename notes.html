<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIUM | Stable Base</title>
    <style>
        /* Стили, которые не ломают сетку */
        body { 
            margin: 0; padding: 0; display: flex; 
            height: 100vh; background: #f4f7f6; /* Светлый фон всей страницы */
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
        }

        .sidebar { 
            width: 350px; background: #1e2122; padding: 40px; 
            display: flex; flex-direction: column; color: white; flex-shrink: 0;
        }

        .back-btn { 
            background: #fff; color: #000; border: none; padding: 10px; 
            border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold;
        }

        #month-title { font-size: 2.5rem; font-weight: 800; margin: 0; text-transform: uppercase; }
        
        #live-info { 
            margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; font-size: 0.9rem; min-height: 100px;
        }

        .note-item { 
            display: flex; justify-content: space-between; margin-bottom: 8px; 
            padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* КОНТЕНТНАЯ ЧАСТЬ */
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .weekdays { display: grid; grid-template-columns: repeat(7, 100px); gap: 15px; margin-bottom: 15px; }
        .weekday { text-align: center; font-weight: 900; color: #333; text-transform: uppercase; font-size: 0.8rem; }
        .weekday.we { color: #ff9f43; } /* Оранжевые буквы Сб Вс */

        .grid { display: grid; grid-template-columns: repeat(7, 100px); gap: 15px; }

        /* ТЕМНЫЕ ПЛИТКИ */
        .day { 
            width: 100px; height: 100px; background: #2d3436; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .day:hover { transform: translateY(-3px); background: #000; }
        .day.empty { background: transparent; box-shadow: none; cursor: default; }

        .day-num { font-size: 1.5rem; font-weight: bold; color: #fff; }
        .day.weekend .day-num { color: #ff9f43; } /* Оранжевые числа Сб Вс */

        /* ТОЧКИ-ИНДИКАТОРЫ */
        .dots { display: flex; gap: 3px; margin-top: 5px; height: 5px; }
        .dot { width: 5px; height: 5px; background: #0088cc; border-radius: 50%; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 300px; color: #000; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="back-btn" onclick="location.href='calendar.html'">← НАЗАД</button>
        <div id="user-name" style="color: #666; font-size: 0.8rem; font-weight: bold;">ADMIN</div>
        <h1 id="month-title">АПРЕЛЬ</h1>
        <div id="live-info">Наведи на дату...</div>
    </div>

    <div class="main">
        <div class="weekdays">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday we">Сб</div><div class="weekday we">Вс</div>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="m-date" style="margin-top:0">Дата</h3>
            <textarea id="m-input" style="width:100%; height:60px; margin-top:10px; border-radius:5px; padding:5px; border:1px solid #ddd;"></textarea>
            <button onclick="save()" style="width:100%; padding:10px; background:#000; color:#fff; border:none; margin-top:10px; border-radius:5px; font-weight:bold; cursor:pointer;">СОХРАНИТЬ</button>
            <button onclick="closeM()" style="width:100%; border:none; background:none; color:gray; margin-top:10px; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const user = localStorage.getItem('currentUser') || 'ADMIN';
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = months[mIdx];
        document.getElementById('user-name').innerText = user;

        let dbData = {};
        let activeDay = null;

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const first = new Date(2026, mIdx, 1).getDay();
            const shift = first === 0 ? 6 : first - 1;
            const daysInMonth = new Date(2026, mIdx + 1, 0).getDate();

            for(let i=0; i<shift; i++) {
                grid.appendChild(Object.assign(document.createElement('div'), {className: 'day empty'}));
            }

            for(let i=1; i<=daysInMonth; i++) {
                const date = new Date(2026, mIdx, i);
                const isWE = (date.getDay() === 0 || date.getDay() === 6);
                const dayEl = document.createElement('div');
                dayEl.className = 'day' + (isWE ? ' weekend' : '');
                
                dayEl.innerHTML = `<div class="day-num">${i}</div>`;
                
                const dotsWrap = document.createElement('div');
                dotsWrap.className = 'dots';
                if(dbData[i]) dbData[i].forEach(() => {
                    dotsWrap.appendChild(Object.assign(document.createElement('div'), {className: 'dot'}));
                });
                dayEl.appendChild(dotsWrap);

                dayEl.onmouseover = () => updateInfo(i);
                dayEl.onclick = () => { activeDay = i; document.getElementById('m-date').innerText = i+' '+months[mIdx]; document.getElementById('modal').style.display = 'flex'; };
                grid.appendChild(dayEl);
            }
        }

        function updateInfo(day) {
            const info = document.getElementById('live-info');
            if(dbData[day] && dbData[day].length > 0) {
                info.innerHTML = '';
                dbData[day].forEach((n, idx) => {
                    const row = document.createElement('div');
                    row.className = 'note-item';
                    row.innerHTML = `<span><b>${n.user}:</b> ${n.text}</span>`;
                    if(n.user === user) {
                        const del = document.createElement('span');
                        del.style.color = 'red'; del.style.cursor = 'pointer'; del.innerText = ' [×]';
                        del.onclick = (e) => { e.stopPropagation(); deleteNote(day, idx); };
                        row.appendChild(del);
                    }
                    info.appendChild(row);
                });
            } else { info.innerText = 'Заметок нет'; }
        }

        async function deleteNote(day, idx) {
            const list = [...dbData[day]];
            list.splice(idx, 1);
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[day]: list}, {merge:true});
        }

        onSnapshot(doc(db, "calendar", `2026_${mIdx}`), (snap) => {
            dbData = snap.exists() ? snap.data() : {};
            render();
            if(activeDay) updateInfo(activeDay);
        });

        window.closeM = () => document.getElementById('modal').style.display = 'none';
        window.save = async () => {
            const val = document.getElementById('m-input').value;
            if(!val) return;
            const list = dbData[activeDay] || [];
            list.push({text: val, user: user});
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[activeDay]: list}, {merge:true});
            document.getElementById('m-input').value = '';
            closeM();
        };

        render();
    </script>
</body>
</html>
