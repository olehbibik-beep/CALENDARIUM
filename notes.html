<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Заметки</title>
    <style>
        /* =========================================
           1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ (:root)
           ========================================= */
        :root { 
            --color-accent: #09e0e3;              
            --color-bg-main: #71797E;             
            --color-bg-app: #0f1112;              
            --color-bg-nav: rgba(120, 120, 120, 0.3); 
            --color-bg-sidebar: rgba(80, 80, 80, 0.2);
            --color-bg-card: rgba(255, 255, 255, 0.03); 
            
            --color-text-main: #e0e6ed;           
            --color-text-white: #ffffff;          
            --color-text-muted: #7f8fa6;          
            --color-text-transparent: rgba(255, 255, 255, 0.1);      
            --color-error: #ff7675;               

            --color-icon-accent: #52525C;         

            /* Цвета СОБЫТИЙ */
            --color-ev-memorial: #D10000;         
            --color-ev-memorial-bg: #3b1e22;      
            --color-ev-congress: #8E44AD;         
            --color-ev-meeting: #056D71;          
            --color-ev-personal: #888888;

            /* Рамки и эффекты */
            --color-border-inner: rgba(255, 255, 255, 0.05); 
            --color-border-dashed: rgba(255, 255, 255, 0.1);
            --color-hover-light: rgba(255, 255, 255, 0.08);  
            --color-hover-medium: rgba(255, 255, 255, 0.12);
            --color-hover-strong: rgba(255, 255, 255, 0.2);
            --color-shadow-app: rgba(0, 0, 0, 0.5);          
            --color-overlay-dark: rgba(0, 0, 0, 0.85);       

            /* Специфичные для сетки дней */
            --color-bg-day: #1a1d1f;
            --color-bg-day-hover: #2b3236;
            --color-bg-weekend: #14161A;
            --color-weekend-text: #636e72;
            
            /* Единые размеры каркаса */
            --size-app-width: 95vw;
            --size-app-height: 90dvh;
            --size-app-max-width: 1400px;
            --size-app-max-height: 900px;
            --size-app-radius: 30px;
            
            --size-nav-width: 60px;
            --size-sidebar-width: 20%;
            --size-sidebar-min-width: 200px;
            --size-sidebar-max-width: 220px;
            --size-dot-height: 4px;
        }

        /* =========================================
           2. БАЗОВЫЕ НАСТРОЙКИ И КАРКАС
           ========================================= */
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: var(--color-bg-main); color: var(--color-text-main); display: flex; align-items: center; justify-content: center; height: 100dvh; width: 100vw; overflow: hidden; }
        
        .app-container { 
            width: var(--size-app-width); height: var(--size-app-height); 
            max-width: var(--size-app-max-width); max-height: var(--size-app-max-height); 
            background: var(--color-bg-app); border-radius: var(--size-app-radius); 
            display: flex; flex-direction: row; position: relative; overflow: hidden; 
            box-shadow: 0 20px 50px var(--color-shadow-app); 
        }

        /* =========================================
           3. НАВИГАЦИЯ И ИКОНКИ
           ========================================= */
        .nav-bar { width: var(--size-nav-width); background: var(--color-bg-nav); display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 3vh 0; flex-shrink: 0; z-index: 20; border-right: 0px solid var(--color-border-inner); }
        .nav-group { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .icon-btn { background: none; border: none; padding: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; }
        .ui-icon { font-family: "Segoe UI Symbol", "Symbola", sans-serif; font-size: 22px; line-height: 1; transition: 0.3s; color: var(--color-text-white); opacity: 0.5; }
        .icon-btn:hover .ui-icon { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .ui-icon-accent { color: var(--color-icon-accent); opacity: 0.8; }
        .icon-btn:hover .ui-icon-accent { color: var(--color-accent); }

        /* =========================================
           4. БОКОВАЯ ПАНЕЛЬ (ПРЕВЬЮ С КАРТОЧКАМИ)
           ========================================= */
        .sidebar { 
            width: var(--size-sidebar-width); min-width: var(--size-sidebar-min-width); max-width: var(--size-sidebar-max-width); 
            background: var(--color-bg-sidebar); padding: 3vh 4px; display: flex; flex-direction: column; flex-shrink: 0; box-sizing: border-box; 
        }
        .section-title { font-size: 0.8rem; font-weight: 800; color: var(--color-text-muted); letter-spacing: 1px; margin-bottom: 2vh; text-align: center; }
        
        .preview-box { display: flex; flex-direction: column; flex: 1; overflow: hidden; padding: 0 10px; }
        .preview { background: transparent; width: 100%; flex: 1; overflow-y: auto; padding-right: 5px; }
        
        /* КАРТОЧКИ: 1-в-1 с главной страницей */
        .event-card-mini { background: transparent; padding: 10px 8px; border-radius: 4px; margin-bottom: 10px; border: 1px dashed var(--color-border-dashed); border-left: 4px solid var(--color-accent); transition: all 0.2s ease; width: 100%; box-sizing: border-box; }
        .event-card-mini:hover { background: var(--color-hover-light); border-color: var(--color-hover-strong); padding-left: 8px; }
        .ev-title { font-size: clamp(0.7rem, 1vw, 0.85rem); font-weight: 400; color: var(--color-text-white); margin-bottom: 4px; line-height: 1.3; }
        .ev-date { font-size: clamp(0.6rem, 0.8vw, 0.75rem); color: var(--color-text-muted); }

        .action-btn { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: 700; margin-top: 2vh; cursor: pointer; color: var(--color-bg-app); background: var(--color-accent); text-transform: uppercase; transition: 0.2s; }
        .action-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .action-btn:active { transform: translateY(0); }

        /* =========================================
           5. ОСНОВНАЯ ОБЛАСТЬ (КАРТИНКА + СЕТКА ДНЕЙ)
           ========================================= */
        .main-view { flex: 1; display: flex; flex-direction: row; align-items: center; padding: 3vh 3vw; position: relative; overflow: hidden; gap: 2vw; }
        .illustration-box { width: 20%; display: flex; align-items: center; justify-content: center; }
        .illustration-placeholder { color: var(--color-text-transparent); border-radius: 20px; padding: 20px; text-align: center; }

        .calendar-wrapper { flex: 1; display: flex; flex-direction: column; height: 90%; transition: 0.3s; max-width: 800px; margin: 0 auto; }
        
        #m-name { font-size: clamp(1.5rem, 4vh, 2.5rem); text-align: center; margin-bottom: 2vh; font-weight: 300; letter-spacing: 2px; color: var(--color-text-white); text-transform: uppercase; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.7rem; font-weight: 900; margin-bottom: 1vh; color: var(--color-text-muted); }
        
        /* Сетка с зазором как у месяцев */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex: 1; align-content: start; }
        
        /* Плитки дней (унифицировано) */
        .day-box { 
            aspect-ratio: 1/1; background: var(--color-bg-day); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: clamp(0.9rem, 2vw, 1.2rem); 
            cursor: pointer; position: relative; transition: 0.2s; 
            border: 2px solid transparent; overflow: hidden; 
        }
        .day-box:hover { background: var(--color-bg-day-hover); }
        .day-box.weekend { background: var(--color-bg-weekend); color: var(--color-weekend-text); }
        
        /* Эффекты: больше не прыгает рамка */
        .day-box.selected { 
            border-color: var(--color-accent) !important; 
            background: rgba(9, 224, 227, 0.1) !important; 
            box-shadow: 0 0 15px rgba(9, 224, 227, 0.3);
            color: var(--color-text-white);
            z-index: 2; 
        }
        .day-box.today { 
            color: var(--color-accent); font-weight: 700; 
            border: 1px solid rgba(9, 224, 227, 0.3); 
            box-shadow: inset 0 0 10px rgba(9, 224, 227, 0.1);
        }
        .day-box.has-memorial { background: var(--color-ev-memorial-bg) !important; color: var(--color-ev-memorial) !important; border: 1px solid rgba(209, 0, 0, 0.3); }
        
        /* ИНДИКАТОРЫ ТОЧКИ (Адаптивные для маленькой клетки) */
        .indicator-row { position: absolute; bottom: 8%; display: flex; gap: 4px; justify-content: center; width: 100%; padding: 0 4px; box-sizing: border-box; }
        .dot { height: var(--size-dot-height); flex: 1; max-width: 10px; border-radius: 4px; }
        .dot.red { background: var(--color-ev-memorial); }
        .dot.blue { background: var(--color-ev-meeting); }
        .dot.personal { background: var(--color-ev-personal); }
        
        /* Линии конгресса */
        .day-box.c-start::after, .day-box.c-mid::after, .day-box.c-end::after, .day-box.c-single::after { content: ''; position: absolute; bottom: 0; height: 4px; background: var(--color-ev-congress); width: 100%; }
        .day-box.c-start::after { left: 50%; width: 50%; }
        .day-box.c-end::after { left: 0; width: 50%; }
        .day-box.c-single::after { left: 25%; width: 50%; border-radius: 2px; }

        /* =========================================
           6. МОДАЛЬНОЕ ОКНО
           ========================================= */
        .modal { display: none; position: fixed; inset: 0; background: var(--color-overlay-dark); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: var(--color-bg-app); border: 1px solid var(--color-border-inner); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 800; margin-bottom: 8px; cursor: pointer; color: var(--color-text-white); text-transform: uppercase; font-size: 0.7rem; transition: 0.2s; }
        .modal-btn:hover { filter: brightness(1.1); }
        textarea { width: 100%; height: 80px; margin-bottom: 15px; padding: 12px; border-radius: 6px; border: 1px solid var(--color-border-inner); background: var(--color-bg-day); color: var(--color-text-white); resize: none; outline: none; }
        textarea:focus { border-color: var(--color-accent); }
        .note-item { display: flex; justify-content: space-between; align-items: center; background: var(--color-bg-card); padding: 10px; margin-bottom: 8px; border-radius: 4px; }

        /* =========================================
           7. АДАПТИВНОСТЬ (МОБИЛКИ) - 1 в 1 с календарем
           ========================================= */
        @media (orientation: portrait) {
            body { background: var(--color-bg-app); }
            .app-container { width: 100vw; height: 100dvh; max-height: none; max-width: none; border-radius: 0; flex-direction: column; box-shadow: none; }
            
            .nav-bar { width: 100%; height: auto; flex-direction: row; padding: 1vh 4vw; border-right: none; border-bottom: 1px solid var(--color-border-inner); }
            .nav-group { flex-direction: row; gap: 15px; }
            
            .sidebar { width: 100%; max-width: 100%; height: auto; max-height: 35dvh; padding: 2vh 4vw 1vh; border-right: none; border-bottom: 1px solid var(--color-border-inner); background: var(--color-bg-app); flex-direction: column; align-items: stretch; justify-content: flex-start; }
            
            .main-view { padding: 1vh 4vw 2vh; flex: 1; flex-direction: column; justify-content: space-between; min-height: 0; }
            .illustration-box { display: none !important; }
            .calendar-wrapper { width: 100%; height: 100%; }

            /* Единые размеры сетки */
            .grid { gap: 6px; }
            .day-box { border-radius: 8px; }
            #m-name { font-size: 1.5rem; margin-bottom: 1vh; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="nav-bar">
            <div class="nav-group">
                <button class="icon-btn" onclick="location.href='calendar.html'" title="Назад в календарь">
                    <span class="ui-icon">◀</span>
                </button>
                <button class="icon-btn" title="Профиль">
                    <span class="ui-icon">👤</span>
                </button>
                <button id="admin-btn" class="icon-btn" onclick="location.href='admin.html'" style="display:none;" title="Настройки">
                    <span class="ui-icon ui-icon-accent">⚙</span>
                </button>
            </div>
            <div class="nav-group">
                <button class="icon-btn" title="Информация">
                    <span class="ui-icon">ⓘ</span>
                </button>
            </div>
        </div>

        <div class="sidebar">
            <div class="section-title">ДЕТАЛИ ДНЯ</div>
            <div class="preview-box">
                <div id="preview" class="preview">
                    <div style="color:var(--color-text-muted); text-align:center; margin-top:20px;">Выберите день</div>
                </div>
                <button class="action-btn" id="edit-btn" style="display:none;" onclick="openModal()">+ ДОБАВИТЬ ПЛАН</button>
            </div>
        </div>

        <div class="main-view">
            
            <div class="illustration-box">
                <div class="illustration-placeholder">
                    <img src="TABL.png" alt="Illustration" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                </div>
            </div>

            <div class="calendar-wrapper">
                <div id="m-name">...</div>
                <div class="weekdays"><div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div></div>
                <div id="grid" class="grid"></div>
            </div>
            
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h3 id="modal-title" style="margin:0 0 20px 0; text-align:center; color: var(--color-accent); text-transform: uppercase;"></h3>
            <div id="modal-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            <textarea id="note-input" placeholder="Текст заметки..."></textarea>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px;">
                <button id="btn-memorial" class="modal-btn" style="background:var(--color-ev-memorial);" onclick="save('memorial')">ВЕЧЕРЯ</button>
                <button id="btn-meeting" class="modal-btn" style="background:var(--color-ev-meeting); color:#fff;" onclick="save('meeting')">ВСТРЕЧА</button>
                <button id="btn-congress" class="modal-btn" style="background:var(--color-ev-congress);" onclick="save('congress')">КОНГРЕСС</button>
                <button class="modal-btn" style="background:var(--color-ev-personal);" onclick="save('personal')">ЛИЧНОЕ</button>
            </div>
            <button class="modal-btn" style="background:none; border:1px solid var(--color-border-inner); color:var(--color-text-muted);" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const currentUserRaw = localStorage.getItem('currentUser');
    if (!currentUserRaw) window.location.replace('index.html');
    const currentUser = currentUserRaw.toLowerCase();
    const isAdmin = currentUser === 'admin';

    if (isAdmin) document.getElementById('admin-btn').style.display = 'flex';

    const cfg = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
    };

    const db = getFirestore(initializeApp(cfg));

    const mIdx = parseInt(localStorage.getItem('selectedMonth')) || 0;
    const year = parseInt(localStorage.getItem('selectedYear')) || 2026;
    const docId = `${year}_${mIdx}`;
    const months = ["ЯНВАРЬ", "ФЕВРАЛЬ", "МАРТ", "АПРЕЛЬ", "МАЙ", "ИЮНЬ", "ИЮЛЬ", "АВГУСТ", "СЕНТЯБРЬ", "ОКТЯБРЬ", "НОЯБРЬ", "ДЕКАБРЬ"];
    
    document.getElementById('m-name').innerText = `${months[mIdx]} ${year}`;
    let dbData = {};
    let selectedDay = null;

    window.selectDay = (d) => {
        if (!d) return;
        selectedDay = d;
        document.querySelectorAll('.day-box').forEach(b => b.classList.remove('selected'));
        const tile = document.getElementById(`tile-${d}`);
        if (tile) tile.classList.add('selected');
        
        document.getElementById('edit-btn').style.display = 'block';
        const notes = dbData[d] || [];
        
        const preview = document.getElementById('preview');
        
        // Рендер карточек
        preview.innerHTML = `<div style="font-size:0.6rem; color:var(--color-text-muted); margin-bottom:10px; font-weight:800; letter-spacing:1px; text-align:center;">ВЫБРАНО: ${d} ${months[mIdx]}</div>` +
            (notes.map(n => {
                let dotColor = 'var(--color-ev-personal)';
                if (n.category === 'memorial') dotColor = 'var(--color-ev-memorial)';
                if (n.category === 'meeting') dotColor = 'var(--color-ev-meeting)';
                if (n.category === 'congress') dotColor = 'var(--color-ev-congress)';
                
                return `
                    <div class="event-card-mini" style="border-left-color: ${dotColor}">
                        <div class="ev-title">${n.text}</div>
                        <div class="ev-date">${d} ${months[mIdx]}</div>
                    </div>
                `;
            }).join('') || '<div style="color:var(--color-text-muted); text-align:center; padding-top:20px;">Планов нет</div>');
    };

    window.openModal = () => {
        document.getElementById('modal-title').innerText = `${selectedDay} ${months[mIdx]}`;
        const list = document.getElementById('modal-list');
        const notes = dbData[selectedDay] || [];
        
        document.getElementById('btn-memorial').disabled = !isAdmin;
        document.getElementById('btn-meeting').disabled = !isAdmin;

        list.innerHTML = notes.map((n, idx) => `
            <div class="note-item">
                <span style="font-size:0.8rem; color:var(--color-text-white);">${n.text}</span>
                ${(isAdmin || n.author === currentUser) ? `<b onclick="delNote(${idx})" style="color:var(--color-error); cursor:pointer; padding:5px;">✕</b>` : ''}
            </div>
        `).join('');
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.save = async (cat) => {
        const input = document.getElementById('note-input');
        const text = input.value.trim() || cat.toUpperCase();
        const notes = [...(dbData[selectedDay] || [])];
        notes.push({ text, category: cat, author: currentUser });
        
        try {
            await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
            input.value = '';
            openModal();
        } catch (e) { alert("Ошибка доступа к базе!"); }
    };

    window.delNote = async (idx) => {
        const notes = [...(dbData[selectedDay] || [])];
        notes.splice(idx, 1);
        await setDoc(doc(db, "calendar", docId), { [selectedDay]: notes }, { merge: true });
        openModal();
    };

    function updateUI() {
        document.querySelectorAll('.day-box').forEach(tile => {
            const d = tile.id.split('-')[1];
            tile.className = tile.className.split(' ').filter(c => ['day-box', 'weekend', 'today', 'selected'].includes(c)).join(' ');
            
            const marks = document.getElementById(`marks-${d}`);
            if (marks) marks.innerHTML = '';

            const notes = dbData[d] || [];
            const hasCongress = notes.some(n => n.category === 'congress');

            notes.forEach(n => {
                if (n.category === 'memorial') {
                    tile.classList.add('has-memorial');
                    if (marks) marks.innerHTML += '<div class="dot red"></div>'; 
                }
                if (n.category === 'meeting' && marks) marks.innerHTML += '<div class="dot blue"></div>';
                if (n.category === 'personal' && marks) marks.innerHTML += '<div class="dot personal"></div>';
            });

            if (hasCongress) {
                const hasPrev = (dbData[d-1] || []).some(n => n.category === 'congress');
                const hasNext = (dbData[parseInt(d)+1] || []).some(n => n.category === 'congress');
                if (!hasPrev && hasNext) tile.classList.add('c-start');
                else if (hasPrev && hasNext) tile.classList.add('c-mid');
                else if (hasPrev && !hasNext) tile.classList.add('c-end');
                else tile.classList.add('c-single');
            }
        });
        if (selectedDay) selectDay(selectedDay);
    }

    const gridEl = document.getElementById('grid');
    const firstDay = new Date(year, mIdx, 1).getDay();
    const shift = firstDay === 0 ? 6 : firstDay - 1;
    const totalDays = new Date(year, mIdx + 1, 0).getDate();
    const now = new Date();

    for (let i = 0; i < shift; i++) gridEl.innerHTML += '<div style="visibility:hidden"></div>';
    for (let d = 1; d <= totalDays; d++) {
        const isWE = new Date(year, mIdx, d).getDay() % 6 === 0;
        const isToday = (d === now.getDate() && mIdx === now.getMonth() && year === now.getFullYear());
        gridEl.innerHTML += `
            <div class="day-box ${isWE?'weekend':''} ${isToday?'today':''}" id="tile-${d}" onclick="selectDay(${d})">
                ${d}
                <div class="indicator-row" id="marks-${d}"></div>
            </div>`;
    }

    onSnapshot(doc(db, "calendar", docId), (s) => {
        dbData = s.exists() ? s.data() : {};
        updateUI();
    });
</script>
</body>
</html>
