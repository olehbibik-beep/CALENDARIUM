<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --main-bg: #f4f7f6; /* Светлый фон всей страницы */
            --sidebar-bg: #1e2122; /* Темный сайдбар как на скрине */
            --dark-card: #2d3436; /* Темные плитки дней */
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        /* ТЕМНЫЙ САЙДБАР */
        .sidebar { 
            width: 420px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; border-right: 1px solid #000; 
            z-index: 10; flex-shrink: 0; box-sizing: border-box; 
            align-items: flex-end; text-align: right; color: white;
        }

        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { 
            background: #fff; color: #000; border: none; padding: 6px 16px; border-radius: 8px; 
            font-size: 0.75rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        .user-name { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; color: #fff; }

        #display-year-static { 
            font-size: 8rem; font-weight: 200; color: rgba(255,255,255,0.05); /* Полупрозрачный год */
            letter-spacing: -12px; line-height: 0.7; margin: 0; 
        }
        #month-title { 
            font-size: 3.5rem; font-weight: 900; color: #fff; 
            letter-spacing: -2px; line-height: 1; margin-top: -20px; margin-bottom: 40px; text-transform: uppercase;
        }

        /* РОЗОВЫЙ БЛОК (СОБЫТИЯ) */
        #live-preview { 
            font-size: 0.85rem; background: rgba(230, 0, 126, 0.1); padding: 20px; 
            border-radius: 15px 0 0 15px; position: relative;
            line-height: 1.5; color: #ff9fcf; text-align: right; width: 100%; box-sizing: border-box;
            min-height: 100px; border: 1px solid rgba(230, 0, 126, 0.3); margin-bottom: 20px;
        }
        #live-preview::after {
            content: ''; position: absolute; right: -5px; top: 0; bottom: 0; width: 5px;
            background: #e6007e; border-radius: 0 10px 10px 0;
        }

        .side-label { font-size: 0.7rem; font-weight: 700; color: #636e72; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 0.9rem; color: #b2bec3; margin-bottom: 8px; }
        .color-bar { width: 4px; height: 16px; border-radius: 2px; }

        /* ГЛАВНАЯ СЕТКА */
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; }
        
        /* ДНИ НЕДЕЛИ (ТЕПЕРЬ ВИДИМЫЕ) */
        .weekdays { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; margin-bottom: 20px; }
        .weekday { font-size: 0.8rem; font-weight: 900; color: #2d3436; text-transform: uppercase; text-align: center; }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 110px); gap: 15px; }

        /* ТЕМНЫЕ КАРТОЧКИ */
        .day-card { 
            background: var(--dark-card); 
            height: 110px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s ease;
            position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .day-number { font-weight: 800; font-size: 1.6rem; color: #fff; pointer-events: none; }
        
        .day-card:hover { transform: translateY(-5px); background: #000; box-shadow: 0 12px 25px rgba(0, 136, 204, 0.3); }
        .day-card.empty { background: transparent; box-shadow: none; cursor: default; }
        
        .dots-row { margin-top: 8px; display: flex; gap: 4px; min-height: 6px; }
        .day-mark { width: 6px; height: 6px; border-radius: 50%; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 35px; border-radius: 30px; width: 450px; text-align: right; color: #333; }
        .save-btn { width: 100%; background: #000; color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="back-btn" onclick="location.href='calendar.html'">Назад</button>
            <div class="user-name" id="user-display">ADMIN</div>
        </div>
        
        <div id="display-year-static">2026</div>
        <div id="month-title">АПРЕЛЬ</div>

        <div class="side-section">
            <div class="side-label">События дня</div>
            <div id="live-preview">Наведите на число...</div>
        </div>

        <div class="side-section">
            <div class="side-label">Легенда</div>
            <div class="legend-item">Работа <div class="color-bar" style="background: var(--ev-work);"></div></div>
            <div class="legend-item">Важное <div class="color-bar" style="background: var(--ev-important);"></div></div>
            <div class="legend-item">Личное <div class="color-bar" style="background: var(--ev-personal);"></div></div>
        </div>
    </div>

    <div class="main-content">
        <div class="weekdays">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
        </div>
        <div class="days-grid" id="days-container"></div>
    </div>

    <div class="modal" id="note-modal">
        <div class="modal-content">
            <h2 id="modal-date-title" style="margin:0 0 20px 0;">Дата</h2>
            <div id="existing-notes"></div>
            <textarea id="note-text" style="width:100%; height:80px; margin:10px 0; padding:10px; border-radius:10px; border:1px solid #eee;"></textarea>
            <button class="save-btn" onclick="saveNote()">ДОБАВИТЬ</button>
            <button onclick="closeModal()" style="margin-top:10px; border:none; background:none; color:#ccc; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const currentUser = localStorage.getItem('currentUser');
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = monthsNames[monthIdx];
        document.getElementById('user-display').innerText = currentUser;

        let currentMonthData = {};
        let selectedDay = null;

        onSnapshot(doc(db, "calendar", `2026_${monthIdx}`), (snap) => {
            currentMonthData = snap.exists() ? snap.data() : {};
            renderGrid();
        });

        function renderGrid() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            const firstDay = new Date(2026, monthIdx, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

            for(let s=0; s<shift; s++) container.appendChild(Object.assign(document.createElement('div'), {className:'day-card empty'}));

            for (let i = 1; i <= daysInMonth; i++) {
                const card = document.createElement('div');
                card.className = 'day-card';
                
                const num = document.createElement('div');
                num.className = 'day-number';
                num.innerText = i;
                card.appendChild(num);
                
                const dots = document.createElement('div');
                dots.className = 'dots-row';
                if (currentMonthData[i]) {
                    currentMonthData[i].forEach(n => {
                        const d = document.createElement('div');
                        d.className = 'day-mark';
                        d.style.background = `var(--ev-${n.category})`;
                        dots.appendChild(d);
                    });
                }
                card.appendChild(dots);

                card.onmouseover = () => {
                    const prev = document.getElementById('live-preview');
                    if (currentMonthData[i] && currentMonthData[i].length > 0) {
                        prev.innerHTML = currentMonthData[i].map(n => `<b>${n.user}:</b> ${n.text}`).join('<br>');
                    } else { prev.innerText = 'Событий нет'; }
                };

                card.onclick = () => openModal(i);
                container.appendChild(card);
            }
        }

        window.openModal = (day) => {
            selectedDay = day;
            document.getElementById('modal-date-title').innerText = day + ' ' + monthsNames[monthIdx];
            document.getElementById('note-modal').style.display = 'flex';
        };
        window.closeModal = () => document.getElementById('note-modal').style.display = 'none';
        
        window.saveNote = async () => {
            const text = document.getElementById('note-text').value;
            if(!text) return;
            const notes = currentMonthData[selectedDay] || [];
            notes.push({text, category: 'work', user: currentUser});
            await setDoc(doc(db, "calendar", `2026_${monthIdx}`), {[selectedDay]: notes}, {merge:true});
            document.getElementById('note-text').value = '';
            closeModal();
        };
    </script>
</body>
</html>
