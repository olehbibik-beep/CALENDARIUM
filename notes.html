<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDARIUM | Inverted Edition</title>
    <style>
        :root {
            --bg-dark: #1e2122; /* Темный фон */
            --sidebar-light: #ffffff; /* Светлый сайдбар */
            --card-light: #ffffff; /* Светлые плитки */
            --text-main: #333333;
            --text-white: #ffffff;
        }

        body { 
            margin: 0; padding: 0; display: flex; 
            height: 100vh; background: var(--bg-dark); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden;
        }

        /* Светлый Сайдбар */
        .sidebar { 
            width: 350px; background: var(--sidebar-light); padding: 40px; 
            border-right: 1px solid #ddd; display: flex; flex-direction: column; 
            box-sizing: border-box; flex-shrink: 0; color: var(--text-main);
        }

        .back-btn { 
            background: #000; color: #fff; border: none; padding: 10px; 
            border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold;
        }

        #month-title { font-size: 2.5rem; font-weight: 800; margin: 0 0 20px 0; color: var(--text-main); }

        /* Контентная область (Темная) */
        .main { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }

        .weekdays { 
            display: grid; grid-template-columns: repeat(7, 100px); 
            gap: 15px; margin-bottom: 15px; 
        }
        .weekday { text-align: center; font-weight: 900; color: var(--text-white); text-transform: uppercase; font-size: 0.8rem; }

        .grid { 
            display: grid; grid-template-columns: repeat(7, 100px); 
            gap: 15px; 
        }

        /* Светлые плитки дней */
        .day { 
            width: 100px; height: 100px; background: var(--card-light); 
            border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; font-weight: bold; color: var(--text-main); 
            cursor: pointer; transition: 0.2s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .day:hover { background: #f0f0f0; transform: translateY(-5px); }
        .day.empty { background: transparent; border: none; cursor: default; box-shadow: none; }

        /* Модалка */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 320px; text-align: right; }
        textarea { width: 100%; height: 80px; margin-top: 10px; border-radius: 10px; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="back-btn" onclick="location.href='calendar.html'">← НАЗАД</button>
        <div id="user-name" style="color: #666; font-weight: bold; text-transform: uppercase;">ADMIN</div>
        <h1 id="month-title">АПРЕЛЬ</h1>
        <div id="live-info" style="margin-top: 20px; color: #888; font-size: 0.9rem;">Наведите на дату...</div>
    </div>

    <div class="main">
        <div class="weekdays">
            <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
            <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="m-date" style="margin-top:0">Дата</h3>
            <textarea id="m-input" placeholder="Введите текст..."></textarea>
            <button onclick="save()" style="width:100%; padding:12px; background:#000; color:#fff; border:none; margin-top:10px; border-radius:10px; font-weight:bold; cursor:pointer;">СОХРАНИТЬ</button>
            <button onclick="closeM()" style="width:100%; border:none; background:none; color:gray; margin-top:10px; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const mIdx = parseInt(localStorage.getItem('selectedMonth') || 0);
        const user = localStorage.getItem('currentUser') || 'ADMIN';
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        document.getElementById('month-title').innerText = months[mIdx];
        document.getElementById('user-name').innerText = user;

        let currentData = {};
        let activeDay = null;

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const first = new Date(2026, mIdx, 1).getDay();
            const shift = first === 0 ? 6 : first - 1;
            const daysInMonth = new Date(2026, mIdx + 1, 0).getDate();

            for(let i=0; i<shift; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                grid.appendChild(empty);
            }

            for(let i=1; i<=daysInMonth; i++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.innerText = i;
                
                dayEl.onmouseover = () => {
                    document.getElementById('live-info').innerText = currentData[i] ? currentData[i].map(d => d.text).join(', ') : 'Нет записей';
                };

                dayEl.onclick = () => {
                    activeDay = i;
                    document.getElementById('m-date').innerText = i + ' ' + months[mIdx];
                    document.getElementById('modal').style.display = 'flex';
                };
                grid.appendChild(dayEl);
            }
        }

        onSnapshot(doc(db, "calendar", `2026_${mIdx}`), (snap) => {
            currentData = snap.exists() ? snap.data() : {};
            render();
        });

        window.closeM = () => document.getElementById('modal').style.display = 'none';
        window.save = async () => {
            const text = document.getElementById('m-input').value;
            if(!text) return;
            const list = currentData[activeDay] || [];
            list.push({text, user});
            await setDoc(doc(db, "calendar", `2026_${mIdx}`), {[activeDay]: list}, {merge:true});
            document.getElementById('m-input').value = '';
            closeM();
        };

        render();
    </script>
</body>
</html>
