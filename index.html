<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDAR 2026</title>
    <style>
        :root {
            --orange-notif: #f39c12;
            --admin-red: #d63031;
            --accent-blue: #0984e3;
            /* Наш новый нежный однотонный фон */
            --bg-soft: #f7f8fa; 
            --card-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        
        body, html { margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; background: var(--bg-soft); }
        .hidden { display: none !important; }

        /* --- 1. СТИЛИ: АВТОРИЗАЦИЯ (ОДНОТОННЫЙ ФОН) --- */
        #auth-page {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: var(--bg-soft); /* Убрали градиент */
        }
        #auth-page .auth-container {
            background: #ffffff; padding: 50px 60px; border-radius: 40px;
            box-shadow: var(--card-shadow);
            display: flex; flex-direction: column; align-items: center;
        }
        #auth-page h2 { font-weight: 900; color: #2d3436; font-size: 3rem; letter-spacing: -3px; text-transform: uppercase; margin: 0; }

        /* --- 2. СТИЛИ: КАЛЕНДАРЬ ГОДА (ВТОРАЯ СТРАНИЦА) --- */
        #year-page { height: 100vh; display: flex; background: var(--bg-soft); }

        /* Левая панель */
        #year-page .sidebar { 
            width: 280px; background: #ffffff; padding: 40px 25px; 
            display: flex; flex-direction: column; border-right: 1px solid #edf0f2;
        }
        .user-info { display: flex; align-items: center; gap: 15px; margin-bottom: 50px; }
        .avatar { 
            width: 50px; height: 50px; background: var(--accent-blue); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 22px; box-shadow: 0 5px 15px rgba(9,132,227,0.2);
        }
        .user-name { font-weight: 700; color: #2d3436; font-size: 1.1rem; }

        /* Сетка месяцев */
        #year-page .main-content { flex: 1; padding: 60px; overflow-y: auto; position: relative; }
        #year-page .year-header { font-size: 8rem; font-weight: 900; color: #e9ecef; position: absolute; top: -20px; right: 40px; z-index: 0; }
        
        #year-page .year-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 25px; position: relative; z-index: 1; 
        }

        .month-card {
            background: #ffffff; border-radius: 25px; padding: 35px 20px;
            text-align: center; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent; box-shadow: var(--card-shadow);
        }
        .month-card:hover { 
            transform: translateY(-8px); border-color: var(--accent-blue);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }
        .month-name { font-size: 1.4rem; font-weight: 700; color: #2d3436; margin: 0; letter-spacing: -0.5px; }
        .month-status { font-size: 11px; color: #b2bec3; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- ОБЩИЕ ЭЛЕМЕНТЫ --- */
        .btn { border: none; padding: 14px 20px; border-radius: 15px; cursor: pointer; font-weight: 600; font-family: inherit; transition: 0.3s; }
        .btn-logout { background: #f1f2f6; color: #636e72; width: 100%; margin-top: auto; }
        .btn-logout:hover { background: #dfe6e9; color: #2d3436; }
        
        /* Системная шторка и инфо-строка (неизменные) */
        .system-sidebar { position: fixed; right: 0; top: 0; width: 320px; height: 100vh; background: var(--orange-notif); color: white; z-index: 5000; transform: translateX(100%); transition: 0.4s; padding: 25px; box-sizing: border-box; }
        .system-sidebar.active { transform: translateX(0); }
        .system-footer-info { position: fixed; bottom: 0; left: 0; width: 100%; height: 30px; background: #636e72; color: #bdc3c7; font-size: 10px; display: flex; align-items: center; justify-content: center; z-index: 4000; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="side-panel" class="system-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="panel-title" style="margin:0">Уведомления</h3>
            <button onclick="window.togglePanel(false)" style="background:none; border:none; color:white; font-size:35px; cursor:pointer;">&times;</button>
        </div>
        <div id="panel-content" style="margin-top:20px;"></div>
    </div>
    
    <div class="system-footer-info">Cloud System • 2026 • Encrypted Session</div>

    <div id="auth-page">
        <div class="auth-container">
            <h2>CALENDAR</h2>
            <p style="color:#b2bec3; font-size:13px; margin: 10px 0 30px 0;">Авторизация в экосистеме</p>
            <input type="text" id="auth-username" placeholder="Ваш логин..." style="width: 280px; padding: 16px; border-radius: 20px; border: 1px solid #eee; margin-bottom: 20px; outline: none; font-size: 16px;">
            <canvas id="pattern-canvas" width="260" height="260" style="background: #fff; border-radius: 25px; border: 1px solid #f1f2f6; cursor: crosshair;"></canvas>
            <p id="auth-status-hint" style="color:#bdc3c7; font-size:11px; margin-top:15px; text-transform:uppercase;">Нарисуйте ключ</p>
        </div>
    </div>

    <div id="year-page" class="hidden">
        <aside class="sidebar">
            <div class="user-info">
                <div class="avatar" id="u-avatar">?</div>
                <div class="user-name" id="sidebar-user-name">USER</div>
            </div>
            
            <nav style="display:flex; flex-direction:column; gap:10px;">
                <p style="font-size:11px; color:#b2bec3; text-transform:uppercase; letter-spacing:1px; margin-left:5px;">Меню</p>
                <button class="btn" style="background:var(--accent-blue); color:white; text-align:left;">📅 Весь год</button>
                <button id="admin-btn-side" class="btn hidden" style="background:var(--admin-red); color:white; text-align:left;" onclick="window.loadAdminRequests()">⚙️ Запросы доступа</button>
            </nav>

            <button class="btn btn-logout" onclick="location.reload()">Выйти из системы</button>
        </aside>

        <main class="main-content">
            <div class="year-header">2026</div>
            <div class="year-grid" id="year-grid">
                </div>
        </main>
    </div>

    <script type="module">
        // Здесь вся логика Firebase (она остается неизменной)
        // ... (Подключение Firebase, handleAuthSubmit, и т.д.)
        
        // ВАЖНО: При генерации сетки месяцев я добавил новый стиль карточек:
        window.renderYearGrid = () => {
            const grid = document.getElementById('year-grid');
            grid.innerHTML = '';
            const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            
            months.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `
                    <p class="month-status">Month ${i+1}</p>
                    <h3 class="month-name">${m}</h3>
                    <div style="width:30px; height:3px; background:var(--accent-blue); margin: 15px auto 0; border-radius:10px; opacity:0.3;"></div>
                `;
                card.onclick = () => window.openMonth(i);
                grid.appendChild(card);
            });
        };

        // Логика переключения на страницу года после входа
        window.loginSuccess = (userName) => {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            document.getElementById('sidebar-user-name').innerText = userName.toUpperCase();
            document.getElementById('u-avatar').innerText = userName.charAt(0).toUpperCase();
            window.renderYearGrid();
        };

        // ... (Остальной JS код с канвасом и уведомлениями)
    </script>
</body>
</html>
