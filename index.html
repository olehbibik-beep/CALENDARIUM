<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan 2026 | Cloud Calendar</title>
    
    <style>
        :root { 
            --color-bg-main: #ffffff;
            --color-text-main: #2d3436;
            --color-accent: #0984e3;
            --color-accent-light: #f0f7ff;
            --color-bg-sidebar: #bdc3c7;
            --color-border-sidebar: #95a5a6;
            --color-admin: #d63031;
            --color-approve: #2ecc71;
            --color-activity-line: #fd79a8;
            --color-notification-bg: #f39c12;
            --color-text-muted: #b2bec3;
            --color-bg-input: #f8f9fa;
            --color-border-light: #eeeeee;
            --sidebar-width: 280px;
            --admin-panel-width: 320px;
            --border-radius-main: 15px;
            --border-radius-input: 20px;
            --border-radius-small: 10px;
        }

        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--color-bg-main); 
            height: 100vh; overflow: hidden; 
        }
        
        .hidden { display: none !important; }

        .btn { 
            padding: 10px 15px; border-radius: 8px; border: none; 
            font-weight: bold; cursor: pointer; font-size: 0.8rem; 
            transition: 0.3s;
        }
        .btn-exit { background: #636e72; color: white; }
        .btn-admin { background: var(--color-admin); color: white; }

        /* ВХОД */
        #auth-page { 
            display: flex; height: 100vh; width: 100vw; 
            background: white; position: fixed; top: 0; left: 0; z-index: 2000; 
            flex-direction: column; align-items: center; justify-content: flex-start; 
            padding-top: 5vh; box-sizing: border-box; 
        }
        #auth-username { 
            width: 260px; padding: 12px; margin-bottom: 10px; 
            border-radius: var(--border-radius-input); border: 1px solid #ddd; 
            background: var(--color-bg-input); text-align: center; outline: none; 
        }
        #pattern-canvas { background: #fafafa; cursor: crosshair; touch-action: none; border-radius: var(--border-radius-main); }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { 
            width: var(--sidebar-width); background: var(--color-bg-sidebar); 
            display: flex; flex-direction: column; padding: 30px 20px; 
            box-sizing: border-box; border-right: 1px solid var(--color-border-sidebar); 
        }
        .user-avatar { 
            width: 45px; height: 45px; background: var(--color-accent); color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; 
        }
        .main-view { flex: 1; padding: 40px 60px; overflow-y: auto; }
        .main-view h1 { font-size: 4rem; margin: 0 0 30px 0; font-weight: 300; }

        .year-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .month-card { 
            background: white; border: 1px solid var(--color-border-light); 
            border-radius: var(--border-radius-main); padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; position: relative; min-height: 120px;
        }
        .month-card:hover { transform: translateY(-3px); border-color: var(--color-accent); }
        .month-card.current-month { border: 2.5px solid var(--color-accent); background: var(--color-accent-light); }
        
        .activity-line { width: 40px; height: 5px; background: var(--color-activity-line); border-radius: 3px; margin-top: 10px; }
        .last-edit { font-size: 9px; color: var(--color-text-muted); position: absolute; bottom: 10px; text-transform: uppercase; }

        /* АДМИН ПАНЕЛЬ */
        .notifications-sidebar {
            width: var(--admin-panel-width); background: var(--color-notification-bg); 
            height: 100vh; position: fixed; right: 0; top: 0; z-index: 1500;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); padding: 25px; box-sizing: border-box; color: white;
            transform: translateX(100%); transition: 0.3s ease;
        }
        .notifications-sidebar.active { transform: translateX(0); }
        .notif-item { background: rgba(255,255,255,0.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }

        /* МЕСЯЦ */
        #month-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        #days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-cell { background: var(--color-bg-input); border: 1px solid var(--color-border-light); padding: 10px; border-radius: var(--border-radius-small); cursor: pointer; min-height: 60px; }
        #day-input { width: 100%; height: 100px; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-page">
        <h2>Добро пожаловать</h2>
        <input type="text" id="auth-username" placeholder="Ваше имя">
        <canvas id="pattern-canvas" width="260" height="260"></canvas>
        <div id="admin-secret-wrap" class="hidden">
            <input type="password" id="admin-pass-input" placeholder="Пароль">
            <button id="btn-admin-login" class="btn btn-exit">Войти как админ</button>
        </div>
        <p id="auth-status" style="font-size: 11px; color: #636e72;">Нарисуйте графический ключ</p>
    </div>

    <div id="year-page" class="hidden">
        <div class="app-container">
            <aside class="sidebar">
                <div class="user-profile">
                    <div class="user-avatar" id="u-avatar">?</div>
                    <div id="sidebar-user-name" style="margin-left:10px; font-weight:bold;">USER</div>
                </div>
                <div class="sidebar-controls" style="margin-top:20px; display:flex; gap:10px;">
                    <button id="btn-logout" class="btn btn-exit">Выйти</button>
                    <button id="admin-btn-side" class="btn btn-admin hidden">⚙️</button>
                </div>
            </aside>
            <main class="main-view">
                <h1>2026</h1>
                <div class="year-grid" id="year-grid"></div>
            </main>
        </div>
    </div>

    <div id="admin-sidebar" class="notifications-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="margin:0">Уведомления</h3>
            <button id="btn-close-admin" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div id="requests-list">Загрузка...</div>
    </div>

    <div id="month-page" class="hidden">
        <button id="btn-back-to-year" class="btn btn-exit">← К году</button>
        <h2 id="month-title" style="font-size: 3rem; margin: 20px 0;"></h2>
        <div id="days-grid"></div>
        <div id="editor-section" class="hidden" style="margin-top:20px; background:#f8f9fa; padding:20px; border-radius:15px;">
            <h4 id="selected-day-label"></h4>
            <textarea id="day-input"></textarea>
            <button id="btn-save-day" class="btn btn-exit" style="background:var(--color-accent); margin-top:10px;">Сохранить</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const CONFIG = {
            firebase: {
                apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
                authDomain: "calendarium-1f7d7.firebaseapp.com",
                projectId: "calendarium-1f7d7",
                storageBucket: "calendarium-1f7d7.firebasestorage.app",
                messagingSenderId: "204240857105",
                appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
            },
            months: ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"]
        };

        const app = initializeApp(CONFIG.firebase);
        const db = getFirestore(app);

        let AppState = {
            currentUser: "",
            patternResult: "",
            currentMonthIdx: null,
            currentDay: null,
            currentMonthData: {}
        };

        const UI = {
            pages: {
                auth: document.getElementById('auth-page'),
                year: document.getElementById('year-page'),
                month: document.getElementById('month-page'),
                admin: document.getElementById('admin-sidebar')
            },
            show: function(key) {
                Object.keys(this.pages).forEach(p => this.pages[p].classList.add('hidden'));
                this.pages[key].classList.remove('hidden');
            },
            toggleAdmin: function(open) {
                this.pages.admin.classList.toggle('active', open);
            }
        };

        const PatternLock = {
            canvas: document.getElementById('pattern-canvas'),
            ctx: null,
            dots: [],
            drawing: false,
            init: function() {
                this.ctx = this.canvas.getContext('2d');
                this.createDots();
                this.bind();
                this.draw();
            },
            createDots: function() {
                this.dots = [];
                for(let i=0; i<3; i++) for(let j=0; j<3; j++) 
                    this.dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});
            },
            draw: function() {
                this.ctx.clearRect(0, 0, 260, 260);
                if (AppState.patternResult.length > 0) {
                    this.ctx.beginPath(); this.ctx.strokeStyle = "#0984e3"; this.ctx.lineWidth = 8;
                    for(let k=0; k < AppState.patternResult.length; k+=2) {
                        const d = this.dots.find(dot => dot.id === AppState.patternResult.substring(k, k+2));
                        if(k===0) this.ctx.moveTo(d.x, d.y); else this.ctx.lineTo(d.x, d.y);
                    }
                    this.ctx.stroke();
                }
                this.dots.forEach(d => {
                    this.ctx.beginPath(); this.ctx.arc(d.x, d.y, 14, 0, Math.PI*2);
                    this.ctx.fillStyle = d.hit ? "#0984e3" : "#bdc3c7"; this.ctx.fill();
                });
            },
            bind: function() {
                const handleMove = (e) => {
                    if(!this.drawing) return;
                    const rect = this.canvas.getBoundingClientRect();
                    const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
                    const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
                    this.dots.forEach(d => {
                        if (Math.sqrt((x-d.x)**2 + (y-d.y)**2) < 25 && !d.hit) {
                            d.hit = true; AppState.patternResult += d.id; this.draw();
                        }
                    });
                };
                this.canvas.onmousedown = this.canvas.ontouchstart = (e) => { 
                    AppState.patternResult = ""; this.createDots(); this.drawing = true; 
                };
                window.onmouseup = window.ontouchend = () => {
                    if(this.drawing && AppState.patternResult.length >= 4) Auth.submit();
                    this.drawing = false;
                };
                this.canvas.onmousemove = this.canvas.ontouchmove = handleMove;
            }
        };

        const Auth = {
            submit: async function() {
                const name = document.getElementById('auth-username').value.trim().toLowerCase();
                const pass = document.getElementById('admin-pass-input').value || AppState.patternResult;
                if(!name) return;

                const userSnap = await getDoc(doc(db, "users", name));
                if (userSnap.exists()) {
                    if (userSnap.data().password === pass) {
                        AppState.currentUser = name;
                        this.success();
                    } else { alert("Неверный ключ"); PatternLock.init(); }
                } else {
                    if(confirm("Регистрация нового пользователя?")) {
                        await setDoc(doc(db, "requests", name), { password: pass });
                        alert("Заявка отправлена!");
                    }
                    PatternLock.init();
                }
            },
            success: function() {
                UI.show('year');
                document.getElementById('sidebar-user-name').innerText = AppState.currentUser.toUpperCase();
                document.getElementById('u-avatar').innerText = AppState.currentUser[0].toUpperCase();
                if(AppState.currentUser === 'admin') document.getElementById('admin-btn-side').classList.remove('hidden');
                Calendar.renderYear();
            }
        };

        const Calendar = {
            renderYear: async function() {
                const grid = document.getElementById('year-grid');
                grid.innerHTML = '';
                const today = new Date().getMonth();
                for(let i=0; i<12; i++) {
                    const card = document.createElement('div');
                    card.className = `month-card ${i === today ? 'current-month' : ''}`;
                    card.innerHTML = `<h3>${CONFIG.months[i]}</h3><div id="stat-${i}"></div>`;
                    card.onclick = () => this.openMonth(i);
                    grid.appendChild(card);
                    this.loadStat(i);
                }
            },
            loadStat: async function(i) {
                const s = await getDoc(doc(db, "data", `month_${i}`));
                if(s.exists()) {
                    const vals = Object.values(s.data());
                    if(vals.length) document.getElementById(`stat-${i}`).innerHTML = `<div class="activity-line"></div><div class="last-edit">ред: ${vals[vals.length-1].author}</div>`;
                }
            },
            openMonth: function(i) {
                AppState.currentMonthIdx = i;
                UI.show('month');
                document.getElementById('month-title').innerText = CONFIG.months[i];
                onSnapshot(doc(db, "data", `month_${i}`), (s) => {
                    AppState.currentMonthData = s.exists() ? s.data() : {};
                    this.renderDays();
                });
            },
            renderDays: function() {
                const grid = document.getElementById('days-grid'); grid.innerHTML = '';
                const days = new Date(2026, AppState.currentMonthIdx + 1, 0).getDate();
                for(let d=1; d<=days; d++) {
                    const div = document.createElement('div');
                    div.className = 'day-cell';
                    div.innerHTML = `<b>${d}</b><div style="font-size:9px">${(AppState.currentMonthData[d]?.text || "").substring(0,10)}</div>`;
                    div.onclick = () => {
                        AppState.currentDay = d;
                        document.getElementById('editor-section').classList.remove('hidden');
                        document.getElementById('day-input').value = AppState.currentMonthData[d]?.text || "";
                    };
                    grid.appendChild(div);
                }
            },
            save: async function() {
                const txt = document.getElementById('day-input').value;
                AppState.currentMonthData[AppState.currentDay] = { text: txt, author: AppState.currentUser };
                await setDoc(doc(db, "data", `month_${AppState.currentMonthIdx}`), AppState.currentMonthData);
                alert("Сохранено");
            }
        };

        // Инициализация кнопок
        document.getElementById('auth-username').oninput = (e) => {
            document.getElementById('admin-secret-wrap').classList.toggle('hidden', e.target.value.toLowerCase() !== 'admin');
        };
        document.getElementById('btn-admin-login').onclick = () => Auth.submit();
        document.getElementById('btn-logout').onclick = () => location.reload();
        document.getElementById('btn-save-day').onclick = () => Calendar.save();
        document.getElementById('btn-back-to-year').onclick = () => UI.show('year');
        document.getElementById('admin-btn-side').onclick = () => UI.toggleAdmin(true);
        document.getElementById('btn-close-admin').onclick = () => UI.toggleAdmin(false);

        // Запуск ключа
        PatternLock.init();
    </script>
</body>
</html>
