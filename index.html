<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan 2026 | Cloud Ecosystem</title>
    <style>
        /* --- 0. ОБЩИЕ СИСТЕМНЫЕ СТИЛИ (НЕИЗМЕННЫЕ) --- */
        :root {
            --orange-notif: #f39c12;
            --admin-red: #d63031;
            --accent-blue: #0984e3;
        }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; background: #f0f2f5; }
        .hidden { display: none !important; }

        /* Системная шторка (Инфо и Уведомления) */
        .system-sidebar {
            position: fixed; right: 0; top: 0; width: 320px; height: 100vh;
            background: var(--orange-notif); color: white; z-index: 5000;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 25px; box-sizing: border-box; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        .system-sidebar.active { transform: translateX(0); }
        .system-footer-info {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 30px;
            background: #636e72; color: #bdc3c7; font-size: 11px;
            display: flex; align-items: center; justify-content: center; z-index: 4000;
            letter-spacing: 1px;
        }

        /* --- 1. СТИЛИ: АВТОРИЗАЦИЯ (#auth-page) --- */
        #auth-page {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #ffffff; /* Чистый белый для входа */
        }
        #auth-page h2 { font-weight: 300; color: #2d3436; margin-bottom: 30px; }
        #auth-page input {
            width: 260px; padding: 15px; border-radius: 30px; border: 1px solid #dfe6e9;
            background: #fdfdfd; text-align: center; margin-bottom: 15px; outline: none;
        }
        #auth-page #pattern-canvas { cursor: crosshair; touch-action: none; }

        /* --- 2. СТИЛИ: КАЛЕНДАРЬ ГОДА (#year-page) --- */
        #year-page {
            height: 100vh; display: flex; background: #f1f2f6;
        }
        #year-page .sidebar {
            width: 260px; background: #dfe4ea; padding: 40px 20px;
            border-right: 1px solid #ced4da; display: flex; flex-direction: column;
        }
        #year-page .main-content { flex: 1; padding: 60px; overflow-y: auto; }
        #year-page h1 { font-size: 5rem; font-weight: 900; color: #2f3542; margin: 0 0 40px 0; opacity: 0.1; }
        
        #year-page .year-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; 
        }
        #year-page .month-card {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); cursor: pointer; transition: 0.3s;
        }
        #year-page .month-card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* --- 3. СТИЛИ: РАСПИСАНИЕ ДНЯ (#month-page) --- */
        #month-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; padding: 50px; box-sizing: border-box; z-index: 1000; overflow-y: auto;
        }
        #month-page .nav-bar { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        #month-page .days-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px;
        }
        #month-page .day-cell {
            aspect-ratio: 1/1; border: 1px solid #f1f2f6; border-radius: 12px;
            padding: 15px; display: flex; flex-direction: column; justify-content: space-between;
            transition: 0.2s; cursor: pointer; background: #fff;
        }
        #month-page .day-cell:hover { background: #f8f9fa; border-color: var(--accent-blue); }
        #month-page .day-cell b { font-size: 1.2rem; color: #2d3436; }
        #month-page .day-content { font-size: 11px; color: #636e72; overflow: hidden; }

        /* Редактор планов */
        #month-page .editor {
            position: fixed; bottom: 50px; right: 50px; width: 400px;
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); border: 1px solid #eee;
        }

        /* Кнопки */
        .btn { border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-blue { background: var(--accent-blue); color: white; }
        .btn-red { background: var(--admin-red); color: white; }
        .btn-gray { background: #f1f2f6; color: #2d3436; }
    </style>
</head>
<body>

    <div id="side-panel" class="system-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="panel-title">Система</h3>
            <button onclick="window.togglePanel(false)" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">&times;</button>
        </div>
        <div id="panel-content"></div>
    </div>
    
    <div class="system-footer-info">
        CLOUD ECOSYSTEM v2.0 • 2026 • ВСЕ ДАННЫЕ ЗАШИФРОВАНЫ
    </div>

    <div id="auth-page">
        <h2>Вход в систему</h2>
        <input type="text" id="auth-username" placeholder="Имя пользователя" oninput="window.checkAdmin(this.value)">
        <canvas id="pattern-canvas" width="260" height="260"></canvas>
        
        <div id="admin-secret-wrap" class="hidden">
            <input type="password" id="admin-pass-input" placeholder="Пароль администратора">
            <br>
            <button class="btn btn-red" style="width:260px" onclick="window.handleAuthSubmit()">Войти как админ</button>
        </div>
        <p style="color:#b2bec3; font-size:12px">Нарисуйте ваш ключ на точках выше</p>
    </div>

    <div id="year-page" class="hidden">
        <aside class="sidebar">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:40px;">
                <div id="u-avatar" style="width:40px; height:40px; border-radius:50%; background:var(--accent-blue); color:white; display:flex; align-items:center; justify-content:center; font-weight:bold;">?</div>
                <span id="sidebar-user-name" style="font-weight:600; color:#2f3542">USER</span>
            </div>
            <button class="btn btn-gray" style="margin-bottom:10px" onclick="location.reload()">Выйти</button>
            <button id="admin-btn-side" class="btn btn-red hidden" onclick="window.loadAdminRequests()">Запросы доступа</button>
        </aside>
        <main class="main-content">
            <h1>2026</h1>
            <div class="year-grid" id="year-grid"></div>
        </main>
    </div>

    <div id="month-page" class="hidden">
        <div class="nav-bar">
            <button class="btn btn-gray" onclick="window.showYear()">← К календарю года</button>
            <h2 id="month-title" style="margin:0; font-weight:300; font-size:2.5rem;">Месяц</h2>
        </div>
        
        <div class="days-grid" id="days-grid"></div>

        <div id="editor-section" class="editor hidden">
            <h3 id="selected-day-label" style="margin-top:0; color:var(--accent-blue)">День</h3>
            <textarea id="day-input" style="width:100%; height:150px; border:1px solid #eee; border-radius:15px; padding:15px; font-family:inherit; outline:none; box-sizing:border-box;" placeholder="Ваши планы..."></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn btn-blue" style="flex:1" onclick="window.saveDayData()">Сохранить</button>
                <button class="btn btn-gray" onclick="document.getElementById('editor-section').classList.add('hidden')">Закрыть</button>
            </div>
        </div>
    </div>

    <script type="module">
        // [Здесь остается вся логика Firebase и Канваса из предыдущих сообщений]
        // Важно: Я обновил названия функций внутри JS, чтобы они соответствовали новым ID.
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        let user = "";
        let patternResult = "";
        let currentMonthIdx = null;
        let currentDay = null;
        let currentMonthData = {};

        // --- ЛОГИКА ОПОВЕЩЕНИЙ ---
        window.togglePanel = (show) => document.getElementById('side-panel').classList.toggle('active', show);
        
        window.pushNotify = (title, text, type = 'info') => {
            const container = document.getElementById('panel-content');
            document.getElementById('panel-title').innerText = "Система";
            const item = document.createElement('div');
            item.style = "background:rgba(255,255,255,0.2); padding:15px; border-radius:12px; margin-bottom:10px;";
            item.innerHTML = `<b>${title}</b><p style="margin:5px 0; font-size:13px;">${text}</p>`;
            container.prepend(item);
            window.togglePanel(true);
        };

        // --- ВХОД ---
        window.checkAdmin = (val) => {
            document.getElementById('admin-secret-wrap').classList.toggle('hidden', val.toLowerCase() !== 'admin');
        };

        window.handleAuthSubmit = async () => {
            user = document.getElementById('auth-username').value.trim().toLowerCase();
            const textPass = document.getElementById('admin-pass-input').value;
            let finalSecret = textPass || patternResult;
            
            if(!user || !finalSecret) { window.pushNotify("Вход", "Заполните имя и ключ", "err"); return; }

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                if (userSnap.data().password === finalSecret) loginSuccess();
                else window.pushNotify("Ошибка", "Неверный ключ", "err");
            } else {
                window.pushNotify("Новый пользователь", `Отправить запрос на регистрацию "${user}"?`);
                const btn = document.createElement('button');
                btn.className = "btn btn-gray"; btn.style = "width:100%; margin-top:5px;"; btn.innerText = "Да, отправить";
                btn.onclick = async () => {
                    await setDoc(doc(db, "requests", user), { password: finalSecret, date: new Date().toISOString() });
                    document.getElementById('panel-content').innerHTML = "Запрос отправлен!";
                };
                document.getElementById('panel-content').appendChild(btn);
            }
        };

        function loginSuccess() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            document.getElementById('sidebar-user-name').innerText = user.toUpperCase();
            document.getElementById('u-avatar').innerText = user.charAt(0);
            if (user === 'admin') document.getElementById('admin-btn-side').classList.remove('hidden');
            renderYearGrid();
        }

        // --- КАЛЕНДАРЬ ---
        async function renderYearGrid() {
            const grid = document.getElementById('year-grid');
            grid.innerHTML = '';
            months.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<h3 style="margin:0; font-weight:500;">${m}</h3>`;
                card.onclick = () => window.openMonth(i);
                grid.appendChild(card);
            });
        }

        window.openMonth = (mIdx) => {
            currentMonthIdx = mIdx;
            document.getElementById('month-page').classList.remove('hidden');
            document.getElementById('month-title').innerText = months[mIdx];
            onSnapshot(doc(db, "data", `month_${mIdx}`), (snap) => {
                currentMonthData = snap.exists() ? snap.data() : {};
                renderDays();
            });
        };

        function renderDays() {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            const daysInMonth = new Date(2026, currentMonthIdx + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const data = currentMonthData[d] || { text: "" };
                const div = document.createElement('div');
                div.className = 'day-cell';
                div.innerHTML = `<b>${d}</b><div class="day-content">${data.text.substring(0,30)}</div>`;
                div.onclick = () => {
                    currentDay = d;
                    document.getElementById('editor-section').classList.remove('hidden');
                    document.getElementById('selected-day-label').innerText = `${d} ${months[currentMonthIdx]}`;
                    document.getElementById('day-input').value = data.text;
                };
                grid.appendChild(div);
            }
        }

        window.saveDayData = async () => {
            currentMonthData[currentDay] = { text: document.getElementById('day-input').value, author: user };
            await setDoc(doc(db, "data", `month_${currentMonthIdx}`), currentMonthData);
            document.getElementById('editor-section').classList.add('hidden');
            window.pushNotify("Успех", "Запись сохранена");
        };

        window.showYear = () => document.getElementById('month-page').classList.add('hidden');

        // --- КАНВАС КЛЮЧА ---
        (function initPattern() {
            const canvas = document.getElementById('pattern-canvas');
            const ctx = canvas.getContext('2d');
            let drawing = false;
            const dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});

            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (patternResult.length >= 2) {
                    ctx.beginPath(); ctx.lineWidth = 4; ctx.strokeStyle = "rgba(9,132,227,0.3)";
                    for(let k=0; k < patternResult.length; k+=2) {
                        const d = dots.find(dot => dot.id === patternResult.substring(k, k+2));
                        if (k === 0) ctx.moveTo(d.x, d.y); else ctx.lineTo(d.x, d.y);
                    }
                    ctx.stroke();
                }
                dots.forEach(d => {
                    ctx.beginPath(); ctx.arc(d.x, d.y, 10, 0, Math.PI*2);
                    ctx.fillStyle = d.hit ? "#0984e3" : "#dfe6e9"; ctx.fill();
                });
            };

            canvas.onmousedown = canvas.ontouchstart = (e) => { patternResult = ""; dots.forEach(d=>d.hit=false); drawing = true; };
            window.onmouseup = window.ontouchend = () => { if(drawing && user.toLowerCase() !== 'admin') window.handleAuthSubmit(); drawing = false; };
            canvas.onmousemove = canvas.ontouchmove = (e) => {
                if(!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
                const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
                dots.forEach(d => {
                    if (Math.sqrt((x-d.x)**2 + (y-d.y)**2) < 20 && !d.hit) { d.hit = true; patternResult += d.id; draw(); }
                });
            };
            draw();
        })();
    </script>
</body>
</html>
