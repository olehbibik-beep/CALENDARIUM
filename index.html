<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общий Облачный Календарь 2026</title>
    <style>
    /* ... (предыдущие стили оставляем) ... */

    /* Новый дизайн страницы входа */
    #auth-page {
        display: flex;
        height: 100vh;
        width: 100vw;
        padding: 0;
        margin: 0;
        position: fixed;
        top: 0; left: 0;
        background: white;
        z-index: 1000;
    }

    .auth-left {
        flex: 1;
        background: #ced4da; /* Серый цвет */
        background-image: url('https://images.unsplash.com/photo-1506784365847-bbad939e9335?q=80&w=2068&auto=format&fit=crop'); /* Пример картинки */
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px;
        background: white;
    }

    .auth-form-card {
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    /* Стили для графического ключа */
    #pattern-canvas {
        background: #f8f9fa;
        border-radius: 15px;
        cursor: crosshair;
        margin: 20px 0;
        touch-action: none; /* Важно для мобилок */
    }

    .toggle-auth {
        color: var(--accent);
        cursor: pointer;
        font-size: 14px;
        text-decoration: underline;
        margin-top: 15px;
    }
</style>

<div id="auth-page">
    <div class="auth-left">
        <h1 style="color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); font-size: 3rem;">Plan 2026</h1>
    </div>
    <div class="auth-right">
        <div class="auth-form-card">
            <h2>Добро пожаловать</h2>
            <input type="text" id="username" placeholder="Ваше имя">

            <div id="password-mode">
                <input type="password" id="pass" placeholder="Пароль">
            </div>

            <div id="pattern-mode" class="hidden">
                <p>Нарисуйте ключ на точках:</p>
                <canvas id="pattern-canvas" width="280" height="280"></canvas>
            </div>

            <button class="btn" onclick="handleAuthSubmit()" style="width: 100%; margin-top: 20px;">Войти</button>
            <div class="toggle-auth" onclick="toggleAuthMode()">Использовать графический ключ</div>
        </div>
    </div>
</div>
</head>
<body>

    <div id="auth-page" class="container" style="text-align: center; margin-top: 15vh;">
        <div style="background: white; padding: 40px; border-radius: 20px; display: inline-block; width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);">
            <h2 style="margin-bottom: 25px;">📅 Общий Календарь</h2>
            <input type="text" id="username" placeholder="Ваше имя" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            <button class="btn" onclick="window.login()" style="width: 100%;">Войти в систему</button>
        </div>
    </div>

    <div id="year-page" class="hidden container">
        <header>
            <h1 style="margin:0">2026</h1>
            <button class="btn" style="background:#636e72" onclick="location.reload()">Выйти</button>
        </header>
        <div class="year-grid" id="year-grid"></div>
    </div>

    <div id="month-page" class="hidden container">
        <header>
            <button class="btn" style="background:#636e72" onclick="showYear()">← К году</button>
            <h1 id="month-title" style="margin:0"></h1>
            <div style="width:80px"></div>
        </header>
        <div class="month-layout">
            <div class="calendar-main"><div class="days-grid" id="days-grid"></div></div>
            <div class="notes-sidebar">
                <h3 style="margin-top:0; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">🔔 Активность</h3>
                <div id="sidebar-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0",
            measurementId: "G-D2G4YVN8V4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const icons = ["❄️","🌨️","🌱","☔","🌸","☀️","🌊","🍎","🍂","🎃","☁️","🎄"];
        let user = "";

        window.login = () => {
            user = document.getElementById('username').value.trim();
            if(!user) return alert("Пожалуйста, введите ваше имя!");
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            renderYear();
        };

        function renderYear() {
            const grid = document.getElementById('year-grid');
            grid.innerHTML = '';
            months.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'month-tile';
                div.innerHTML = `<span>${icons[i]}</span><h3>${m}</h3>`;
                div.onclick = () => openMonth(i);
                grid.appendChild(div);
            });
        }

        function openMonth(mIdx) {
            document.getElementById('year-page').classList.add('hidden');
            document.getElementById('month-page').classList.remove('hidden');
            document.getElementById('month-title').innerText = months[mIdx];
            
            // Подписка на обновления облака
            onSnapshot(doc(db, "data", `month_${mIdx}`), (docSnap) => {
                const monthData = docSnap.exists() ? docSnap.data() : {};
                renderDays(mIdx, monthData);
            });
        }

        function renderDays(mIdx, data) {
            const grid = document.getElementById('days-grid');
            const sidebar = document.getElementById('sidebar-list');
            grid.innerHTML = ''; sidebar.innerHTML = '';

            for (let d = 1; d <= 31; d++) {
                const dayData = data[d] || { text: "", author: "" };
                const canEdit = dayData.author === "" || dayData.author === user;

                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = `
                    <div class="day-num">${d}</div>
                    <textarea id="input-${d}" ${canEdit ? "" : "disabled"} placeholder="${canEdit ? "..." : "Занято"}">${dayData.text}</textarea>
                `;
                grid.appendChild(card);

                if(dayData.text) {
                    sidebar.innerHTML += `
                        <div class="sidebar-item">
                            <b>${d} ${months[mIdx]}</b>
                            ${dayData.text}
                            <div class="author-tag">👤 ${dayData.author}</div>
                        </div>`;
                }

                const area = card.querySelector('textarea');
                area.onchange = async () => {
                    data[d] = { text: area.value, author: area.value ? user : "" };
                    await setDoc(doc(db, "data", `month_${mIdx}`), data);
                };
            }
        }

        window.showYear = () => {
            document.getElementById('month-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
        };
    </script>
</body>
</html>
