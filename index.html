<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan 2026 | Cloud Calendar</title>
    <style>
        :root { 
            --primary: #2d3436; 
            --accent: #0984e3; 
            --bg-sidebar: #bdc3c7; 
            --admin-red: #d63031; 
            --pink-line: #fd79a8; 
            --orange-notif: #f39c12;
        }
        
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: white; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- СТРАНИЦА ВХОДА --- */
        #auth-page { 
            display: flex; height: 100vh; width: 100vw; background: white; 
            position: fixed; top: 0; left: 0; z-index: 2000; 
            flex-direction: column; align-items: center; justify-content: flex-start; 
            padding-top: 5vh; box-sizing: border-box; 
        }
        #auth-username { 
            width: 260px; padding: 12px; margin-bottom: 10px; border-radius: 20px; 
            border: 1px solid #ddd; background: #f8f9fa; font-size: 1rem; text-align: center; outline: none; 
        }
        #pattern-canvas { background: transparent; cursor: crosshair; touch-action: none; margin-bottom: 10px; }

        /* --- ГЛАВНЫЙ ИНТЕРФЕЙС --- */
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { 
            width: 280px; background: var(--bg-sidebar); 
            display: flex; flex-direction: column; padding: 30px 20px; 
            box-sizing: border-box; border-right: 1px solid #95a5a6; 
        }
        .user-profile { display: flex; align-items: center; gap: 12px; margin-bottom: auto; }
        .user-avatar { 
            width: 45px; height: 45px; background: var(--accent); color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 1.2rem; text-transform: uppercase; 
        }
        .user-tag { color: #57606f; font-weight: 600; font-size: 0.9rem; }
        .sidebar-controls { display: flex; gap: 8px; }

        .main-view { flex: 1; padding: 40px 60px; display: flex; flex-direction: column; background: white; overflow-y: auto; }
        .main-view h1 { font-size: 4rem; margin: 0 0 30px 0; font-weight: 300; color: #2d3436; }

        .year-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px; flex-grow: 1; 
        }
        .month-card { 
            background: white; border: 1px solid #eee; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; position: relative; min-height: 120px;
        }
        .month-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .month-card.current-month { border: 2.5px solid var(--accent); background: #f0f7ff; }
        
        /* --- ОРАНЖЕВАЯ ШТОРКА --- */
        .notifications-sidebar {
            width: 320px; background: var(--orange-notif); height: 100vh; 
            position: fixed; right: 0; top: 0; z-index: 3000; /* Выше всего */
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            padding: 25px; box-sizing: border-box; color: white;
            transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .notifications-sidebar.active { transform: translateX(0); }
        
        .notif-item { 
            background: rgba(255,255,255,0.2); border-radius: 12px; 
            padding: 15px; margin-bottom: 15px; position: relative; 
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .notif-badge {
            position: absolute; top: -8px; left: -8px; background: #d63031;
            color: white; width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;
        }

        .btn { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-exit { background: #636e72; color: white; }
        
        #month-page { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 1000; padding: 40px; box-sizing: border-box; overflow-y: auto;
        }
        #days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    </style>
</head>
<body>

    <div id="side-panel" class="notifications-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 id="panel-title" style="margin:0">Уведомления</h3>
            <button onclick="window.togglePanel(false)" style="background:none; border:none; color:white; font-size:28px; cursor:pointer;">&times;</button>
        </div>
        <div id="panel-content">
            </div>
    </div>

    <div id="auth-page">
        <h2 style="font-weight: 300;">Cloud Calendar</h2>
        <input type="text" id="auth-username" placeholder="Ваше имя" oninput="window.checkAdmin(this.value)">
        <canvas id="pattern-canvas" width="260" height="260"></canvas>
        <div id="admin-secret-wrap" class="hidden">
            <input type="password" id="admin-pass-input" placeholder="Пароль администратора" style="width: 260px; padding: 12px; border-radius: 20px; border: 1px solid #ddd; margin-bottom: 10px; text-align: center;">
            <button class="btn" style="width: 260px; background: var(--admin-red); color:white;" onclick="window.handleAuthSubmit()">Войти как админ</button>
        </div>
        <p style="font-size: 11px; color: #636e72;">Нарисуйте ключ для входа или регистрации</p>
    </div>

    <div id="year-page" class="hidden">
        <div class="app-container">
            <aside class="sidebar">
                <div class="user-profile">
                    <div class="user-avatar" id="u-avatar">?</div>
                    <div class="user-tag" id="sidebar-user-name">USER</div>
                </div>
                <div class="sidebar-controls">
                    <button class="btn btn-exit" onclick="location.reload()">Выйти</button>
                    <button id="admin-btn-side" class="btn hidden" style="background:var(--admin-red); color:white;" onclick="window.loadAdminRequests()">⚙️</button>
                </div>
            </aside>
            <main class="main-view">
                <h1>2026</h1>
                <div class="year-grid" id="year-grid"></div>
            </main>
        </div>
    </div>

    <div id="month-page" class="hidden">
        <button class="btn btn-exit" onclick="window.showYear()">← Назад</button>
        <h2 id="month-title" style="font-size: 3rem; font-weight: 300;"></h2>
        <div id="days-grid"></div>
        <div id="editor-section" class="hidden" style="margin-top:20px; background:#f8f9fa; padding:20px; border-radius:15px;">
            <h4 id="selected-day-label"></h4>
            <textarea id="day-input" style="width:100%; height:100px; padding:10px; border-radius:10px; border:1px solid #ddd;"></textarea>
            <button class="btn" style="background:var(--accent); color:white; margin-top:10px;" onclick="window.saveDayData()">Сохранить</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        let user = "";
        let patternResult = "";
        let currentMonthIdx = null;
        let currentDay = null;
        let currentMonthData = {};

        // --- СИСТЕМА УВЕДОМЛЕНИЙ В ШТОРКЕ ---
        window.togglePanel = (show) => {
            document.getElementById('side-panel').classList.toggle('active', show);
        };

        window.pushNotify = (title, text, type = 'info') => {
            const container = document.getElementById('panel-content');
            document.getElementById('panel-title').innerText = "Система";
            
            const item = document.createElement('div');
            item.className = 'notif-item';
            item.innerHTML = `
                <div class="notif-badge">${type === 'err' ? '×' : '!'}</div>
                <b>${title}</b>
                <p style="margin:5px 0; font-size:13px;">${text}</p>
            `;
            container.prepend(item); // Новые сверху
            window.togglePanel(true);
            
            // Авто-закрытие через 4 секунды, если это просто инфо
            if(type === 'info') setTimeout(() => item.style.opacity = '0.5', 3500);
        };

        window.checkAdmin = (val) => {
            const secretBox = document.getElementById('admin-secret-wrap');
            secretBox.classList.toggle('hidden', val.toLowerCase() !== 'admin');
        };

        window.handleAuthSubmit = async () => {
            user = document.getElementById('auth-username').value.trim().toLowerCase();
            const textPass = document.getElementById('admin-pass-input').value;
            let finalSecret = textPass || patternResult;
            
            if(!user) { window.pushNotify("Ошибка", "Введите ваше имя", "err"); return; }
            if(!finalSecret) { window.pushNotify("Ключ", "Нарисуйте графический ключ", "err"); return; }

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                if (userSnap.data().password === finalSecret) loginSuccess();
                else window.pushNotify("Доступ запрещен", "Неверный графический ключ", "err");
            } else {
                // Если юзера нет, предлагаем регу через шторку
                const container = document.getElementById('panel-content');
                container.innerHTML = ''; // Чистим
                window.pushNotify("Новый пользователь", `Имя "${user}" не найдено. Хотите отправить запрос на регистрацию?`);
                
                const btn = document.createElement('button');
                btn.className = "btn";
                btn.style = "width:100%; margin-top:10px; background:white; color:var(--orange-notif);";
                btn.innerText = "Отправить запрос";
                btn.onclick = async () => {
                    await setDoc(doc(db, "requests", user), { password: finalSecret, date: new Date().toISOString() });
                    container.innerHTML = '<p>Запрос отправлен! Ожидайте подтверждения админом.</p>';
                };
                container.appendChild(btn);
            }
        };

        function loginSuccess() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            document.getElementById('sidebar-user-name').innerText = user.toUpperCase();
            document.getElementById('u-avatar').innerText = user.charAt(0);
            if (user === 'admin') document.getElementById('admin-btn-side').classList.remove('hidden');
            window.togglePanel(false);
            renderYearGrid();
        }

        // --- ФУНКЦИИ АДМИНА ---
        window.loadAdminRequests = async () => {
            const list = document.getElementById('panel-content');
            document.getElementById('panel-title').innerText = "Запросы";
            list.innerHTML = "Загрузка...";
            window.togglePanel(true);
            
            const snap = await getDocs(collection(db, "requests"));
            list.innerHTML = snap.empty ? "Новых заявок нет" : "";
            
            snap.forEach(d => {
                const item = document.createElement('div');
                item.className = 'notif-item';
                item.innerHTML = `
                    <b>Запрос: ${d.id}</b>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button class="btn" style="background:#2ecc71; color:white; flex:1" onclick="window.approveUser('${d.id}', '${d.data().password}')">Да</button>
                        <button class="btn" style="background:#d63031; color:white; flex:1" onclick="window.rejectUser('${d.id}')">Нет</button>
                    </div>
                `;
                list.appendChild(item);
            });
        };

        window.approveUser = async (uId, uPass) => {
            await setDoc(doc(db, "users", uId), { password: uPass });
            await deleteDoc(doc(db, "requests", uId));
            window.loadAdminRequests();
        };

        window.rejectUser = async (uId) => {
            await deleteDoc(doc(db, "requests", uId));
            window.loadAdminRequests();
        };

        // --- ОСТАЛЬНАЯ ЛОГИКА (КАЛЕНДАРЬ) ---
        async function renderYearGrid() {
            const grid = document.getElementById('year-grid');
            grid.innerHTML = '';
            for(let i=0; i<months.length; i++) {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<h3>${months[i]}</h3>`;
                card.onclick = () => window.openMonth(i);
                grid.appendChild(card);
            }
        }

        window.openMonth = (mIdx) => {
            currentMonthIdx = mIdx;
            document.getElementById('month-page').classList.remove('hidden');
            document.getElementById('month-title').innerText = months[mIdx];
            onSnapshot(doc(db, "data", `month_${mIdx}`), (snap) => {
                currentMonthData = snap.exists() ? snap.data() : {};
                renderDays();
            });
        };

        function renderDays() {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            const daysInMonth = new Date(2026, currentMonthIdx + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const dayData = currentMonthData[d] || { text: "" };
                const div = document.createElement('div');
                div.style = `background:#f8f9fa; border:1px solid #eee; padding:10px; border-radius:10px; cursor:pointer; min-height:60px;`;
                div.innerHTML = `<b>${d}</b><div style="font-size:10px;">${dayData.text.substring(0,15)}</div>`;
                div.onclick = () => {
                    currentDay = d;
                    document.getElementById('editor-section').classList.remove('hidden');
                    document.getElementById('selected-day-label').innerText = `${d} ${months[currentMonthIdx]}`;
                    document.getElementById('day-input').value = dayData.text;
                };
                grid.appendChild(div);
            }
        }

        window.saveDayData = async () => {
            currentMonthData[currentDay] = { text: document.getElementById('day-input').value, author: user };
            await setDoc(doc(db, "data", `month_${currentMonthIdx}`), currentMonthData);
            document.getElementById('editor-section').classList.add('hidden');
            window.pushNotify("Успех", "Данные сохранены в облаке");
        };

        window.showYear = () => document.getElementById('month-page').classList.add('hidden');

        // Графический ключ
        (function initPattern() {
            const canvas = document.getElementById('pattern-canvas');
            const ctx = canvas.getContext('2d');
            let drawing = false;
            const dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});

            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dots.forEach(d => {
                    ctx.beginPath(); ctx.arc(d.x, d.y, 12, 0, Math.PI*2);
                    ctx.fillStyle = d.hit ? "#0984e3" : "#bdc3c7"; ctx.fill();
                });
            };

            canvas.onmousedown = canvas.ontouchstart = (e) => { 
                patternResult = ""; dots.forEach(d=>d.hit=false); drawing = true; 
            };
            window.onmouseup = window.ontouchend = () => { 
                if(!drawing) return;
                drawing = false; 
                if(user !== 'admin') window.handleAuthSubmit();
            };
            canvas.onmousemove = canvas.ontouchmove = (e) => {
                if(!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
                const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
                dots.forEach(d => {
                    if (Math.sqrt((x-d.x)**2 + (y-d.y)**2) < 20 && !d.hit) { d.hit = true; patternResult += d.id; draw(); }
                });
            };
            draw();
        })();
    </script>
</body>
</html>
