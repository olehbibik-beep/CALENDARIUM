<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общий Облачный Календарь 2026</title>
    <style>
        :root { --primary: #2d3436; --accent: #0984e3; --bg: #dfe6e9; --card: #ffffff; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Год: Квадратные плитки */
        .year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .month-tile { 
            background: var(--card); aspect-ratio: 1/1; border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s; border: 1px solid #eee; text-align: center;
        }
        .month-tile:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .month-tile span { font-size: 2.5rem; margin-bottom: 10px; }
        .month-tile h3 { margin: 0; font-size: 1.1rem; color: var(--primary); }

        /* Месяц и Сайдбар */
        .month-layout { display: flex; gap: 20px; margin-top: 20px; }
        .calendar-main { flex: 3; }
        .notes-sidebar { flex: 1.2; background: var(--card); padding: 20px; border-radius: 15px; height: 75vh; overflow-y: auto; position: sticky; top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-card { background: var(--card); padding: 8px; border-radius: 8px; min-height: 90px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .day-num { font-weight: bold; margin-bottom: 5px; color: #636e72; }
        
        textarea { width: 100%; flex-grow: 1; border: none; background: #f1f2f6; border-radius: 4px; resize: none; font-size: 12px; padding: 5px; box-sizing: border-box; }
        textarea:disabled { opacity: 0.5; cursor: not-allowed; background: #dfe6e9; }
        
        /* Список активности справа */
        .sidebar-item { border-bottom: 1px solid #f1f2f6; padding: 12px 0; font-size: 0.9rem; line-height: 1.4; }
        .sidebar-item b { color: var(--accent); display: block; margin-bottom: 2px; }
        .author-tag { font-size: 11px; color: #b2bec3; font-weight: bold; text-transform: uppercase; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-page" class="container" style="text-align: center; margin-top: 15vh;">
        <div style="background: white; padding: 40px; border-radius: 20px; display: inline-block; width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);">
            <h2 style="margin-bottom: 25px;">📅 Общий Календарь</h2>
            <input type="text" id="username" placeholder="Ваше имя" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            <button class="btn" onclick="window.login()" style="width: 100%;">Войти в систему</button>
        </div>
    </div>

    <div id="year-page" class="hidden container">
        <header>
            <h1 style="margin:0">2026</h1>
            <button class="btn" style="background:#636e72" onclick="location.reload()">Выйти</button>
        </header>
        <div class="year-grid" id="year-grid"></div>
    </div>

    <div id="month-page" class="hidden container">
        <header>
            <button class="btn" style="background:#636e72" onclick="showYear()">← К году</button>
            <h1 id="month-title" style="margin:0"></h1>
            <div style="width:80px"></div>
        </header>
        <div class="month-layout">
            <div class="calendar-main"><div class="days-grid" id="days-grid"></div></div>
            <div class="notes-sidebar">
                <h3 style="margin-top:0; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">🔔 Активность</h3>
                <div id="sidebar-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0",
            measurementId: "G-D2G4YVN8V4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const icons = ["❄️","🌨️","🌱","☔","🌸","☀️","🌊","🍎","🍂","🎃","☁️","🎄"];
        let user = "";

        window.login = () => {
            user = document.getElementById('username').value.trim();
            if(!user) return alert("Пожалуйста, введите ваше имя!");
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            renderYear();
        };

        function renderYear() {
            const grid = document.getElementById('year-grid');
            grid.innerHTML = '';
            months.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'month-tile';
                div.innerHTML = `<span>${icons[i]}</span><h3>${m}</h3>`;
                div.onclick = () => openMonth(i);
                grid.appendChild(div);
            });
        }

        function openMonth(mIdx) {
            document.getElementById('year-page').classList.add('hidden');
            document.getElementById('month-page').classList.remove('hidden');
            document.getElementById('month-title').innerText = months[mIdx];
            
            // Подписка на обновления облака
            onSnapshot(doc(db, "data", `month_${mIdx}`), (docSnap) => {
                const monthData = docSnap.exists() ? docSnap.data() : {};
                renderDays(mIdx, monthData);
            });
        }

        function renderDays(mIdx, data) {
            const grid = document.getElementById('days-grid');
            const sidebar = document.getElementById('sidebar-list');
            grid.innerHTML = ''; sidebar.innerHTML = '';

            for (let d = 1; d <= 31; d++) {
                const dayData = data[d] || { text: "", author: "" };
                const canEdit = dayData.author === "" || dayData.author === user;

                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = `
                    <div class="day-num">${d}</div>
                    <textarea id="input-${d}" ${canEdit ? "" : "disabled"} placeholder="${canEdit ? "..." : "Занято"}">${dayData.text}</textarea>
                `;
                grid.appendChild(card);

                if(dayData.text) {
                    sidebar.innerHTML += `
                        <div class="sidebar-item">
                            <b>${d} ${months[mIdx]}</b>
                            ${dayData.text}
                            <div class="author-tag">👤 ${dayData.author}</div>
                        </div>`;
                }

                const area = card.querySelector('textarea');
                area.onchange = async () => {
                    data[d] = { text: area.value, author: area.value ? user : "" };
                    await setDoc(doc(db, "data", `month_${mIdx}`), data);
                };
            }
        }

        window.showYear = () => {
            document.getElementById('month-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
        };
    </script>
</body>
</html>
