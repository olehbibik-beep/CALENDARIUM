<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Secure Terminal</title>
    <style>
        :root { 
            --accent: #09e0e3; 
            --bg: #3e3e3e; 
            --orange: #f39c12; 
            --title-color: #ffffff;
        }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; flex-direction: column;
            position: relative;
        }

        /* --- КАРТОЧКА АВТОРИЗАЦИИ --- */
        .auth-card { 
            background: #1a1d1f; padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; 
            width: 90%; max-width: 360px; 
            z-index: 10; position: relative; box-sizing: border-box;
        }
        
        .auth-header h1 {
            margin: 0 0 20px 0; font-size: 1.3rem; letter-spacing: 2px;
            color: var(--title-color); font-weight: 800; text-transform: uppercase;
        }

        input { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 6px; 
            border: none; background: #333; color: #fff; 
            text-align: center; font-size: 1rem; outline: none; box-sizing: border-box; 
        }
        
        canvas { 
            background: transparent; border-radius: 8px; 
            cursor: crosshair; max-width: 100%; height: auto; touch-action: none;
        }
        canvas.disabled { opacity: 0.1; pointer-events: none; }
        .hidden { display: none; }

        /* --- КНОПКИ С ХОВЕРОМ --- */
        .orange-btn, .admin-btn { 
            width: 100%; padding: 14px; border-radius: 6px; border: none; 
            font-weight: 900; cursor: pointer; font-size: 0.9rem; 
            text-transform: uppercase; transition: all 0.3s ease;
        }

        .orange-btn { background: white; color: var(--orange); }
        .orange-btn:hover { background: var(--orange); color: white; transform: translateY(-2px); }

        .admin-btn { background: var(--accent); color: #1a1d1f; margin-top: 10px; }
        .admin-btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(9, 224, 227, 0.3); }

        /* --- ШТОРКА И КРЕСТИКИ --- */
        #notif-sidebar { 
            position: absolute; top: 50%; left: 50%; width: 300px; height: 45%;
            background: var(--orange); color: white; z-index: 5; border-radius: 8px;
            padding: 30px; box-sizing: border-box; transform: translate(-50%, -50%); 
            opacity: 0; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; display: flex; flex-direction: column;
        }

        #notif-sidebar.active { transform: translate(calc(-50% + 280px), -50%); opacity: 1; pointer-events: auto; }

        .close-x, .close-info { 
            cursor: pointer; font-size: 32px; color: #ffffff; /* Белый по умолчанию */
            transition: color 0.3s ease, transform 0.2s ease; line-height: 1;
        }
        .close-x:hover, .close-info:hover { color: var(--accent); transform: scale(1.2); }

        /* --- ИНФО МОДАЛКА --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            z-index: 99999; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(8px);
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .info-modal {
            background: #1a1d1f; width: 90%; max-width: 550px; border-radius: 12px;
            overflow: hidden; color: #eee; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .info-modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #25292c; }
        .info-modal-content { padding: 25px; }
        
        .info-flex { display: flex; gap: 20px; align-items: center; }
        .info-text-side { flex: 1; }
        .info-img-side { flex: 1.2; }
        .info-img-side img { width: 100%; border-radius: 8px; filter: grayscale(0.2); }

        .changelog-box { background: #25292c; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .changelog-box h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 0.9rem; }
        .changelog-box ul { margin: 0; padding-left: 15px; font-size: 0.8rem; color: #bbb; }

        /* Футер */
        .inner-footer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 360px; display: flex; justify-content: space-between;
        }
        .footer-text { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 850px) {
            #notif-sidebar { position: fixed; top: 20px; left: 10px; right: 10px; width: auto; height: auto; transform: translateY(-150%); }
            #notif-sidebar.active { transform: translateY(0); }
            .info-flex { flex-direction: column-reverse; }
        }
    </style>
</head>
<body>

    <div id="notif-sidebar">
        <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;">
            <span style="font-size: 10px; letter-spacing: 2px;">SYSTEM LOG</span>
            <span class="close-x" onclick="closeLog()">×</span>
        </div>
        <div id="log-container"></div>
    </div>
    
    <div class="auth-card">
        <div class="auth-header"><h1>CALENDARIUM</h1></div>
        <input type="text" id="username" oninput="checkName(this.value)" placeholder="Ваше имя">
        <canvas id="canvas" width="260" height="260" class="disabled"></canvas>
        <div id="admin-box" class="hidden">
            <input type="password" id="admin-password" placeholder="Пароль">
            <button class="admin-btn" onclick="handleLogin()">Войти</button>
        </div>
        <p id="status" style="font-size: 10px; color: var(--accent); margin-top: 15px; text-transform: uppercase; font-weight: bold;">Введите имя</p>
    </div>

    <div id="info-modal-overlay" class="modal-overlay" onclick="closeInfoModal()">
        <div class="info-modal" onclick="event.stopPropagation()">
            <div class="info-modal-header">
                <h2 style="margin:0; font-size: 1rem; font-weight: 400;">ОБНОВЛЕНИЕ v2.6</h2>
                <span class="close-info" onclick="closeInfoModal()">×</span>
            </div>
            <div class="info-modal-content">
                <div class="info-flex">
                    <div class="info-text-side">
                        <div class="changelog-box">
                            <h3>ЧТО НОВОГО:</h3>
                            <ul>
                                <li>Акцентный цвет графики.</li>
                                <li>Улучшенный отклик кнопок.</li>
                                <li>Исправлена логика шторки.</li>
                            </ul>
                        </div>
                    </div>
                    <div class="info-img-side"><img src="Set1.png" alt="Preview"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="inner-footer">
        <span style="color: #888; font-size: 10px; cursor: pointer; border-bottom: 1px solid #444;" onclick="openInfoModal()">СПРАВКА</span>
        <div class="footer-text">GROUP 5 • 2026</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const sidebar = document.getElementById('notif-sidebar');
        let dots = [], pattern = "", drawing = false;

        // Инициализация
        window.onload = () => setTimeout(() => document.getElementById('info-modal-overlay').classList.add('active'), 500);

        window.openInfoModal = () => document.getElementById('info-modal-overlay').classList.add('active');
        window.closeInfoModal = () => document.getElementById('info-modal-overlay').classList.remove('active');
        window.closeLog = () => { sidebar.classList.remove('active'); resetCanvas(); };

        function resetCanvas() { pattern = ""; initDots(); draw(); }

        window.checkName = (val) => {
            const name = val.trim().toLowerCase();
            const isOk = name.length > 0;
            const isAdmin = name === 'admin';
            
            document.getElementById('canvas').classList.toggle('hidden', isAdmin);
            document.getElementById('admin-box').classList.toggle('hidden', !isAdmin);
            canvas.classList.toggle('disabled', !isOk);
            document.getElementById('status').innerText = isAdmin ? "ADMIN MODE" : (isOk ? "РИСУЙТЕ КЛЮЧ" : "ВВЕДИТЕ ИМЯ");
        };

        function initDots() {
            dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});
        }

        function draw() {
            ctx.clearRect(0, 0, 260, 260);
            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            
            if(pattern.length > 0) {
                ctx.beginPath(); ctx.strokeStyle = accentColor; ctx.lineWidth = 6; ctx.lineCap="round"; ctx.lineJoin="round";
                for(let k=0; k < pattern.length; k+=2) {
                    let d = dots.find(dot => dot.id === pattern.substring(k, k+2));
                    k === 0 ? ctx.moveTo(d.x, d.y) : ctx.lineTo(d.x, d.y);
                }
                ctx.stroke();
            }
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, 10, 0, Math.PI*2);
                ctx.fillStyle = d.hit ? accentColor : "#333"; ctx.fill();
            });
        }

        const startDraw = () => { 
            if (canvas.classList.contains('disabled')) return;
            sidebar.classList.remove('active'); // Прячем шторку при новом вводе
            pattern = ""; initDots(); drawing = true; draw(); 
        };

        const moveDraw = (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) * (canvas.width / rect.width);
            const y = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) * (canvas.height / rect.height);

            dots.forEach(d => {
                if(Math.sqrt((x - d.x)**2 + (y - d.y)**2) < 20 && !d.hit) { 
                    d.hit = true; pattern += d.id; draw(); 
                }
            });
        };

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(); });
        window.addEventListener('mousemove', moveDraw);
        window.addEventListener('touchmove', moveDraw);
        window.addEventListener('mouseup', () => { if(drawing && pattern.length >= 4) handleLogin(); drawing = false; });

        window.handleLogin = async () => {
            const name = document.getElementById('username').value.trim().toLowerCase();
            const secret = (name === 'admin') ? document.getElementById('admin-password').value : pattern;
            if(!secret) return;

            try {
                const snap = await getDoc(doc(db, "users", name));
                if (snap.exists() && snap.data().password === secret) {
                    location.href = 'calendar.html';
                } else if (name !== 'admin') {
                    showRequestUI(name);
                } else {
                    showLog("ОШИБКА", "НЕВЕРНЫЙ ПАРОЛЬ");
                }
            } catch (e) { console.error(e); }
        };

        function showRequestUI(name) {
            document.getElementById('log-container').innerHTML = `
                <p style="font-size:0.8rem; margin-bottom:15px;">ПРОФИЛЬ НЕ НАЙДЕН. ОТПРАВИТЬ ЗАЯВКУ?</p>
                <button class="orange-btn" id="send-req">ОТПРАВИТЬ</button>
            `;
            sidebar.classList.add('active');
            document.getElementById('send-req').onclick = async () => {
                await setDoc(doc(db, "requests", name), { password: pattern, date: new Date().toISOString() });
                showLog("УСПЕХ", "ЗАЯВКА ОТПРАВЛЕНА");
            };
        }

        function showLog(title, text) {
            document.getElementById('log-container').innerHTML = `<h1 style="font-size:1rem; color:#fff;">${text}</h1>`;
            sidebar.classList.add('active');
        }

        initDots(); draw();
    </script>
</body>
</html>
