<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | Plan 2026</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: white; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        #auth-page { display: flex; flex-direction: column; align-items: center; padding-top: 10vh; }
        #auth-username { width: 260px; padding: 12px; margin-bottom: 10px; border-radius: 20px; border: 1px solid #ddd; background: #f8f9fa; text-align: center; outline: none; }
        #pattern-canvas { background: #fafafa; cursor: crosshair; touch-action: none; margin-bottom: 10px; border-radius: 15px; border: 1px solid #eee; }
        .hidden { display: none !important; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #636e72; color: white; }
    </style>
</head>
<body>
    <div id="auth-page">
        <h2>Добро пожаловать</h2>
        <input type="text" id="auth-username" placeholder="Ваше имя" oninput="checkAdmin(this.value)">
        <canvas id="pattern-canvas" width="260" height="260"></canvas>
        <div id="admin-secret-wrap" class="hidden">
            <input type="password" id="admin-pass-input" placeholder="Пароль" style="margin-bottom:10px; padding:8px; border-radius:10px; border:1px solid #ddd;"><br>
            <button class="btn" onclick="handleAuthSubmit()">Войти как админ</button>
        </div>
        <p id="auth-status" style="font-size: 11px; color: #636e72;">Нарисуйте графический ключ</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* ТВОЙ КОНФИГ */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let patternResult = "";
        const canvas = document.getElementById('pattern-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        let drawing = false;

        window.checkAdmin = (val) => {
            const wrap = document.getElementById('admin-secret-wrap');
            val.toLowerCase() === 'admin' ? wrap.classList.remove('hidden') : wrap.classList.add('hidden');
        };

        function initDots() {
            dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (patternResult.length > 0) {
                ctx.beginPath(); ctx.strokeStyle = "#0984e3"; ctx.lineWidth = 8; ctx.lineJoin = "round";
                for(let k=0; k < patternResult.length; k+=2) {
                    const d = dots.find(dot => dot.id === patternResult.substring(k, k+2));
                    k === 0 ? ctx.moveTo(d.x, d.y) : ctx.lineTo(d.x, d.y);
                }
                ctx.stroke();
            }
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, 14, 0, Math.PI*2);
                ctx.fillStyle = d.hit ? "#0984e3" : "#bdc3c7"; ctx.fill();
            });
        }

        canvas.onmousedown = canvas.ontouchstart = (e) => { e.preventDefault(); patternResult = ""; initDots(); drawing = true; };
        window.onmouseup = window.ontouchend = () => {
            drawing = false;
            if(patternResult.length >= 4 && document.getElementById('auth-username').value.toLowerCase() !== 'admin') window.handleAuthSubmit();
        };
        canvas.onmousemove = canvas.ontouchmove = (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
            dots.forEach(d => {
                if (Math.sqrt((x-d.x)**2 + (y-d.y)**2) < 25 && !d.hit) { d.hit = true; patternResult += d.id; draw(); }
            });
        };

        window.handleAuthSubmit = async () => {
            const name = document.getElementById('auth-username').value.trim().toLowerCase();
            const pass = document.getElementById('admin-pass-input').value || patternResult;
            if(!name || !pass) return;

            const userSnap = await getDoc(doc(db, "users", name));
            if (userSnap.exists() && userSnap.data().password === pass) {
                localStorage.setItem('currentUser', name);
                window.location.href = 'calendar.html'; // Переход
            } else {
                alert("Ошибка доступа");
                patternResult = ""; initDots(); draw();
            }
        };

        initDots(); draw();
    </script>
</body>
</html>
