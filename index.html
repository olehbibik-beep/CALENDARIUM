<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Plan 2026</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Дополнение к твоему style.css для блокировки */
        #pattern-canvas {
            transition: opacity 0.3s ease;
        }
        #pattern-canvas.disabled {
            opacity: 0.15; /* Делаем его бледным */
            pointer-events: none; /* Запрещаем любые клики */
            cursor: not-allowed;
        }
    </style>
</head>
<body class="auth-screen">
    
    <div id="auth-page">
        <h2 id="welcome-text">Добро пожаловать</h2>
        
        <input type="text" id="auth-username" placeholder="Ваше имя" oninput="handleInput(this.value)">
        
        <canvas id="pattern-canvas" width="260" height="260" class="disabled"></canvas>
        
        <div id="admin-secret-wrap" class="hidden">
            <input type="password" id="admin-pass-input" placeholder="Пароль для админа" 
                   style="margin-bottom:10px; padding:12px; border-radius:20px; border:1px solid #ddd; width:260px; text-align:center;">
            <br>
            <button class="btn" style="background: var(--accent); color:white; width:260px;" onclick="handleAuthSubmit()">Войти как админ</button>
        </div>

        <p id="auth-status" style="font-size: 11px; color: #636e72; margin-top: 15px;">Введите имя, чтобы начать</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let patternResult = "";
        const canvas = document.getElementById('pattern-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        let drawing = false;

        // ГЛАВНАЯ ФУНКЦИЯ ПРОВЕРКИ ВВОДА
        window.handleInput = (val) => {
            const name = val.trim();
            const status = document.getElementById('auth-status');
            
            // Проверка на админа (показываем поле пароля)
            const wrap = document.getElementById('admin-secret-wrap');
            if (name.toLowerCase() === 'admin') wrap.classList.remove('hidden');
            else wrap.classList.add('hidden');

            if (name.length > 0) {
                canvas.classList.remove('disabled');
                status.innerText = "Теперь нарисуйте ключ";
                status.style.color = "#636e72";
            } else {
                canvas.classList.add('disabled');
                status.innerText = "Введите имя, чтобы начать";
                resetCanvas();
            }
        };

        function initDots() {
            dots = [];
            for(let i=0; i<3; i++) {
                for(let j=0; j<3; j++) {
                    dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (patternResult.length > 0) {
                ctx.beginPath();
                ctx.strokeStyle = "#0984e3";
                ctx.lineWidth = 8;
                ctx.lineJoin = "round";
                ctx.lineCap = "round";
                for(let k=0; k < patternResult.length; k+=2) {
                    const d = dots.find(dot => dot.id === patternResult.substring(k, k+2));
                    if (k === 0) ctx.moveTo(d.x, d.y);
                    else ctx.lineTo(d.x, d.y);
                }
                ctx.stroke();
            }
            dots.forEach(d => {
                ctx.beginPath();
                ctx.arc(d.x, d.y, 14, 0, Math.PI*2);
                ctx.fillStyle = d.hit ? "#0984e3" : "#bdc3c7";
                ctx.fill();
            });
        }

        function resetCanvas() {
            patternResult = "";
            initDots();
            draw();
        }

        canvas.onmousedown = canvas.ontouchstart = (e) => {
            if(canvas.classList.contains('disabled')) return;
            e.preventDefault();
            patternResult = "";
            initDots();
            drawing = true;
            draw();
        };

        window.onmouseup = window.ontouchend = () => {
            if (!drawing) return;
            drawing = false;
            if (patternResult.length >= 4 && document.getElementById('auth-username').value.toLowerCase() !== 'admin') {
                window.handleAuthSubmit();
            }
        };

        canvas.onmousemove = canvas.ontouchmove = (e) => {
            if (!drawing || canvas.classList.contains('disabled')) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            dots.forEach(d => {
                const dist = Math.sqrt((x - d.x)**2 + (y - d.y)**2);
                if (dist < 25 && !d.hit) {
                    d.hit = true;
                    patternResult += d.id;
                    draw();
                }
            });
        };

        window.handleAuthSubmit = async () => {
            const name = document.getElementById('auth-username').value.trim().toLowerCase();
            const adminPass = document.getElementById('admin-pass-input').value;
            const finalSecret = (name === 'admin' && adminPass) ? adminPass : patternResult;

            try {
                const userSnap = await getDoc(doc(db, "users", name));
                if (userSnap.exists() && userSnap.data().password === finalSecret) {
                    localStorage.setItem('currentUser', name);
                    window.location.href = 'calendar.html';
                } else {
                    document.getElementById('auth-status').innerText = "❌ Неверный ключ";
                    document.getElementById('auth-status').style.color = "red";
                    resetCanvas();
                }
            } catch (e) {
                console.error(e);
            }
        };

        initDots();
        draw();
    </script>
</body>
</html>
