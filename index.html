<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDAR 2026 | Cloud Ecosystem</title>
    <style>
        :root {
            --orange-notif: #f39c12;
            --admin-red: #d63031;
            --accent-blue: #0984e3;
            --bg-soft: #f4f7f9; 
            --card-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }
        
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; background: var(--bg-soft); }
        .hidden { display: none !important; }

        /* АНИМАЦИИ */
        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* ФУТЕР И ШТОРКА */
        .system-footer-white {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 35px;
            background: #ffffff; border-top: 1px solid #edf0f2;
            color: #b2bec3; font-size: 10px; font-weight: 700;
            display: flex; align-items: center; padding: 0 25px; z-index: 4500;
            letter-spacing: 1px; text-transform: uppercase; box-sizing: border-box;
        }
        .footer-dot { width: 6px; height: 6px; background: #2ecc71; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 8px #2ecc71; }

        .system-sidebar {
            position: fixed; right: 0; top: 0; width: 340px; height: 100vh;
            background: var(--orange-notif); color: white; z-index: 5000;
            transform: translateX(100%); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 30px; box-sizing: border-box; box-shadow: -15px 0 50px rgba(0,0,0,0.1);
        }
        .system-sidebar.active { transform: translateX(0); }

        .notify-item {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3); padding: 15px; border-radius: 20px;
            margin-bottom: 12px; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

        /* АВТОРИЗАЦИЯ */
        #auth-page { height: 100vh; display: flex; align-items: center; justify-content: center; width: 100%; }
        .auth-container {
            background: #ffffff; padding: 50px 60px; border-radius: 40px;
            box-shadow: var(--card-shadow); display: flex; flex-direction: column; align-items: center;
        }
        .auth-logo { font-weight: 900; color: #2d3436; font-size: 3rem; letter-spacing: -3px; text-transform: uppercase; margin: 0; opacity: 0.8; }
        .auth-input {
            width: 280px; padding: 16px; border-radius: 30px; border: 1px solid #eee;
            margin: 25px 0 15px 0; outline: none; font-size: 16px; text-align: center; transition: 0.3s;
        }
        #pattern-canvas { 
            background: #fff; border-radius: 25px; border: 1px solid #f1f2f6; 
            cursor: not-allowed; opacity: 0.2; transition: 0.5s; 
        }
        #pattern-canvas.active { opacity: 1; cursor: crosshair; border-color: #dfe6e9; }

        /* ПАНЕЛЬ ГОДА И МЕСЯЦА */
        #year-page { height: 100vh; display: flex; width: 100%; }
        .y-sidebar { width: 280px; background: #ffffff; padding: 40px 25px; display: flex; flex-direction: column; border-right: 1px solid #edf0f2; }
        .y-main-content { flex: 1; padding: 60px; overflow-y: auto; position: relative; }
        .y-bg-label { font-size: 10rem; font-weight: 900; color: #000; opacity: 0.03; position: absolute; top: -20px; right: 40px; pointer-events: none; }
        
        .y-month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .y-month-card {
            background: #ffffff; border-radius: 30px; padding: 40px 20px; text-align: center;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.02); border: 1px solid transparent;
        }
        .y-month-card:hover { transform: translateY(-8px); border-color: var(--accent-blue); box-shadow: 0 15px 35px rgba(0,0,0,0.06); }

        /* СЕТКА ДНЕЙ МЕСЯЦА */
        .m-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
        .m-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; }
        .m-weekday { text-align: center; font-size: 12px; font-weight: 800; color: #b2bec3; padding-bottom: 10px; text-transform: uppercase; }
        .m-day { 
            aspect-ratio: 1/1; background: white; border-radius: 20px; display: flex; 
            align-items: center; justify-content: center; font-weight: 700; cursor: pointer;
            transition: 0.2s; border: 1px solid transparent; position: relative;
        }
        .m-day:hover { border-color: var(--accent-blue); color: var(--accent-blue); transform: scale(1.05); }
        .m-day.weekend { color: #ff7675; }
        .m-day.today { background: var(--accent-blue); color: white !important; box-shadow: 0 10px 20px rgba(9, 132, 227, 0.3); }

        .btn { border: none; padding: 14px 20px; border-radius: 15px; cursor: pointer; font-weight: 600; transition: 0.3s; font-family: inherit; }
        .btn-blue { background: var(--accent-blue); color: white; }
        .btn-back { background: #f1f2f6; color: #636e72; margin-bottom: 20px; }
    </style>
</head>
<body onclick="window.togglePanel(false)">

    <div id="side-panel" class="system-sidebar" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:15px;">
            <h3 style="margin:0; font-weight:800;">SYSTEM LOG</h3>
            <button onclick="window.togglePanel(false)" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">&times;</button>
        </div>
        <div id="panel-content" style="margin-top:20px;"></div>
    </div>

    <div class="system-footer-white">
        <div class="footer-dot"></div>
        <span>Cloud Plan Ecosystem — Secure Terminal</span>
        <div style="flex:1"></div>
        <span>2026 Node: Active</span>
    </div>

    <div id="auth-page">
        <div class="auth-container" onclick="event.stopPropagation()">
            <h2 class="auth-logo">Calendar</h2>
            <input type="text" id="auth-username" class="auth-input" placeholder="Введите имя..." oninput="window.updateCanvasState(this.value)">
            <canvas id="pattern-canvas" width="260" height="260"></canvas>
            <div id="admin-secret-wrap" class="hidden" style="margin-top:20px; text-align:center;">
                <input type="password" id="admin-pass-input" class="auth-input" placeholder="Пароль администратора" style="margin-top:0">
                <button class="btn btn-blue" style="width:100%; background:var(--admin-red)" onclick="window.handleAuthSubmit()">Войти как ADMIN</button>
            </div>
            <p id="auth-status-hint" style="color:#bdc3c7; font-size:11px; margin-top:15px; text-transform:uppercase; letter-spacing:1px;">Введите имя</p>
        </div>
    </div>

    <div id="year-page" class="hidden">
        <aside class="y-sidebar">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:50px;">
                <div id="u-avatar" style="width:50px; height:50px; background:var(--accent-blue); border-radius:15px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:22px;">?</div>
                <div id="sidebar-user-name" style="font-weight:800; color:#2d3436;">USER</div>
            </div>
            <button class="btn btn-blue" style="width:100%; text-align:left; margin-bottom:10px;" onclick="window.showYearView()">📅 Весь год</button>
            <button id="admin-btn-side" class="btn hidden" style="background:var(--admin-red); color:white; width:100%; text-align:left; margin-bottom:10px;">⚙️ Запросы</button>
            <button class="btn" style="background:#f1f2f6; color:#636e72; width:100%; margin-top:auto;" onclick="location.reload()">Выход</button>
        </aside>

        <main class="y-main-content">
            <div id="view-year">
                <div class="y-bg-label">2026</div>
                <h1 style="font-weight:900; margin-bottom:40px;">Выберите месяц</h1>
                <div class="y-month-grid" id="year-grid"></div>
            </div>

            <div id="view-month" class="hidden">
                <button class="btn btn-back" onclick="window.showYearView()">← К выбору месяца</button>
                <div class="m-header">
                    <h1 id="active-month-name" style="font-weight:900; margin:0;">Месяц</h1>
                    <div style="font-weight:700; color:var(--accent-blue); background:rgba(9,132,227,0.1); padding:8px 20px; border-radius:20px;">2026</div>
                </div>
                <div class="m-grid" id="month-days-grid">
                    </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let user = "";
        let patternResult = "";
        let drawing = false;
        let canvasEnabled = false;

        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        // --- УПРАВЛЕНИЕ ВИДАМИ ---
        window.showYearView = () => {
            document.getElementById('view-year').classList.remove('hidden');
            document.getElementById('view-month').classList.add('hidden');
        };

        window.openMonth = (monthIndex) => {
            document.getElementById('view-year').classList.add('hidden');
            document.getElementById('view-month').classList.remove('hidden');
            document.getElementById('active-month-name').innerText = months[monthIndex];
            renderDays(monthIndex);
        };

        function renderDays(monthIdx) {
            const grid = document.getElementById('month-days-grid');
            grid.innerHTML = '';
            
            // Заголовки недель
            ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"].forEach(d => {
                grid.innerHTML += `<div class="m-weekday">${d}</div>`;
            });

            const date = new Date(2026, monthIdx, 1);
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();
            let startDay = date.getDay(); // 0 (Вс) - 6 (Сб)
            startDay = startDay === 0 ? 6 : startDay - 1; // Коррекция под Пн-Вс

            // Пустые ячейки в начале
            for(let i=0; i<startDay; i++) grid.innerHTML += `<div></div>`;

            // Числа месяца
            for(let d=1; d<=daysInMonth; d++) {
                const curDate = new Date(2026, monthIdx, d);
                const dayOfWeek = curDate.getDay();
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                
                const dayEl = document.createElement('div');
                dayEl.className = `m-day ${isWeekend ? 'weekend' : ''}`;
                dayEl.innerText = d;
                dayEl.onclick = () => window.pushNotify(`${d} ${months[monthIdx]}`, "Тут будут ваши задачи на этот день.");
                grid.appendChild(dayEl);
            }
        }

        // --- АВТОРИЗАЦИЯ (БЕЗ ИЗМЕНЕНИЙ) ---
        window.updateCanvasState = (val) => {
            const cvs = document.getElementById('pattern-canvas');
            const hint = document.getElementById('auth-status-hint');
            canvasEnabled = val.trim().length > 0;
            if (canvasEnabled) { cvs.classList.add('active'); hint.innerText = "Нарисуйте ключ"; hint.style.color = "#0984e3"; }
            else { cvs.classList.remove('active'); hint.innerText = "Введите имя"; hint.style.color = "#bdc3c7"; resetAuthUI(false); }
            document.getElementById('admin-secret-wrap').classList.toggle('hidden', val.toLowerCase() !== 'admin');
        };

        window.togglePanel = (show) => document.getElementById('side-panel').classList.toggle('active', show);

        window.pushNotify = (title, text, isAction = false) => {
            const container = document.getElementById('panel-content');
            if(!isAction) container.innerHTML = "";
            const item = document.createElement('div');
            item.className = 'notify-item';
            item.innerHTML = `<b>${title}</b><p style="margin:5px 0 0 0; font-size:13px;">${text}</p>`;
            container.prepend(item);
            window.togglePanel(true);
        };

        function resetAuthUI(clearName = true) {
            patternResult = ""; dots.forEach(d => d.hit = false); draw(); 
            if(clearName) { document.getElementById('auth-username').value = ""; window.updateCanvasState(""); }
        }

        window.handleAuthSubmit = async () => {
            const authContainer = document.querySelector('.auth-container');
            user = document.getElementById('auth-username').value.trim().toLowerCase();
            const textPass = document.getElementById('admin-pass-input').value;
            let finalSecret = textPass || patternResult;
            if(!user || !finalSecret) return;
            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                if (userSnap.data().password === finalSecret) loginSuccess();
                else { window.pushNotify("Ошибка", "Неверный ключ"); authContainer.classList.add('shake'); setTimeout(() => authContainer.classList.remove('shake'), 400); resetAuthUI(false); }
            } else {
                const container = document.getElementById('panel-content'); container.innerHTML = "";
                window.pushNotify("Новый профиль", `Запрос для "${user}"?`, true);
                const btn = document.createElement('button'); btn.className = "btn btn-blue"; btn.style="width:100%; margin-top:10px; background:#fff; color:var(--orange-notif)"; btn.innerText = "Отправить";
                btn.onclick = async () => {
                    await setDoc(doc(db, "requests", user), { password: finalSecret, date: new Date().toISOString() });
                    container.innerHTML = `<div class="notify-item"><b>Успешно!</b></div>`;
                    setTimeout(() => { window.togglePanel(false); resetAuthUI(true); }, 2000);
                };
                container.appendChild(btn);
            }
        };

        function loginSuccess() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            document.getElementById('sidebar-user-name').innerText = user.toUpperCase();
            document.getElementById('u-avatar').innerText = user.charAt(0).toUpperCase();
            if (user === 'admin') document.getElementById('admin-btn-side').classList.remove('hidden');
            renderYearGrid();
        }

        function renderYearGrid() {
            const grid = document.getElementById('year-grid'); grid.innerHTML = '';
            months.forEach((m, idx) => {
                const card = document.createElement('div');
                card.className = 'y-month-card';
                card.innerHTML = `<h3 style="margin:0">${m}</h3><p style="font-size:11px; color:#b2bec3; margin-top:10px;">2026</p>`;
                card.onclick = () => window.openMonth(idx);
                grid.appendChild(card);
            });
        }

        // КАНВАС
        const canvas = document.getElementById('pattern-canvas');
        const ctx = canvas.getContext('2d');
        const dots = [];
        for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (patternResult.length >= 2) {
                ctx.beginPath(); ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.strokeStyle = "#0984e3";
                for(let k=0; k < patternResult.length; k+=2) {
                    const d = dots.find(dot => dot.id === patternResult.substring(k, k+2));
                    if (k === 0) ctx.moveTo(d.x, d.y); else ctx.lineTo(d.x, d.y);
                }
                ctx.stroke();
            }
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.hit ? 12 : 8, 0, Math.PI*2);
                ctx.fillStyle = d.hit ? "#0984e3" : "#dfe6e9"; ctx.fill();
            });
        }
        canvas.onmousedown = canvas.ontouchstart = (e) => { if(!canvasEnabled) return; e.preventDefault(); e.stopPropagation(); drawing = true; patternResult = ""; dots.forEach(d=>d.hit=false); };
        window.onmouseup = window.ontouchend = () => { if(drawing && document.getElementById('auth-username').value.toLowerCase() !== 'admin') window.handleAuthSubmit(); drawing = false; };
        canvas.onmousemove = canvas.ontouchmove = (e) => {
            if(!drawing || !canvasEnabled) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
            dots.forEach(d => { if (Math.sqrt((x-d.x)**2 + (y-d.y)**2) < 25 && !d.hit) { d.hit = true; patternResult += d.id; draw(); } });
        };
        draw();
    </script>
</body>
</html>
