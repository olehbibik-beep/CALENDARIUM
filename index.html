<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan 2026 | Облачный Календарь</title>
    <style>
        :root { --primary: #2d3436; --accent: #0984e3; --bg: #dfe6e9; --card: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); }
        .hidden { display: none !important; }

        /* --- ВХОД --- */
        #auth-page { display: flex; height: 100vh; width: 100vw; background: white; position: fixed; top: 0; left: 0; z-index: 1000; }
        .auth-left { flex: 1; background: #ced4da url('https://images.unsplash.com/photo-1506784365847-bbad939e9335?q=80&w=2068&auto=format&fit=crop') center/cover; display: flex; align-items: center; justify-content: center; position: relative; }
        .auth-left::after { content: ""; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.3); }
        .auth-left h1 { color: white; z-index: 1; font-size: 4rem; text-shadow: 2px 2px 15px rgba(0,0,0,0.5); }
        .auth-right { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .auth-form-card { width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #pattern-canvas { background: #f8f9fa; border-radius: 15px; cursor: crosshair; margin: 20px 0; touch-action: none; border: 1px solid #eee; }
        .toggle-auth { color: var(--accent); cursor: pointer; font-size: 14px; text-decoration: underline; margin-top: 15px; }

        /* --- ИНТЕРФЕЙС --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .month-tile { background: var(--card); aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; border: 1px solid #eee; }
        .month-tile:hover { transform: translateY(-5px); border-color: var(--accent); }
        .month-tile span { font-size: 2.5rem; }
        .month-layout { display: flex; gap: 20px; }
        .calendar-main { flex: 3; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-card { background: var(--card); padding: 8px; border-radius: 8px; min-height: 100px; border: 1px solid #eee; }
        textarea { width: 100%; height: 60px; border: none; background: #f1f2f6; border-radius: 4px; resize: none; font-size: 12px; padding: 5px; box-sizing: border-box; }
        .notes-sidebar { flex: 1.2; background: var(--card); padding: 20px; border-radius: 15px; height: 80vh; overflow-y: auto; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="auth-left"><h1>Plan 2026</h1></div>
        <div class="auth-right">
            <div class="auth-form-card">
                <h2>Добро пожаловать</h2>
                <input type="text" id="username" placeholder="Ваше имя">
                <div id="password-mode"><input type="password" id="pass" placeholder="Пароль (1234)"></div>
                <div id="pattern-mode" class="hidden">
                    <p style="font-size:12px">Проведите линию через 3+ точки:</p>
                    <canvas id="pattern-canvas" width="260" height="260"></canvas>
                </div>
                <button class="btn" onclick="handleAuthSubmit()" style="width: 100%; margin-top: 10px;">Войти</button>
                <div class="toggle-auth" onclick="toggleAuthMode()">Использовать графический ключ</div>
            </div>
        </div>
    </div>

    <div id="year-page" class="hidden container">
        <header>
            <h1 id="welcome-user">2026</h1>
            <button class="btn" style="background:#636e72" onclick="location.reload()">Выйти</button>
        </header>
        <div class="year-grid" id="year-grid"></div>
    </div>

    <div id="month-page" class="hidden container">
        <header>
            <button class="btn" onclick="showYear()">← К году</button>
            <h1 id="month-title"></h1>
            <div style="width:80px"></div>
        </header>
        <div class="month-layout">
            <div class="calendar-main"><div class="days-grid" id="days-grid"></div></div>
            <div class="notes-sidebar"><h3>🔔 Активность</h3><div id="sidebar-list"></div></div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
        authDomain: "calendarium-1f7d7.firebaseapp.com",
        projectId: "calendarium-1f7d7",
        storageBucket: "calendarium-1f7d7.firebasestorage.app",
        messagingSenderId: "204240857105",
        appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0",
        measurementId: "G-D2G4YVN8V4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    const icons = ["❄️","🌨️","🌱","☔","🌸","☀️","🌊","🍎","🍂","🎃","☁️","🎄"];
    let user = "";
    let authMode = 'password';
    let patternResult = ""; // Здесь будем хранить "код" графического ключа

    // --- СИСТЕМА ВХОДА И РЕГИСТРАЦИИ ---
    window.handleAuthSubmit = async () => {
        user = document.getElementById('username').value.trim().toLowerCase();
        const passInput = document.getElementById('pass').value;
        
        if(!user) return alert("Введите имя!");

        // Формируем секретный код в зависимости от режима
        let secret = (authMode === 'password') ? passInput : patternResult;
        if(!secret || (authMode === 'pattern' && secret.length < 3)) {
            return alert("Введите пароль или нарисуйте ключ (минимум 3 точки)!");
        }

        const userRef = doc(db, "users", user);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
            // ПОЛЬЗОВАТЕЛЬ ЕСТЬ -> ПРОВЕРЯЕМ ПАРОЛЬ
            if (userSnap.data().password === secret) {
                loginSuccess();
            } else {
                alert("Неверный пароль или ключ для этого пользователя!");
            }
        } else {
            // ПОЛЬЗОВАТЕЛЯ НЕТ -> РЕГИСТРИРУЕМ
            if(confirm(`Пользователь "${user}" не найден. Создать новый аккаунт с этим паролем/ключом?`)) {
                await setDoc(userRef, { password: secret, mode: authMode });
                loginSuccess();
            }
        }
    };

    function loginSuccess() {
        document.getElementById('auth-page').classList.add('hidden');
        document.getElementById('year-page').classList.remove('hidden');
        document.getElementById('welcome-user').innerText = `Планы: ${user.toUpperCase()}`;
        renderYear();
    }

    // --- ОБНОВЛЕННЫЙ ГРАФИЧЕСКИЙ КЛЮЧ ---
    function initPattern() {
        const canvas = document.getElementById('pattern-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        patternResult = ""; 
        const dots = [];
        for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+''+j, x: 50+i*80, y: 50+j*80, hit: false});

        const draw = () => {
            ctx.clearRect(0,0,260,260);
            // Рисуем линии
            ctx.beginPath(); ctx.strokeStyle = "#0984e3"; ctx.lineWidth = 5;
            dots.filter(d => d.hit).forEach((d, idx) => {
                if(idx === 0) ctx.moveTo(d.x, d.y); else ctx.lineTo(d.x, d.y);
            });
            ctx.stroke();
            // Рисуем точки
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, 12, 0, Math.PI*2);
                ctx.fillStyle = d.hit ? "#0984e3" : "#dfe6e9"; ctx.fill();
            });
        };
        draw();
        
        canvas.onmousedown = () => { drawing = true; dots.forEach(d=>d.hit=false); patternResult=""; draw(); };
        window.onmouseup = () => drawing = false;
        canvas.onmousemove = (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left; const y = e.clientY - rect.top;
            dots.forEach(d => {
                const dist = Math.sqrt((x-d.x)**2 + (y-d.y)**2);
                if(dist < 20 && !d.hit) { 
                    d.hit = true; 
                    patternResult += d.id; // Добавляем ID точки в строку-пароль (напр. "001122")
                    draw(); 
                }
            });
        };
    }

    // Остальные функции (renderYear, openMonth, renderDays, showYear) оставь как были раньше
    // ... (копируй их из предыдущего кода)

        // --- CALENDAR ---
        function renderYear() {
            const grid = document.getElementById('year-grid');
            grid.innerHTML = months.map((m, i) => `
                <div class="month-tile" onclick="window.openMonth(${i})">
                    <span>${icons[i]}</span><h3>${m}</h3>
                </div>`).join('');
        }

        window.openMonth = (mIdx) => {
            document.getElementById('year-page').classList.add('hidden');
            document.getElementById('month-page').classList.remove('hidden');
            document.getElementById('month-title').innerText = months[mIdx];
            
            onSnapshot(doc(db, "data", `month_${mIdx}`), (snap) => {
                const data = snap.exists() ? snap.data() : {};
                renderDays(mIdx, data);
            });
        };

        function renderDays(mIdx, data) {
            const grid = document.getElementById('days-grid');
            const sidebar = document.getElementById('sidebar-list');
            grid.innerHTML = ''; sidebar.innerHTML = '';

            for (let d = 1; d <= 31; d++) {
                const dayData = data[d] || { text: "", author: "" };
                const canEdit = !dayData.author || dayData.author === user;
                
                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = `<b>${d}</b><textarea id="t-${d}" ${canEdit?'':'disabled'}>${dayData.text}</textarea>`;
                grid.appendChild(card);

                if(dayData.text) {
                    sidebar.innerHTML += `<div class="sidebar-item"><b>${d} ${months[mIdx]}</b>: ${dayData.text} <br><small>👤 ${dayData.author}</small></div>`;
                }

                card.querySelector('textarea').onchange = async (e) => {
                    const newText = e.target.value;
                    data[d] = { text: newText, author: newText ? user : "" };
                    try {
                        await setDoc(doc(db, "data", `month_${mIdx}`), data);
                    } catch (err) {
                        alert("Ошибка сохранения! Проверьте Rules в Firebase.");
                    }
                };
            }
        }

        window.showYear = () => {
            document.getElementById('month-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
        };
    </script>
</body>
</html>
