<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="apple-mobile-web-app-title" content="Calendarium">
    <meta name="application-name" content="Calendarium">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121416">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Secure Terminal</title>
    <style>
        /* БАЗОВЫЕ ПЕРЕМЕННЫЕ И НАСТРОЙКИ СТРАНИЦЫ */
        :root { 
            --accent: #09e0e3; 
            --bg: #19242E; 
            --orange: #383942; 
            --footer-bg: #eceff1;
            --title-color: #ffffff;
        }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; flex-direction: column;
            position: relative;
        }

        /* --- КАРТОЧКА АВТОРИЗАЦИИ --- */
        .auth-card { 
            background: #1a1d1f; padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; 
            width: 90%; max-width: 360px; 
            z-index: 10; 
            box-sizing: border-box;
            position: relative;
        }
        
        .auth-header {
            display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; 
        }
        
        .auth-header h1 {
            margin: 0; font-size: 1.3rem; letter-spacing: 2px; line-height: 1; 
            color: var(--title-color); 
            font-weight: 800; text-transform: uppercase;
        }

        /* --- ПОЛЯ ВВОДА И КАНВАС --- */
        input { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 6px; 
            border: none; background: #444; 
            color: #fff; 
            text-align: center; 
            font-size: 1rem; outline: none; box-sizing: border-box; 
        }
        
        canvas { 
            background: transparent; 
            border-radius: 8px; 
            cursor: crosshair; max-width: 100%; height: auto; touch-action: none;
        }
        canvas.disabled { opacity: 0.1; pointer-events: none; }
        canvas.hidden { display: none; }
        .hidden { display: none; }

        /* --- БОКОВОЕ МЕНЮ / УВЕДОМЛЕНИЯ (ШТОРКА) --- */
        #notif-sidebar { 
            position: absolute; 
            top: 50%; left: 50%; 
            width: 300px; 
            height: 45%;
            background: var(--orange); 
            color: white; 
            z-index: 5; 
            border-radius: 8px;
            padding: 30px; 
            box-sizing: border-box;
            transform: translate(-50%, -50%); 
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex; 
            flex-direction: column;
            pointer-events: none; 
        }

        #notif-sidebar.active { 
            transform: translate(calc(-50% + 280px), -50%); 
            opacity: 1;
            pointer-events: auto; 
        }

        .notif-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }

        /* --- ОБЪЕДИНЕННЫЕ СТИЛИ ДЛЯ КРЕСТИКОВ ЗАКРЫТИЯ --- */
        .close-x, .close-info { 
            cursor: pointer; 
            font-size: 34px; 
            line-height: 1; 
            color: #ffffff; /* Белый по умолчанию */
            transition: all 0.3s ease; 
            font-weight: 300;
        }
        .close-x:hover, .close-info:hover { 
            color: var(--accent); /* Акцент при наведении */
            transform: scale(1.2); 
        }
        
        .notif-header span:first-child { 
            font-weight: 300; color: #fff; font-size: 0.7rem; letter-spacing: 1.5px; opacity: 0.9; margin: 0;
        }

        #log-container { flex: 1; display: flex; flex-direction: column; justify-content: right; text-align: right; }
        .log-card { border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .log-card h3 { margin: 0 0 8px 0; font-size: 1.1rem; text-transform: uppercase; }
        .log-card p { margin: 0; font-size: 0.85rem; line-height: 1.4; }
        
        /* --- КНОПКИ --- */
        .orange-btn { 
            width: 100%; padding: 14px; border-radius: 6px; border: none; 
            background: white; color: var(--orange); font-weight: 900; 
            cursor: pointer; font-size: 0.9rem; text-transform: uppercase; 
            transition: all 0.3s ease;
        }
        .orange-btn:hover {
            background: var(--orange); color: white; transform: translateY(-2px);
        }

        .admin-btn { 
            width: 100%; padding: 14px; border-radius: 6px; border: none; 
            background: var(--accent); color: #001A1F; font-weight: 900; 
            cursor: pointer; margin-top: 10px; transition: all 0.3s ease;
        }
        .admin-btn:hover {
            filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(9, 224, 227, 0.3);
        }
        
        /* --- ФУТЕР --- */
        .inner-footer {
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            width: 90%;
            transform: translateX(-50%);
            max-width: 360px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0; 
            z-index: 10;
        }
        .footer-text { font-size: 9px; color: #777; text-transform: uppercase; font-weight: 300; letter-spacing: 1px; }
        
        /* --- АДАПТИВ ПОД МОБИЛЬНЫЕ И ПЛАНШЕТЫ --- */
        @media (max-width: 850px) { 
            .auth-card { 
                z-index: 10; transform: translateY(-5vh); padding: 20px; 
            }
            #notif-sidebar { 
                position: fixed; z-index: 9999 !important;
                top: 20px; left: 10px; right: 10px; bottom: auto;
                width: auto; height: auto; min-height: 160px;
                transform: translate(0, -150%) scale(1); 
            }
            #notif-sidebar.active { 
                transform: translate(0, 0) scale(1); 
            }
            .notif-header { margin-bottom: 10px; }
            .info-flex { flex-direction: column; } 
        }

        /* --- СТИЛИ ДЛЯ ИНФО-ОКНА --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            z-index: 99999; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }
        
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .info-modal {
            background: #003D4D; 
            width: 95%; 
            max-width: 600px; 
            max-height: 85vh;
            border-radius: 16px; display: flex; flex-direction: column; overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            color: #E0E6ED; 
        }

        .modal-overlay.active .info-modal { transform: translateY(0); }

        .info-modal-header {
            padding: 20px; display: flex; margin-left: auto; justify-content: space-between; align-items: center;
            background: #003D4D; border-bottom: none; 
        }

        .info-modal-header h2 { margin: 0; font-size: 1.1rem; font-weight: 300; color: #fff; text-transform: uppercase;}

        .info-modal-content { padding: 20px; overflow-y: auto; text-align: left; }

        .info-flex {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .info-text-side { flex: 1.5; } 
        .info-img-side { flex: 2.5; display: flex; justify-content: center; } 
        .info-img-side img {
            width: 100%; height: auto; border-radius: 8px; box-shadow: 0 0px 0px rgba(0,0,0,0.0);
        }

        .changelog-box { background: transparent; padding: 15px; border-radius: 4px; border-left: 4px solid var(--accent); margin-bottom: 20px; }
        .changelog-box h3 { margin: 0 0 10px 0; font-size: 1rem; color: var(--accent); }
        .changelog-box ul { margin: 0; padding-left: 20px; font-size: 0.85rem; line-height: 1.5; color: #ccc;}
        .changelog-box li { margin-bottom: 5px; }
    </style>
    <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</head>
<body>

    <div id="notif-sidebar">
        <div class="notif-header">
            <span>INFO</span>
            <span class="close-x" onclick="closeLog()">×</span>
        </div>
        <div id="log-container"></div>
    </div>
    
    <div class="auth-card">
        <div class="auth-header">
            <h1>CALENDARIUM</h1>
        </div>

        <input type="text" id="username" oninput="checkName(this.value)" maxlength="20" placeholder="Ваше имя">
        
        <canvas id="canvas" width="260" height="260" class="disabled"></canvas>
        
        <div id="admin-box" class="hidden">
            <input type="password" id="admin-password" placeholder="пароль администратора">
            <button class="admin-btn" onclick="handleLogin()">Войти в систему</button>
        </div>
    </div>

    <div id="info-modal-overlay" class="modal-overlay hidden" onclick="closeInfoModal(event)">
        <div class="info-modal" onclick="event.stopPropagation()">
            
            <div class="info-modal-header">
                <span class="close-info" onclick="closeInfoModal()">×</span>
            </div>

            <div class="info-modal-content">
                <div class="info-flex">
                    <div class="info-text-side">
                        <div class="changelog-box">
                            <h3>Последние изменения</h3>
                            <ul>
                                <li>Акцентный цвет рисования и UI.</li>
                                <li>Ховеры для кнопок и крестиков.</li>
                                <li>Корректная работа шторки.</li>
                            </ul>
                        </div>
                    </div>
                    
                    <div class="info-img-side">
                        <img src="Set2.png" alt="Превью">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="inner-footer">
        <span style="color: #999; font-size: 10px; cursor: pointer; text-decoration: underline; transition: 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='#999'" onclick="openInfoModal()">Как пользоваться?</span>
        <div class="footer-text">Group 5 • v2.6.18</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const canvas = document.getElementById('canvas');
        const adminBox = document.getElementById('admin-box');
        const ctx = canvas.getContext('2d');
        const sidebar = document.getElementById('notif-sidebar');
        let dots = [], pattern = "", drawing = false;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                window.openInfoModal();
            }, 500); 
        });

        window.closeLog = () => {
            sidebar.classList.remove('active');
            resetCanvas();
        };

        window.openInfoModal = () => {
            const modal = document.getElementById('info-modal-overlay');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('active'), 10);
        };

        window.closeInfoModal = (e) => {
            const modal = document.getElementById('info-modal-overlay');
            modal.classList.remove('active');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        function resetCanvas() {
            pattern = "";
            initDots();
            draw();
        }

        window.checkName = (val) => {
            let cleanValue = val.replace(/[^a-zA-Zа-яА-Я0-9]/g, '').slice(0, 20);
            const inputField = document.getElementById('username');
            
            if (val !== cleanValue) {
                inputField.value = cleanValue;
            }

            const name = cleanValue.trim().toLowerCase();
            const isOk = name.length > 0;
            
            // Прячем шторку и сбрасываем канвас при вводе имени
            sidebar.classList.remove('active');
            resetCanvas();
            
            if (name === 'admin') {
                canvas.classList.add('hidden');
                adminBox.classList.remove('hidden');
            } else {
                canvas.classList.remove('hidden');
                adminBox.classList.add('hidden');
                canvas.classList.toggle('disabled', !isOk);
            }
        };

        function initDots() {
            dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});
        }

        function draw() {
            ctx.clearRect(0, 0, 260, 260);
            
            // Берем акцентный цвет из CSS
            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();

            if(pattern.length > 0) {
                ctx.beginPath(); 
                ctx.strokeStyle = accentColor; 
                ctx.lineWidth = 8; 
                ctx.lineCap="round"; 
                ctx.lineJoin="round";
                for(let k=0; k < pattern.length; k+=2) {
                    let d = dots.find(dot => dot.id === pattern.substring(k, k+2));
                    if (k === 0) ctx.moveTo(d.x, d.y);
                    else ctx.lineTo(d.x, d.y);
                }
                ctx.stroke();
            }
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, 14, 0, Math.PI*2);
                ctx.fillStyle = d.hit ? accentColor : "#3e3e3e"; 
                ctx.fill();
            });
        }

        const startDraw = (e) => {
            if (canvas.classList.contains('disabled')) return;
            sidebar.classList.remove('active'); // Прячем шторку перед новым рисованием
            pattern = ""; initDots(); drawing = true; draw();
        };

        const moveDraw = (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;

            dots.forEach(d => {
                if(Math.sqrt((x - d.x)**2 + (y - d.y)**2) < 25 && !d.hit) { 
                    d.hit = true; 
                    pattern += d.id; 
                    draw(); 
                }
            });
        };

        const endDraw = () => {
            if(!drawing) return;
            drawing = false;
            if(pattern.length >= 4) window.handleLogin();
        };

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, {passive: false});
        window.addEventListener('mousemove', moveDraw);
        window.addEventListener('touchmove', (e) => { if(drawing) e.preventDefault(); moveDraw(e); }, {passive: false});
        window.addEventListener('mouseup', endDraw);
        window.addEventListener('touchend', endDraw);

        window.handleLogin = async () => {
            const name = document.getElementById('username').value.trim().toLowerCase();
            const adminPass = document.getElementById('admin-password').value;
            const finalSecret = (name === 'admin') ? adminPass : pattern;

            if (!finalSecret) return;

            try {
                const snap = await getDoc(doc(db, "users", name));
                if (snap.exists()) {
                    if (snap.data().password === finalSecret) {
                        localStorage.setItem('currentUser', name);
                        window.location.href = 'calendar.html';
                    } else {
                        showLog("Ошибка", "Неверный ключ или пароль.");
                    }
                } else if (name !== 'admin') {
                    document.getElementById('log-container').innerHTML = `
                        <div class="log-card"><h3>Новый профиль?</h3><p>Хочу создать свой аккаунт.</p></div>
                        <button class="orange-btn" id="send-req"><p style="margin: 0;">ОТПРАВИТЬ</p></button>
                    `;
                    sidebar.classList.add('active');
                    
                    document.getElementById('send-req').onclick = async () => {
                        await setDoc(doc(db, "requests", name), { password: pattern, date: new Date().toISOString() });
                        showLog("Готово", "Заявка отправлена");
                    };
                }
            } catch (e) { console.error(e); }
        };

        function showLog(title, text) {
            const logContainer = document.getElementById('log-container');
            const sidebar = document.getElementById('notif-sidebar');

            if (!logContainer || !sidebar) return;

            logContainer.innerHTML = `
                <div class="log-card">
                    <h1 style="margin:0; font-size:1.1rem; line-height:1.4; color:#fff; font-weight:500;">
                        ${text}
                    </h1>
                </div>`;
            
            sidebar.classList.add('active');
        }

        initDots(); draw();
    </script>
</body>
</html>
