<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALENDAR 2026 | Cloud Ecosystem</title>
    <style>
        /* --- ОБЩИЕ ПЕРЕМЕННЫЕ И СТИЛИ --- */
        :root {
            --orange-notif: #f39c12;
            --admin-red: #d63031;
            --accent-blue: #0984e3;
            --bg-soft: #f4f7f9; /* Нежный однотонный фон */
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; background: var(--bg-soft); }
        .hidden { display: none !important; }

        /* --- 1. СТИЛИ: АВТОРИЗАЦИЯ --- */
        #auth-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-soft); }
        #auth-page .auth-container {
            background: #ffffff; padding: 50px 60px; border-radius: 40px;
            box-shadow: var(--card-shadow); display: flex; flex-direction: column; align-items: center;
        }
        #auth-page h2 { font-weight: 900; color: #2d3436; font-size: 3rem; letter-spacing: -3px; text-transform: uppercase; margin: 0; }
        #auth-page input {
            width: 280px; padding: 16px; border-radius: 20px; border: 1px solid #eee;
            margin: 20px 0; outline: none; font-size: 16px; transition: 0.3s;
        }
        #auth-page input:focus { border-color: var(--accent-blue); }

       /* ============================================================
   PAGE: YEAR (Сетка месяцев)
   Все стили этой страницы изолированы через префикс .y-
   ============================================================ */

#year-page {
    height: 100vh;
    display: flex;
    background: var(--bg-soft);
}

/* Боковая панель года */
.y-sidebar {
    width: 280px;
    background: #ffffff;
    padding: 40px 25px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #edf0f2;
    z-index: 10;
}

/* Основной контент (Сетка) */
.y-main-content {
    flex: 1;
    padding: 60px;
    overflow-y: auto;
    position: relative;
}

/* Декоративный заголовок на фоне */
.y-bg-year-label {
    font-size: 10rem;
    font-weight: 900;
    color: #000;
    opacity: 0.03;
    position: absolute;
    top: -20px;
    right: 40px;
    user-select: none;
}

/* Сетка карточек */
.y-month-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 30px;
    position: relative;
}

/* Индивидуальная карточка месяца */
.y-month-card {
    background: #ffffff;
    border-radius: 30px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    border: 1px solid rgba(0,0,0,0.03);
}

.y-month-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.07);
    border-color: var(--accent-blue);
}

.y-month-name {
    font-size: 1.5rem;
    font-weight: 800;
    color: #2d3436;
    margin: 0;
    letter-spacing: -0.5px;
}

.y-month-label {
    font-size: 11px;
    color: var(--accent-blue);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
}

        /* --- 3. СТИЛИ: РАСПИСАНИЕ МЕСЯЦА --- */
        #month-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; padding: 40px; z-index: 1000; overflow-y: auto; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .day-cell { border: 1px solid #eee; padding: 15px; border-radius: 12px; aspect-ratio: 1/1; cursor: pointer; }
        .day-cell:hover { background: var(--bg-soft); }
        .editor { position: fixed; bottom: 30px; right: 30px; width: 350px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }

        /* Системные элементы */
        .system-sidebar { position: fixed; right: 0; top: 0; width: 320px; height: 100vh; background: var(--orange-notif); color: white; z-index: 5000; transform: translateX(100%); transition: 0.4s; padding: 25px; box-sizing: border-box; }
        .system-sidebar.active { transform: translateX(0); }
        .btn { border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .btn-blue { background: var(--accent-blue); color: white; }
    </style>
</head>
<body>

    <div id="side-panel" class="system-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0">Уведомления</h3>
            <button onclick="window.togglePanel(false)" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">&times;</button>
        </div>
        <div id="panel-content" style="margin-top:20px;"></div>
    </div>

    <div id="auth-page">
        <div class="auth-container">
            <h2>CALENDAR</h2>
            <input type="text" id="auth-username" placeholder="Ваш логин..." oninput="window.checkAdmin(this.value)">
            <canvas id="pattern-canvas" width="260" height="260" style="cursor: crosshair;"></canvas>
            
            <div id="admin-secret-wrap" class="hidden">
                <input type="password" id="admin-pass-input" placeholder="Пароль администратора">
                <button class="btn btn-blue" style="width:100%; background:var(--admin-red)" onclick="window.handleAuthSubmit()">Войти как ADMIN</button>
            </div>
            <p id="auth-status-hint" style="color:#bdc3c7; font-size:11px; margin-top:15px;">НАРИСУЙТЕ КЛЮЧ</p>
        </div>
    </div>

    <div id="year-page" class="hidden">
    <aside class="y-sidebar">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:50px;">
            <div class="avatar" id="u-avatar">?</div>
            <div id="sidebar-user-name" style="font-weight:800; color:#2d3436; font-size: 1.1rem;">USER</div>
        </div>
        
        <div style="flex:1">
            <p style="font-size:11px; color:#b2bec3; text-transform:uppercase; letter-spacing:1px; margin-bottom:15px;">Навигация</p>
            <button class="btn btn-blue" style="width:100%; text-align:left; margin-bottom:10px;">📅 Календарь 2026</button>
            <button id="admin-btn-side" class="btn hidden" style="background:var(--admin-red); color:white; width:100%; text-align:left;" onclick="window.loadAdminRequests()">⚙️ Админ-панель</button>
        </div>

        <button class="btn" style="background:#f1f2f6; color:#636e72; width:100%;" onclick="location.reload()">Выйти из системы</button>
    </aside>

    <main class="y-main-content">
        <div class="y-bg-year-label">2026</div>
        <div class="y-month-grid" id="year-grid">
            </div>
    </main>
</div>

    <div id="month-page" class="hidden">
        <button class="btn" onclick="window.showYear()">← Назад</button>
        <h2 id="month-title" style="font-size:2.5rem; margin:20px 0;"></h2>
        <div class="days-grid" id="days-grid"></div>
        
        <div id="editor-section" class="editor hidden">
            <h4 id="selected-day-label" style="margin:0 0 15px 0; color:var(--accent-blue)"></h4>
            <textarea id="day-input" style="width:100%; height:100px; border:1px solid #eee; border-radius:10px; padding:10px; outline:none;"></textarea>
            <button class="btn btn-blue" style="width:100%; margin-top:10px;" onclick="window.saveDayData()">Сохранить в облако</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let user = "";
        let patternResult = "";
        let currentMonthIdx = null;
        let currentDay = null;
        let currentMonthData = {};

        // --- ЛОГИКА ИНТЕРФЕЙСА ---
        window.togglePanel = (show) => document.getElementById('side-panel').classList.toggle('active', show);
        
        window.pushNotify = (title, text) => {
            const container = document.getElementById('panel-content');
            const item = document.createElement('div');
            item.style = "background:rgba(255,255,255,0.2); padding:12px; border-radius:12px; margin-bottom:10px; font-size:13px;";
            item.innerHTML = `<b>${title}</b><br>${text}`;
            container.prepend(item);
            window.togglePanel(true);
        };

        window.checkAdmin = (val) => {
            document.getElementById('admin-secret-wrap').classList.toggle('hidden', val.toLowerCase() !== 'admin');
        };

        // --- ВХОД (FIREBASE) ---
        window.handleAuthSubmit = async () => {
            user = document.getElementById('auth-username').value.trim().toLowerCase();
            const textPass = document.getElementById('admin-pass-input').value;
            let finalSecret = textPass || patternResult;
            
            if(!user || !finalSecret) { alert("Введите имя и нарисуйте ключ!"); return; }

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                if (userSnap.data().password === finalSecret) loginSuccess();
                else { 
                    alert("Неверный ключ!"); 
                    patternResult = ""; 
                    initPattern(); // Сброс канваса
                }
            } else {
                window.pushNotify("Регистрация", `Пользователь "${user}" не найден. Нажмите, чтобы отправить запрос.`);
                const btn = document.createElement('button');
                btn.className = "btn btn-blue"; btn.style="width:100%; margin-top:10px;"; btn.innerText = "Отправить запрос";
                btn.onclick = async () => {
                    await setDoc(doc(db, "requests", user), { password: finalSecret, date: new Date().toISOString() });
                    alert("Запрос отправлен админу!");
                };
                document.getElementById('panel-content').appendChild(btn);
            }
        };

        function loginSuccess() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            document.getElementById('sidebar-user-name').innerText = user.toUpperCase();
            document.getElementById('u-avatar').innerText = user.charAt(0).toUpperCase();
            if (user === 'admin') document.getElementById('admin-btn-side').classList.remove('hidden');
            renderYearGrid();
        }

        // --- КАЛЕНДАРЬ ГОДА ---
        function renderYearGrid() {
            const grid = document.getElementById('year-grid');
            grid.innerHTML = '';
            const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            months.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<h3>${m}</h3><p style="font-size:12px; color:#b2bec3;">2026</p>`;
                card.onclick = () => openMonth(i);
                grid.appendChild(card);
            });
        }

        async function openMonth(mIdx) {
            currentMonthIdx = mIdx;
            document.getElementById('month-page').classList.remove('hidden');
            document.getElementById('month-title').innerText = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"][mIdx];
            
            onSnapshot(doc(db, "data", `month_${mIdx}`), (snap) => {
                currentMonthData = snap.exists() ? snap.data() : {};
                renderDays();
            });
        }

        function renderDays() {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            const daysInMonth = new Date(2026, currentMonthIdx + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const data = currentMonthData[d] || { text: "" };
                const div = document.createElement('div');
                div.className = 'day-cell';
                div.innerHTML = `<b>${d}</b><div style="font-size:10px; color:#999; margin-top:5px;">${data.text.substring(0,20)}</div>`;
                div.onclick = () => {
                    currentDay = d;
                    document.getElementById('editor-section').classList.remove('hidden');
                    document.getElementById('selected-day-label').innerText = `${d} число`;
                    document.getElementById('day-input').value = data.text;
                };
                grid.appendChild(div);
            }
        }

        window.saveDayData = async () => {
            currentMonthData[currentDay] = { text: document.getElementById('day-input').value, author: user };
            await setDoc(doc(db, "data", `month_${currentMonthIdx}`), currentMonthData);
            document.getElementById('editor-section').classList.add('hidden');
            window.pushNotify("Облако", "Данные сохранены!");
        };

        window.showYear = () => document.getElementById('month-page').classList.add('hidden');

        // --- КАНВАС (КЛЮЧ) ---
        function initPattern() {
            const canvas = document.getElementById('pattern-canvas');
            const ctx = canvas.getContext('2d');
            let drawing = false;
            const dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});

            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // Линии
                if (patternResult.length >= 2) {
                    ctx.beginPath(); ctx.lineWidth = 5; ctx.strokeStyle = "#0984e3"; ctx.lineCap="round"; ctx.lineJoin="round";
                    for(let k=0; k < patternResult.length; k+=2) {
                        const d = dots.find(dot => dot.id === patternResult.substring(k, k+2));
                        if (k === 0) ctx.moveTo(d.x, d.y); else ctx.lineTo(d.x, d.y);
                    }
                    ctx.stroke();
                }
                // Точки
                dots.forEach(d => {
                    ctx.beginPath(); ctx.arc(d.x, d.y, d.hit ? 12 : 8, 0, Math.PI*2);
                    ctx.fillStyle = d.hit ? "#0984e3" : "#dfe6e9"; ctx.fill();
                });
            };

            const handleMove = (e) => {
                if(!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
                const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
                dots.forEach(d => {
                    if (Math.sqrt((x-d.x)**2 + (y-d.y)**2) < 20 && !d.hit) {
                        d.hit = true; patternResult += d.id; draw();
                    }
                });
            };

            canvas.onmousedown = canvas.ontouchstart = (e) => { drawing = true; patternResult = ""; dots.forEach(d=>d.hit=false); handleMove(e); };
            window.onmouseup = window.ontouchend = () => { 
                if(drawing && user !== 'admin') window.handleAuthSubmit();
                drawing = false; 
            };
            canvas.onmousemove = canvas.ontouchmove = handleMove;
            draw();
        }

        initPattern();
    </script>
</body>
</html>
