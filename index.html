<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan 2026 | Облачный Календарь</title>
    <style>
        :root { --primary: #2d3436; --accent: #0984e3; --bg: #dfe6e9; --card: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); }
        .hidden { display: none !important; }

        /* --- ВХОД --- */
        #auth-page { display: flex; height: 100vh; width: 100vw; background: white; position: fixed; top: 0; left: 0; z-index: 1000; }
        .auth-left { flex: 1; background: #ced4da url('https://images.unsplash.com/photo-1506784365847-bbad939e9335?q=80&w=2068&auto=format&fit=crop') center/cover; display: flex; align-items: center; justify-content: center; position: relative; }
        .auth-left::after { content: ""; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.3); }
        .auth-left h1 { color: white; z-index: 1; font-size: 4rem; text-shadow: 2px 2px 15px rgba(0,0,0,0.5); }
        .auth-right { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .auth-form-card { width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #pattern-canvas { background: #f8f9fa; border-radius: 15px; cursor: crosshair; margin: 20px 0; touch-action: none; border: 1px solid #eee; }
        .toggle-auth { color: var(--accent); cursor: pointer; font-size: 14px; text-decoration: underline; margin-top: 15px; }

        /* --- ИНТЕРФЕЙС --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .month-tile { background: var(--card); aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; border: 1px solid #eee; }
        .month-tile:hover { transform: translateY(-5px); border-color: var(--accent); }
        .month-tile span { font-size: 2.5rem; }
        .month-layout { display: flex; gap: 20px; }
        .calendar-main { flex: 3; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-card { background: var(--card); padding: 8px; border-radius: 8px; min-height: 100px; border: 1px solid #eee; }
        textarea { width: 100%; height: 60px; border: none; background: #f1f2f6; border-radius: 4px; resize: none; font-size: 12px; padding: 5px; box-sizing: border-box; }
        .notes-sidebar { flex: 1.2; background: var(--card); padding: 20px; border-radius: 15px; height: 80vh; overflow-y: auto; }
        .sidebar-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="auth-left"><h1>Plan 2026</h1></div>
        <div class="auth-right">
            <div class="auth-form-card">
                <h2>Добро пожаловать</h2>
                <input type="text" id="username" placeholder="Ваше имя">
                <div id="password-mode"><input type="password" id="pass" placeholder="Пароль"></div>
                <div id="pattern-mode" class="hidden">
                    <p style="font-size:12px">Проведите линию через 3+ точки:</p>
                    <canvas id="pattern-canvas" width="260" height="260"></canvas>
                </div>
                <button class="btn" onclick="handleAuthSubmit()" style="width: 100%; margin-top: 10px;">Войти</button>
                <div class="toggle-auth" onclick="toggleAuthMode()">Использовать графический ключ</div>
            </div>
        </div>
    </div>

    <div id="year-page" class="hidden container">
        <header>
            <h1 id="welcome-user">2026</h1>
            <button class="btn" style="background:#636e72" onclick="location.reload()">Выйти</button>
        </header>
        <div class="year-grid" id="year-grid"></div>
    </div>

    <div id="month-page" class="hidden container">
        <header>
            <button class="btn" onclick="showYear()">← К году</button>
            <h1 id="month-title"></h1>
            <div style="width:80px"></div>
        </header>
        <div class="month-layout">
            <div class="calendar-main"><div class="days-grid" id="days-grid"></div></div>
            <div class="notes-sidebar"><h3>🔔 Активность</h3><div id="sidebar-list"></div></div>
        </div>
    </div>

    <div id="admin-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; display:flex; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:15px; width:90%; max-width:500px; max-height:80vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>Заявки на регистрацию</h2>
                <button class="btn" onclick="document.getElementById('admin-modal').classList.add('hidden')" style="background:#636e72">Закрыть</button>
            </div>
            <div id="requests-list"></div>
        </div>
    </div>
    <button id="admin-btn" class="hidden btn" onclick="openAdminPanel()" style="position:fixed; bottom:20px; right:20px; background:#d63031; z-index:1001; transition: 0.3s;">⚙️ Управление</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0",
            measurementId: "G-D2G4YVN8V4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const icons = ["❄️","🌨️","🌱","☔","🌸","☀️","🌊","🍎","🍂","🎃","☁️","🎄"];
        let user = "";
        let authMode = 'password';
        let patternResult = "";

        // --- ВХОД И ЗАЯВКИ ---
        window.handleAuthSubmit = async () => {
            user = document.getElementById('username').value.trim().toLowerCase();
            const passInput = document.getElementById('pass').value;
            if(!user) return alert("Введите имя!");

            let secret = (authMode === 'password') ? passInput : patternResult;
            if(!secret || (authMode === 'pattern' && secret.length < 3)) {
                return alert("Введите пароль или нарисуйте ключ!");
            }

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                if (userSnap.data().password === secret) loginSuccess();
                else alert("Неверный пароль!");
                return;
            }

            const reqRef = doc(db, "requests", user);
            const reqSnap = await getDoc(reqRef);

            if (reqSnap.exists()) {
                alert("Заявка на рассмотрении.");
            } else {
                if(confirm(`Пользователь "${user}" не найден. Отправить запрос админу?`)) {
                    await setDoc(reqRef, { password: secret, mode: authMode, date: new Date().toISOString() });
                    alert("Запрос отправлен!");
                }
            }
        };

        function loginSuccess() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            document.getElementById('welcome-user').innerText = `Планы: ${user.toUpperCase()}`;
            if (user === 'admin') {
                document.getElementById('admin-btn').classList.remove('hidden');
                listenRequests(); // Следим за заявками
            }
            renderYear();
        }

        // --- АДМИНКА ---
        function listenRequests() {
            onSnapshot(collection(db, "requests"), (snap) => {
                const btn = document.getElementById('admin-btn');
                if (!snap.empty) {
                    btn.style.boxShadow = "0 0 20px #ff7675";
                    btn.innerHTML = `⚙️ Новых заявок: ${snap.size}`;
                } else {
                    btn.style.boxShadow = "none";
                    btn.innerHTML = "⚙️ Управление";
                }
            });
        }

        window.openAdminPanel = async () => {
            document.getElementById('admin-modal').classList.remove('hidden');
            const listDiv = document.getElementById('requests-list');
            listDiv.innerHTML = "Загрузка...";
            const querySnapshot = await getDocs(collection(db, "requests"));
            listDiv.innerHTML = querySnapshot.empty ? "<p>Заявок нет</p>" : "";
            
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                const item = document.createElement('div');
                item.style = "padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;";
                item.innerHTML = `<span>${id} (${data.mode})</span>
                    <div>
                        <button class="btn" onclick="approveUser('${id}','${data.password}','${data.mode}')" style="background:#2ecc71">✅</button>
                        <button class="btn" onclick="rejectUser('${id}')" style="background:#e74c3c">❌</button>
                    </div>`;
                listDiv.appendChild(item);
            });
        };

        window.approveUser = async (name, pass, mode) => {
            await setDoc(doc(db, "users", name), { password: pass, mode: mode });
            await deleteDoc(doc(db, "requests", name));
            openAdminPanel();
        };

        window.rejectUser = async (name) => {
            if(confirm("Удалить?")) {
                await deleteDoc(doc(db, "requests", name));
                openAdminPanel();
            }
        };

        // --- ГРАФИЧЕСКИЙ КЛЮЧ ---
        window.toggleAuthMode = () => {
            const pMode = document.getElementById('password-mode');
            const gMode = document.getElementById('pattern-mode');
            authMode = (authMode === 'password') ? 'pattern' : 'password';
            pMode.classList.toggle('hidden');
            gMode.classList.toggle('hidden');
            document.querySelector('.toggle-auth').innerText = authMode === 'password' ? "Использовать ключ" : "Использовать пароль";
            if(authMode === 'pattern') setTimeout(initPattern, 100);
        };

        function initPattern() {
            const canvas = document.getElementById('pattern-canvas');
            const ctx = canvas.getContext('2d');
            let drawing = false;
            patternResult = ""; 
            const dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});

            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (patternResult.length > 0) {
                    ctx.beginPath(); ctx.strokeStyle = "rgba(9, 132, 227, 0.5)"; ctx.lineWidth = 8; ctx.lineJoin = "round";
                    for(let k=0; k < patternResult.length; k+=2) {
                        const d = dots.find(dot => dot.id === patternResult.substring(k, k+2));
                        if (k === 0) ctx.moveTo(d.x, d.y); else ctx.lineTo(d.x, d.y);
                    }
                    ctx.stroke();
                }
                dots.forEach(d => {
                    ctx.beginPath(); ctx.arc(d.x, d.y, 12, 0, Math.PI*2);
                    ctx.fillStyle = d.hit ? "#0984e3" : "#dfe6e9"; ctx.fill();
                });
            };

            const handleInput = (e) => {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                dots.forEach(d => {
                    if (Math.sqrt((x-d.x)**2 + (y-d.y)**2) < 25 && !d.hit) {
                        d.hit = true; patternResult += d.id; draw();
                    }
                });
            };

            canvas.onmousedown = (e) => { drawing = true; patternResult = ""; dots.forEach(d=>d.hit=false); handleInput(e); };
            canvas.ontouchstart = (e) => { drawing = true; patternResult = ""; dots.forEach(d=>d.hit=false); handleInput(e); };
            window.onmouseup = window.ontouchend = () => drawing = false;
            canvas.onmousemove = canvas.ontouchmove = (e) => { if(e.touches) e.preventDefault(); handleInput(e); };
            draw();
        }

        // --- КАЛЕНДАРЬ ---
        function renderYear() {
            const grid = document.getElementById('year-grid');
            grid.innerHTML = months.map((m, i) => `<div class="month-tile" onclick="openMonth(${i})"><span>${icons[i]}</span><h3>${m}</h3></div>`).join('');
        }

        window.openMonth = (mIdx) => {
            document.getElementById('year-page').classList.add('hidden');
            document.getElementById('month-page').classList.remove('hidden');
            document.getElementById('month-title').innerText = months[mIdx];
            onSnapshot(doc(db, "data", `month_${mIdx}`), (snap) => renderDays(mIdx, snap.exists() ? snap.data() : {}));
        };

        function renderDays(mIdx, data) {
            const grid = document.getElementById('days-grid');
            const sidebar = document.getElementById('sidebar-list');
            grid.innerHTML = ''; sidebar.innerHTML = '';
            for (let d = 1; d <= 31; d++) {
                const dayData = data[d] || { text: "", author: "" };
                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = `<b>${d}</b><textarea ${dayData.author && dayData.author !== user ? 'disabled' : ''}>${dayData.text}</textarea>`;
                grid.appendChild(card);
                if(dayData.text) sidebar.innerHTML += `<div class="sidebar-item"><b>${d} ${months[mIdx]}</b>: ${dayData.text} <br><small>👤 ${dayData.author}</small></div>`;
                card.querySelector('textarea').onchange = async (e) => {
                    data[d] = { text: e.target.value, author: e.target.value ? user : "" };
                    await setDoc(doc(db, "data", `month_${mIdx}`), data);
                };
            }
        }

        window.showYear = () => {
            document.getElementById('month-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
        };
    </script>
</body>
</html>
