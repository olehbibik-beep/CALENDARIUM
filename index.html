<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0984e3; 
            --bg: #f4f7f6; 
            --orange-notif: #f39c12; 
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* КАРТОЧКА ВХОДА */
        .auth-card { 
            background: white; padding: 40px; border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 320px; 
        }
        
        h1 { font-size: 2rem; margin-bottom: 25px; color: #2d3436; text-transform: uppercase; letter-spacing: 2px; }
        
        input { 
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 15px; 
            border: 1px solid #eee; background: #fafafa; text-align: center; 
            font-size: 1rem; outline: none; box-sizing: border-box; 
        }
        
        canvas { background: #fff; border: 1px solid #eee; border-radius: 20px; cursor: crosshair; transition: all 0.3s; }
        canvas.disabled { opacity: 0.15; pointer-events: none; filter: grayscale(1); }
        
        /* --- ОРАНЖЕВАЯ ШТОРКА (SYSTEM LOG) --- */
        .notifications-sidebar {
            width: 320px; 
            background: var(--orange-notif); 
            height: 100vh; 
            position: fixed; 
            right: 0; 
            top: 0; 
            z-index: 9999; /* Поверх всего */
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); 
            padding: 25px; 
            box-sizing: border-box; 
            color: white;
            /* Спрятана вправо */
            transform: translateX(100%); 
            transition: transform 0.3s ease-in-out;
        }
        
        /* Класс, который выдвигает шторку */
        .notifications-sidebar.active { 
            transform: translateX(0); 
        }

        .notif-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 10px; }
        .notif-item { background: rgba(255,255,255,0.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; animation: fadeIn 0.3s ease; }
        .close-notif { cursor: pointer; font-size: 24px; line-height: 1; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #auth-status { font-size: 11px; color: #636e72; margin-top: 15px; text-transform: uppercase; }
        .hidden { display: none; }
        .btn-admin { margin-top: 10px; padding: 12px; width: 100%; border-radius: 15px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="notif-sidebar" class="notifications-sidebar">
        <div class="notif-header">
            <span style="font-weight: 800; letter-spacing: 1px;">SYSTEM LOG</span>
            <span class="close-notif" onclick="toggleNotif(false)">×</span>
        </div>
        <div id="notif-content">
            </div>
    </div>

    <div class="auth-card">
        <h1>Calendar</h1>
        <input type="text" id="username" placeholder="имя пользователя" oninput="handleInput(this.value)">
        
        <canvas id="canvas" width="260" height="260" class="disabled"></canvas>
        
        <div id="admin-area" class="hidden">
            <input type="password" id="admin-pass" placeholder="пароль">
            <button class="btn-admin" onclick="tryLogin()">ВОЙТИ КАК АДМИН</button>
        </div>
        
        <p id="auth-status">Введите имя</p>
        
        <button onclick="showNotification('Тестовое уведомление!')" style="margin-top:20px; opacity:0.3; font-size:10px; border:none; background:none; cursor:pointer;">проверить шторку</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let dots = [], pattern = "", drawing = false;

        // --- ФУНКЦИИ ШТОРКИ ---
        window.toggleNotif = (show) => {
            const sidebar = document.getElementById('notif-sidebar');
            if(show) sidebar.classList.add('active');
            else sidebar.classList.remove('active');
        };

        window.showNotification = (text) => {
            const content = document.getElementById('notif-content');
            content.innerHTML = `<div class="notif-item"><b>Система:</b><br>${text}</div>`;
            window.toggleNotif(true);
            
            // Авто-закрытие через 4 секунды
            setTimeout(() => {
                window.toggleNotif(false);
            }, 4000);
        };

        // Остальная логика (имя, канвас, вход)
        window.handleInput = (val) => {
            const isSet = val.trim().length > 0;
            canvas.classList.toggle('disabled', !isSet);
            document.getElementById('auth-status').innerText = isSet ? "Нарисуйте ключ" : "Введите имя";
            document.getElementById('admin-area').classList.toggle('hidden', val.toLowerCase() !== 'admin');
        };

        function initDots() {
            dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});
        }

        function draw() {
            ctx.clearRect(0, 0, 260, 260);
            if(pattern.length > 0) {
                ctx.beginPath(); ctx.strokeStyle = "#0984e3"; ctx.lineWidth = 6; ctx.lineJoin="round"; ctx.lineCap="round";
                for(let k=0; k<pattern.length; k+=2) {
                    let d = dots.find(dot => dot.id === pattern.substring(k, k+2));
                    k===0 ? ctx.moveTo(d.x, d.y) : ctx.lineTo(d.x, d.y);
                }
                ctx.stroke();
            }
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, 12, 0, Math.PI*2);
                ctx.fillStyle = d.hit ? "#0984e3" : "#dfe6e9"; ctx.fill();
            });
        }

        canvas.onmousedown = canvas.ontouchstart = (e) => {
            e.preventDefault(); pattern = ""; initDots(); drawing = true; draw();
        };

        window.onmouseup = window.ontouchend = () => {
            if(!drawing) return;
            drawing = false;
            if(pattern.length >= 4 && document.getElementById('username').value.toLowerCase() !== 'admin') window.tryLogin();
        };

        canvas.onmousemove = canvas.ontouchmove = (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
            dots.forEach(d => {
                if(Math.sqrt((x-d.x)**2 + (y-d.y)**2) < 20 && !d.hit) {
                    d.hit = true; pattern += d.id; draw();
                }
            });
        };

        window.tryLogin = async () => {
            const name = document.getElementById('username').value.trim().toLowerCase();
            const adminPass = document.getElementById('admin-pass').value;
            const finalSecret = (name === 'admin' && adminPass) ? adminPass : pattern;

            try {
                const userSnap = await getDoc(doc(db, "users", name));
                if (userSnap.exists()) {
                    if (userSnap.data().password === finalSecret) {
                        localStorage.setItem('currentUser', name);
                        window.location.href = 'calendar.html';
                    } else {
                        showNotification("Ошибка: Неверный ключ для доступа!");
                    }
                } else {
                    if (confirm(`Отправить заявку для "${name}"?`)) {
                        await setDoc(doc(db, "requests", name), { password: finalSecret, date: new Date().toISOString() });
                        showNotification("Запрос отправлен! Ожидайте активации.");
                    }
                }
            } catch (e) {
                showNotification("Ошибка: Проверьте интернет!");
            }
            pattern = ""; initDots(); draw();
        };

        initDots(); draw();
    </script>
</body>
</html>
