<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="apple-mobile-web-app-title" content="Calendarium">
<meta name="application-name" content="Calendarium">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121416">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Secure Terminal</title>
    <style>
        :root { 
            --accent: #0984e3; 
            --bg: #121416; 
            --orange: #f39c12; 
            --footer-bg: #eceff1;
        }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; flex-direction: column;
        }

        /* Адаптивная карточка */
        .auth-card { 
            background: white; padding: 30px; border-radius: 40px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; 
            width: 90%; max-width: 360px; z-index: 10; margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        h1 { font-size: 2rem; margin: 0 0 20px; color: #444; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }

        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 20px; 
            border: 1px solid #f0f0f0; background: #fafafa; text-align: center; 
            font-size: 1rem; outline: none; box-sizing: border-box; 
        }
        
        /* Адаптивный холст */
        canvas { 
            background: #fff; border: 0px solid #f0f0f0; border-radius: 30px; 
            cursor: crosshair; max-width: 100%; height: auto; touch-action: none;
        }
        canvas.disabled { opacity: 0.1; pointer-events: none; }
        canvas.hidden { display: none; }

        .status-text { font-size: 10px; color: var(--accent); margin-top: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

/* Контейнер для выравнивания в ряд */
.auth-header {
    display: flex;
    align-items: center;    /* Центровка по вертикали */
    justify-content: center; /* Центровка всего блока по горизонтали */
    gap: 15px;              /* Расстояние между картинкой и текстом */
    margin-bottom: 25px;    /* Отступ от всей шапки до инпута */
}

/* Стиль маленькой картинки сбоку */
.auth-logo-side {
    width: 40px;            /* Чуть меньше размер, раз она сбоку */
    height: 40px;
    object-fit: contain;
}

/* Убираем лишние отступы у заголовка, чтобы он не прыгал */
.auth-header h1 {
    margin: 0;
    font-size: 1.4rem;
    letter-spacing: 3px;
    line-height: 1;
}




        /* ШТОРКА SYSTEM LOG */
        #notif-sidebar { 
            position: fixed; right: 0; top: 0; width: 350px; height: 100vh; 
            background: var(--orange); color: white; z-index: 9999;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            padding: 30px; box-sizing: border-box;
        }
        #notif-sidebar.active { transform: translateX(0); }
        
        @media (max-width: 400px) {
            #notif-sidebar { width: 100%; } /* На совсем мелких — на весь экран */
            .auth-card { padding: 20px; border-radius: 30px; }
            h1 { font-size: 1.5rem; }
        }

        .notif-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-weight: 900; }
        .close-x { cursor: pointer; font-size: 28px; line-height: 1; }
        .log-card { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        
        .orange-btn { width: 100%; padding: 16px; border-radius: 18px; border: none; background: white; color: var(--orange); font-weight: bold; cursor: pointer; font-size: 1rem; }
        .admin-btn { width: 100%; padding: 15px; border-radius: 20px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--footer-bg); padding: 10px 20px;
            display: flex; align-items: center; box-sizing: border-box; border-top: 1px solid #dfe6e9;
        }
        .footer-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-right: 10px; }
        .footer-text { font-size: 9px; color: #95a5a6; text-transform: uppercase; font-weight: 600; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="notif-sidebar">
        <div class="notif-header">
            <span>SYSTEM LOG</span>
            <span class="close-x" onclick="closeLog()">×</span>
        </div>
        <div id="log-container"></div>
    </div>

    <div class="auth-card">
    <div class="auth-header">
        <img src="favicon.png" alt="L" class="auth-logo-side">
        <h1>GROUP</h1><h2>5</h2>
    </div>

    <input type="text" id="username" placeholder="имя пользователя" oninput="checkName(this.value)" autocomplete="off">
    
    
        
        <canvas id="canvas" width="260" height="260" class="disabled"></canvas>
        
        <div id="admin-box" class="hidden">
            <input type="password" id="admin-password" placeholder="пароль администратора">
            <button class="admin-btn" onclick="handleLogin()">Войти в систему</button>
        </div>

        <p class="status-text" id="status">Введите имя</p>
    </div>

    <footer>
        <div class="footer-dot"></div>
        <div class="footer-text">Group 5 • Version v2.6.16</div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const canvas = document.getElementById('canvas');
        const adminBox = document.getElementById('admin-box');
        const ctx = canvas.getContext('2d');
        const sidebar = document.getElementById('notif-sidebar');
        let dots = [], pattern = "", drawing = false;

        window.closeLog = () => {
            sidebar.classList.remove('active');
            resetCanvas();
        };

        function resetCanvas() {
            pattern = "";
            initDots();
            draw();
        }

        window.checkName = (val) => {
            const name = val.trim().toLowerCase();
            const isOk = name.length > 0;
            if (name === 'admin') {
                canvas.classList.add('hidden');
                adminBox.classList.remove('hidden');
                document.getElementById('status').innerText = "Режим администратора";
            } else {
                canvas.classList.remove('hidden');
                adminBox.classList.add('hidden');
                canvas.classList.toggle('disabled', !isOk);
                document.getElementById('status').innerText = isOk ? "Нарисуйте ключ" : "Введите имя";
            }
        };

        function initDots() {
            dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});
        }

        function draw() {
            ctx.clearRect(0, 0, 260, 260);
            if(pattern.length > 0) {
                ctx.beginPath(); ctx.strokeStyle = "#0984e3"; ctx.lineWidth = 8; ctx.lineCap="round"; ctx.lineJoin="round";
                for(let k=0; k < pattern.length; k+=2) {
                    let d = dots.find(dot => dot.id === pattern.substring(k, k+2));
                    if (k === 0) ctx.moveTo(d.x, d.y);
                    else ctx.lineTo(d.x, d.y);
                }
                ctx.stroke();
            }
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, 14, 0, Math.PI*2);
                ctx.fillStyle = d.hit ? "#0984e3" : "#dfe6e9";
                ctx.fill();
            });
        }

        // Универсальные события для ПК и Тач-скринов
        const startDraw = (e) => {
            if (canvas.classList.contains('disabled')) return;
            pattern = ""; initDots(); drawing = true; draw();
        };

        const moveDraw = (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            // Расчет для тача или мыши с учетом масштабирования canvas
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;

            dots.forEach(d => {
                if(Math.sqrt((x - d.x)**2 + (y - d.y)**2) < 25 && !d.hit) { 
                    d.hit = true; 
                    pattern += d.id; 
                    draw(); 
                }
            });
        };

        const endDraw = () => {
            if(!drawing) return;
            drawing = false;
            if(pattern.length >= 4) window.handleLogin();
        };

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, {passive: false});

        window.addEventListener('mousemove', moveDraw);
        window.addEventListener('touchmove', (e) => { if(drawing) e.preventDefault(); moveDraw(e); }, {passive: false});

        window.addEventListener('mouseup', endDraw);
        window.addEventListener('touchend', endDraw);

        window.handleLogin = async () => {
            const name = document.getElementById('username').value.trim().toLowerCase();
            const adminPass = document.getElementById('admin-password').value;
            const finalSecret = (name === 'admin') ? adminPass : pattern;

            if (!finalSecret) return;

            try {
                const snap = await getDoc(doc(db, "users", name));
                if (snap.exists()) {
                    if (snap.data().password === finalSecret) {
                        localStorage.setItem('currentUser', name);
                        window.location.href = 'calendar.html';
                    } else {
                        showLog("Ошибка", "Неверный ключ или пароль.");
                    }
                } else if (name !== 'admin') {
                    document.getElementById('log-container').innerHTML = `
                        <div class="log-card"><h3>Новый профиль?</h3><p>Создать запрос для "${name}"?</p></div>
                        <button class="orange-btn" id="send-req">ОТПРАВИТЬ</button>
                    `;
                    sidebar.classList.add('active');
                    document.getElementById('send-req').onclick = async () => {
                        await setDoc(doc(db, "requests", name), { password: pattern, date: new Date().toISOString() });
                        showLog("Готово", "Заявка отправлена администратору.");
                    };
                }
            } catch (e) { console.error(e); }
        };

        function showLog(title, text) {
            document.getElementById('log-container').innerHTML = `<div class="log-card"><h3>${title}</h3><p>${text}</p></div>`;
            sidebar.classList.add('active');
            setTimeout(closeLog, 3000);
        }

        initDots(); draw();
    </script>
</body>
</html>
