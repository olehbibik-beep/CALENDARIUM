<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="apple-mobile-web-app-title" content="Calendarium">
    <meta name="application-name" content="Calendarium">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121416">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Secure Terminal</title>
    <style>
        :root { 
            --accent: #09e0e3; 
            --bg: #71797E; 
            --orange: #383942; 
            --error: #ff4757;
            --warning: #ffa502;
            --title-color: #ffffff;
        }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; flex-direction: column;
            position: relative;
        }

        /* --- ГЛАВНЫЙ КОНТЕЙНЕР --- */
        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* --- КАРТОЧКА АВТОРИЗАЦИИ --- */
        .auth-wrapper {
            display: flex;
            background: #1a1d1f; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 320px; 
            flex-shrink: 0;
            position: relative;
        }

        .auth-content {
            padding: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .auth-header { margin-bottom: 20px; text-align: center; }
        .auth-header h1 {
            margin: 0; font-size: 1.3rem; letter-spacing: 2px; line-height: 1; 
            color: var(--title-color); font-weight: 800; text-transform: uppercase;
        }

        /* --- ПОЛЯ ВВОДА И КАНВАС --- */
        input { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 8px; 
            border: none; background: #fff; color: #444; text-align: center; 
            font-size: 1rem; outline: none; box-sizing: border-box; 
        }
        
        canvas { 
            background: transparent; border-radius: 8px; 
            cursor: crosshair; max-width: 100%; height: auto; touch-action: none;
        }
        canvas.disabled { opacity: 0.1; pointer-events: none; }
        .hidden { display: none !important; }

        /* --- ИНТЕРАКТИВНАЯ ЛИНИЯ --- */
        .status-line {
            width: 12px;
            background: var(--accent);
            border-radius: 0 16px 16px 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s ease;
            box-shadow: -2px 0 15px rgba(9, 224, 227, 0.2);
        }
        .status-line:hover { filter: brightness(1.8); }
        .status-line .dot { width: 4px; height: 4px; background: #fff; border-radius: 50%; opacity: 0.8; }
        
        /* Цвета статусов */
        .status-line.error { background: var(--error); box-shadow: -2px 0 15px rgba(255, 71, 87, 0.3); }
        .status-line.warning { background: var(--warning); box-shadow: -2px 0 15px rgba(255, 165, 2, 0.3); }

        /* --- ИНФО ПАНЕЛЬ (СПРАВА) --- */
        .info-panel {
            flex: 1;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            pointer-events: none;
            color: #fff;
            min-width: 250px;
        }
        
        .info-panel.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }
        
        .info-item { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 30px; }
        .info-num { font-size: 3.5rem; font-weight: 300; line-height: 0.8; }
        .info-desc { font-size: 0.9rem; font-weight: 300; color: #e0e6ed; line-height: 1.4; }

        /* --- КНОПКИ --- */
        .orange-btn { 
            padding: 12px 20px; border-radius: 6px; border: none; 
            background: var(--warning); color: #fff; font-weight: 800; 
            cursor: pointer; font-size: 0.8rem; text-transform: uppercase; 
            transition: all 0.3s ease; margin-top: 10px;
        }
        .orange-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .admin-btn { 
            width: 100%; padding: 14px; border-radius: 6px; border: none; 
            background: var(--accent); color: #001A1F; font-weight: 900; 
            cursor: pointer; margin-top: 10px; transition: all 0.3s ease;
        }
        .admin-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        
        /* --- ФУТЕР --- */
        .inner-footer {
            position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 10;
        }
        .footer-text { font-size: 10px; color: #aaa; text-transform: uppercase; font-weight: 300; letter-spacing: 2px; }
        
        @media (max-width: 750px) { 
            .main-container { flex-direction: column; gap: 20px; }
            .info-panel { transform: translateY(-20px); text-align: center; }
            .info-panel.active { transform: translateY(0); }
            .info-item { flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px;}
        }
    </style>
    <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</head>
<body>

    <div class="main-container">
        
        <div class="auth-wrapper">
            <div class="auth-content">
                <div class="auth-header">
                    <h1>CALENDARIUM</h1>
                </div>

                <input type="text" id="username" oninput="checkName(this.value)" maxlength="20" placeholder="Ваше имя">
                
                <canvas id="canvas" width="260" height="260" class="disabled"></canvas>
                
                <div id="admin-box" class="hidden" style="width: 100%;">
                    <input type="password" id="admin-password" placeholder="пароль администратора">
                    <button class="admin-btn" onclick="handleLogin()">Войти в систему</button>
                </div>
            </div>
            
            <div id="status-line" class="status-line" onclick="toggleInfo()">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div id="info-panel" class="info-panel">
            <div id="info-content">
                </div>
        </div>

    </div>

    <div class="inner-footer">
        <div class="footer-text">CALENDARIUM • v2.6.18</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const canvas = document.getElementById('canvas');
        const adminBox = document.getElementById('admin-box');
        const ctx = canvas.getContext('2d');
        
        let dots = [], pattern = "", drawing = false;
        let isPanelOpen = false;
        let panelState = 'info'; // 'info', 'error', 'warning'
        let currentEventsCount = "...";

        // Загрузка количества событий за текущий месяц
        async function fetchEventsCount() {
            try {
                const now = new Date();
                const docId = `${now.getFullYear()}_${now.getMonth()}`;
                const snap = await getDoc(doc(db, "calendar", docId));
                let count = 0;
                if (snap.exists()) {
                    const data = snap.data();
                    for (let day in data) {
                        if (Array.isArray(data[day])) count += data[day].length;
                    }
                }
                currentEventsCount = count;
                const el = document.getElementById('events-count');
                if(el) el.innerText = count;
            } catch(e) {
                console.error("Error fetching events", e);
            }
        }

        // Управление боковой панелью
        window.toggleInfo = () => {
            if (panelState !== 'info') {
                setPanelState('info');
                if (!isPanelOpen) togglePanel(true);
                return;
            }
            togglePanel(!isPanelOpen);
        };

        function togglePanel(show) {
            isPanelOpen = show;
            document.getElementById('info-panel').classList.toggle('active', show);
        }

        function setPanelState(state, customHtml = '') {
            panelState = state;
            const line = document.getElementById('status-line');
            const content = document.getElementById('info-content');
            
            line.className = 'status-line'; // сброс классов
            if (state === 'error') line.classList.add('error');
            if (state === 'warning') line.classList.add('warning');

            if (state === 'info') {
                content.innerHTML = `
                    <div class="info-item">
                        <div class="info-num" id="events-count">${currentEventsCount}</div>
                        <div class="info-desc">Предстоящих события<br>в этом месяце</div>
                    </div>
                    <div class="info-item">
                        <div class="info-num">7</div>
                        <div class="info-desc">Улучшения<br><span style="font-size:0.75rem; color:#888; display:block; margin-top:5px;">(Новый UI, удаление шторок, боковая инфо-панель)</span></div>
                    </div>
                `;
            } else {
                content.innerHTML = customHtml;
            }
        }

        // Возврат панели в дефолтное состояние при взаимодействии с формой
        function resetUIState() {
            if (panelState !== 'info') {
                setPanelState('info');
                togglePanel(false);
            }
            pattern = "";
            initDots();
            draw();
        }

        window.checkName = (val) => {
            let cleanValue = val.replace(/[^a-zA-Zа-яА-Я0-9]/g, '').slice(0, 20);
            const inputField = document.getElementById('username');
            
            if (val !== cleanValue) inputField.value = cleanValue;

            const name = cleanValue.trim().toLowerCase();
            const isOk = name.length > 0;
            
            resetUIState();
            
            if (name === 'admin') {
                canvas.classList.add('hidden');
                adminBox.classList.remove('hidden');
            } else {
                canvas.classList.remove('hidden');
                adminBox.classList.add('hidden');
                canvas.classList.toggle('disabled', !isOk);
            }
        };

        // --- ЛОГИКА ОТРИСОВКИ КЛЮЧА ---
        function initDots() {
            dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});
        }

        function draw() {
            ctx.clearRect(0, 0, 260, 260);
            
            let color = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            if(panelState === 'error') color = getComputedStyle(document.documentElement).getPropertyValue('--error').trim();
            if(panelState === 'warning') color = getComputedStyle(document.documentElement).getPropertyValue('--warning').trim();

            if(pattern.length > 0) {
                ctx.beginPath(); 
                ctx.strokeStyle = color; 
                ctx.lineWidth = 8; 
                ctx.lineCap="round"; 
                ctx.lineJoin="round";
                for(let k=0; k < pattern.length; k+=2) {
                    let d = dots.find(dot => dot.id === pattern.substring(k, k+2));
                    if (k === 0) ctx.moveTo(d.x, d.y);
                    else ctx.lineTo(d.x, d.y);
                }
                ctx.stroke();
            }
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, 14, 0, Math.PI*2);
                ctx.fillStyle = d.hit ? color : "#3e3e3e"; 
                ctx.fill();
            });
        }

        const startDraw = (e) => {
            if (canvas.classList.contains('disabled')) return;
            resetUIState();
            drawing = true; 
        };

        const moveDraw = (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;

            dots.forEach(d => {
                if(Math.sqrt((x - d.x)**2 + (y - d.y)**2) < 25 && !d.hit) { 
                    d.hit = true; pattern += d.id; draw(); 
                }
            });
        };

        const endDraw = () => {
            if(!drawing) return;
            drawing = false;
            if(pattern.length >= 4) window.handleLogin();
        };

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, {passive: false});
        window.addEventListener('mousemove', moveDraw);
        window.addEventListener('touchmove', (e) => { if(drawing) e.preventDefault(); moveDraw(e); }, {passive: false});
        window.addEventListener('mouseup', endDraw);
        window.addEventListener('touchend', endDraw);

        // --- ЛОГИКА АВТОРИЗАЦИИ ---
        window.handleLogin = async () => {
            const name = document.getElementById('username').value.trim().toLowerCase();
            const adminPass = document.getElementById('admin-password').value;
            const finalSecret = (name === 'admin') ? adminPass : pattern;

            if (!finalSecret) return;

            try {
                const snap = await getDoc(doc(db, "users", name));
                if (snap.exists()) {
                    if (snap.data().password === finalSecret) {
                        localStorage.setItem('currentUser', name);
                        window.location.href = 'calendar.html';
                    } else {
                        // Показываем ОШИБКУ справа (линия красная)
                        setPanelState('error', `
                            <div class="info-item" style="align-items: center;">
                                <div class="info-desc" style="color: var(--error); font-size: 1.4rem; font-weight: 500;">Неверный ключ или пароль.</div>
                            </div>
                        `);
                        togglePanel(true);
                        draw(); // перерисовать линии красным
                    }
                } else if (name !== 'admin') {
                    // Показываем ПРЕДЛОЖЕНИЕ РЕГИСТРАЦИИ справа (линия желтая)
                    setPanelState('warning', `
                        <div class="info-item" style="flex-direction: column; gap: 5px;">
                            <div class="info-desc" style="color: var(--warning); font-size: 1.4rem; font-weight: 800; text-transform: uppercase;">Новый профиль?</div>
                            <div class="info-desc" style="margin-bottom: 10px;">Хочу создать свой аккаунт с этим графическим ключом.</div>
                            <button class="orange-btn" id="send-req">ОТПРАВИТЬ ЗАЯВКУ</button>
                        </div>
                    `);
                    togglePanel(true);
                    draw(); // перерисовать линии желтым
                    
                    document.getElementById('send-req').onclick = async () => {
                        await setDoc(doc(db, "requests", name), { password: pattern, date: new Date().toISOString() });
                        setPanelState('info', `
                            <div class="info-item">
                                <div class="info-desc" style="color: var(--accent); font-size: 1.4rem; font-weight: 500;">\ Заявка отправлена администратору.</div>
                            </div>
                        `);
                    };
                }
            } catch (e) { console.error(e); }
        };

        // Старт
        initDots(); draw();
        fetchEventsCount();
        setPanelState('info');
    </script>
</body>
</html>
