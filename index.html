<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="apple-mobile-web-app-title" content="Calendarium">
    <meta name="application-name" content="Calendarium">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121416">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Secure Terminal</title>
    <style>
        :root { 
            --accent: #0984e3; 
            --bg: #121416; 
            --orange: #f39c12; 
            --footer-bg: #eceff1;
        }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; flex-direction: column;
        }

        /* КАРТОЧКА АВТОРИЗАЦИИ */
        .auth-card { 
            background: white; padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; 
            width: 90%; max-width: 360px; 
            z-index: 10; /* КАРТОЧКА СВЕРХУ */
            box-sizing: border-box;
            position: relative;
        }
        
        .auth-header h1 {
            margin: 0 0 20px 0; font-size: 1.3rem; letter-spacing: 2px; 
            color: #444; font-weight: 800; text-transform: uppercase;
        }

        input { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 6px; 
            border: none; background: #ebebeb; text-align: center; 
            font-size: 1rem; outline: none; box-sizing: border-box; 
        }
        
        canvas { 
            background: #fff; border-radius: 8px; 
            cursor: crosshair; max-width: 100%; height: auto; touch-action: none;
        }
        canvas.disabled { opacity: 0.1; pointer-events: none; }
        canvas.hidden { display: none; }

        .status-text { font-size: 10px; color: var(--accent); margin-top: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

        /* УВЕДОМЛЕНИЯ (PC: ВЫЕЗД ИЗ-ПОД ПЛИТКИ) */
        #notif-sidebar { 
            position: absolute; /* Относительно центра */
            width: 300px; 
            background: var(--orange); color: white; 
            z-index: 5; /* УВЕДОМЛЕНИЕ ПОД КАРТОЧКОЙ */
            border-radius: 8px;
            padding: 25px; box-sizing: border-box;
            
            /* Начальное положение: спрятано прямо за карточкой */
            transform: translateX(0) scale(0.9);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            display: flex; flex-direction: column;
        }
        
        /* Эффект выезда вправо на PC */
        #notif-sidebar.active { 
            transform: translateX(250px) scale(1); /* Сдвиг вправо */
            opacity: 1;
        }

        .notif-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
        }
        .notif-header span { font-weight: 900; font-size: 0.65rem; letter-spacing: 1px; }
        .close-x { cursor: pointer; font-size: 20px; line-height: 1; }

        #log-container { text-align: center; }
        .log-card h3 { margin: 0 0 5px 0; font-size: 1rem; }
        .log-card p { margin: 0 0 15px 0; font-size: 0.8rem; opacity: 0.9; }
        
        .orange-btn { width: 100%; padding: 12px; border-radius: 6px; border: none; background: white; color: var(--orange); font-weight: 900; cursor: pointer; font-size: 0.8rem; }
        .admin-btn { width: 100%; padding: 14px; border-radius: 6px; border: none; background: var(--accent); color: white; font-weight: 900; cursor: pointer; margin-top: 10px; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ (СВЕРХУ) */
        @media (max-width: 600px) {
            .auth-card { transform: translateY(-5vh); }
            
            #notif-sidebar { 
                position: fixed;
                top: 20px; left: 15px; right: 15px; 
                width: auto;
                transform: translateY(-150%); /* Прячем вверх */
                opacity: 0;
            }
            #notif-sidebar.active { 
                transform: translateY(0); 
                opacity: 1;
            }
        }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--footer-bg); padding: 10px 20px;
            display: flex; align-items: center; box-sizing: border-box; border-top: 1px solid #dfe6e9; z-index: 20;
        }
        .footer-dot { width: 6px; height: 6px; background: #2ecc71; border-radius: 50%; margin-right: 10px; }
        .footer-text { font-size: 8px; color: #95a5a6; text-transform: uppercase; font-weight: 600; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="notif-sidebar">
        <div class="notif-header">
            <span>СИСТЕМНЫЙ ЛОГ</span>
            <span class="close-x" onclick="closeLog()">×</span>
        </div>
        <div id="log-container"></div>
    </div>
    
    <div class="auth-card">
        <div class="auth-header">
            <h1>CALENDARIUM</h1>
        </div>
        <input type="text" id="username" placeholder="имя пользователя" oninput="checkName(this.value)" autocomplete="off">
        <canvas id="canvas" width="260" height="260" class="disabled"></canvas>
        <div id="admin-box" class="hidden">
            <input type="password" id="admin-password" placeholder="пароль администратора">
            <button class="admin-btn" onclick="handleLogin()">Войти в систему</button>
        </div>
        <p class="status-text" id="status">Введите имя</p>
    </div>

    <footer>
        <div class="footer-dot"></div>
        <div class="footer-text">Group 5 • Version v2.6.18</div>
    </footer>

            messagingSenderId: "204240857105",

        const db = getFirestore(initializeApp(firebaseConfig));
        const sidebar = document.getElementById('notif-sidebar');

        // Вставь сюда функции checkName, draw, startDraw, handleLogin и showLog из прошлого кода.
        // Главное — логика показа не изменилась, изменился только CSS.
        
        window.closeLog = () => { sidebar.classList.remove('active'); };

    </script>
</body>
</html>
