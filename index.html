<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan 2026 | Облачный Календарь</title>
    <style>
        :root { --primary: #2d3436; --accent: #0984e3; --bg: #bdc3c7; --card: #ffffff; --admin-red: #d63031; --pink-line: #fd79a8; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: white; color: var(--primary); height: 100%; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- ВХОД (БЕЗ ИЗМЕНЕНИЙ) --- */
        #auth-page { display: flex; height: 100vh; width: 100vw; background: white; position: fixed; top: 0; left: 0; z-index: 1000; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 5vh; box-sizing: border-box; }
        #auth-username { width: 260px; padding: 12px; margin-bottom: 10px; border-radius: 20px; border: 1px solid #ddd; background: #f8f9fa; font-size: 1rem; text-align: center; outline: none; }
        #pattern-canvas { background: transparent; cursor: crosshair; touch-action: none; margin-bottom: 10px; }
        #admin-pass-input { width: 200px; padding: 8px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; text-align: center; }
        #site-info-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #dfe6e9; display: flex; align-items: center; justify-content: center; color: #636e72; font-size: 12px; z-index: 1002; }

        /* --- НОВЫЙ МАКЕТ С САЙДБАРОМ --- */
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Левая панель */
        .sidebar { width: 300px; background: #bdc3c7; display: flex; flex-direction: column; padding: 40px 25px; box-sizing: border-box; border-right: 1px solid #95a5a6; }
        .user-tag { color: #7f8c8d; font-size: 0.9rem; margin-bottom: auto; }
        .sidebar-controls { display: flex; flex-direction: row; gap: 10px; }

        /* Правая панель */
        .main-view { flex: 1; padding: 60px; overflow-y: auto; background: white; }
        .main-view h1 { font-size: 5rem; margin: 0 0 40px 0; font-weight: 300; }

        /* Сетка месяцев */
        .year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .month-card { 
            background: white; border: 1px solid #f0f0f0; border-radius: 15px; aspect-ratio: 1/1.2; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; position: relative; 
        }
        .month-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .month-card h3 { font-weight: 400; font-size: 1.2rem; margin-bottom: 30px; }

        /* Розовая полоска активности */
        .activity-line { width: 50px; height: 6px; background: var(--pink-line); border-radius: 3px; position: absolute; bottom: 40px; }

        /* Кнопки как на макете */
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-exit { background: #636e72; color: white; }
        .btn-admin { background: var(--admin-red); color: white; display: flex; align-items: center; gap: 5px; }

        /* Страница месяца (адаптация) */
        #month-page { padding: 40px; }
        .month-layout { display: flex; gap: 30px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; flex: 2; }
        .day-box { background: #f8f9fa; border-radius: 10px; padding: 10px; min-height: 100px; border: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-page">
        <h2>Добро пожаловать</h2>
        <input type="text" id="auth-username" placeholder="Ваше имя" oninput="checkAdmin(this.value)">
        <canvas id="pattern-canvas" width="260" height="260"></canvas>
        <div id="admin-secret-wrap" class="hidden">
            <input type="password" id="admin-pass-input" placeholder="Пароль">
            <button class="btn btn-exit" onclick="handleAuthSubmit()" style="margin: 0 auto; display: block;">Войти</button>
        </div>
        <p class="auth-hint">Проведите графический ключ</p>
    </div>
    <div id="site-info-bar">© 2026 Твой Личный Облачный Планировщик</div>

    <div id="year-page" class="hidden">
        <div class="app-container">
            <aside class="sidebar">
                <div class="user-tag" id="sidebar-user-name">Имя пользователя</div>
                <div class="sidebar-controls">
                    <button class="btn btn-exit" onclick="location.reload()">Выйти</button>
                    <button id="admin-btn-side" class="btn btn-admin hidden" onclick="openAdminPanel()">⚙️ Управление</button>
                </div>
            </aside>
            <main class="main-view">
                <h1 id="year-title">2026</h1>
                <div class="year-grid" id="year-grid"></div>
            </main>
        </div>
    </div>

    <div id="month-page" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:500; overflow-y:auto;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 40px;">
            <button class="btn btn-exit" onclick="showYear()">← Назад к году</button>
            <h2 id="month-title" style="font-size: 3rem; margin: 20px 0;"></h2>
            <div class="month-layout">
                <div id="days-grid" class="days-grid"></div>
                <div style="flex:1; background:#f8f9fa; padding:20px; border-radius:15px;">
                    <div id="editor-section" class="hidden">
                        <h4 id="selected-day-label"></h4>
                        <textarea id="day-input" style="width:100%; height:150px; border-radius:10px; padding:10px; border:1px solid #ddd;"></textarea>
                        <button class="btn btn-exit" style="background:#0984e3; width:100%; margin-top:10px;" onclick="saveDayData()">Сохранить</button>
                    </div>
                    <div id="sidebar-list" style="margin-top:20px; font-size: 0.8rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; display:flex; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:15px; width:400px;">
            <h3>Заявки на доступ</h3>
            <div id="requests-list"></div>
            <button class="btn btn-exit" style="width:100%; margin-top:20px;" onclick="document.getElementById('admin-modal').classList.add('hidden')">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        let user = "";
        let patternResult = "";
        let currentMonthIdx = null;
        let currentDay = null;
        let currentMonthData = {};

        window.checkAdmin = (val) => {
            const secretBox = document.getElementById('admin-secret-wrap');
            if(val.toLowerCase() === 'admin') secretBox.classList.remove('hidden');
            else secretBox.classList.add('hidden');
        };

        window.handleAuthSubmit = async () => {
            user = document.getElementById('auth-username').value.trim().toLowerCase();
            const textPass = document.getElementById('admin-pass-input').value;
            let finalSecret = textPass || patternResult;
            if(!user || !finalSecret) return alert("Введите имя и ключ.");

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                if (userSnap.data().password === finalSecret) loginSuccess();
                else alert("Ошибка доступа.");
            } else {
                const reqRef = doc(db, "requests", user);
                if(confirm("Отправить запрос на доступ?")) {
                    await setDoc(reqRef, { password: finalSecret, mode: textPass ? 'password' : 'pattern' });
                    alert("Запрос отправлен.");
                }
            }
        };

        function loginSuccess() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('site-info-bar').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            document.getElementById('sidebar-user-name').innerText = user.toUpperCase();
            if (user === 'admin') document.getElementById('admin-btn-side').classList.remove('hidden');
            renderYearGrid();
        }

        async function renderYearGrid() {
            const grid = document.getElementById('year-grid');
            grid.innerHTML = '';
            
            for(let i=0; i<months.length; i++) {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.onclick = () => openMonth(i);
                card.innerHTML = `<h3>${months[i]}</h3>`;
                
                // Проверка активности (розовая линия)
                const snap = await getDoc(doc(db, "data", `month_${i}`));
                if (snap.exists() && Object.keys(snap.data()).length > 0) {
                    const line = document.createElement('div');
                    line.className = 'activity-line';
                    card.appendChild(line);
                }
                grid.appendChild(card);
            }
        }

        window.openMonth = (mIdx) => {
            currentMonthIdx = mIdx;
            document.getElementById('month-page').classList.remove('hidden');
            document.getElementById('month-title').innerText = months[mIdx];
            onSnapshot(doc(db, "data", `month_${mIdx}`), (snap) => {
                currentMonthData = snap.exists() ? snap.data() : {};
                renderDays();
            });
        };

        function renderDays() {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            for (let d = 1; d <= 31; d++) {
                const dayData = currentMonthData[d] || { text: "" };
                const div = document.createElement('div');
                div.className = 'day-box';
                div.innerHTML = `<b>${d}</b><div style="font-size:10px; color:#666;">${dayData.text.substring(0,20)}</div>`;
                div.onclick = () => {
                    currentDay = d;
                    document.getElementById('editor-section').classList.remove('hidden');
                    document.getElementById('selected-day-label').innerText = `${d} ${months[currentMonthIdx]}`;
                    document.getElementById('day-input').value = dayData.text;
                };
                grid.appendChild(div);
            }
        }

        window.saveDayData = async () => {
            const val = document.getElementById('day-input').value.trim();
            currentMonthData[currentDay] = { text: val, author: user };
            await setDoc(doc(db, "data", `month_${currentMonthIdx}`), currentMonthData);
            alert("Сохранено!");
        };

        window.showYear = () => document.getElementById('month-page').classList.add('hidden');

        // ГРАФИЧЕСКИЙ КЛЮЧ
        (function initPattern() {
            const canvas = document.getElementById('pattern-canvas');
            const ctx = canvas.getContext('2d');
            let drawing = false;
            const dots = [];
            for(let i=0; i<3; i++) for(let j=0; j<3; j++) dots.push({id: i+""+j, x: 50+i*80, y: 50+j*80, hit: false});
            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dots.forEach(d => {
                    ctx.beginPath(); ctx.arc(d.x, d.y, 14, 0, Math.PI*2);
                    ctx.fillStyle = d.hit ? "#7f8c8d" : "#95a5a6"; ctx.fill();
                });
            };
            canvas.onmousedown = canvas.ontouchstart = () => { patternResult = ""; dots.forEach(d=>d.hit=false); drawing = true; draw(); };
            window.onmouseup = window.ontouchend = () => { drawing = false; if(user !== 'admin' && patternResult.length > 2) window.handleAuthSubmit(); };
            canvas.onmousemove = canvas.ontouchmove = (e) => {
                if(!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                dots.forEach(d => {
                    if (Math.sqrt((x-d.x)**2 + (y-d.y)**2) < 25 && !d.hit) { d.hit = true; patternResult += d.id; draw(); }
                });
            };
            draw();
        })();

        window.openAdminPanel = async () => {
            document.getElementById('admin-modal').classList.remove('hidden');
            const list = document.getElementById('requests-list');
            const snap = await getDocs(collection(db, "requests"));
            list.innerHTML = "";
            snap.forEach(d => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${d.id}</span>
                    <button onclick="approveUser('${d.id}','${d.data().password}')">✅</button>
                </div>`;
            });
        };
        window.approveUser = async (n, p) => { 
            await setDoc(doc(db, "users", n), { password: p }); 
            await deleteDoc(doc(db, "requests", n)); 
            alert("Готово"); openAdminPanel(); 
        };
    </script>
</body>
</html>
