<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общий Календарь 2026</title>
    <style>
        :root { --primary: #4A90E2; --bg: #F0F4F8; --card: #FFFFFF; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }
        
        /* Сетка */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; }
        .month-tile { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 5px solid var(--primary); transition: 0.2s; }
        .month-tile:hover { transform: translateY(-3px); background: var(--primary); color: white; }

        .day-card { background: var(--card); padding: 10px; border-radius: 10px; min-height: 100px; display: flex; flex-direction: column; border: 1px solid #ddd; }
        .day-number { font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        
        textarea { flex-grow: 1; border: 1px solid #eee; border-radius: 5px; padding: 5px; font-size: 13px; resize: none; }
        textarea:disabled { background: #f9f9f9; color: #666; cursor: not-allowed; border: 1px dashed #ccc; }
        
        .author-tag { font-size: 10px; color: #999; margin-top: 3px; font-style: italic; }
        
        header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center;">
            <h2>Войти в общий календарь</h2>
            <input type="text" id="username" placeholder="Ваше имя" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
            <button onclick="login()" style="width: 100%;">Войти</button>
        </div>
    </div>

    <div id="year-page" class="hidden">
        <header>
            <h1 id="user-title">Календарь 2026</h1>
            <button onclick="location.reload()">Выйти</button>
        </header>
        <div class="grid" id="year-grid"></div>
    </div>

    <div id="month-page" class="hidden">
        <header>
            <button onclick="showYear()" style="background: #607D8B;">← Назад</button>
            <h1 id="month-title">Месяц</h1>
            <div></div>
        </header>
        <div class="grid" id="days-grid" style="grid-template-columns: repeat(7, 1fr);"></div>
    </div>

    <script>
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        let currentUser = "";

        function login() {
            const name = document.getElementById('username').value.trim();
            if (!name) return alert("Введите имя!");
            currentUser = name;
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            document.getElementById('user-title').innerText = `Привет, ${name}!`;
            initYear();
        }

        function initYear() {
            const container = document.getElementById('year-grid');
            container.innerHTML = '';
            months.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'month-tile';
                div.innerHTML = `<h3>${m}</h3>`;
                div.onclick = () => openMonth(i);
                container.appendChild(div);
            });
        }

        function openMonth(mIdx) {
            document.getElementById('year-page').classList.add('hidden');
            document.getElementById('month-page').classList.remove('hidden');
            document.getElementById('month-title').innerText = months[mIdx];
            
            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';

            for (let d = 1; d <= 31; d++) {
                const dayId = `shared_day_${mIdx}_${d}`;
                const data = JSON.parse(localStorage.getItem(dayId)) || { text: "", author: "" };

                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                
                // Проверка: можно ли редактировать? (если пусто или если ты автор)
                const canEdit = data.author === "" || data.author === currentUser;

                dayCard.innerHTML = `
                    <div class="day-number">${d}</div>
                    <textarea 
                        id="input-${dayId}" 
                        ${canEdit ? "" : "disabled"} 
                        placeholder="${canEdit ? "Напишите что-то..." : "Занято другим..."}"
                        onchange="saveData('${dayId}', this.value)"
                    >${data.text}</textarea>
                    <div class="author-tag">${data.author ? "Автор: " + data.author : "Свободно"}</div>
                `;
                grid.appendChild(dayCard);
            }
        }

        function saveData(id, val) {
            const data = {
                text: val,
                author: val.trim() === "" ? "" : currentUser // Если текст удален, ячейка освобождается
            };
            localStorage.setItem(id, JSON.stringify(data));
            // Перерисовываем, чтобы обновить подпись автора
            const mTitle = document.getElementById('month-title').innerText;
            openMonth(months.indexOf(mTitle));
        }

        function showYear() {
            document.getElementById('month-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
        }
    </script>
</body>
</html>
