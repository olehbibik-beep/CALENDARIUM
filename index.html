<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan 2026 | Облачный Календарь</title>
    <style>
        :root { --primary: #2d3436; --accent: #0984e3; --bg: #dfe6e9; --card: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* --- СТРАНИЦА ВХОДА (SPLIT SCREEN) --- */
        #auth-page {
            display: flex;
            height: 100vh;
            width: 100vw;
            background: white;
            position: fixed;
            top: 0; left: 0;
            z-index: 1000;
        }

        .auth-left {
            flex: 1;
            background: #ced4da url('https://images.unsplash.com/photo-1506784365847-bbad939e9335?q=80&w=2068&auto=format&fit=crop') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .auth-left::after { content: ""; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.3); }
        .auth-left h1 { color: white; z-index: 1; font-size: 4rem; text-shadow: 2px 2px 15px rgba(0,0,0,0.5); }

        .auth-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .auth-form-card { width: 100%; max-width: 350px; text-align: center; }
        
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
        }

        #pattern-canvas {
            background: #f8f9fa; border-radius: 15px; cursor: crosshair;
            margin: 20px 0; touch-action: none; border: 1px solid #eee;
        }

        .toggle-auth { color: var(--accent); cursor: pointer; font-size: 14px; text-decoration: underline; margin-top: 15px; }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .month-tile { 
            background: var(--card); aspect-ratio: 1/1; border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s; border: 1px solid #eee;
        }
        .month-tile:hover { transform: translateY(-5px); border-color: var(--accent); }
        .month-tile span { font-size: 2.5rem; margin-bottom: 10px; }

        .month-layout { display: flex; gap: 20px; margin-top: 20px; }
        .calendar-main { flex: 3; }
        .notes-sidebar { flex: 1.2; background: var(--card); padding: 20px; border-radius: 15px; height: 75vh; overflow-y: auto; position: sticky; top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-card { background: var(--card); padding: 8px; border-radius: 8px; min-height: 90px; border: 1px solid #eee; display: flex; flex-direction: column; }
        textarea { width: 100%; flex-grow: 1; border: none; background: #f1f2f6; border-radius: 4px; resize: none; font-size: 12px; padding: 5px; box-sizing: border-box; }
        
        .sidebar-item { border-bottom: 1px solid #f1f2f6; padding: 12px 0; font-size: 0.85rem; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="auth-left">
            <h1>Plan 2026</h1>
        </div>
        <div class="auth-right">
            <div class="auth-form-card">
                <h2 id="auth-title">Добро пожаловать</h2>
                <input type="text" id="username" placeholder="Ваше имя">

                <div id="password-mode">
                    <input type="password" id="pass" placeholder="Пароль">
                </div>

                <div id="pattern-mode" class="hidden">
                    <p style="font-size: 14px; color: #666;">Нарисуйте графический ключ:</p>
                    <canvas id="pattern-canvas" width="260" height="260"></canvas>
                </div>

                <button class="btn" onclick="handleAuthSubmit()" style="width: 100%; margin-top: 10px;">Войти</button>
                <div class="toggle-auth" onclick="toggleAuthMode()">Использовать графический ключ</div>
            </div>
        </div>
    </div>

    <div id="year-page" class="hidden container">
        <header>
            <h1 id="welcome-user">2026</h1>
            <button class="btn" style="background:#636e72" onclick="location.reload()">Выйти</button>
        </header>
        <div class="year-grid" id="year-grid"></div>
    </div>

    <div id="month-page" class="hidden container">
        <header>
            <button class="btn" style="background:#636e72" onclick="showYear()">← К году</button>
            <h1 id="month-title"></h1>
            <div style="width:80px"></div>
        </header>
        <div class="month-layout">
            <div class="calendar-main"><div class="days-grid" id="days-grid"></div></div>
            <div class="notes-sidebar">
                <h3 style="margin-top:0; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">🔔 Активность</h3>
                <div id="sidebar-list"></div>
            </div>
        </div>
    </div>
