<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общий Облачный Календарь</title>
    <style>
        :root { --primary: #2d3436; --accent: #0984e3; --bg: #dfe6e9; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Плитки года */
        .year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .month-tile { 
            background: var(--card); aspect-ratio: 1/1; border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s; border: 1px solid #eee;
        }
        .month-tile:hover { transform: scale(1.02); border-color: var(--accent); }

        /* Месяц и Сайдбар */
        .month-layout { display: flex; gap: 20px; }
        .calendar-main { flex: 3; }
        .notes-sidebar { flex: 1; background: var(--card); padding: 20px; border-radius: 15px; height: 80vh; overflow-y: auto; position: sticky; top: 20px; }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-card { background: var(--card); padding: 8px; border-radius: 8px; min-height: 80px; border: 1px solid #eee; }
        textarea { width: 100%; height: 50px; border: none; background: #f1f2f6; border-radius: 4px; resize: none; font-size: 12px; }
        
        .sidebar-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9rem; }
        .author { font-size: 10px; color: #0984e3; font-weight: bold; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-page" class="container" style="text-align: center; margin-top: 10vh;">
        <div style="background: white; padding: 40px; border-radius: 20px; display: inline-block; width: 300px;">
            <h2>📅 Вход в Общий Календарь</h2>
            <input type="text" id="username" placeholder="Ваше имя" style="width: 100%; padding: 10px; margin-bottom: 15px;">
            <button class="btn" onclick="window.login()" style="width: 100%;">Войти</button>
        </div>
    </div>

    <div id="year-page" class="hidden container">
        <header><h1>2026</h1></header>
        <div class="year-grid" id="year-grid"></div>
    </div>

    <div id="month-page" class="hidden container">
        <header>
            <button class="btn" onclick="location.reload()">← Назад</button>
            <h1 id="month-title"></h1>
        </header>
        <div class="month-layout">
            <div class="calendar-main"><div class="days-grid" id="days-grid"></div></div>
            <div class="notes-sidebar">
                <h3>🔔 Активность</h3>
                <div id="sidebar-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // !!! ВСТАВЬ СВОЙ КОНФИГ ТУТ !!!
        const firebaseConfig = {
            apiKey: "твой_ключ",
            authDomain: "твой_проект.firebaseapp.com",
            projectId: "твой_проект",
            storageBucket: "твой_проект.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const icons = ["❄️","🌨️","🌱","☔","🌸","☀️","🌊","🍎","🍂","🎃","☁️","🎄"];
        let user = "";

        window.login = () => {
            user = document.getElementById('username').value.trim();
            if(!user) return alert("Имя!");
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('year-page').classList.remove('hidden');
            renderYear();
        };

        function renderYear() {
            const grid = document.getElementById('year-grid');
            grid.innerHTML = '';
            months.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'month-tile';
                div.innerHTML = `<span>${icons[i]}</span><h3>${m}</h3>`;
                div.onclick = () => openMonth(i);
                grid.appendChild(div);
            });
        }

        function openMonth(mIdx) {
            document.getElementById('year-page').classList.add('hidden');
            document.getElementById('month-page').classList.remove('hidden');
            document.getElementById('month-title').innerText = months[mIdx];
            
            // СЛУШАЕМ ОБЛАКО В РЕАЛЬНОМ ВРЕМЕНИ
            onSnapshot(doc(db, "data", `month_${mIdx}`), (docSnap) => {
                const monthData = docSnap.exists() ? docSnap.data() : {};
                renderDays(mIdx, monthData);
            });
        }

        function renderDays(mIdx, data) {
            const grid = document.getElementById('days-grid');
            const sidebar = document.getElementById('sidebar-list');
            grid.innerHTML = ''; sidebar.innerHTML = '';

            for (let d = 1; d <= 31; d++) {
                const dayData = data[d] || { text: "", author: "" };
                const canEdit = dayData.author === "" || dayData.author === user;

                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = `<b>${d}</b><textarea id="day-${d}" ${canEdit ? "" : "disabled"}>${dayData.text}</textarea>`;
                grid.appendChild(card);

                // Если кто-то написал — добавляем в правую колонку
                if(dayData.text) {
                    sidebar.innerHTML += `<div class="sidebar-item"><b>${d} ${months[mIdx]}:</b> ${dayData.text} <br> <span class="author">👤 ${dayData.author}</span></div>`;
                }

                // Сохранение в облако
                const area = card.querySelector('textarea');
                area.onchange = async () => {
                    data[d] = { text: area.value, author: area.value ? user : "" };
                    await setDoc(doc(db, "data", `month_${mIdx}`), data);
                };
            }
        }
    </script>
</body>
</html>
