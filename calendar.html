<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --bg: #121416; 
            --dark: #22272a; 
            --card-bg: #1e2224;
            --ev-memorial: #ff7675; 
            --ev-meeting: #0984e3; 
            --accent-gold: #fdcb6e;
            --text-main: #e0e6ed;
            --footer-bg: #0f1112; 
            --footer-border: #222;
        }
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* САЙДБАР (ТЕМНЫЙ) */
        .sidebar { 
            width: 320px; background: #0f1112; padding: 25px; 
            display: flex; flex-direction: column; border-right: 1px solid var(--footer-border);
            flex-shrink: 0; z-index: 10;
        }

        .user-header { display: flex; align-items: center; width: 100%; justify-content: space-between; margin-bottom: 25px; }
        .user-name { font-weight: 800; text-transform: uppercase; font-size: 0.7rem; color: var(--accent); letter-spacing: 1px; }
        
        .nav-btns { display: flex; gap: 8px; }
        .btn-small { background: var(--dark); color: #fff; border: 1px solid #333; padding: 6px 12px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-small:active { transform: scale(0.9); }
        .btn-admin { border-color: var(--accent); color: var(--accent); }

        /* ПЕРЕКЛЮЧАТЕЛЬ ГОДА */
        .year-switcher { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 30px; }
        #display-year { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; line-height: 1; color: #fff; }
        .year-side { cursor: pointer; color: #3d444b; font-weight: 900; padding: 10px; font-size: 1.2rem; transition: 0.2s; }
        .year-side:hover { color: var(--accent); }

        /* ПРЕВЬЮ СОБЫТИЯ */
        .upcoming-box { width: 100%; margin-top: auto; padding-bottom: 40px; }
        .event-card-mini { background: var(--card-bg); padding: 15px; border-radius: 15px; border-left: 4px solid var(--ev-meeting); border: 1px solid #2d3436; border-left-width: 4px; animation: fadeIn 0.4s ease; }
        .ev-title { font-size: 0.85rem; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 4px; }

        /* СЕТКА МЕСЯЦЕВ */
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px; background: var(--bg); }
        .months-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            width: 100%; 
            max-width: 850px; 
        }
        
        .month-card { 
            background: var(--dark); border-radius: 18px; 
            aspect-ratio: 1 / 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; font-weight: 900; cursor: pointer; position: relative; transition: 0.3s;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;
            border: 1px solid transparent;
        }
        .month-card:hover { background: var(--card-bg); border-color: #333; transform: translateY(-3px); }
        .month-card:active { transform: scale(0.92); background: #000; }

        /* ИНДИКАТОРЫ ТОЧКИ */
        .month-indicator { position: absolute; bottom: 12px; display: flex; gap: 4px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.red { background: var(--ev-memorial); box-shadow: 0 0 8px var(--ev-memorial); }
        .dot.blue { background: var(--ev-meeting); box-shadow: 0 0 8px var(--ev-meeting); }

        /* ФУТЕР */
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--footer-bg); padding: 15px 25px;
            display: flex; align-items: center; box-sizing: border-box; 
            border-top: 1px solid var(--footer-border); z-index: 100;
        }
        .footer-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-right: 12px; box-shadow: 0 0 10px #2ecc71; }
        .footer-text { font-size: 10px; color: #576574; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        /* АНИМАЦИЯ */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* МОБИЛЬНАЯ ВЕРСИЯ */
        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { 
                width: 100%; padding: 15px; height: auto; 
                border-right: none; border-bottom: 1px solid var(--footer-border);
            }
            .year-switcher { margin-bottom: 10px; }
            #display-year { font-size: 2.8rem; }
            .upcoming-box { padding-bottom: 10px; margin-top: 15px; }
            
            .main-content { padding: 20px; padding-bottom: 100px; }
            .months-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .month-card { border-radius: 12px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="user-header">
            <div id="user-display" class="user-name">...</div>
            <div class="nav-btns">
                <button id="admin-btn" class="btn-small btn-admin" onclick="location.href='admin.html'" style="display:none;">АДМИН</button>
                <button class="btn-small" onclick="localStorage.clear(); location.href='index.html'">ВЫХОД</button>
            </div>
        </div>

        <div class="year-switcher">
            <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
            <div id="display-year"></div>
            <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
        </div>

        <div class="upcoming-box">
            <div id="next-event-container">
                <div style="font-size:0.6rem; opacity:0.3; text-align:center;">ПОИСК СОБЫТИЙ...</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <footer>
        <div class="footer-dot"></div>
        <div class="footer-text">Cloud Plan Ecosystem • Main Terminal v2.3</div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        const user = localStorage.getItem('currentUser') || 'ГОСТЬ';
        document.getElementById('user-display').innerText = user;
        if(user.toLowerCase() === 'admin') {
            document.getElementById('admin-btn').style.display = 'block';
        }

        let currentYear = parseInt(localStorage.getItem('selectedYear')) || 2026;

        function initGrid() {
            const grid = document.getElementById('months');
            grid.innerHTML = '';
            monthsNames.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                // Берем короткое имя для карточки
                const shortName = m.substring(0, 3);
                card.innerHTML = `<span>${shortName}</span><div class="month-indicator" id="ind-${i}"></div>`;
                card.onclick = () => {
                    localStorage.setItem('selectedMonth', i);
                    localStorage.setItem('selectedYear', currentYear.toString());
                    window.location.href = 'notes.html';
                };
                grid.appendChild(card);
            });
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            let firstFound = null;

            for (let j = 0; j < 12; j++) {
                const el = document.getElementById(`ind-${j}`);
                if (el) el.innerHTML = '';
            }

            for (let i = 0; i < 12; i++) {
                try {
                    const snap = await getDoc(doc(db, "calendar", `${currentYear}_${i}`));
                    if (snap.exists()) {
                        const data = snap.data();
                        const ind = document.getElementById(`ind-${i}`);
                        let hasRed = false, hasBlue = false;

                        Object.keys(data).sort((a,b) => a-b).forEach(day => {
                            data[day].forEach(n => {
                                if (n.category === 'memorial' || n.category === 'congress') hasRed = true;
                                else hasBlue = true;
                                
                                if (!firstFound) {
                                    firstFound = { text: n.text, day, month: monthsNames[i], cat: n.category };
                                }
                            });
                        });

                        if (ind) {
                            if (hasRed) ind.innerHTML += '<div class="dot red"></div>';
                            if (hasBlue) ind.innerHTML += '<div class="dot blue"></div>';
                        }
                    }
                } catch (e) {}
            }

            if (firstFound) {
                const accent = (firstFound.cat === 'memorial') ? 'var(--ev-memorial)' : 'var(--ev-meeting)';
                container.innerHTML = `
                    <div class="event-card-mini" style="border-left-color: ${accent}">
                        <div class="ev-title">${firstFound.text}</div>
                        <div style="font-size:0.65rem; opacity:0.5; font-weight:700; color: #ccc;">${firstFound.day} ${firstFound.month} ${currentYear}</div>
                    </div>`;
            } else {
                container.innerHTML = '<div style="font-size:0.6rem; opacity:0.2; text-align:center; letter-spacing:1px;">НЕТ ЗАПЛАНИРОВАННЫХ СОБЫТИЙ</div>';
            }
        }

        window.changeYear = (dir) => { 
            currentYear += dir; 
            updateDisp(); 
            initGrid(); 
            loadData(); 
        };

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear.toString());
        }

        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
