<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Terminal 2.0</title>
    <style>
        :root { 
            --accent: #0984e3; 
            --sidebar-bg: #ffffff;
            --main-bg: #f0f3f5;
            --text-main: #2d3436; 
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
            --online: #2ecc71;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; display: flex; 
            height: 100vh; background: var(--main-bg); overflow: hidden; 
        }

        /* --- САЙДБАР --- */
        .sidebar { 
            width: 350px; background: var(--sidebar-bg); padding: 30px; 
            display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; 
            z-index: 10; flex-shrink: 0; align-items: flex-end; text-align: right;
        }

        .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .user-name { font-size: 1.1rem; font-weight: 800; color: var(--text-main); text-transform: uppercase; }
        .logout-btn { background: #000; color: #fff; border: none; padding: 5px 12px; border-radius: 6px; font-size: 0.6rem; cursor: pointer; font-weight: 900; }

        /* ВЫБОР ГОДА */
        .year-selector { 
            display: flex; align-items: center; gap: 15px; justify-content: flex-end; 
            margin-bottom: 30px; color: #dfe6e9;
        }
        #display-year { 
            font-size: 5.5rem; font-weight: 900; color: #dfe6e9; 
            letter-spacing: -4px; line-height: 0.8; cursor: pointer; transition: 0.3s;
        }
        #display-year:hover { color: var(--accent); }
        .year-btn { 
            background: none; border: 1px solid #dfe6e9; color: #b2bec3; 
            border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold;
        }
        .year-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ПОЛЬЗОВАТЕЛИ В СЕТИ */
        .online-box { width: 100%; margin-top: auto; padding-top: 20px; border-top: 1px solid #f1f1f1; }
        .online-title { font-size: 0.7rem; font-weight: 800; color: #b2bec3; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
        .online-dot { width: 8px; height: 8px; background: var(--online); border-radius: 50%; box-shadow: 0 0 8px var(--online); animation: pulse 1.5s infinite; }
        
        .user-online-item { font-size: 0.9rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
        .user-online-item::before { content: ''; width: 4px; height: 4px; background: #dfe6e9; border-radius: 50%; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* --- СЕТКА МЕСЯЦЕВ --- */
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 25px; height: 100vh; }
        .months-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px; width: 100%; max-width: 1000px; 
        }

        .month-card { 
            background: #fff; border-radius: 20px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.1rem; color: var(--text-main);
            cursor: pointer; border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            aspect-ratio: 1.2 / 1;
        }
        .month-card::before { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: var(--accent); }
        .month-card:nth-child(3n+1)::before { background: var(--ev-work); }
        .month-card:nth-child(3n+2)::before { background: var(--ev-important); }
        .month-card:nth-child(3n+3)::before { background: var(--ev-personal); }

        .month-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.06); border-color: var(--accent); }

        /* МОБИЛКИ */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 15px; align-items: center; text-align: center; border-right: none; border-bottom: 1px solid #eee; }
            .year-selector { margin-bottom: 10px; gap: 10px; }
            #display-year { font-size: 3rem; letter-spacing: -2px; }
            .online-box { display: none; } /* На мобилках скрываем список юзеров для места */
            .main-content { padding: 10px; height: calc(100vh - 150px); }
            .months-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 8px; height: 100%; }
            .month-card { aspect-ratio: auto; font-size: 0.85rem; border-radius: 12px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="logout-btn" onclick="logout()">Exit</button>
            <div class="user-name" id="display-name">...</div>
        </div>

        <div class="year-selector">
            <button class="year-btn" onclick="changeYear(-1)">‹</button>
            <div id="display-year">2026</div>
            <button class="year-btn" onclick="changeYear(1)">›</button>
        </div>

        <div class="online-box">
            <div class="online-title">
                Users Online
                <div class="online-dot"></div>
            </div>
            <div id="online-list">
                <div class="user-online-item" id="me-status">Вы в сети</div>
                </div>
        </div>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <script type="module">
        /* Названия месяцев */
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        const yearTitle = document.getElementById('display-year');
        
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || 2026;
        yearTitle.innerText = currentYear;

        const currentUser = localStorage.getItem('currentUser') || 'Guest';
        document.getElementById('display-name').innerText = currentUser;

        /* Отрисовка сетки */
        function renderMonths() {
            grid.innerHTML = '';
            monthsNames.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<span>${m}</span>`;
                card.onclick = () => { 
                    localStorage.setItem('selectedMonth', i);
                    localStorage.setItem('selectedYear', currentYear);
                    window.location.href = 'notes.html'; 
                };
                grid.appendChild(card);
            });
        }

        /* Функция смены года */
        window.changeYear = (dir) => {
            currentYear += dir;
            yearTitle.innerText = currentYear;
            localStorage.setItem('selectedYear', currentYear);
            renderMonths();
        };

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };

        renderMonths();
    </script>
</body>
</html>
