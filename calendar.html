<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --sidebar-bg: #1a1a1a; --main-bg: #f4f4f4; --card-bg: #2d3436; 
            --ev-memorial: #ff4757; --ev-meeting: #0984e3; --accent-gold: #fdcb6e;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        .sidebar { 
            width: 400px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; align-items: flex-end; color: white;
        }
        .year-switcher { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 40px; }
        #display-year { font-size: 4.5rem; font-weight: 900; }
        .year-side { cursor: pointer; color: #444; font-weight: 900; }

        .upcoming-box { width: 100%; margin-top: auto; text-align: left; }
        .event-card-mini { background: #252525; padding: 20px; border-radius: 20px; border-right: 6px solid transparent; }
        .ev-title { font-size: 0.9rem; font-weight: 800; color: #fff; }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px; }
        .months-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 700px; }
        .month-card { 
            background: var(--card-bg); border-radius: 22px; height: 150px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; font-weight: 900; cursor: pointer; position: relative; transition: 0.2s;
        }
        .month-card:hover { transform: scale(1.05); background: #000; }
        .month-indicator { position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot.red { background: var(--ev-memorial); box-shadow: 0 0 8px var(--ev-memorial); }
        .dot.blue { background: var(--ev-meeting); box-shadow: 0 0 8px var(--ev-meeting); }
        
        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; padding: 20px; }
            .months-grid { grid-template-columns: repeat(3, 1fr); width: 100%; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="year-switcher">
            <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
            <div id="display-year"></div>
            <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
        </div>
        <div class="upcoming-box">
            <div style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px;">БЛИЖАЙШЕЕ СОБЫТИЕ</div>
            <div id="next-event-container">Поиск...</div>
        </div>
    </div>
    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || 2026;
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        function initGrid() {
            const grid = document.getElementById('months');
            grid.innerHTML = '';
            monthsNames.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<span>${m}</span><div class="month-indicator" id="ind-${i}"></div>`;
                card.onclick = () => {
                    localStorage.setItem('selectedMonth', i);
                    localStorage.setItem('selectedYear', currentYear);
                    window.location.href = 'notes.html';
                };
                grid.appendChild(card);
            });
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            let found = false;
            const now = new Date();

            for (let i = 0; i < 12; i++) {
                const snap = await getDoc(doc(db, "calendar", `${currentYear}_${i}`));
                if (snap.exists()) {
                    const data = snap.data();
                    const ind = document.getElementById(`ind-${i}`);
                    let red = false, blue = false;

                    const days = Object.keys(data).map(Number).sort((a,b)=>a-b);
                    days.forEach(d => {
                        data[d].forEach(n => {
                            if(n.category === 'memorial') red = true; else blue = true;
                            if(!found && (currentYear > now.getFullYear() || (currentYear === now.getFullYear() && (i > now.getMonth() || (i === now.getMonth() && d >= now.getDate()))))) {
                                container.innerHTML = `<div class="event-card-mini" style="border-right-color: ${n.category==='memorial'?'#ff4757':'#0984e3'}">
                                    <div class="ev-title">${n.text}</div>
                                    <div style="font-size:0.7rem; opacity:0.6;">${d} ${monthsNames[i]}</div>
                                </div>`;
                                found = true;
                            }
                        });
                    });
                    if(red) ind.innerHTML += '<div class="dot red"></div>';
                    if(blue) ind.innerHTML += '<div class="dot blue"></div>';
                }
            }
            if(!found) container.innerHTML = 'НЕТ ПЛАНОВ';
        }

        window.changeYear = (dir) => { currentYear += dir; updateDisp(); initGrid(); loadData(); };
        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        updateDisp(); initGrid(); loadData();
    </script>
</body>
</html>
