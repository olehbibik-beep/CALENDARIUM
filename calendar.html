<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 | CALENDARIUM</title>
    <style>
        :root { --accent: #0984e3; --bg: #f4f7f6; --orange: #f39c12; --text: #2d3436; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: white; overflow: hidden; }

        /* САЙДБАР */
        .sidebar { 
            width: 300px; background: #dfe6e9; padding: 40px 20px; 
            display: flex; flex-direction: column; border-right: 1px solid #ddd;
        }
        .user-profile { margin-bottom: 40px; }
        .user-name { font-size: 1.8rem; font-weight: 900; color: var(--text); text-transform: uppercase; line-height: 1; }
        .user-role { font-size: 0.7rem; color: #636e72; letter-spacing: 2px; margin-top: 5px; }

        .nav-btn { 
            width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 15px; border: none;
            background: white; color: var(--text); font-weight: bold; cursor: pointer; text-align: left;
            transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .nav-btn:hover { background: #f1f2f6; transform: translateX(5px); }
        .nav-btn.admin-only { background: var(--orange); color: white; display: none; }

        .logout-btn { margin-top: auto; background: #b2bec3; color: white; }

        /* ОСНОВНАЯ СЕТКА */
        .main-content { flex: 1; padding: 60px; overflow-y: auto; background: var(--bg); }
        h1 { font-size: 5rem; font-weight: 200; margin: 0 0 40px 0; color: #b2bec3; }

        .months-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
        }
        .month-card { 
            background: white; border-radius: 25px; height: 180px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.2rem; cursor: pointer; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid transparent;
        }
        .month-card:hover { transform: translateY(-10px); border-color: var(--accent); color: var(--accent); }

        /* ШТОРКА ЗАЯВОК */
        .admin-sidebar {
            position: fixed; right: 0; top: 0; width: 380px; height: 100vh; 
            background: var(--orange); color: white; z-index: 1000;
            transform: translateX(100%); transition: 0.4s; padding: 30px; box-sizing: border-box;
        }
        .admin-sidebar.active { transform: translateX(0); }
        
        .request-item { 
            background: rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; margin-bottom: 15px;
        }
        .req-actions { display: flex; gap: 10px; margin-top: 15px; }
        .req-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .approve { background: #2ecc71; color: white; }
        .reject { background: #e74c3c; color: white; }

        /* СТАТУС-СООБЩЕНИЕ В ШТОРКЕ */
        .status-msg {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid white;
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        footer { position: fixed; bottom: 0; width: 100%; background: #eceff1; padding: 5px 20px; font-size: 10px; color: #95a5a6; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-profile">
            <div class="user-name" id="display-name">Guest</div>
            <div class="user-role" id="display-role">Terminal User</div>
        </div>
        
        <button class="nav-btn" onclick="location.reload()">ОБНОВИТЬ ДАННЫЕ</button>
        <button id="admin-req-btn" class="nav-btn admin-only" onclick="toggleAdminSidebar(true)">ЗАЯВКИ ПОЛЬЗОВАТЕЛЕЙ</button>
        
        <button class="nav-btn logout-btn" onclick="logout()">ВЫЙТИ</button>
    </div>

    <div class="main-content">
        <h1 id="year">2026</h1>
        <div class="months-grid" id="months"></div>
    </div>

    <div id="admin-sidebar" class="admin-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <span style="font-weight:900; letter-spacing: 1px;">USER REQUESTS</span>
            <span style="cursor:pointer; font-size:24px;" onclick="toggleAdminSidebar(false)">×</span>
        </div>
        <div id="requests-list"></div>
    </div>

    <footer>Cloud Plan Ecosystem — Calendar Access</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser');

        if (!currentUser) window.location.href = 'index.html';

        document.getElementById('display-name').innerText = currentUser;
        if (currentUser === 'admin') {
            document.getElementById('admin-req-btn').style.display = 'block';
            document.getElementById('display-role').innerText = 'System Administrator';
        }

        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        months.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'month-card';
            card.innerText = m;
            card.onclick = () => {
                localStorage.setItem('selectedMonth', i);
                window.location.href = 'notes.html';
            };
            grid.appendChild(card);
        });

        window.toggleAdminSidebar = (show) => {
            const sb = document.getElementById('admin-sidebar');
            if (show) {
                sb.classList.add('active');
                loadRequests();
            } else {
                sb.classList.remove('active');
            }
        };

        async function loadRequests() {
            const list = document.getElementById('requests-list');
            list.innerHTML = 'Загрузка...';
            const querySnapshot = await getDocs(collection(db, "requests"));
            list.innerHTML = '';
            
            querySnapshot.forEach((documentSnap) => {
                const data = documentSnap.data();
                const name = documentSnap.id;
                
                const item = document.createElement('div');
                item.className = 'request-item';
                item.innerHTML = `
                    <div style="font-weight:bold;">Пользователь: ${name}</div>
                    <div style="font-size:0.8rem; opacity:0.8;">Ключ: ${data.password}</div>
                    <div class="req-actions">
                        <button class="req-btn approve" id="app-${name}">Одобрить</button>
                        <button class="req-btn reject" id="rej-${name}">Удалить</button>
                    </div>
                `;
                list.appendChild(item);

                document.getElementById(`app-${name}`).onclick = () => manageUser(name, data.password, 'approve');
                document.getElementById(`rej-${name}`).onclick = () => manageUser(name, '', 'reject');
            });
            if (list.innerHTML === '') list.innerHTML = 'Заявок пока нет.';
        }

        window.manageUser = async (name, pass, action) => {
            try {
                if (action === 'approve') {
                    await setDoc(doc(db, "users", name), { password: pass });
                    await deleteDoc(doc(db, "requests", name));
                    showStatusInSidebar(`Пользователь ${name} добавлен!`);
                } else {
                    await deleteDoc(doc(db, "requests", name));
                    showStatusInSidebar(`Заявка ${name} удалена.`);
                }
                setTimeout(loadRequests, 1200);
            } catch (e) {
                showStatusInSidebar("Ошибка доступа к БД");
            }
        };

        function showStatusInSidebar(text) {
            const list = document.getElementById('requests-list');
            const msg = document.createElement('div');
            msg.className = 'status-msg';
            msg.innerText = text;
            list.prepend(msg);
        }

        window.logout = () => {
            localStorage.clear();
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
