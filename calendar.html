<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --sidebar-bg: #1a1a1a; --main-bg: #f4f4f4; --card-bg: #2d3436; 
            --ev-memorial: #ff4757; --ev-meeting: #0984e3; --accent-gold: #fdcb6e;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        .sidebar { 
            width: 400px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; align-items: flex-end; color: white;
            flex-shrink: 0;
        }
        .year-switcher { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 40px; }
        #display-year { font-size: 4.5rem; font-weight: 900; }
        .year-side { cursor: pointer; color: #444; font-weight: 900; transition: 0.3s; padding: 10px; }
        .year-side:hover { color: #fff; }

        .upcoming-box { width: 100%; margin-top: auto; text-align: left; min-height: 120px; }
        .event-card-mini { background: #252525; padding: 20px; border-radius: 20px; border-right: 6px solid transparent; animation: fadeIn 0.5s ease; }
        .ev-title { font-size: 0.95rem; font-weight: 800; color: #fff; text-transform: uppercase; line-height: 1.3; }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .months-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; max-width: 850px; }
        .month-card { 
            background: var(--card-bg); border-radius: 25px; height: 160px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; font-weight: 900; cursor: pointer; position: relative; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .month-card:hover { transform: translateY(-5px); background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .month-indicator { position: absolute; top: 15px; right: 15px; display: flex; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.red { background: var(--ev-memorial); box-shadow: 0 0 10px var(--ev-memorial); }
        .dot.blue { background: var(--ev-meeting); box-shadow: 0 0 10px var(--ev-meeting); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 950px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; padding: 30px; align-items: center; }
            .months-grid { grid-template-columns: repeat(3, 1fr); gap: 15px; }
            .month-card { height: 130px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="year-switcher">
            <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
            <div id="display-year"></div>
            <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
        </div>
        <div class="upcoming-box">
            <div style="font-size: 0.7rem; opacity: 0.4; margin-bottom: 12px; letter-spacing: 2px; font-weight: 900;">БЛИЖАЙШЕЕ СОБЫТИЕ</div>
            <div id="next-event-container">Загрузка данных...</div>
        </div>
    </div>
    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        // Получаем год, строго преобразуя в число
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || 2026;

        function initGrid() {
            const grid = document.getElementById('months');
            grid.innerHTML = '';
            monthsNames.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<span>${m}</span><div class="month-indicator" id="ind-${i}"></div>`;
                card.onclick = () => {
                    localStorage.setItem('selectedMonth', i);
                    localStorage.setItem('selectedYear', currentYear.toString());
                    window.location.href = 'notes.html';
                };
                grid.appendChild(card);
            });
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            let firstFound = null;

            // Сначала очистим все старые индикаторы
            for (let j = 0; j < 12; j++) {
                const el = document.getElementById(`ind-${j}`);
                if (el) el.innerHTML = '';
            }

            for (let i = 0; i < 12; i++) {
                // Пытаемся получить данные для месяца
                const docId = `${currentYear}_${i}`;
                try {
                    const snap = await getDoc(doc(db, "calendar", docId));
                    
                    if (snap.exists()) {
                        const monthData = snap.data();
                        const ind = document.getElementById(`ind-${i}`);
                        let red = false, blue = false;

                        // Перебираем дни (ключи объекта)
                        const days = Object.keys(monthData).map(Number).sort((a,b) => a-b);
                        
                        days.forEach(day => {
                            const entries = monthData[day];
                            if (Array.isArray(entries)) {
                                entries.forEach(entry => {
                                    // Логика индикаторов
                                    if (entry.category === 'memorial' || entry.category === 'congress') red = true;
                                    else blue = true;

                                    // Записываем самое первое событие в году для сайдбара
                                    if (!firstFound) {
                                        firstFound = {
                                            text: entry.text,
                                            day: day,
                                            month: monthsNames[i],
                                            cat: entry.category
                                        };
                                    }
                                });
                            }
                        });

                        // Рисуем точки
                        if (ind) {
                            if (red) ind.innerHTML += '<div class="dot red"></div>';
                            if (blue) ind.innerHTML += '<div class="dot blue"></div>';
                        }
                    }
                } catch (e) {
                    console.error("Ошибка загрузки:", docId, e);
                }
            }

            // Обновляем сайдбар
            if (firstFound) {
                const color = (firstFound.cat === 'memorial' || firstFound.cat === 'congress') ? '#ff4757' : '#0984e3';
                container.innerHTML = `
                    <div class="event-card-mini" style="border-right-color: ${color}">
                        <div class="ev-title">${firstFound.text}</div>
                        <div style="font-size:0.75rem; opacity:0.5; margin-top:8px; font-weight:700;">
                            ${firstFound.day} ${firstFound.month} ${currentYear}
                        </div>
                    </div>`;
            } else {
                container.innerHTML = '<div style="opacity:0.2; font-weight:900; font-size:0.8rem;">СОБЫТИЙ НЕ НАЙДЕНО</div>';
            }
        }

        window.changeYear = (dir) => { 
            currentYear += dir; 
            updateDisp(); 
            initGrid(); 
            loadData(); 
        };

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear.toString());
        }

        // Запуск
        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
