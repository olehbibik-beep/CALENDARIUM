<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0088cc; --bg: #0b0d0e; --dark: #1a1d1f; --card-bg: #22272a;
            --ev-memorial: #ff7675; --ev-meeting: #09e0e3; --text-main: #e0e6ed;
            --inner-border: rgba(255, 255, 255, 0.05);
        }
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; 
        }

        /* ГЛАВНАЯ ПЛИТКА-ОБОЛОЧКА */
        .app-container {
            width: 95vw; max-width: 1200px; height: 90vh;
            background: #0f1112; border-radius: 30px;
            border: 1px solid var(--inner-border);
            display: flex; position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* ЛЕВАЯ СТОРОНА (САЙДБАР) */
        .sidebar { 
            width: 300px; background: rgba(0,0,0,0.2); 
            padding: 30px; display: flex; flex-direction: column; 
            border-right: 1px solid var(--inner-border); flex-shrink: 0;
        }

        .user-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .user-name { font-weight: 800; text-transform: uppercase; font-size: 0.7rem; color: var(--accent); letter-spacing: 1px; }
        .nav-btns { display: flex; gap: 8px; }
        .btn-small { background: var(--dark); color: #fff; border: 1px solid #333; padding: 6px 12px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; cursor: pointer; }

        /* ПРАВАЯ СТОРОНА (КАЛЕНДАРЬ) */
        .main-view { 
            flex: 1; display: flex; flex-direction: column; 
            padding: 40px; position: relative;
        }

        .year-switcher { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 40px; }
        #display-year { font-size: 4rem; font-weight: 900; letter-spacing: -3px; color: #fff; }
        .year-side { cursor: pointer; color: #3d444b; font-weight: 900; font-size: 1.5rem; transition: 0.2s; }
        .year-side:hover { color: var(--accent); }

        .months-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; 
            width: 100%; max-width: 800px; margin: 0 auto;
        }
        
        .month-card { 
            background: var(--dark); border-radius: 18px; aspect-ratio: 1 / 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; font-weight: 900; cursor: pointer; position: relative; transition: 0.3s;
            text-transform: uppercase; font-size: 0.9rem;
        }

        .month-card.current-active { background: transparent !important; z-index: 1; }
        .month-card.current-active::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(90, 90, 90, 0.4); border-radius: 18px; z-index: -1;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .month-indicator { position: absolute; bottom: 12px; display: flex; gap: 4px; width: 60%; }
        .dot { height: 4px; flex: 1; border-radius: 10px; }
        .dot.red { background: var(--ev-memorial); }
        .dot.blue { background: var(--ev-meeting); }

        /* УВЕДОМЛЕНИЯ */
        .upcoming-box { margin-top: 20px; overflow-y: auto; flex: 1; padding-right: 5px; }
        .event-card-mini { 
            background: var(--card-bg); padding: 12px; border-radius: 12px; 
            margin-bottom: 10px; border-left: 4px solid var(--accent);
            animation: fadeIn 0.3s ease;
        }
        .ev-title { font-size: 0.75rem; font-weight: 800; color: #fff; margin-bottom: 4px; text-transform: uppercase; line-height: 1.2; }
        .ev-date { font-size: 0.65rem; color: var(--accent); opacity: 0.8; font-weight: 700; }

        /* ВНУТРЕННИЙ ФУТЕР (Для ПК) */
        .inner-footer {
            position: absolute; bottom: 20px; left: 340px; right: 40px;
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 20px; border-top: 1px solid var(--inner-border);
        }
        .footer-text { font-size: 9px; color: #444; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .footer-dot { width: 6px; height: 6px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 10px #2ecc71; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 850px) {
            body { overflow: auto; height: auto; }
            .app-container { flex-direction: column; height: auto; min-height: 100vh; width: 100vw; border-radius: 0; overflow: visible; display: flex; }
            
            .sidebar { display: contents; }
            .user-header { order: 1; width: 100%; padding: 20px; background: #0f1112; border-bottom: 1px solid var(--inner-border); margin-bottom: 0; }
            .main-view { order: 2; padding: 20px; width: 100%; overflow: visible; }
            .months-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            
            .upcoming-box { 
                order: 3; display: block; width: 100%; padding: 20px; 
                background: rgba(255, 255, 255, 0.02); border-top: 1px solid var(--inner-border); 
            }
            
            .inner-footer { 
                order: 4; position: static; width: 100%; padding: 20px; 
                left: 0; right: 0; margin-top: 10px;
            }

            #display-year { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="user-header">
                <div id="user-display" class="user-name">...</div>
                <div class="nav-btns">
                    <button id="admin-btn" class="btn-small" onclick="location.href='admin.html'" style="display:none; color:var(--accent);">ADMIN</button>
                    <button class="btn-small" onclick="localStorage.clear(); location.href='index.html'">ВЫХОД</button>
                </div>
            </div>
            
            <div class="upcoming-box" id="next-event-container">
                <div style="font-size:0.6rem; opacity:0.3; text-align:center;">ЗАГРУЗКА...</div>
            </div>
        </div>

        <div class="main-view">
            <div class="year-switcher">
                <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
                <div id="display-year"></div>
                <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
            </div>
            <div class="months-grid" id="months"></div>
        </div>

        <div class="inner-footer">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="footer-dot"></div>
                <div class="footer-text">Group 5 • v2.6.16</div>
            </div>
            <div class="footer-text">© 2026 CALENDARIUM</div>
        </div>
    </div>

    <script type="module">
        const user = localStorage.getItem('currentUser');
        if (!user) { window.location.replace('index.html'); }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || new Date().getFullYear();
        
        document.getElementById('user-display').innerText = user;
        if(user.toLowerCase() === 'admin') document.getElementById('admin-btn').style.display = 'block';

        function initGrid() {
            const grid = document.getElementById('months');
            const now = new Date();
            const todayMonth = now.getMonth(); 
            const todayYear = now.getFullYear();

            grid.innerHTML = monthsNames.map((m, i) => {
                const isToday = (i === todayMonth && currentYear === todayYear);
                return `
                    <div class="month-card ${isToday ? 'current-active' : ''}" onclick="goToMonth(${i})">
                        <span>${m.substring(0, 3)}</span>
                        <div class="month-indicator" id="ind-${i}"></div>
                    </div>`;
            }).join('');
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            container.innerHTML = '<div style="font-size:0.6rem; opacity:0.3; text-align:center; margin-top:20px;">ПОИСК...</div>';

            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            let upcomingEvents = [];

            const snapshots = await Promise.all(Array.from({length: 12}, (_, i) => getDoc(doc(db, "calendar", `${currentYear}_${i}`))));

            snapshots.forEach((snap, i) => {
                const ind = document.getElementById(`ind-${i}`);
                if (ind) ind.innerHTML = '';
                if (snap.exists()) {
                    const data = snap.data();
                    let red = false, blue = false;
                    Object.entries(data).forEach(([day, notes]) => {
                        notes.forEach(n => {
                            if (n.category === 'memorial' || n.category === 'congress') red = true; else blue = true;
                            const evDate = new Date(currentYear, i, parseInt(day)).getTime();
                            if (evDate >= todayStart) upcomingEvents.push({ text: n.text, day, mName: monthsNames[i], stamp: evDate, cat: n.category });
                        });
                    });
                    if (ind) {
                        if (red) ind.innerHTML += '<div class="dot red"></div>';
                        if (blue) ind.innerHTML += '<div class="dot blue"></div>';
                    }
                }
            });

            upcomingEvents.sort((a, b) => a.stamp - b.stamp);
            if (upcomingEvents.length > 0) {
                container.innerHTML = '<div style="font-size:0.6rem; color:var(--accent); margin-bottom:15px; font-weight:800; letter-spacing:1px; text-align:center;">АКТУАЛЬНОЕ</div>' + 
                upcomingEvents.slice(0, 5).map(ev => `
                    <div class="event-card-mini" style="border-left-color: ${(ev.cat === 'memorial' || ev.cat === 'congress') ? 'var(--ev-memorial)' : 'var(--ev-meeting)'}">
                        <div class="ev-title">${ev.text}</div>
                        <div class="ev-date">${ev.day} ${ev.mName}</div>
                    </div>`).join('');
            } else {
                container.innerHTML = '<div style="font-size:0.6rem; opacity:0.2; text-align:center; margin-top:20px;">СОБЫТИЙ НЕТ</div>';
            }
        }

        window.goToMonth = (i) => {
            localStorage.setItem('selectedMonth', i);
            localStorage.setItem('selectedYear', currentYear);
            window.location.href = 'notes.html';
        };

        window.changeYear = (dir) => { currentYear += dir; updateDisp(); initGrid(); loadData(); };
        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        updateDisp(); initGrid(); loadData();
    </script>
</body>
</html>
