<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALENDARIUM | Dashboard</title>
    <style>
        :root { 
            --accent: #0088cc; --bg: #4с4с4с; --dark: #1a1d1f; --card-bg: #22272a;
            --ev-memorial: #ff7675; --ev-meeting: #09e0e3; --text-main: #e0e6ed;
            --inner-border: rgba(255, 255, 255, 0.05);
        }
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; 
        }

        /* ГЛАВНАЯ ПЛИТКА */
        .app-container {
            width: 90%; max-width: 90%; height: 90%;
            background: #0f1112; border-radius: 24px;
            border: 1px solid var(--inner-border);
            display: flex; position: relative; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        /* САЙДБАР */
        .sidebar { 
            width: 280px; background: rgba(255,255,255,0.02); 
            padding: 25px; display: flex; flex-direction: column; 
            border-right: 1px solid var(--inner-border); flex-shrink: 0;
        }

        .user-header { margin-bottom: 25px; }
        .user-name { font-weight: 800; text-transform: uppercase; font-size: 0.65rem; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 10px; display: block;}
        .nav-btns { display: flex; gap: 8px; }
        .btn-small { background: var(--dark); color: #fff; border: 1px solid #333; padding: 6px 10px; border-radius: 6px; font-size: 0.6rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-small:hover { background: #333; }

        .upcoming-box { flex: 1; overflow-y: auto; padding-right: 5px; margin-top: 10px; }
        /* Скроллбар для сайдбара */
        .upcoming-box::-webkit-scrollbar { width: 3px; }
        .upcoming-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .event-card-mini { 
            background: var(--card-bg); padding: 12px; border-radius: 12px; 
            margin-bottom: 10px; border-left: 3px solid var(--accent);
            animation: fadeIn 0.4s ease forwards;
        }
        .ev-title { font-size: 0.7rem; font-weight: 800; color: #fff; text-transform: uppercase; line-height: 1.2; }
        .ev-date { font-size: 0.6rem; opacity: 0.5; margin-top: 5px; font-weight: 600; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-view { flex: 1; display: flex; flex-direction: column; padding: 30px; position: relative; }

        .year-switcher { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; }
        #display-year { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; color: #fff; }
        .year-side { cursor: pointer; color: #2d3436; font-weight: 900; font-size: 1.2rem; transition: 0.2s; padding: 10px; }
        .year-side:hover { color: var(--accent); }

        .months-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; 
            width: 100%; max-width: 700px; margin: 0 auto;
        }
        
        .month-card { 
            background: var(--dark); border-radius: 14px; aspect-ratio: 1 / 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; font-weight: 800; cursor: pointer; position: relative; transition: 0.3s;
            text-transform: uppercase; font-size: 0.8rem;
        }
        .month-card:hover { transform: translateY(-3px); background: #2a2f32; }

        /* АКТИВНЫЙ МЕСЯЦ (УМЕНЬШЕННЫЙ ЦЕНТР) */
        .month-card.current-active { background: transparent !important; }
        .month-card.current-active::before {
            content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
            background: rgba(100, 100, 100, 0.6); border-radius: 10px; z-index: -1;
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        .month-indicator { position: absolute; bottom: 8px; display: flex; gap: 3px; width: 70%; height: 3px; }
        .dot { flex: 1; height: 100%; border-radius: 2px; }
        .dot.red { background: var(--ev-memorial); }
        .dot.blue { background: var(--ev-meeting); }

        /* ФУТЕР ВНУТРИ */
        .inner-footer {
            margin-top: auto; padding-top: 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-top: 1px solid var(--inner-border);
        }
        .footer-text { font-size: 8px; color: #444; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 850px) {
            .app-container { height: 100vh; width: 100vw; border-radius: 0; flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--inner-border); }
            .upcoming-box { display: none; }
            .months-grid { grid-template-columns: repeat(3, 1fr); }
            #display-year { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="user-header">
                <span id="user-display" class="user-name">LOADING...</span>
                <div class="nav-btns">
                    <button id="admin-btn" class="btn-small" onclick="location.href='admin.html'" style="display:none; color:var(--accent);">ADMIN</button>
                    <button class="btn-small" onclick="localStorage.clear(); location.href='index.html'">ВЫХОД</button>
                </div>
            </div>
            
            <div id="next-event-container" class="upcoming-box">
                <div style="font-size:0.6rem; opacity:0.2; text-align:center; margin-top: 20px;">ПОИСК СОБЫТИЙ...</div>
            </div>
        </aside>

        <main class="main-view">
            <div class="year-switcher">
                <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
                <div id="display-year"></div>
                <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
            </div>

            <div class="months-grid" id="months"></div>

            <div class="inner-footer">
                <div class="footer-text">v2.6.16 • CLNDR</div>
                <div class="footer-text">© 2026 GROUP 5</div>
            </div>
        </main>
    </div>

    <script type="module">
        const user = localStorage.getItem('currentUser');
        if (!user) window.location.replace('index.html');

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || new Date().getFullYear();
        
        document.getElementById('user-display').innerText = user;
        if(user.toLowerCase() === 'admin') document.getElementById('admin-btn').style.display = 'block';

        function initGrid() {
            const grid = document.getElementById('months');
            const now = new Date();
            const todayMonth = now.getMonth(); 
            const todayYear = now.getFullYear();

            grid.innerHTML = monthsNames.map((m, i) => {
                const isToday = (i === todayMonth && currentYear === todayYear);
                return `
                    <div class="month-card ${isToday ? 'current-active' : ''}" onclick="goToMonth(${i})">
                        <span>${m.substring(0, 3)}</span>
                        <div class="month-indicator" id="ind-${i}"></div>
                    </div>`;
            }).join('');
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            const now = new Date();
            const todayStamp = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            
            let upcomingEvents = [];
            const monthPromises = Array.from({length: 12}, (_, i) => getDoc(doc(db, "calendar", `${currentYear}_${i}`)));
            const snapshots = await Promise.all(monthPromises);

            snapshots.forEach((snap, i) => {
                if (snap.exists()) {
                    const data = snap.data();
                    const ind = document.getElementById(`ind-${i}`);
                    if (!ind) return;

                    let red = false, blue = false;
                    Object.entries(data).forEach(([day, notes]) => {
                        notes.forEach(n => {
                            if (n.category === 'memorial' || n.category === 'congress') red = true; else blue = true;
                            
                            // Собираем события для сайдбара
                            const evDate = new Date(currentYear, i, parseInt(day)).getTime();
                            if (evDate >= todayStamp) {
                                upcomingEvents.push({ text: n.text, day, mName: monthsNames[i], stamp: evDate, cat: n.category });
                            }
                        });
                    });
                    if (red) ind.innerHTML += '<div class="dot red"></div>';
                    if (blue) ind.innerHTML += '<div class="dot blue"></div>';
                }
            });

            // Сортируем и выводим ближайшие 5 событий
            upcomingEvents.sort((a, b) => a.stamp - b.stamp);
            if (upcomingEvents.length > 0) {
                container.innerHTML = '<div style="font-size:0.6rem; color:var(--accent); margin-bottom:15px; font-weight:800; letter-spacing:1px;">АКТУАЛЬНОЕ</div>' + 
                upcomingEvents.slice(0, 5).map(ev => `
                    <div class="event-card-mini" style="border-left-color: ${ (ev.cat==='memorial'||ev.cat==='congress') ? 'var(--ev-memorial)' : 'var(--ev-meeting)' }">
                        <div class="ev-title">${ev.text}</div>
                        <div class="ev-date">${ev.day} ${ev.mName}</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div style="font-size:0.6rem; opacity:0.2; text-align:center; margin-top:20px;">СОБЫТИЙ НЕ НАЙДЕНО</div>';
            }
        }

        window.goToMonth = (i) => {
            localStorage.setItem('selectedMonth', i);
            localStorage.setItem('selectedYear', currentYear);
            window.location.href = 'notes.html';
        };

        window.changeYear = (dir) => { 
            currentYear += dir; 
            updateDisp(); 
            initGrid(); 
            loadData(); 
        };

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
