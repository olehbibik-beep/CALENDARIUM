<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="view-transition" content="same-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM</title>
    <style>
    /* =========================================
       1. ПЕРЕМЕННЫЕ И БАЗОВЫЕ НАСТРОЙКИ
       ========================================= */
    :root { 
        --accent: #09e0e3; 
        --bg: #71797E; 
        --dark: #1a1d1f;
        --card-bg: #22272a;
        --ev-memorial: #ff7675; 
        --ev-meeting: #09e0e3; 
        --text-main: #e0e6ed;
        --inner-border: rgba(255, 255, 255, 0.05);
    }
    
    * { 
        box-sizing: border-box; 
        font-family: 'Inter', sans-serif; 
        -webkit-tap-highlight-color: transparent; 
    }
    
    body { 
        margin: 0; padding: 0; 
        background: var(--bg); color: var(--text-main); 
        display: flex; align-items: center; justify-content: center; 
        height: 100dvh; width: 100vw; 
        overflow: hidden; 
    }

    /* =========================================
       2. ГЛАВНЫЕ КОНТЕЙНЕРЫ (КАРКАС ПРИЛОЖЕНИЯ)
       ========================================= */
    .app-container {
        width: 95vw; height: 90dvh; 
        max-width: 1400px; max-height: 900px;
        background: #0f1112;
        border-radius: 30px; 
        display: flex; flex-direction: row; 
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* =========================================
       3. НОВАЯ ЛЕВАЯ ПАНЕЛЬ НАВИГАЦИИ (МЕНЮ)
       ========================================= */
    .nav-bar {
        width: 60px;
        background: rgba(30, 30, 35, 0.3);
        border-right: 1px solid var(--inner-border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 3vh 0;
        flex-shrink: 0;
        z-index: 20;
    }
    .nav-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    /* =========================================
       4. БОКОВАЯ ПАНЕЛЬ (АКТУАЛЬНОЕ)
       ========================================= */
    .sidebar { 
        width: 260px; 
        background: transparent; 
        padding: 3vh 1.5vw; 
        display: flex; flex-direction: column; 
        border-right: 1px solid var(--inner-border); 
        flex-shrink: 0;
    }

    .section-title {
        font-size: 0.7rem; color: #7f8fa6; 
        margin-bottom: 20px; font-weight: 800; 
        letter-spacing: 1px; text-transform: uppercase;
    }

    /* Блок ближайших событий */
    .upcoming-box { overflow-y: auto; flex: 1; padding-right: 5px; }
    .event-card-mini { 
        background: transparent; 
        padding: 10px 0 10px 10px; 
        border-radius: 4px; 
        margin-bottom: 15px; 
        border-left: 3px solid var(--accent); 
        transition: background 0.3s ease; 
        cursor: default; 
    }
    .event-card-mini:hover { background: rgba(255, 255, 255, 0.03); }
    .ev-title { font-size: clamp(0.7rem, 1vw, 0.85rem); font-weight: 300; color: #fff; margin-bottom: 4px; line-height: 1.3;}
    .ev-date { font-size: clamp(0.6rem, 0.8vw, 0.75rem); color: #7f8fa6; }

    /* =========================================
       5. УНИВЕРСАЛЬНЫЕ КНОПКИ И ИКОНКИ
       ========================================= */
    .icon-btn { 
        background: none; border: none; padding: 5px; cursor: pointer; 
        display: flex; align-items: center; justify-content: center; outline: none;
        flex-shrink: 0; z-index: 50; 
    }
    .ui-icon {
        font-family: "Segoe UI Symbol", "Symbola", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
        font-size: 22px;
        line-height: 1; display: inline-flex; align-items: center; justify-content: center;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none; color: #fff; opacity: 0.5;
    }
    .icon-btn:hover .ui-icon { opacity: 1; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
    .ui-icon-accent { color: #52525C; opacity: 0.8; }
    .icon-btn:hover .ui-icon-accent { color: var(--accent); }
    .icon-btn-exit:hover .ui-icon { color: #ff4757 !important; }

    /* =========================================
       6. ОСНОВНАЯ ОБЛАСТЬ (КАЛЕНДАРЬ И ИЛЛЮСТРАЦИЯ)
       ========================================= */
    .main-view { 
        flex: 1; display: flex; flex-direction: row; align-items: center;
        padding: 3vh 3vw; position: relative; overflow: hidden; gap: 2vw;
    }

    /* Блок для картинки с человеком */
    .illustration-box {
        flex: 1;
        display: flex; align-items: center; justify-content: center;
        height: 100%; position: relative;
    }
    /* Заглушка, чтобы было понятно где картинка */
    .illustration-placeholder {
        color: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.1);
        border-radius: 20px; padding: 20px; text-align: center; font-size: 0.8rem;
    }

    /* Блок самого календаря (Компактный) */
    .calendar-wrapper {
        width: 450px; /* Компактная ширина */
        max-width: 50%;
        display: flex; flex-direction: column;
        flex-shrink: 0;
    }

    /* Переключатель годов */
    .year-switcher { 
        display: flex; align-items: center; justify-content: flex-end; gap: 1.5vw; 
        margin-bottom: 3vh; flex-shrink: 0; 
    }
    #display-year { font-size: clamp(2rem, 5vh, 4rem); font-weight: 500; letter-spacing: -1px; color: #fff; line-height: 1; }
    .year-side { cursor: pointer; color: #3d444b; font-weight: 300; font-size: clamp(1rem, 2.5vh, 1.5rem); transition: 0.2s; }
    .year-side:hover { color: var(--accent); }

    /* Сетка месяцев (Компактный режим) */
    .months-grid { 
        display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); 
        gap: 12px; width: 100%; aspect-ratio: 4 / 3; /* Квадратные пропорции сетки */
    }
    .month-card { 
        background: #202428; border-radius: 12px; /* Темный фон плиток */
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        color: #fff; font-weight: 400; cursor: pointer; position: relative; transition: 0.3s;
        text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;
        height: 100%; width: 100%; border: 1px solid rgba(255,255,255,0.02); overflow: hidden;
    }
    .month-card:hover { background: #2a2e33; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    
    .month-card.current-active { 
        z-index: 10; background: #33393f; border: 1px solid var(--accent); box-shadow: 0 8px 15px rgba(9, 224, 227, 0.15)
    }

    /* Индикаторы событий (точки) */
    .month-indicator { position: absolute; bottom: 12%; display: flex; gap: 6px; width: 100%; justify-content: center; }
    .dot { height: 3px; width: 12px; border-radius: 4px; }
    .dot.red { background: var(--ev-memorial); }
    .dot.blue { background: var(--ev-meeting); }

    /* Скрытие имени пользователя, так как нет места (оставим в консоли или можно добавить в меню) */
    .user-name { display: none; }

    /* =========================================
       7. ПАНЕЛЬ ОБЪЯВЛЕНИЙ (BOARD)
       ========================================= */
    .board-toggle-btn {
        position: absolute; right: 0; top: 50%; transform: translateY(-50%);
        background: rgba(255,255,255,0.05); border: none; padding: 25px 8px;
        border-radius: 12px 0 0 12px; cursor: pointer; z-index: 100; transition: 0.3s;
    }
    .board-toggle-btn:hover { background: var(--accent); }
    .board-toggle-btn .board-icon { color: rgba(255,255,255,0.5); font-size: 12px; transition: 0.3s; }
    .board-toggle-btn:hover .board-icon { color: #000; }

    .announcements-overlay {
        position: absolute; inset: 0; background: rgba(15, 17, 18, 0.95); backdrop-filter: blur(10px);
        z-index: 200; display: flex; flex-direction: column; padding: 40px;
        transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .announcements-overlay.active { transform: translateX(0); }
    .panel-header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;
    }
    .panel-header h2 { margin: 0; font-weight: 300; letter-spacing: 2px; color: var(--accent); }
    .close-panel-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; transition: 0.2s; }
    .close-panel-btn:hover { color: var(--accent); transform: scale(1.1); }
    .board-items { 
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; 
        padding-right: 10px; overflow-y: auto; flex: 1; align-content: start; 
    }
    .board-card {
        background: rgba(255,255,255,0.03); padding: 20px; border-radius: 8px;
        border-top: 3px solid var(--accent); display: flex; flex-direction: column;
        gap: 10px; transition: transform 0.2s ease;
    }
    .board-card:hover { background: rgba(255,255,255,0.06); }
    .board-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: #fff; font-weight: 600; }
    .board-card p { margin: 0; color: #7f8fa6; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; }

    /* ПРОСМОТРЩИК ИЗОБРАЖЕНИЙ */
    .image-viewer {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
        align-items: center; justify-content: center; backdrop-filter: blur(5px);
    }
    .image-viewer img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 8px; }
    .close-viewer { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: #fff; font-weight: 300; cursor: pointer; transition: 0.2s; }
    .close-viewer:hover { color: var(--ev-memorial); }

    /* АДАПТИВНОСТЬ */
    @media (max-width: 1200px) { .board-items { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px) { 
        .board-items { grid-template-columns: repeat(2, 1fr); } 
        .main-view { flex-direction: column; }
        .calendar-wrapper { width: 100%; max-width: 500px; }
        .illustration-box { display: none; }
    }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="nav-bar">
            <div class="nav-group">
                <button class="icon-btn icon-btn-exit" onclick="localStorage.clear(); location.href='index.html'" title="Выход">
                    <span class="ui-icon">✕</span> </button>
                
                <button class="icon-btn" title="Профиль">
                    <span class="ui-icon">👤</span>
                </button>

                <button id="admin-btn" class="icon-btn" onclick="location.href='admin.html'" style="display:none;" title="Настройки">
                    <span class="ui-icon ui-icon-accent">⚙</span>
                </button>

                <button class="icon-btn" id="board-edit-btn" onclick="location.href='board.html'" title="Редактор Объявлений" style="display: none;">
                    <span class="ui-icon ui-icon-accent">✏</span>
                </button>

                </div>

            <div class="nav-group">
                <button class="icon-btn" title="Информация">
                    <span class="ui-icon">ⓘ</span>
                </button>
            </div>
        </div>

        <div class="sidebar">
            <div class="section-title">АКТУАЛЬНОЕ</div>
            <div class="upcoming-box" id="next-event-container">
                <div style="font-size:0.6rem; color:#7f8fa6; opacity:0.3; text-align:center;">ЗАГРУЗКА...</div>
            </div>
        </div>

        <div class="main-view">
            
            <div class="illustration-box">
                <div class="illustration-placeholder">
                    Здесь будет<br>картинка с человеком
                    </div>
                </div>

            <div class="calendar-wrapper">
                <div class="year-switcher">
                    <button class="icon-btn" onclick="toggleCalendarView()" title="Сменить вид" style="margin-right: auto; opacity: 0.5;">
                        <span class="ui-icon" style="font-size: 18px;">⌗</span>
                    </button>

                    <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
                    <div id="display-year"></div>
                    <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
                </div>
                
                <div class="months-grid" id="months"></div>
            </div>

            <div id="announcements-panel" class="announcements-overlay">
                <div class="panel-header">
                    <h2>ОБЪЯВЛЕНИЯ</h2>
                    <button class="close-panel-btn" onclick="toggleBoard()" title="Закрыть">✕</button>
                </div>
                <div id="board-content" class="board-items">
                    <div style="text-align:center; opacity:0.3; margin-top:50px;">ЗАГРУЗКА...</div>
                </div>
            </div>

            <button class="board-toggle-btn" onclick="toggleBoard()" title="Открыть объявления">
                <span class="board-icon">◀</span>
            </button>
        </div>
    </div>
    
    <div id="image-viewer" class="image-viewer" onclick="closeViewer()">
        <div class="close-viewer">✕</div>
        <img id="viewer-img" src="" alt="View">
    </div>

    <div id="user-display" class="user-name">...</div>

    <script type="module">
        // --- 1. Проверка авторизации ---
        const user = localStorage.getItem('currentUser');
        if (!user) { window.location.replace('index.html'); }

        // --- 2. Инициализация Firebase ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        
        // --- 3. Глобальные данные и состояния ---
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || new Date().getFullYear();

        // --- 4. Настройка интерфейса пользователя ---
        document.getElementById('user-display').innerText = user;
        if(user.toLowerCase() === 'admin') {
            document.getElementById('admin-btn').style.display = 'flex';
            document.getElementById('board-edit-btn').style.display = 'flex';
        }

        // --- 5. Функции управления календарем ---
        window.toggleCalendarView = () => {
            const grid = document.getElementById('months');
            grid.classList.toggle('linear-mode');
            localStorage.setItem('calendarViewMode', grid.classList.contains('linear-mode') ? 'linear' : 'grid');
        };

        function initGrid() {
            const grid = document.getElementById('months');
            const now = new Date();
            const todayMonth = now.getMonth(); 
            const todayYear = now.getFullYear();

            let gridHTML = '';
            monthsNames.forEach((m, i) => {
                const isToday = (i === todayMonth && currentYear === todayYear);
                const statusClass = isToday ? 'current-active' : '';
                gridHTML += `
                    <div class="month-card ${statusClass}" 
                         onclick="goToMonth(${i})">
                        <span>${m.substring(0, 3)}</span>
                        <div class="month-indicator" id="ind-${i}"></div>
                    </div>`;
            });
            grid.innerHTML = gridHTML;
        }

        window.goToMonth = (i) => {
            localStorage.setItem('selectedMonth', i);
            localStorage.setItem('selectedYear', currentYear);
            window.location.href = 'notes.html';
        };

        window.changeYear = (dir) => { 
            if (!document.startViewTransition) { applyYearChange(dir); return; }
            document.startViewTransition(() => applyYearChange(dir));
        };

        function applyYearChange(dir) {
            currentYear += dir; updateDisp(); initGrid(); loadData();
        }

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        // --- 6. Функции загрузки данных ---
        window.toggleBoard = async () => {
            const panel = document.getElementById('announcements-panel');
            panel.classList.toggle('active');
            
            if(panel.classList.contains('active')) {
                await loadBoardData();
            }
        };

        async function loadBoardData() {
            const content = document.getElementById('board-content');
            content.innerHTML = '<div style="text-align:center; opacity:0.3; margin-top:50px; grid-column: 1 / -1;">ОБНОВЛЕНИЕ...</div>';
            
            try {
                const snap = await getDoc(doc(db, "board", "main")); 
                
                if (snap.exists() && snap.data().posts && snap.data().posts.length > 0) {
                    const postsData = snap.data().posts;
                    let html = '';
                    
                    const sortedPosts = [...postsData].sort((a, b) => b.id - a.id);
                    
                    sortedPosts.forEach(post => {
                        const imageHtml = post.imageUrl ? `<img src="${post.imageUrl}" style="width:100%; max-height:200px; object-fit:cover; border-radius:8px; margin-top:auto; cursor: zoom-in; transition: 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1" alt="Фото" onclick="openViewer('${post.imageUrl}')">` : '';
                        
                        html += `
                            <div class="board-card">
                                <h3 style="font-size: 0.75rem; color: #7f8fa6; font-weight: 700; margin: 0 0 8px 0; text-transform: uppercase;">
                                    ${post.date} • ${post.author}
                                </h3>
                                <p style="margin: 0 0 10px 0; color: #fff; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word;">
                                    ${post.text}
                                </p>
                                ${imageHtml}
                            </div>
                        `;
                    });
                    content.innerHTML = html;
                } else {
                    content.innerHTML = '<div style="text-align:center; opacity:0.2; margin-top:50px; grid-column: 1 / -1;">ОБЪЯВЛЕНИЙ ПОКА НЕТ</div>';
                }
            } catch (e) {
                console.error("Ошибка при загрузке доски:", e);
                content.innerHTML = '<div style="color:#ff7675; text-align:center; margin-top:50px; grid-column: 1 / -1;">ОШИБКА ЗАГРУЗКИ</div>';
            }
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            if (!container) return;
            container.innerHTML = '<div style="font-size:0.6rem; opacity:0.3; text-align:center; margin-top:20px;">ПОИСК...</div>';
            
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            let upcomingEvents = [];

            for(let i=0; i<12; i++) {
                const ind = document.getElementById(`ind-${i}`);
                if(ind) ind.innerHTML = '';
            }

            const monthPromises = Array.from({length: 12}, (_, i) => getDoc(doc(db, "calendar", `${currentYear}_${i}`)));
            const snapshots = await Promise.all(monthPromises);

            snapshots.forEach((snap, i) => {
                if (snap.exists()) {
                    const data = snap.data();
                    const ind = document.getElementById(`ind-${i}`);
                    let hasRed = false, hasBlue = false;

                    Object.entries(data).forEach(([day, notes]) => {
                        if (!Array.isArray(notes)) return;
                        notes.forEach(n => {
                            if (n.category === 'memorial' || n.category === 'congress') hasRed = true;
                            else hasBlue = true;
                            const eventDate = new Date(currentYear, i, parseInt(day)).getTime();
                            if (eventDate >= todayStart) {
                                upcomingEvents.push({ text: n.text, day: day, mName: monthsNames[i], stamp: eventDate, cat: n.category });
                            }
                        });
                    });

                    if (ind) {
                        if (hasRed) ind.innerHTML += '<div class="dot red"></div>';
                        if (hasBlue) ind.innerHTML += '<div class="dot blue"></div>';
                    }
                }
            });

            upcomingEvents.sort((a, b) => a.stamp - b.stamp);
            if (upcomingEvents.length > 0) {
                let html = '';
                upcomingEvents.slice(0, 5).forEach(ev => {
                    const color = (ev.cat === 'memorial' || ev.cat === 'congress') ? 'var(--ev-memorial)' : 'var(--ev-meeting)';
                    html += `<div class="event-card-mini" style="border-left-color: ${color}"><div class="ev-title">${ev.text}</div><div class="ev-date">${ev.day} ${ev.mName}</div></div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div style="font-size:0.6rem; opacity:0.2; text-align:center; margin-top:20px;">СОБЫТИЙ НЕТ</div>';
            }
        }

        // --- 7. Просмотрщик изображений ---
        window.openViewer = (url) => {
            document.getElementById('viewer-img').src = url;
            document.getElementById('image-viewer').style.display = 'flex';
        };
        window.closeViewer = () => {
            document.getElementById('image-viewer').style.display = 'none';
        };

        // --- 8. Первичный запуск ---
        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
