<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --bg: #f8f9fa; 
            --text: #2d3436; 
            --card-bg: #ffffff;
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* САЙДБАР (ПО КАРТИНКЕ) */
        .sidebar { 
            width: 400px; 
            background: #fff; 
            padding: 50px 40px; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #eee; 
            z-index: 10; flex-shrink: 0; box-sizing: border-box; 
            align-items: flex-end; 
            text-align: right;
        }

        /* ПРОФИЛЬ */
        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; }
        .logout-btn { 
            background: #000; color: #fff; border: none; 
            padding: 6px 14px; border-radius: 8px; 
            font-size: 0.75rem; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        .user-name { font-size: 1.1rem; font-weight: 800; color: #2d3436; text-transform: uppercase; }
        .user-icon { color: var(--accent); display: flex; align-items: center; }

        /* ГОД */
        #display-year { 
            font-size: 8rem; font-weight: 200; color: #dfe6e9; 
            letter-spacing: -12px; line-height: 0.7; margin-bottom: 60px; 
        }

        /* СЕКЦИИ */
        .side-section { width: 100%; margin-bottom: 40px; }
        .side-label { font-size: 0.7rem; font-weight: 700; color: #b2bec3; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
        
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 0.95rem; font-weight: 600; color: #636e72; margin-bottom: 12px; }
        .color-bar { width: 4px; height: 16px; border-radius: 2px; }

        /* ЛОГИ (РОЗОВЫЙ БЛОК) */
        .log-entry { 
            font-size: 0.85rem; background: #ffe6f2; padding: 16px 20px; 
            border-radius: 15px 0 0 15px; position: relative;
            line-height: 1.4; color: #636e72; text-align: right; width: 100%; box-sizing: border-box;
        }
        .log-entry::after {
            content: ''; position: absolute; right: -10px; top: -5px; bottom: -5px; width: 10px;
            border-right: 3px solid #e6007e; border-top: 3px solid #e6007e;
            border-bottom: 3px solid #e6007e; border-radius: 0 10px 10px 0;
        }

        /* ЦЕНТРАЛЬНАЯ ЧАСТЬ */
        .main-content { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            padding: 40px; position: relative; 
        }

        .months-grid { 
            display: grid; grid-template-columns: repeat(4, 180px); gap: 20px; 
        }

        .month-card { 
            background: #fff; border-radius: 20px; height: 130px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.1rem; color: #2d3436;
            cursor: pointer; border: 1px solid transparent;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .month-card:hover { 
            transform: scale(1.05); box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            color: var(--accent); border-color: #eee;
        }

        footer { position: fixed; bottom: 0; width: 100%; padding: 10px 40px; font-size: 10px; color: #b2bec3; text-align: right; background: #fff; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="logout-btn" onclick="logout()">Exit</button>
            <div class="user-name" id="display-name">ADMIN</div>
            <div class="user-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
        </div>

        <div id="display-year">2026</div>

        <div class="side-section">
            <div class="side-label">Категории</div>
            <div class="legend-item">Работа <div class="color-bar" style="background: var(--ev-work);"></div></div>
            <div class="legend-item">Важное <div class="color-bar" style="background: var(--ev-important);"></div></div>
            <div class="legend-item">Личное <div class="color-bar" style="background: var(--ev-personal);"></div></div>
        </div>

        <div class="side-section">
            <div class="side-label">Логи записей</div>
            <div id="logs-container">
                <div class="log-entry">Подключение к базе..</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <footer>Cloud Plan Ecosystem — Secure Terminal 2.0</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('display-name').innerText = currentUser;

        // Отрисовка месяцев
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        months.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'month-card';
            card.innerText = m;
            card.onclick = () => { localStorage.setItem('selectedMonth', i); window.location.href = 'notes.html'; };
            grid.appendChild(card);
        });

        // Живые логи (только 1 последний, как на скрине)
        const qLogs = query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(1));
        onSnapshot(qLogs, (snapshot) => {
            const container = document.getElementById('logs-container');
            if (snapshot.empty) return;
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerText = `${data.user}: ${data.action} в ${data.month}`;
                container.appendChild(div);
            });
        });

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
    </script>
</body>
</html>
