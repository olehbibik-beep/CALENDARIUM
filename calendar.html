<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #ffffff; 
            --sidebar-bg: #1a1a1a; /* Глубокий темный из скриншота */
            --main-bg: #f4f4f4;    /* Светлый фон для сетки */
            --card-bg: #2d3436;    /* Цвет плиток из скриншота */
            --text-white: #ffffff;
            --text-muted: #636e72;
            --online-green: #2ecc71;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        /* --- ТЕМНЫЙ САЙДБАР --- */
        .sidebar { 
            width: 380px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; 
            z-index: 10; flex-shrink: 0; align-items: flex-end; text-align: right;
            color: var(--text-white);
        }

        .user-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .back-btn { background: #fff; color: #000; border: none; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        .user-name { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; }

        .year-selector { margin-bottom: 20px; }
        #display-year { 
            font-size: 8rem; font-weight: 900; color: #252525; 
            letter-spacing: -5px; line-height: 0.7; margin-bottom: 10px;
        }
        .year-controls { display: flex; gap: 10px; justify-content: flex-end; }
        .year-btn { background: #333; color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .year-btn:hover { background: #444; }

        .side-label { font-size: 0.75rem; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 2px; margin: 40px 0 20px; }

        /* ОНЛАЙН СПИСОК */
        .online-box { width: 100%; margin-top: auto; }
        .user-list { display: flex; flex-direction: column; gap: 12px; }
        .user-badge { font-size: 1rem; font-weight: 900; text-transform: uppercase; color: #fff; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
        .user-badge::after { content: ''; width: 10px; height: 10px; background: var(--online-green); border-radius: 50%; box-shadow: 0 0 10px var(--online-green); }

        /* --- СЕТКА МЕСЯЦЕВ --- */
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .months-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 20px; width: 100%; max-width: 1000px; 
        }

        .month-card { 
            background: var(--card-bg); border-radius: 25px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1.3rem; color: #fff;
            cursor: pointer; border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-transform: uppercase;
        }

        .month-card:hover { transform: scale(1.05); background: #1a1a1a; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        /* МОБИЛКИ */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 20px; align-items: center; text-align: center; }
            #display-year { font-size: 4rem; margin-bottom: 20px; }
            .year-controls { justify-content: center; }
            .side-label, .online-box { display: none; }
            .main-content { padding: 15px; height: calc(100vh - 180px); }
            .months-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; height: 100%; }
            .month-card { aspect-ratio: auto; font-size: 0.9rem; border-radius: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-nav">
            <button class="back-btn" onclick="logout()">Logout</button>
            <div class="user-name" id="display-name">ADMIN</div>
        </div>

        <div class="year-selector">
            <div id="display-year">2026</div>
            <div class="year-controls">
                <button class="year-btn" onclick="changeYear(-1)">‹</button>
                <button class="year-btn" onclick="changeYear(1)">›</button>
            </div>
        </div>

        <div class="online-box">
            <div class="side-label">В сети</div>
            <div id="user-list" class="user-list"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const currentUser = localStorage.getItem('currentUser') || 'ADMIN';
        document.getElementById('display-name').innerText = currentUser;

        // Статус в сети
        const userStatusRef = doc(db, "online_users", currentUser);
        setDoc(userStatusRef, { name: currentUser, lastSeen: Date.now() });

        onSnapshot(collection(db, "online_users"), (snapshot) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const user = doc.data();
                const div = document.createElement('div');
                div.className = 'user-badge';
                div.innerText = user.name;
                list.appendChild(div);
            });
        });

        // Сетка
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        const yearTitle = document.getElementById('display-year');
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || 2026;
        yearTitle.innerText = currentYear;

        function renderMonths() {
            grid.innerHTML = '';
            monthsNames.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerText = m;
                card.onclick = () => { 
                    localStorage.setItem('selectedMonth', i);
                    localStorage.setItem('selectedYear', currentYear);
                    window.location.href = 'notes.html'; 
                };
                grid.appendChild(card);
            });
        }

        window.changeYear = (dir) => {
            currentYear += dir;
            yearTitle.innerText = currentYear;
            localStorage.setItem('selectedYear', currentYear);
            renderMonths();
        };

        window.logout = async () => {
            await deleteDoc(userStatusRef);
            localStorage.clear();
            window.location.href = 'index.html';
        };

        renderMonths();
        window.addEventListener('beforeunload', () => deleteDoc(userStatusRef));
    </script>
</body>
</html>
