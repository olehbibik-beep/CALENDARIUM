<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0984e3; 
            --bg: #fff; /* Фон белый, как на картинке */
            --orange: #f39c12; 
            --text: #2d3436; 
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* ИСПРАВЛЕННЫЙ ЕДИНЫЙ САЙДБАР */
        .sidebar { 
            width: 420px; /* Ширина, чтобы элементы влезли комфортно */
            padding: 50px 40px; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #eee; 
            z-index: 10; flex-shrink: 0; box-sizing: border-box; 
            align-items: flex-end; /* Весь контент прижат вправо */
            text-align: right;
        }

        /* --- ВЕРХНИЙ БЛОК ПРОФИЛЯ --- */
        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 60px; }
        
        /* Черная кнопка EXIT */
        .logout-btn { 
            background: #000; color: #fff; border: none; 
            padding: 6px 14px; border-radius: 8px; /* Сильное скругление */
            font-size: 0.75rem; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        .logout-btn:hover { background: #333; }

        /* Имя ADMIN */
        .user-name { font-size: 1.1rem; font-weight: 800; color: #2d3436; text-transform: uppercase; letter-spacing: -0.5px; }

        /* Иконка (синяя) */
        .user-icon { color: #0088cc; display: flex; align-items: center; }

        /* --- ОГРОМНЫЙ ГОД (Светлый) --- */
        #display-year { 
            font-size: 8rem; /* Ещё больше */
            font-weight: 200; /* Тонкий */
            color: #dfe6e9; /* Светлый серый */
            letter-spacing: -12px; /* Супер-плотный */
            line-height: 0.7; margin: 0 0 60px 0; 
        }

        /* --- СЕКЦИИ --- */
        .side-section { width: 100%; margin-bottom: 40px; }
        .side-label { font-size: 0.7rem; font-weight: 700; color: #b2bec3; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
        
        /* Легенда с ПОЛОСКАМИ */
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 0.95rem; font-weight: 600; color: #636e72; margin-bottom: 12px; }
        
        /* Полоска-маркер */
        .color-bar { width: 4px; height: 16px; border-radius: 2px; }

        /* --- ЛОГИ (Розовый блок со скобкой) --- */
        .logs-container { width: 100%; }
        
        .log-entry { 
            font-size: 0.85rem; 
            background: #ffe6f2; /* Нежно-розовый фон */
            padding: 16px 20px; 
            border-radius: 15px 0 0 15px; /* Скругление только слева */
            position: relative;
            line-height: 1.4; color: #636e72;
            box-sizing: border-box;
        }
        
        /* Ярко-розовая скобка */
        .log-entry::after {
            content: '';
            position: absolute;
            right: -10px; top: -5px; bottom: -5px; width: 10px;
            border-right: 3px solid #e6007e; /* Яркая розовая скобка */
            border-top: 3px solid #e6007e;
            border-bottom: 3px solid #e6007e;
            border-radius: 0 10px 10px 0;
        }

        /* footer: поверх шторки, если она открыта */
        footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 6px 20px; font-size: 9px; color: #b2bec3; border-top: 1px solid #eee; text-align: right; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="logout-btn" onclick="logout()">Exit</button>
            <div class="user-name" id="display-name">...</div>
            <div class="user-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
        </div>

        <div id="display-year">2026</div>

        <div class="side-section">
            <div class="side-label">Категории</div>
            <div class="legend-item">Работа <div class="color-bar" style="background: var(--ev-work);"></div></div>
            <div class="legend-item">Важное <div class="color-bar" style="background: var(--ev-important);"></div></div>
            <div class="legend-item">Личное <div class="color-bar" style="background: var(--ev-personal);"></div></div>
        </div>

        <div class="side-section">
            <div class="side-label">Логи записей</div>
            <div class="logs-container" id="logs-container">
                <div class="log-entry">Подключение к базе..</div>
            </div>
        </div>
    </div>

    <div style="flex:1; background:#f0f2f5;"></div>

    <footer>Cloud Plan Ecosystem — Secure Terminal 2.0</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser');

        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('display-name').innerText = currentUser;

        // Логи
        const qLogs = query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(1)); // На картинке только 1
        onSnapshot(qLogs, (snapshot) => {
            const container = document.getElementById('logs-container');
            if (snapshot.empty) return;
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerHTML = `${data.action} в ${data.month}`; // Без времени
                container.appendChild(div);
            });
        });

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
    </script>
</body>
</html>
