<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM</title>
    <style>
    :root { 
        --accent: #0088cc; --bg: #3e3e3e; --dark: #1a1d1f; --card-bg: #22272a;
        --ev-memorial: #ff7675; --ev-meeting: #09e0e3; --text-main: #e0e6ed;
        --inner-border: rgba(255, 255, 255, 0.05);
    }
    
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
        margin: 0; background: var(--bg); color: var(--text-main); 
        display: flex; align-items: center; justify-content: center; 
        height: 100vh; overflow: hidden; 
    }

    /* ГЛАВНАЯ ПЛИТКА-ОБОЛОЧКА */
    .app-container {
        width: 90%; max-width: 95%; height: 85%; background: #0f1112;
        border-radius: 30px; border: 0px solid var(--inner-border); 
        display: flex; position: relative; overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.0);
    }

    /* ЛЕВАЯ СТОРОНА (САЙДБАР) - ЗАФИКСИРОВАНО НА 300px */
    .sidebar { 
        width: 300px; 
        background: rgba(80,80,80,0.2); 
        padding: 30px; display: flex; flex-direction: column; 
        border-right: 1px solid var(--inner-border); flex-shrink: 0;
    }

    .user-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .user-name { font-weight: 800; text-transform: uppercase; font-size: 0.7rem; color: var(--accent); letter-spacing: 1px; }
    .nav-btns { display: flex; gap: 8px; }
    .btn-small { background: var(--dark); color: #fff; border: 1px solid #333; padding: 6px 12px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; cursor: pointer; }

    /* ПРАВАЯ СТОРОНА */
    .main-view { 
        width: 100%; height: 100%; flex: 1; display: flex; flex-direction: column; 
        padding: 10px 20px 30px 20px; position: relative;
    }

    .year-switcher { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
    #display-year { font-size: 4rem; font-weight: 900; letter-spacing: -3px; color: #fff; }
    .year-side { cursor: pointer; color: #3d444b; font-weight: 900; font-size: 1.5rem; transition: 0.2s; }
    .year-side:hover { color: var(--accent); }

    .months-grid { 
        display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); 
        gap: 15px; width: 100%; max-width: 800px; margin: 0 auto;
        flex: 1; min-height: 0; padding-bottom: 10px;
    }
    
    .month-card { 
        background: var(--dark); border-radius: 18px; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        color: #fff; font-weight: 900; cursor: pointer; position: relative; transition: 0.3s;
        text-transform: uppercase; font-size: 0.9rem; min-height: 50px; 
    }

    .month-card.current-active { background: transparent !important; z-index: 1; }
    .month-card.current-active::before {
        content: ''; position: absolute; inset: 0; background: rgba(90, 90, 90, 0.4); 
        border-radius: 18px; z-index: -1; border: 1px solid rgba(255,255,255,0.1);
    }

    .month-indicator { position: absolute; bottom: 12px; display: flex; gap: 4px; width: 60%; }
    .dot { height: 4px; flex: 1; border-radius: 10px; }
    .dot.red { background: var(--ev-memorial); }
    .dot.blue { background: var(--ev-meeting); }

    .upcoming-box { margin-top: 20px; overflow-y: auto; flex: 1; }
    .event-card-mini { background: transparent; padding: 12px; border-radius: 4px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
    .ev-title { font-size: 0.75rem; font-weight: 800; color: #fff; margin-bottom: 4px; }

    .inner-footer {
        position: absolute; bottom: 0px; left: 0px; right: 0px; display: flex; align-items: center; justify-content: space-between;
        background: rgba(240, 128, 128, 0.4); padding: 5px 20px; border-top: 1px solid var(--inner-border);
    }
    .footer-text { font-size: 9px; color: #fff; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

    /* МОБИЛЬНАЯ АДАПТАЦИЯ */
    @media (max-width: 850px) {
        body { overflow: auto; height: auto; padding: 0; }
        .app-container { flex-direction: column; height: auto; min-height: 100vh; width: 100vw; border-radius: 0; display: flex; }
        
        .sidebar { display: contents; }
        .user-header { 
            order: 1; width: 100%; padding: 20px; background: #0f1112; 
            border-bottom: 1px solid var(--inner-border); margin-bottom: 0; display: flex; 
        }
        
        .main-view { order: 2; padding: 15px; width: 100%; }
        
        .months-grid { 
            grid-template-columns: repeat(2, 1fr); /* ИЗМЕНЕНО: 2 колонки лучше помещаются на телефоне */
            gap: 10px; 
        }
        .month-card { aspect-ratio: 1 / 1; }

        .upcoming-box { 
            order: 3; display: block; width: 100%; padding: 20px; 
            background: rgba(255, 255, 255, 0.02); border-top: 1px solid var(--inner-border); 
            margin-top: 10px; padding-bottom: 20px; /* ИЗМЕНЕНО: убрали гигантский отступ в 100px */
        }
        
        .inner-footer { order: 4; position: static; padding: 20px; width: 100%; }
        #display-year { font-size: 2.8rem; }
        .year-side { font-size: 1.5rem; }
    }
</style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="user-header">
                <div id="user-display" class="user-name">...</div>
                <div class="nav-btns">
                    <button id="admin-btn" class="btn-small" onclick="location.href='admin.html'" style="display:none; color:var(--accent);">ADMIN</button>
                    <button class="btn-small" onclick="localStorage.clear(); location.href='index.html'">ВЫХОД</button>
                </div>
            </div>
            
            <div class="upcoming-box" id="next-event-container">
                <div style="font-size:0.6rem; color:#7f8fa6; opacity:0.3; text-align:center;">ЗАГРУЗКА...</div>
            </div>
        </div>

        <div class="main-view">
            <div class="year-switcher">
                <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
                <div id="display-year"></div>
                <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
            </div>

            <div class="months-grid" id="months"></div>

        </div>
        <div class="inner-footer">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="footer-dot"></div>
                    <div class="footer-text">Group 5 • v2.6.16</div>
                </div>
                <div class="footer-text">© 2026 CALENDARIUM</div>
            </div>
    </div>

    <script type="module">
        /* Твой скрипт Firebase и логика остаются такими же */
        const user = localStorage.getItem('currentUser');
        if (!user) { window.location.replace('index.html'); }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || new Date().getFullYear();
        
        document.getElementById('user-display').innerText = user;
        if(user.toLowerCase() === 'admin') {
            document.getElementById('admin-btn').style.display = 'block';
        }

        function initGrid() {
            const grid = document.getElementById('months');
            const now = new Date();
            const todayMonth = now.getMonth(); 
            const todayYear = now.getFullYear();

            let gridHTML = '';
            monthsNames.forEach((m, i) => {
                const isToday = (i === todayMonth && currentYear === todayYear);
                const statusClass = isToday ? 'current-active' : '';
                gridHTML += `
                    <div class="month-card ${statusClass}" onclick="goToMonth(${i})">
                        <span>${m.substring(0, 3)}</span>
                        <div class="month-indicator" id="ind-${i}"></div>
                    </div>`;
            });
            grid.innerHTML = gridHTML;
        }

        window.goToMonth = (i) => {
            localStorage.setItem('selectedMonth', i);
            localStorage.setItem('selectedYear', currentYear);
            window.location.href = 'notes.html';
        };

        window.changeYear = (dir) => { 
            currentYear += dir; updateDisp(); initGrid(); loadData(); 
        };
async function loadData() {
    const container = document.getElementById('next-event-container');
    if (!container) return;

    // Начальное состояние
    container.innerHTML = '<div style="font-size:0.6rem; opacity:0.3; text-align:center; margin-top:20px;">ПОИСК...</div>';

    const now = new Date();
    // Устанавливаем время в 00:00:00, чтобы сравнение шло только по дням
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    
    let upcomingEvents = [];

    // Чистим индикаторы (точки) перед новой загрузкой
    for(let i=0; i<12; i++) {
        const ind = document.getElementById(`ind-${i}`);
        if(ind) ind.innerHTML = '';
    }

    // Загружаем все 12 месяцев текущего выбранного года
    const monthPromises = Array.from({length: 12}, (_, i) => 
        getDoc(doc(db, "calendar", `${currentYear}_${i}`))
    );
    
    const snapshots = await Promise.all(monthPromises);

    snapshots.forEach((snap, i) => {
        if (snap.exists()) {
            const data = snap.data();
            const ind = document.getElementById(`ind-${i}`);
            let hasRed = false;
            let hasBlue = false;

            Object.entries(data).forEach(([day, notes]) => {
                if (!Array.isArray(notes)) return;

                notes.forEach(n => {
                    // 1. Логика точек под плитками месяцев
                    if (n.category === 'memorial' || n.category === 'congress') hasRed = true;
                    else hasBlue = true;

                    // 2. Логика списка в сайдбаре
                    const eventDate = new Date(currentYear, i, parseInt(day)).getTime();

                    // Условие: показывать события, которые ЕЩЕ НЕ ПРОШЛИ (сегодня или будущее)
                    if (eventDate >= todayStart) {
                        upcomingEvents.push({
                            text: n.text,
                            day: day,
                            mName: monthsNames[i],
                            stamp: eventDate,
                            cat: n.category
                        });
                    }
                });
            });

            // Рисуем точки под месяцем
            if (ind) {
                if (hasRed) ind.innerHTML += '<div class="dot red"></div>';
                if (hasBlue) ind.innerHTML += '<div class="dot blue"></div>';
            }
        }
    });

    // Сортируем события по дате (ближайшие сверху)
    upcomingEvents.sort((a, b) => a.stamp - b.stamp);

    // Вывод в HTML
    if (upcomingEvents.length > 0) {
        let html = '<div style="font-size:0.6rem; color:var(--accent); margin-bottom:15px; font-weight:800; letter-spacing:1px; text-align:center;">АКТУАЛЬНОЕ</div>';
        
        // Берем только первые 5 для компактности
        upcomingEvents.slice(0, 5).forEach(ev => {
            const color = (ev.cat === 'memorial' || ev.cat === 'congress') ? 'var(--ev-memorial)' : 'var(--ev-meeting)';
            html += `
                <div class="event-card-mini" style="border-left-color: ${color}">
                    <div class="ev-title">${ev.text}</div>
                    <div class="ev-date">${ev.day} ${ev.mName}</div>
                </div>`;
        });
        container.innerHTML = html;
    } else {
        container.innerHTML = '<div style="font-size:0.6rem; opacity:0.2; text-align:center; margin-top:20px;">СОБЫТИЙ НЕТ</div>';
    }
}


        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
