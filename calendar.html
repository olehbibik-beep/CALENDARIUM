<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --sidebar-bg: #ffffff;
            --main-bg: #f4f7f6;
            --text-main: #2d3436; 
            --text-muted: #636e72;
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        * { box-sizing: border-box; }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; display: flex; 
            height: 100vh; background: var(--main-bg); overflow: hidden; 
        }

        /* --- САЙДБАР --- */
        .sidebar { 
            width: 400px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
            z-index: 10; flex-shrink: 0; align-items: flex-end; text-align: right;
        }

        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; }
        .logout-btn { 
            background: #000; color: #fff; border: none; 
            padding: 7px 16px; border-radius: 8px; 
            font-size: 0.7rem; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .user-name { font-size: 1.1rem; font-weight: 800; color: var(--text-main); text-transform: uppercase; }
        .user-icon { color: var(--accent); display: flex; align-items: center; }

        #display-year { 
            font-size: 8rem; font-weight: 800; color: #eceff1; 
            letter-spacing: -10px; line-height: 0.7; margin-bottom: 60px; 
            text-shadow: 1px 1px 0px #fff; 
        }

        .side-section { width: 100%; margin-bottom: 40px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; }
        .side-label { font-size: 0.75rem; font-weight: 800; color: #b2bec3; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
        
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 12px; font-size: 0.95rem; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; }
        .color-bar { width: 5px; height: 18px; border-radius: 3px; }

        .log-entry { 
            font-size: 0.85rem; background: #fff5f9; padding: 18px 20px; 
            border-radius: 15px 0 0 15px; position: relative;
            line-height: 1.5; color: #4b4b4b; text-align: right; width: 100%;
            box-shadow: -5px 5px 15px rgba(230, 0, 126, 0.05);
        }
        .log-entry::after {
            content: ''; position: absolute; right: -10px; top: -5px; bottom: -5px; width: 10px;
            border-right: 4px solid #e6007e; border-top: 4px solid #e6007e;
            border-bottom: 4px solid #e6007e; border-radius: 0 10px 10px 0;
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        .main-content { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            padding: 40px; overflow-y: auto; 
        }

        .months-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 190px); 
            gap: 25px; 
        }

        .month-card { 
            background: #fff; border-radius: 24px; height: 140px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.1rem; color: var(--text-main);
            cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .month-card:hover { 
            transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            color: var(--accent); border-color: var(--accent);
        }

        footer { 
            position: fixed; bottom: 0; width: 100%; padding: 12px 40px; 
            font-size: 10px; color: #b2bec3; text-align: right; 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-top: 1px solid #eee; 
            z-index: 5;
        }

        /* -------------------------------------------------- */
        /* !!! МОБИЛЬНАЯ АДАПТАЦИЯ !!!                        */
        /* -------------------------------------------------- */
        @media (max-width: 1100px) {
            .months-grid { grid-template-columns: repeat(2, 1fr); width: 100%; max-width: 500px; }
        }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { 
                width: 100%; height: auto; padding: 20px; 
                align-items: center; text-align: center; border-right: none; border-bottom: 1px solid #eee;
            }
            #display-year { font-size: 4rem; letter-spacing: -4px; margin-bottom: 20px; line-height: 1; }
            .side-section { display: none; } /* Скрываем легенду и логи на мобилках для чистоты */
            
            .main-content { padding: 20px; align-items: flex-start; }
            .months-grid { grid-template-columns: 1fr; gap: 15px; }
            .month-card { height: 80px; border-radius: 15px; }
            
            footer { padding: 10px; text-align: center; font-size: 8px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="logout-btn" onclick="logout()">Exit</button>
            <div class="user-name" id="display-name">ADMIN</div>
            <div class="user-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
        </div>

        <div id="display-year">2026</div>

        <div class="side-section">
            <div class="side-label">Категории</div>
            <div class="legend-item">Работа <div class="color-bar" style="background: var(--ev-work);"></div></div>
            <div class="legend-item">Важное <div class="color-bar" style="background: var(--ev-important);"></div></div>
            <div class="legend-item">Личное <div class="color-bar" style="background: var(--ev-personal);"></div></div>
        </div>

        <div class="side-section">
            <div class="side-label">Логи записей</div>
            <div id="logs-container">
                <div class="log-entry">Система готова...</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <footer>Cloud Plan Ecosystem — Secure Terminal 2.0</footer>

    <script type="module">
        /* JS без изменений, так как он работает с ID и классами */
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('display-name').innerText = currentUser;

        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        monthsNames.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'month-card';
            card.innerText = m;
            card.onclick = () => { localStorage.setItem('selectedMonth', i); window.location.href = 'notes.html'; };
            grid.appendChild(card);
        });

        const qLogs = query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(1));
        onSnapshot(qLogs, (snapshot) => {
            const container = document.getElementById('logs-container');
            if (snapshot.empty) return;
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerText = `${data.user}: ${data.action} в ${data.month || 'системе'}`;
                container.appendChild(div);
            });
        });

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
    </script>
</body>
</html>
