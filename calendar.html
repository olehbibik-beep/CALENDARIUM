<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --sidebar-bg: #1a1a1a; 
            --main-bg: #f4f4f4;    
            --card-bg: #2d3436;    
            --text-white: #ffffff;
            --ev-important: #d63031;
            --ev-work: #0984e3;
            --accent-gold: #fdcb6e;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        /* --- САЙДБАР --- */
        .sidebar { 
            width: 400px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; 
            z-index: 10; flex-shrink: 0; align-items: flex-end; text-align: right;
            color: var(--text-white);
        }

        .user-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .logout-btn { background: #fff; color: #000; border: none; padding: 6px 16px; border-radius: 20px; font-weight: 900; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        .user-name { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; }

        .year-switcher { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 100%; margin-bottom: 40px; 
        }
        .year-side { 
            font-size: 1.1rem; font-weight: 900; color: #444; 
            cursor: pointer; transition: 0.3s; flex: 1; text-align: center;
        }
        .year-side:hover { color: #888; }
        #display-year { 
            font-size: 4.5rem; font-weight: 900; color: var(--text-white); 
            letter-spacing: -3px; line-height: 1; flex: 2; text-align: center;
        }

        .upcoming-box { width: 100%; margin-top: auto; text-align: right; margin-bottom: 25px; }
        .side-label { font-size: 0.7rem; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .event-card-mini { background: #252525; padding: 20px; border-radius: 20px; transition: 0.3s; position: relative; text-align: left; }
        .ev-title { font-size: 0.9rem; font-weight: 800; margin-bottom: 5px; color: #fff; text-transform: uppercase; }
        .ev-date { font-size: 0.75rem; font-weight: 700; opacity: 0.6; color: #fff; }

        #admin-link {
            display: none; color: var(--accent-gold); text-decoration: none; font-size: 0.75rem; 
            font-weight: 900; text-transform: uppercase; border: 1px solid var(--accent-gold); 
            padding: 12px 25px; border-radius: 12px; transition: 0.3s; width: 100%; text-align: center; margin-top: 10px;
        }
        #admin-link:hover { background: var(--accent-gold); color: #000; }

        /* --- СЕТКА МЕСЯЦЕВ --- */
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px; }
        .months-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; max-width: 700px; }
        .month-card { 
            background: var(--card-bg); border-radius: 22px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; 
            color: #fff; cursor: pointer; aspect-ratio: 1 / 1; transition: 0.3s; text-transform: uppercase; position: relative;
        }
        .month-indicator { position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.red { background: #ff4757; box-shadow: 0 0 8px #ff4757; }
        .dot.blue { background: #2f3542; border: 1px solid #fff; }
        .month-card:hover { transform: scale(1.05); background: #000; }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; height: auto; padding: 25px; align-items: center; text-align: center; }
            .upcoming-box { display: block; margin-top: 20px; }
            .main-content { padding: 20px; height: auto; }
            .months-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-nav">
            <button class="logout-btn" onclick="logout()">Logout</button>
            <div class="user-name" id="display-name">...</div>
        </div>

        <div class="year-switcher">
            <div class="year-side" id="prev-year" onclick="changeYear(-1)"></div>
            <div id="display-year"></div>
            <div class="year-side" id="next-year" onclick="changeYear(1)"></div>
        </div>

        <div class="upcoming-box">
            <div class="side-label">Ближайшее из планов</div>
            <div id="next-event-container">Загрузка...</div>
        </div>

        <a href="admin.html" id="admin-link">Admin Terminal</a>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser') || 'GUEST';
        document.getElementById('display-name').innerText = currentUser;

        if (currentUser.toUpperCase() === 'ADMIN') {
            document.getElementById('admin-link').style.setProperty('display', 'block', 'important');
        }

        let currentYear = parseInt(localStorage.getItem('selectedYear')) || 2026;
        let plansData = {};

        // 1. ЗАГРУЗКА ИНДИКАТОРОВ (ТОЧЕК)
        async function loadIndicators() {
            plansData = {};
            const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            const grid = document.getElementById('months');
            grid.innerHTML = '';

            for (let i = 0; i < 12; i++) {
                const docRef = doc(db, "calendar", `${currentYear}_${i}`);
                const snap = await getDoc(docRef);
                const monthInfo = snap.exists() ? snap.data() : null;
                plansData[i] = monthInfo;

                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<span>${monthsNames[i]}</span>`;

                if (monthInfo && Object.keys(monthInfo).length > 0) {
                    const ind = document.createElement('div');
                    ind.className = 'month-indicator';
                    
                    let hasHigh = false; // Важное
                    let hasNormal = false; // Обычное
                    
                    Object.values(monthInfo).forEach(dayArray => {
                        dayArray.forEach(note => {
                            if(note.category === 'memorial' || note.category === 'congress') hasHigh = true;
                            else hasNormal = true;
                        });
                    });

                    if (hasHigh) ind.innerHTML += '<div class="dot red"></div>';
                    if (hasNormal) ind.innerHTML += '<div class="dot blue"></div>';
                    card.appendChild(ind);
                }

                card.onclick = () => {
                    localStorage.setItem('selectedMonth', i);
                    localStorage.setItem('selectedYear', currentYear);
                    window.location.href = 'notes.html';
                };
                grid.appendChild(card);
            }
            updateUpcoming();
        }

        // 2. БЛИЖАЙШЕЕ СОБЫТИЕ
        function updateUpcoming() {
            const container = document.getElementById('next-event-container');
            const now = new Date();
            const curMonth = now.getMonth();
            const curDay = now.getDate();
            const curYearReal = now.getFullYear();

            let found = false;

            // Если смотрим текущий год, ищем событие начиная с сегодняшнего дня
            if (currentYear === curYearReal) {
                for (let m = curMonth; m < 12; m++) {
                    if (plansData[m]) {
                        const days = Object.keys(plansData[m]).map(Number).sort((a,b) => a-b);
                        for (let d of days) {
                            if (m === curMonth && d < curDay) continue; 
                            const note = plansData[m][d][0];
                            container.innerHTML = `
                                <div class="event-card-mini" style="border-right: 5px solid var(--ev-${note.category})">
                                    <div class="ev-title">${note.text}</div>
                                    <div class="ev-date">${d}.${m + 1}.${currentYear}</div>
                                </div>`;
                            found = true;
                            break;
                        }
                    }
                    if (found) break;
                }
            }

            if (!found) {
                container.innerHTML = '<div style="color:#666; font-size:0.7rem; font-weight:800;">СОБЫТИЙ НЕ НАЙДЕНО</div>';
            }
        }

        // 3. ПЕРЕКЛЮЧЕНИЕ ГОДА
        window.changeYear = (dir) => {
            currentYear += dir;
            updateYearDisplay();
            loadIndicators();
        };

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };

        function updateYearDisplay() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        // СТАРТ
        updateYearDisplay();
        loadIndicators();
    </script>
</body>
</html>
