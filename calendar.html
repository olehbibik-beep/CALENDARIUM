<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="view-transition" content="same-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM</title>
    <style>
    :root { 
        --accent: #09e0e3; --bg: #71797E; --dark: #1a1d1f; --card-bg: #22272a;
        --ev-memorial: #ff7675; --ev-meeting: #09e0e3; --text-main: #e0e6ed;
        --inner-border: rgba(255, 255, 255, 0.05);
    }
    
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
        margin: 0; background: var(--bg); color: var(--text-main); 
        display: flex; align-items: center; justify-content: center; 
        height: 100vh; overflow: hidden; 
    }

    /* ГЛАВНАЯ ПЛИТКА-ОБОЛОЧКА */
    .app-container {
        width: 90%; max-width: 95%; height: 85%; background: #0f1112;
        border-radius: 30px; border: 0px solid var(--inner-border); 
        display: flex; position: relative; overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* ЛЕВАЯ СТОРОНА (САЙДБАР) - ЗАФИКСИРОВАНО НА 300px */
    .sidebar { 
        width: 320px; 
        background: rgba(80,80,80,0.2); 
        padding: 30px; display: flex; flex-direction: column; 
        border-right: 0px solid var(--inner-border); flex-shrink: 0;
    }

    .user-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .user-name { font-weight: 700; text-transform: uppercase; font-size: 0.7rem; color: #fff; letter-spacing: 1px; }
    .nav-btns { display: flex; gap: 8px; }
    .btn-small { background: rgba(0,0,0,0.5); color: #fff; border: 0px solid #333; padding: 8px 16px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
    .btn-small:hover { background: var(--accent); }

    /* ПРАВАЯ СТОРОНА */
    .main-view { 
        width: 100%; height: 100%; flex: 1; display: flex; flex-direction: column; 
        padding: 10px 20px 30px 20px; position: relative;
    }

    .year-switcher { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
    #display-year { font-size: 4rem; font-weight: 300; letter-spacing: -3px; color: #fff; }
    .year-side { cursor: pointer; color: #3d444b; font-weight: 300; font-size: 1.5rem; transition: 0.2s; }
    .year-side:hover { color: var(--accent); }

    .months-grid { 
        display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); 
        gap: 15px; width: 100%; max-width: 800px; margin: 0 auto;
        flex: 1; min-height: 0; padding-bottom: 10px;
    }
    
    .month-card { 
        background: var(--dark); border-radius: 18px; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        color: #fff; font-weight: 300; cursor: pointer; position: relative; transition: 0.3s;
        text-transform: uppercase; font-size: 0.9rem; min-height: 50px; 
        border: 1px solid transparent;
    }

    .month-card:hover {
        background: #2b3236; 
        box-shadow: 0 8px 15px rgba(0,0,0,0.4);
    }

    .month-card.current-active { background: transparent !important; z-index: 1; }
        
    .month-card.current-active::before {
        content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.1); 
        border-radius: 18px; z-index: -1; border: 0px solid rgba(255,255,255,0.1);
    }

    .month-indicator { position: absolute; bottom: 12px; display: flex; gap: 4px; width: 20%; }
    .dot { height: 4px; flex: 1; border-radius: 10px; }
    .dot.red { background: var(--ev-memorial); }
    .dot.blue { background: var(--ev-meeting); }

    .upcoming-box { margin-top: 20px; overflow-y: auto; flex: 1; }
    .event-card-mini { background: transparent; padding: 12px; border-radius: 4px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
    .ev-title { font-size: 0.75rem; font-weight: 300; color: #fff; margin-bottom: 4px; }

    .inner-footer {
        position: absolute; bottom: 10px; left: 70px; right: 70px; display: flex; align-items: center; justify-content: space-between;
        background: transparent; padding: 5px 20px; border-top: 0px solid var(--inner-border);
    }
    .footer-text { font-size: 9px; color: #555; text-transform: uppercase; font-weight: 300; letter-spacing: 1px; }

  /* =========================================
       АЛГОРИТМ АДАПТИВНОСТИ (ОБНОВЛЕННЫЙ)
       ========================================= */

    /* 1. ПОРТРЕТНАЯ ОРИЕНТАЦИЯ (Все устройства вертикально: телефоны, планшеты) */
    @media (max-width: 1024px) and (orientation: portrait) {
        body { height: 100dvh; padding: 0; background: #0f1112; }
        .app-container { 
            flex-direction: column; width: 100vw; height: 100dvh; 
            border-radius: 0; box-shadow: none; 
        }
        
        .sidebar { display: contents; }
        .user-header { 
            order: 1; padding: 20px; margin: 0; background: #1a1d1f; 
            border-bottom: 1px solid var(--inner-border);
        }
        
        .main-view { order: 2; padding: 15px; flex: 0 0 auto; }
        .year-switcher { margin-bottom: 10px; }
        #display-year { font-size: 3rem; }
        
        .months-grid { 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(4, 1fr); gap: 10px; 
        }
        .month-card { min-height: 60px; font-size: 0.85rem; }

        .upcoming-box { 
            order: 3; padding: 20px; flex: 1; overflow-y: auto; margin: 0;
            background: rgba(255,255,255, 0.02);
            border-top: 1px solid var(--inner-border);
        }
        .inner-footer { display: none; }
    }

    /* 2. ЛАНДШАФТНАЯ ОРИЕНТАЦИЯ - ПЛАНШЕТЫ (Широкие экраны, выглядит как ПК) */
    @media (max-width: 1180px) and (min-width: 768px) and (orientation: landscape) {
        .app-container { 
            /* Главная фишка: расширяем плитку почти на весь экран */
            width: 98vw; 
            height: 95dvh; 
            border-radius: 20px; /* Сохраняем красоту плитки */
            
            /* Если вдруг захочешь использовать именно физический масштаб (zoom), 
               раскомментируй строку ниже, но обычно width: 98vw хватает: */
            /* transform: scale(0.9); */
        }
        
        /* Сайдбар остается слева, но делаем его чуть компактнее */
        .sidebar { 
            width: 260px; padding: 20px; 
        }
        
        /* Сетка месяцев остается как на ПК (4x3), просто адаптируется под размер */
        .months-grid { 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 10px; 
        }
        
        .month-card { min-height: 55px; font-size: 0.8rem; }
        #display-year { font-size: 3.5rem; }
        .inner-footer { display: none; }
    }

    /* 3. ЛАНДШАФТНАЯ ОРИЕНТАЦИЯ - ТЕЛЕФОНЫ (Очень узкая высота экрана) */
    @media (max-height: 500px) and (orientation: landscape) {
        body { height: 100dvh; padding: 0; }
        .app-container { 
            flex-direction: row; width: 100vw; height: 100dvh; border-radius: 0; 
        }
        
        .sidebar { 
            width: 220px; padding: 10px; border-bottom: none; 
            border-right: 1px solid var(--inner-border);
        }
        .user-header { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
        .nav-btns { width: 100%; justify-content: space-between; }
        .upcoming-box { margin-top: 5px; }

        .main-view { padding: 10px; }
        .year-switcher { margin-bottom: 5px; }
        #display-year { font-size: 2rem; }
        .year-side { font-size: 1rem; }

        .months-grid { 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 5px; padding-bottom: 0;
        }
        .month-card { min-height: 0; font-size: 0.7rem; border-radius: 8px; }
        .month-indicator { bottom: 4px; }
        .inner-footer { display: none; }
    }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="user-header">
                <div id="user-display" class="user-name">...</div>
                <div class="nav-btns">
                    <button id="admin-btn" class="btn-small" onclick="location.href='admin.html'" style="display:none; color: #fff;">OPTIONS</button>
                    <button class="btn-small" onclick="localStorage.clear(); location.href='index.html'">ВЫХОД</button>
                </div>
            </div>
            
            <div class="upcoming-box" id="next-event-container">
                <div style="font-size:0.6rem; color:#7f8fa6; opacity:0.3; text-align:center;">ЗАГРУЗКА...</div>
            </div>
        </div>

        <div class="main-view">
            <div class="year-switcher">
                <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
                <div id="display-year"></div>
                <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
            </div>

            <div class="months-grid" id="months"></div>

        </div>
        
    </div>
    <div class="inner-footer">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="footer-dot"></div>
            <div class="footer-text">Group 5 • v2.6.16</div>
        </div>
        <div class="footer-text">© 2026 CALENDARIUM</div>
    </div>
    <script type="module">
        const user = localStorage.getItem('currentUser');
        if (!user) { window.location.replace('index.html'); }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || new Date().getFullYear();
        
        document.getElementById('user-display').innerText = user;
        if(user.toLowerCase() === 'admin') {
            document.getElementById('admin-btn').style.display = 'block';
        }

        function initGrid() {
            const grid = document.getElementById('months');
            const now = new Date();
            const todayMonth = now.getMonth(); 
            const todayYear = now.getFullYear();

            let gridHTML = '';
            monthsNames.forEach((m, i) => {
                const isToday = (i === todayMonth && currentYear === todayYear);
                const statusClass = isToday ? 'current-active' : '';
                gridHTML += `
                    <div class="month-card ${statusClass}" onclick="goToMonth(${i})">
                        <span>${m.substring(0, 3)}</span>
                        <div class="month-indicator" id="ind-${i}"></div>
                    </div>`;
            });
            grid.innerHTML = gridHTML;
        }

        window.goToMonth = (i) => {
            localStorage.setItem('selectedMonth', i);
            localStorage.setItem('selectedYear', currentYear);
            window.location.href = 'notes.html';
        };

        // --- ЛОГИКА ПЛАВНОГО ПЕРЕХОДА И СМЕНЫ ГОДА ---
        window.changeYear = (dir) => { 
            if (!document.startViewTransition) {
                applyYearChange(dir);
                return;
            }
            document.startViewTransition(() => {
                applyYearChange(dir);
            });
        };

        function applyYearChange(dir) {
            currentYear += dir; 
            updateDisp(); 
            initGrid(); 
            loadData();
        }

        // --- ЛОГИКА СВАЙПОВ ---
        let touchStartX = 0;
        let touchEndX = 0;
        const mainView = document.querySelector('.main-view');

        mainView.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        mainView.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const threshold = 50; // чувствительность свайпа
            if (touchEndX < touchStartX - threshold) {
                changeYear(1);
            }
            if (touchEndX > touchStartX + threshold) {
                changeYear(-1);
            }
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            if (!container) return;

            container.innerHTML = '<div style="font-size:0.6rem; opacity:0.3; text-align:center; margin-top:20px;">ПОИСК...</div>';

            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            
            let upcomingEvents = [];

            for(let i=0; i<12; i++) {
                const ind = document.getElementById(`ind-${i}`);
                if(ind) ind.innerHTML = '';
            }

            const monthPromises = Array.from({length: 12}, (_, i) => 
                getDoc(doc(db, "calendar", `${currentYear}_${i}`))
            );
            
            const snapshots = await Promise.all(monthPromises);

            snapshots.forEach((snap, i) => {
                if (snap.exists()) {
                    const data = snap.data();
                    const ind = document.getElementById(`ind-${i}`);
                    let hasRed = false;
                    let hasBlue = false;

                    Object.entries(data).forEach(([day, notes]) => {
                        if (!Array.isArray(notes)) return;

                        notes.forEach(n => {
                            if (n.category === 'memorial' || n.category === 'congress') hasRed = true;
                            else hasBlue = true;

                            const eventDate = new Date(currentYear, i, parseInt(day)).getTime();

                            if (eventDate >= todayStart) {
                                upcomingEvents.push({
                                    text: n.text,
                                    day: day,
                                    mName: monthsNames[i],
                                    stamp: eventDate,
                                    cat: n.category
                                });
                            }
                        });
                    });

                    if (ind) {
                        if (hasRed) ind.innerHTML += '<div class="dot red"></div>';
                        if (hasBlue) ind.innerHTML += '<div class="dot blue"></div>';
                    }
                }
            });

            upcomingEvents.sort((a, b) => a.stamp - b.stamp);

            if (upcomingEvents.length > 0) {
                let html = '<div style="font-size:0.6rem; color:#7f8fa6; margin-bottom:10px; font-weight:800; letter-spacing:1px;">АКТУАЛЬНОЕ</div>';
                upcomingEvents.slice(0, 5).forEach(ev => {
                    const color = (ev.cat === 'memorial' || ev.cat === 'congress') ? 'var(--ev-memorial)' : 'var(--ev-meeting)';
                    html += `
                        <div class="event-card-mini" style="border-left-color: ${color}">
                            <div class="ev-title">${ev.text}</div>
                            <div class="ev-date">${ev.day} ${ev.mName}</div>
                        </div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div style="font-size:0.6rem; opacity:0.2; text-align:center; margin-top:20px;">СОБЫТИЙ НЕТ</div>';
            }
        }

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
