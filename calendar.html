<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0984e3; 
            --sidebar-bg: #ffffff;
            --main-bg: #f0f3f5;
            --text-main: #2d3436; 
            /* Палитра как в заметках */
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        * { box-sizing: border-box; outline: none; }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; display: flex; 
            height: 100vh; background: var(--main-bg); overflow: hidden; 
        }

        /* --- САЙДБАР --- */
        .sidebar { 
            width: 350px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; 
            z-index: 10; flex-shrink: 0; align-items: flex-end; text-align: right;
        }

        .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logout-btn { 
            background: #000; color: #fff; border: none; padding: 6px 14px; 
            border-radius: 8px; font-size: 0.7rem; font-weight: 900; cursor: pointer; 
            text-transform: uppercase;
        }
        .user-name { font-size: 1.1rem; font-weight: 800; color: var(--text-main); text-transform: uppercase; }

        #display-year { 
            font-size: 6rem; font-weight: 900; color: #dfe6e9; 
            letter-spacing: -6px; line-height: 0.8; margin-bottom: 30px; 
        }

        .side-section { width: 100%; margin-bottom: 25px; border-bottom: 1px solid #f1f1f1; padding-bottom: 15px; }
        .side-label { font-size: 0.7rem; font-weight: 800; color: #b2bec3; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 0.85rem; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
        .color-bar { width: 4px; height: 16px; border-radius: 2px; }

        /* --- СЕТКА МЕСЯЦЕВ --- */
        .main-content { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            padding: 30px; height: 100vh; overflow-y: auto;
        }

        .months-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            width: 100%;
            max-width: 1100px;
        }

        /* СТИЛЬ КАРТОЧКИ КАК В ЗАМЕТКАХ */
        .month-card { 
            background: #fff; border-radius: 24px; 
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.1rem; color: var(--text-main);
            cursor: pointer; border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            aspect-ratio: 1.1 / 1;
        }

        /* Цветная полоска снизу как в заметках */
        .month-card::before {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
            background: var(--accent); opacity: 0.6;
        }

        /* Разные цвета для рядов для красоты */
        .month-card:nth-child(3n+1)::before { background: var(--ev-work); }
        .month-card:nth-child(3n+2)::before { background: var(--ev-important); }
        .month-card:nth-child(3n+3)::before { background: var(--ev-personal); }

        .month-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        .month-card span { z-index: 2; }

        footer { 
            position: fixed; bottom: 0; width: 100%; padding: 12px 30px; 
            font-size: 9px; color: #b2bec3; text-align: right; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
        }

        /* --- АДАПТИВНОСТЬ ПОД ТЕЛЕФОН --- */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; height: auto; padding: 15px; 
                align-items: center; text-align: center; border-right: none; border-bottom: 1px solid #eee;
            }
            #display-year { font-size: 3.5rem; letter-spacing: -2px; margin: 5px 0; }
            .side-section { display: none; }

            .main-content { padding: 15px; height: calc(100vh - 160px); }
            .months-grid { 
                grid-template-columns: repeat(3, 1fr); 
                grid-template-rows: repeat(4, 1fr);
                gap: 10px; height: 100%;
            }
            .month-card { aspect-ratio: auto; height: 100%; font-size: 0.9rem; border-radius: 16px; }
            footer { padding: 5px; text-align: center; position: relative; background: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="logout-btn" onclick="logout()">Exit</button>
            <div class="user-name" id="display-name">USER</div>
        </div>

        <div id="display-year">2026</div>

        <div class="side-section">
            <div class="side-label">Легенда</div>
            <div class="legend-item">Работа <div class="color-bar" style="background: var(--ev-work);"></div></div>
            <div class="legend-item">Срочно <div class="color-bar" style="background: var(--ev-important);"></div></div>
            <div class="legend-item">Личное <div class="color-bar" style="background: var(--ev-personal);"></div></div>
        </div>

        <div class="side-section">
            <div class="side-label">System Log</div>
            <div id="logs-container"><div class="log-entry" style="font-size: 11px; color: #999;">Терминал активен..</div></div>
        </div>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <footer>Cloud Plan Ecosystem — Secure Terminal</footer>

    <script type="module">
        /* Скрипт Firebase без изменений */
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        const currentUser = localStorage.getItem('currentUser') || 'ADMIN';
        document.getElementById('display-name').innerText = currentUser;

        monthsNames.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'month-card';
            card.innerHTML = `<span>${m}</span>`;
            card.onclick = () => { 
                localStorage.setItem('selectedMonth', i); 
                window.location.href = 'notes.html'; 
            };
            grid.appendChild(card);
        });

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
    </script>
</body>
</html>
