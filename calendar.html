<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --sidebar-bg: #1a1a1a; 
            --main-bg: #f4f4f4;    
            --card-bg: #2d3436;    
            --text-white: #ffffff;
            --ev-important: #d63031;
            --ev-work: #0984e3;
            --accent-gold: #fdcb6e;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        /* --- САЙДБАР --- */
        .sidebar { 
            width: 400px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; 
            z-index: 10; flex-shrink: 0; align-items: flex-end; text-align: right;
            color: var(--text-white);
        }

        .user-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .logout-btn { background: #fff; color: #000; border: none; padding: 6px 16px; border-radius: 20px; font-weight: 900; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        .user-name { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; }

        /* ИСПРАВЛЕННЫЙ СЕЛЕКТОР ГОДА */
        .year-switcher { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 100%; margin-bottom: 40px; 
        }
        .year-side { 
            font-size: 1.1rem; font-weight: 900; color: #444; 
            cursor: pointer; transition: 0.3s; flex: 1; text-align: center;
        }
        .year-side:hover { color: #888; }
        #display-year { 
            font-size: 4.5rem; font-weight: 900; color: var(--text-white); 
            letter-spacing: -3px; line-height: 1; flex: 2; text-align: center;
        }

        /* БЛИЖАЙШЕЕ СОБЫТИЕ */
        .upcoming-box { width: 100%; margin-top: auto; text-align: right; margin-bottom: 25px; }
        .side-label { font-size: 0.7rem; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .event-card-mini { background: #252525; padding: 20px; border-radius: 20px; transition: 0.3s; position: relative; }
        .event-card-mini.important { border-right: 5px solid var(--ev-important); }
        .event-card-mini.work { border-right: 5px solid var(--ev-work); }
        .ev-title { font-size: 1rem; font-weight: 900; margin-bottom: 5px; color: #fff; text-transform: uppercase; }
        .ev-date { font-size: 0.8rem; font-weight: 700; opacity: 0.7; }

        #admin-link {
            display: none; color: var(--accent-gold); text-decoration: none; font-size: 0.75rem; 
            font-weight: 900; text-transform: uppercase; border: 1px solid var(--accent-gold); 
            padding: 10px 25px; border-radius: 12px; transition: 0.3s; width: 100%; text-align: center;
        }
        #admin-link:hover { background: var(--accent-gold); color: #000; }

        /* --- СЕТКА МЕСЯЦЕВ --- */
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px; }
        .months-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; max-width: 700px; }
        .month-card { 
            background: var(--card-bg); border-radius: 22px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; 
            color: #fff; cursor: pointer; aspect-ratio: 1 / 1; transition: 0.3s; text-transform: uppercase; position: relative;
        }
        .month-indicator { position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.red { background: var(--ev-important); box-shadow: 0 0 5px var(--ev-important); }
        .dot.blue { background: var(--ev-work); box-shadow: 0 0 5px var(--ev-work); }
        .month-card:hover { transform: scale(1.08); background: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; padding: 20px; align-items: center; }
            .year-switcher { margin-bottom: 20px; }
            #display-year { font-size: 3.5rem; }
            .upcoming-box, #admin-link { display: none !important; }
            .main-content { padding: 20px; height: auto; }
            .months-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-nav">
            <button class="logout-btn" onclick="logout()">Logout</button>
            <div class="user-name" id="display-name">...</div>
        </div>

        <div class="year-switcher">
            <div class="year-side" id="prev-year" onclick="changeYear(-1)"></div>
            <div id="display-year"></div>
            <div class="year-side" id="next-year" onclick="changeYear(1)"></div>
        </div>

        <div class="upcoming-box">
            <div class="side-label">Приоритет</div>
            <div id="next-event-container"></div>
        </div>

        <a href="admin.html" id="admin-link">Admin Terminal</a>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser') || 'GUEST';
        document.getElementById('display-name').innerText = currentUser;

        if (currentUser.toUpperCase() === 'ADMIN') {
            document.getElementById('admin-link').style.display = 'block';
        }

        let currentYear = parseInt(localStorage.getItem('selectedYear')) || 2026;
        let allEventsGlobal = [];

        // Слушатель событий
        const qEvents = query(collection(db, "events"), orderBy("date", "asc"));
        onSnapshot(qEvents, (snapshot) => {
            allEventsGlobal = [];
            snapshot.forEach(doc => allEventsGlobal.push(doc.data()));
            updateUI();
        });

        function updateUI() {
            // 1. Ближайшее в тулбаре
            const container = document.getElementById('next-event-container');
            const now = new Date().toISOString().split('T')[0];
            const futureEvents = allEventsGlobal.filter(e => e.date >= now);
            const priority = futureEvents.find(e => e.type === 'important' || e.type === 'work');
            
            if (priority) {
                const typeClass = priority.type === 'important' ? 'important' : 'work';
                container.innerHTML = `<div class="event-card-mini ${typeClass}"><div class="ev-title">${priority.title}</div><div class="ev-date" style="color: var(--ev-${priority.type})">${priority.date.split('-').reverse().join('.')}</div></div>`;
            } else if (futureEvents[0]) {
                container.innerHTML = `<div class="event-card-mini"><div class="ev-title">${futureEvents[0].title}</div><div class="ev-date">${futureEvents[0].date.split('-').reverse().join('.')}</div></div>`;
            } else {
                container.innerHTML = '<div style="color:#444; font-weight:900; font-size:0.7rem;">ПЛАНОВ НЕТ</div>';
            }

            // 2. Месяцы
            renderMonths();
        }

        function renderMonths() {
            const grid = document.getElementById('months');
            const names = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            grid.innerHTML = '';

            names.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<span>${m}</span>`;

                const monthEvents = allEventsGlobal.filter(e => {
                    const d = new Date(e.date);
                    return d.getMonth() === i && d.getFullYear() === currentYear;
                });

                if (monthEvents.length > 0) {
                    const ind = document.createElement('div');
                    ind.className = 'month-indicator';
                    if (monthEvents.some(e => e.type === 'important')) ind.innerHTML += '<div class="dot red"></div>';
                    if (monthEvents.some(e => e.type === 'work')) ind.innerHTML += '<div class="dot blue"></div>';
                    card.appendChild(ind);
                }

                card.onclick = () => {
                    localStorage.setItem('selectedMonth', i);
                    localStorage.setItem('selectedYear', currentYear);
                    window.location.href = 'notes.html';
                };
                grid.appendChild(card);
            });
        }

        window.changeYear = (dir) => {
            currentYear += dir;
            updateYearDisplay();
            renderMonths();
        };

        function updateYearDisplay() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
        updateYearDisplay();
    </script>
</body>
</html>
