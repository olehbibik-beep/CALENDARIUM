<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0984e3; 
            --bg: #f0f2f5; 
            --orange: #f39c12; 
            --text: #2d3436; 
            --card-bg: rgba(255, 255, 255, 0.85);
            /* Цвета событий */
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* САЙДБАР (ЛЕВЫЙ) */
        .sidebar { 
            width: 260px; background: #fff; padding: 40px 24px; 
            display: flex; flex-direction: column; border-right: 1px solid #e0e0e0;
            z-index: 10;
        }
        .user-profile { margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
        .user-name { font-size: 1.2rem; font-weight: 800; color: var(--text); text-transform: uppercase; }
        .user-role { font-size: 0.6rem; color: #b2bec3; letter-spacing: 1.5px; text-transform: uppercase; }

        .nav-btn { 
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: none;
            background: #f8f9fa; color: var(--text); font-weight: 600; cursor: pointer; text-align: left;
            transition: 0.2s;
        }
        .nav-btn:hover { background: #e9ecef; }
        .nav-btn.admin-only { background: var(--orange); color: white; display: none; }
        .logout-btn { margin-top: auto; background: transparent; color: #fab1a0; border: 1px solid #fab1a0; text-align: center; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content { 
            flex: 1; display: flex; padding: 40px 40px 40px 60px; 
            align-items: center; justify-content: flex-start;
        }

        .months-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 20px; width: 100%; max-width: 850px; 
        }

        .month-card { 
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 15px; height: 120px; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 1.1rem; color: #636e72;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27);
        }

        .month-card:hover { 
            transform: scale(1.05); background: #fff; color: var(--accent);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* ТОЧКИ СОБЫТИЙ НА ПЛИТКЕ */
        .event-dots {
            position: absolute; bottom: 15px; display: flex; gap: 5px;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; }

        /* ПРАВАЯ ИНФО-ПАНЕЛЬ (ГОД И ЛЕГЕНДА) */
        .info-panel {
            width: 280px; padding: 40px; display: flex; flex-direction: column; align-items: flex-end;
        }

        #display-year { 
            font-size: 5rem; font-weight: 900; color: #dfe6e9; 
            letter-spacing: -4px; line-height: 0.8; margin-bottom: 40px;
        }

        .legend { width: 100%; text-align: right; }
        .legend-title { font-size: 0.7rem; font-weight: 900; color: #b2bec3; margin-bottom: 15px; letter-spacing: 1px; }
        .legend-item { 
            display: flex; align-items: center; justify-content: flex-end; 
            gap: 10px; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: #636e72;
        }
        .color-mark { width: 10px; height: 10px; border-radius: 3px; }

        /* ШТОРКА */
        .admin-sidebar {
            position: fixed; right: 0; top: 0; width: 380px; height: 100vh; 
            background: var(--orange); color: white; z-index: 1000;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            padding: 30px; box-sizing: border-box;
        }
        .admin-sidebar.active { transform: translateX(0); }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 6px 20px; font-size: 9px; color: #b2bec3; border-top: 1px solid #eee; z-index: 5; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-profile">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <div>
                <div class="user-name" id="display-name">Guest</div>
                <div class="user-role" id="display-role">Terminal User</div>
            </div>
        </div>
        
        <button id="admin-req-btn" class="nav-btn admin-only" onclick="event.stopPropagation(); toggleAdminSidebar(true)">ЗАЯВКИ ПОЛЬЗОВАТЕЛЕЙ</button>
        <button class="nav-btn logout-btn" onclick="logout()">ВЫЙТИ</button>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <div class="info-panel">
        <div id="display-year">2026</div>
        
        <div class="legend">
            <div class="legend-title">КАТЕГОРИИ СОБЫТИЙ</div>
            <div class="legend-item">Работа <div class="color-mark" style="background: var(--ev-work);"></div></div>
            <div class="legend-item">Важное <div class="color-mark" style="background: var(--ev-important);"></div></div>
            <div class="legend-item">Личное <div class="color-mark" style="background: var(--ev-personal);"></div></div>
        </div>
    </div>

    <div id="admin-sidebar" class="admin-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <span style="font-weight:900;">ADMIN PANEL</span>
            <span style="cursor:pointer; font-size:24px;" onclick="toggleAdminSidebar(false)">×</span>
        </div>
        <div id="requests-list"></div>
    </div>

    <footer>Cloud Plan Ecosystem — Secure Terminal 2.0</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser');

        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('display-name').innerText = currentUser;
        
        if (currentUser === 'admin') {
            document.getElementById('admin-req-btn').style.display = 'block';
            document.getElementById('display-role').innerText = 'System Administrator';
        }

        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        
        months.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'month-card';
            card.innerHTML = `
                ${m}
                <div class="event-dots">
                    <div class="dot" style="background: var(--ev-work)"></div>
                    <div class="dot" style="background: var(--ev-important)"></div>
                </div>
            `;
            card.onclick = () => {
                localStorage.setItem('selectedMonth', i);
                window.location.href = 'notes.html';
            };
            grid.appendChild(card);
        });

        const adminSidebar = document.getElementById('admin-sidebar');
        window.toggleAdminSidebar = (show) => {
            if (show) { adminSidebar.classList.add('active'); loadRequests(); }
            else { adminSidebar.classList.remove('active'); }
        };

        window.addEventListener('mousedown', (e) => {
            if (adminSidebar.classList.contains('active') && !adminSidebar.contains(e.target)) toggleAdminSidebar(false);
        });

        async function loadRequests() {
            const list = document.getElementById('requests-list');
            list.innerHTML = 'Загрузка...';
            const querySnapshot = await getDocs(collection(db, "requests"));
            list.innerHTML = '';
            querySnapshot.forEach((documentSnap) => {
                const name = documentSnap.id;
                const data = documentSnap.data();
                const item = document.createElement('div');
                item.className = 'req-item';
                item.innerHTML = `<div style="font-weight:bold;">${name}</div>
                    <button onclick="manageUser('${name}', '${data.password}', 'approve')" style="background:#2ecc71; color:white; border:none; padding:5px 10px; border-radius:5px; margin-top:5px; cursor:pointer;">OK</button>`;
                list.appendChild(item);
            });
        }

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
    </script>
</body>
</html>
