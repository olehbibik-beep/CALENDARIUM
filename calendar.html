<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM</title>
    <style>
        :root { 
            --sidebar-bg: #1a1a1a; --main-bg: #f4f4f4; --card-bg: #2d3436; 
            --ev-memorial: #ff4757; --ev-meeting: #0984e3; --accent-gold: #fdcb6e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; display: flex; 
            height: 100vh; background: var(--main-bg); overflow: hidden; 
        }

        /* САЙДБАР */
        .sidebar { 
            width: 320px; background: var(--sidebar-bg); padding: 25px; 
            display: flex; flex-direction: column; color: white;
            flex-shrink: 0; z-index: 10;
        }

        .user-header { display: flex; align-items: center; width: 100%; justify-content: space-between; margin-bottom: 15px; }
        .user-info { display: flex; flex-direction: column; gap: 5px; }
        .user-name { font-weight: 800; text-transform: uppercase; font-size: 0.7rem; color: var(--accent-gold); }
        
        .nav-btns { display: flex; gap: 8px; }
        .btn-small { background: #fff; color: #000; border: none; padding: 5px 10px; border-radius: 6px; font-size: 0.6rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-admin { background: var(--accent-gold); color: #000; }

        .year-switcher { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 15px; }
        #display-year { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .year-side { cursor: pointer; color: #444; font-weight: 900; padding: 10px; font-size: 1.2rem; }

        .upcoming-box { width: 100%; margin-top: auto; }
        .event-card-mini { background: #252525; padding: 12px; border-radius: 12px; border-right: 4px solid var(--ev-meeting); animation: fadeIn 0.4s ease; }
        .ev-title { font-size: 0.8rem; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* СЕТКА */
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .months-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            width: 100%; 
            max-width: 800px; 
        }
        
        .month-card { 
            background: var(--card-bg); border-radius: 12px; 
            aspect-ratio: 1 / 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; font-weight: 900; cursor: pointer; position: relative; transition: 0.2s;
            text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.5px;
        }
        .month-card:active { transform: scale(0.9); background: #000; }

        .month-indicator { position: absolute; top: 6px; right: 6px; display: flex; gap: 3px; }
        .dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot.red { background: var(--ev-memorial); }
        .dot.blue { background: var(--ev-meeting); }

        /* МОБИЛЬНАЯ ВЕРСИЯ */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; padding: 10px 15px; height: auto; 
                align-items: center; 
            }
            .user-header { margin-bottom: 8px; width: 100%; }
            .year-switcher { margin-bottom: 5px; }
            #display-year { font-size: 2.4rem; }
            
            .upcoming-box { 
                display: block; 
                margin: 5px 0; 
                width: 100%;
            }
            .event-card-mini { padding: 8px 12px; }

            .main-content { padding: 10px; flex: 1; align-items: center; }
            .months-grid { 
                grid-template-columns: repeat(4, 1fr);
                gap: 6px; 
            }
            .month-card { border-radius: 8px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="user-header">
            <div class="user-info">
                <div id="user-display" class="user-name">...</div>
            </div>
            <div class="nav-btns">
                <button id="admin-btn" class="btn-small btn-admin" onclick="location.href='admin.html'" style="display:none;">АДМИН</button>
                <button class="btn-small" onclick="location.href='index.html'">ВЫХОД</button>
            </div>
        </div>

        <div class="year-switcher">
            <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
            <div id="display-year"></div>
            <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
        </div>

        <div class="upcoming-box">
            <div id="next-event-container">
                <div style="font-size:0.6rem; opacity:0.3; text-align:center;">ЗАГРУЗКА СОБЫТИЙ...</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthsNames = ["Янв", "Фев", "Мар", "Апр", "Май", "Июн", "Июл", "Авг", "Сен", "Окт", "Ноя", "Дек"];
        
        // Пользователь и проверка админа
        const user = localStorage.getItem('currentUser') || 'ГОСТЬ';
        document.getElementById('user-display').innerText = user;
        if(user.toLowerCase() === 'admin') {
            document.getElementById('admin-btn').style.display = 'block';
        }

        let currentYear = parseInt(localStorage.getItem('selectedYear')) || 2026;

        function initGrid() {
            const grid = document.getElementById('months');
            grid.innerHTML = '';
            monthsNames.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<span>${m}</span><div class="month-indicator" id="ind-${i}"></div>`;
                card.onclick = () => {
                    localStorage.setItem('selectedMonth', i);
                    localStorage.setItem('selectedYear', currentYear.toString());
                    window.location.href = 'notes.html';
                };
                grid.appendChild(card);
            });
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            let firstFound = null;

            // Очистка индикаторов
            for (let j = 0; j < 12; j++) {
                const el = document.getElementById(`ind-${j}`);
                if (el) el.innerHTML = '';
            }

            for (let i = 0; i < 12; i++) {
                try {
                    const snap = await getDoc(doc(db, "calendar", `${currentYear}_${i}`));
                    if (snap.exists()) {
                        const data = snap.data();
                        const ind = document.getElementById(`ind-${i}`);
                        let hasRed = false, hasBlue = false;

                        Object.keys(data).sort((a,b) => a-b).forEach(day => {
                            data[day].forEach(n => {
                                if (n.category === 'memorial' || n.category === 'congress') hasRed = true;
                                else hasBlue = true;
                                
                                if (!firstFound) {
                                    firstFound = { text: n.text, day, month: monthsNames[i], cat: n.category };
                                }
                            });
                        });

                        if (ind) {
                            if (hasRed) ind.innerHTML += '<div class="dot red"></div>';
                            if (hasBlue) ind.innerHTML += '<div class="dot blue"></div>';
                        }
                    }
                } catch (e) {}
            }

            if (firstFound) {
                const accent = (firstFound.cat === 'memorial' || firstFound.cat === 'congress') ? '#ff4757' : '#0984e3';
                container.innerHTML = `
                    <div class="event-card-mini" style="border-right-color: ${accent}">
                        <div class="ev-title">${firstFound.text}</div>
                        <div style="font-size:0.6rem; opacity:0.5; font-weight:700;">${firstFound.day} ${firstFound.month} ${currentYear}</div>
                    </div>`;
            } else {
                container.innerHTML = '<div style="font-size:0.6rem; opacity:0.2; text-align:center;">НЕТ СОБЫТИЙ</div>';
            }
        }

        window.changeYear = (dir) => { 
            currentYear += dir; 
            updateDisp(); 
            initGrid(); 
            loadData(); 
        };

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear.toString());
        }

        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
