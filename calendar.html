<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0984e3; 
            --bg: #f0f2f5; 
            --orange: #f39c12; 
            --text: #2d3436; 
            --card-bg: rgba(255, 255, 255, 0.85);
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* ЕДИНЫЙ САЙДБАР */
        .sidebar { 
            width: 340px; 
            background: #fff; 
            display: flex; 
            flex-direction: column;
            padding: 40px 30px; /* Внутренние отступы */
            border-right: 1px solid #e0e0e0;
            z-index: 10; 
            flex-shrink: 0;
            box-sizing: border-box;
            /* Выравнивание всего контента внутри сайдбара по правому краю */
            align-items: flex-end; 
            text-align: right;
        }

        /* Блок профиля */
        .user-block { margin-bottom: 40px; }
        .user-name { font-size: 1.1rem; font-weight: 900; color: var(--text); text-transform: uppercase; margin-bottom: 5px; }
        .user-role { font-size: 0.6rem; color: #b2bec3; letter-spacing: 1px; text-transform: uppercase; }

        /* Большой год */
        #display-year { 
            font-size: 5rem; font-weight: 900; color: #dfe6e9; 
            letter-spacing: -5px; line-height: 0.8; margin-bottom: 40px; 
        }

        /* Секции */
        .side-section { width: 100%; margin-bottom: 30px; }
        .side-label { font-size: 0.65rem; font-weight: 900; color: #b2bec3; margin-bottom: 15px; letter-spacing: 1.5px; text-transform: uppercase; }
        
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 0.85rem; font-weight: 600; color: #636e72; margin-bottom: 8px; }
        .color-dot { width: 10px; height: 10px; border-radius: 3px; }

        /* Контейнер логов */
        .logs-container { width: 100%; max-height: 250px; overflow-y: auto; }
        .log-entry { 
            font-size: 0.75rem; background: #f8f9fa; padding: 12px; border-radius: 12px; 
            margin-bottom: 8px; border-right: 4px solid var(--accent); /* Полоска теперь справа */
            line-height: 1.4; color: #636e72;
        }
        .log-entry b { color: var(--text); }
        .log-time { font-size: 0.6rem; opacity: 0.5; display: block; margin-top: 4px; }

        .logout-btn { 
            margin-top: auto; border: none; background: none; color: #fab1a0; 
            cursor: pointer; font-weight: 800; font-size: 0.75rem; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* СЕТКА (ПО ЦЕНТРУ) */
        .main-view { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .months-grid { display: grid; grid-template-columns: repeat(4, 180px); gap: 20px; }

        .month-card { 
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 20px; height: 130px; position: relative;
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 1.1rem; color: #636e72;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.5);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27);
        }

        .month-card:hover { 
            transform: scale(1.05); background: #fff; color: var(--accent); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); border-color: var(--accent);
        }

        footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 6px 20px; font-size: 9px; color: #b2bec3; border-top: 1px solid #eee; text-align: right; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-block">
            <div class="user-name" id="display-name">...</div>
            <div class="user-role" id="display-role">Terminal Access</div>
        </div>

        <div id="display-year">2026</div>

        <div class="side-section">
            <div class="side-label">Категории</div>
            <div class="legend-item">Работа <div class="color-dot" style="background: var(--ev-work);"></div></div>
            <div class="legend-item">Важное <div class="color-dot" style="background: var(--ev-important);"></div></div>
            <div class="legend-item">Личное <div class="color-dot" style="background: var(--ev-personal);"></div></div>
        </div>

        <div class="side-section">
            <div class="side-label">История записей</div>
            <div class="logs-container" id="logs-container">
                <div class="log-entry">История синхронизируется...</div>
            </div>
        </div>

        <div class="side-section admin-only" style="display:none;">
            <div class="side-label">Заявки</div>
            <div id="requests-list"></div>
        </div>

        <button class="logout-btn" onclick="logout()">Выйти из системы</button>
    </div>

    <div class="main-view">
        <div class="months-grid" id="months"></div>
    </div>

    <footer>Cloud Plan Ecosystem — Secure Terminal 2.0</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser');

        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('display-name').innerText = currentUser;

        if (currentUser === 'admin') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            document.getElementById('display-role').innerText = 'System Administrator';
            initAdminRequests();
        }

        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        monthsNames.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'month-card';
            card.innerText = m;
            card.onclick = () => { localStorage.setItem('selectedMonth', i); window.location.href = 'notes.html'; };
            grid.appendChild(card);
        });

        // Слушаем логи только для записей
        const qLogs = query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(8));
        onSnapshot(qLogs, (snapshot) => {
            const container = document.getElementById('logs-container');
            if (snapshot.empty) return;
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerHTML = `<b>${data.user}</b>: ${data.action} в ${data.month}<span class="log-time">${new Date(data.timestamp?.toDate()).toLocaleTimeString()}</span>`;
                container.appendChild(div);
            });
        });

        function initAdminRequests() {
            onSnapshot(collection(db, "requests"), (s) => {
                const list = document.getElementById('requests-list');
                list.innerHTML = '';
                s.forEach(d => {
                    const item = document.createElement('div');
                    item.className = 'log-entry';
                    item.style.borderRightColor = 'var(--orange)';
                    item.innerHTML = `${d.id} <button onclick="approve('${d.id}', '${d.data().password}')" style="border:none; color:var(--orange); background:none; cursor:pointer; font-weight:bold; font-size:10px;">[OK]</button>`;
                    list.appendChild(item);
                });
            });
        }

        window.approve = async (n, p) => { await setDoc(doc(db, "users", n), {password: p}); await deleteDoc(doc(db, "requests", n)); };
        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
    </script>
</body>
</html>
