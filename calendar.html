<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --sidebar-bg: #1a1a1a; 
            --main-bg: #f4f4f4;    
            --card-bg: #2d3436;    
            --text-white: #ffffff;
            --ev-important: #d63031; /* Красный */
            --ev-work: #0984e3;      /* Синий */
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        /* --- САЙДБАР --- */
        .sidebar { 
            width: 380px; background: var(--sidebar-bg); padding: 50px 40px; 
            display: flex; flex-direction: column; 
            z-index: 10; flex-shrink: 0; align-items: flex-end; text-align: right;
            color: var(--text-white);
        }

        .user-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; }
        .logout-btn { background: #fff; color: #000; border: none; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        .user-name { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; }

        /* СЕЛЕКТОР ГОДА */
        .year-switcher { 
            display: flex; align-items: baseline; gap: 20px; justify-content: flex-end; 
            margin-bottom: 50px; width: 100%;
        }
        .year-side { font-size: 1.5rem; font-weight: 900; color: #333; cursor: pointer; transition: 0.3s; }
        #display-year { font-size: 6rem; font-weight: 900; color: var(--text-white); letter-spacing: -4px; line-height: 0.8; }

        /* БЛИЖАЙШЕЕ СОБЫТИЕ */
        .upcoming-box { width: 100%; margin-top: auto; text-align: right; }
        .side-label { font-size: 0.75rem; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        
        .event-card-mini { 
            background: #252525; padding: 20px; border-radius: 20px; 
            transition: 0.3s; position: relative; overflow: hidden;
        }
        /* Динамический индикатор цвета в тулбаре */
        .event-card-mini.important { border-right: 5px solid var(--ev-important); }
        .event-card-mini.work { border-right: 5px solid var(--ev-work); }

        .ev-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 5px; color: #fff; text-transform: uppercase; }
        .ev-date { font-size: 0.8rem; font-weight: 700; opacity: 0.8; }

        /* --- СЕТКА МЕСЯЦЕВ --- */
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px; }
        .months-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; width: 100%; max-width: 750px; }
        
        .month-card { 
            background: var(--card-bg); border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 0.9rem; color: #fff;
            cursor: pointer; aspect-ratio: 1 / 1;
            transition: 0.3s; text-transform: uppercase;
            position: relative;
        }
        
        /* Точки уведомлений на плитках месяцев */
        .month-indicator { 
            position: absolute; top: 15px; right: 15px; display: flex; gap: 4px; 
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.red { background: var(--ev-important); box-shadow: 0 0 5px var(--ev-important); }
        .dot.blue { background: var(--ev-work); box-shadow: 0 0 5px var(--ev-work); }

        .month-card:hover { transform: scale(1.1); background: #000; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 20px; align-items: center; }
            .year-switcher { justify-content: center; margin-bottom: 20px; }
            #display-year { font-size: 4rem; }
            .upcoming-box { display: none; }
            .main-content { padding: 30px; }
            .months-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-nav">
            <button class="logout-btn" onclick="logout()">Exit</button>
            <div class="user-name" id="display-name">...</div>
        </div>

        <div class="year-switcher">
            <div class="year-side" id="prev-year" onclick="changeYear(-1)"></div>
            <div id="display-year"></div>
            <div class="year-side" id="next-year" onclick="changeYear(1)"></div>
        </div>

        <div class="upcoming-box">
            <div class="side-label">Ближайший приоритет</div>
            <div id="next-event-container">
                <div style="color: #444; font-size: 0.8rem; font-weight: 900;">СВОБОДНО</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser') || 'ADMIN';
        document.getElementById('display-name').innerText = currentUser;

        // 1. ПОИСК БЛИЖАЙШЕГО СОБЫТИЯ (КРАСНОЕ ИЛИ СИНЕЕ)
        const now = new Date().toISOString().split('T')[0];
        const qEvents = query(collection(db, "events"), where("date", ">=", now), orderBy("date", "asc"));

        onSnapshot(qEvents, (snapshot) => {
            const container = document.getElementById('next-event-container');
            let events = [];
            snapshot.forEach(doc => events.push(doc.data()));

            // Фильтруем только красные и синие
            const priority = events.find(e => e.type === 'important' || e.type === 'work');
            
            if (priority) {
                const typeClass = priority.type === 'important' ? 'important' : 'work';
                container.innerHTML = `
                    <div class="event-card-mini ${typeClass}">
                        <div class="ev-title">${priority.title}</div>
                        <div class="ev-date" style="color: var(--ev-${priority.type})">${priority.date.split('-').reverse().join('.')}</div>
                    </div>
                `;
            } else if (events[0]) { // Если приоритетных нет, берем любое ближайшее
                container.innerHTML = `
                    <div class="event-card-mini">
                        <div class="ev-title">${events[0].title}</div>
                        <div class="ev-date">${events[0].date.split('-').reverse().join('.')}</div>
                    </div>
                `;
            } else {
                container.innerHTML = '<div style="color:#444; font-weight:900;">НЕТ СОБЫТИЙ</div>';
            }

            // 2. ОБНОВЛЕНИЕ ИНДИКАТОРОВ НА ПЛИТКАХ МЕСЯЦЕВ
            renderMonths(events);
        });

        // 3. СЕТКА МЕСЯЦЕВ
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || 2026;

        function renderMonths(allEvents = []) {
            grid.innerHTML = '';
            monthsNames.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<span>${m}</span>`;

                // Проверяем наличие красных/синих событий в этом месяце
                const monthEvents = allEvents.filter(e => {
                    const d = new Date(e.date);
                    return d.getMonth() === i && d.getFullYear() === currentYear;
                });

                if (monthEvents.length > 0) {
                    const indicators = document.createElement('div');
                    indicators.className = 'month-indicator';
                    if (monthEvents.some(e => e.type === 'important')) indicators.innerHTML += '<div class="dot red"></div>';
                    if (monthEvents.some(e => e.type === 'work')) indicators.innerHTML += '<div class="dot blue"></div>';
                    card.appendChild(indicators);
                }

                card.onclick = () => { 
                    localStorage.setItem('selectedMonth', i);
                    localStorage.setItem('selectedYear', currentYear);
                    window.location.href = 'notes.html'; 
                };
                grid.appendChild(card);
            });
        }

        window.changeYear = (dir) => {
            currentYear += dir;
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
            // Месяцы перерисуются через onSnapshot
        };

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
        
        // Initial setup
        document.getElementById('display-year').innerText = currentYear;
        document.getElementById('prev-year').innerText = currentYear - 1;
        document.getElementById('next-year').innerText = currentYear + 1;
    </script>
</body>
</html>
