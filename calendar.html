<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --accent: #0088cc; 
            --sidebar-bg: #ffffff;
            --main-bg: #f4f7f6;
            --text-main: #2d3436; 
            --text-muted: #636e72;
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        * { box-sizing: border-box; }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; display: flex; 
            height: 100vh; background: var(--main-bg); overflow: hidden; 
        }

        /* --- САЙДБАР (ПК) --- */
        .sidebar { 
            width: 350px; background: var(--sidebar-bg); padding: 40px; 
            display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
            z-index: 10; flex-shrink: 0; align-items: flex-end; text-align: right;
        }

        .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .logout-btn { 
            background: #000; color: #fff; border: none; 
            padding: 6px 14px; border-radius: 8px; 
            font-size: 0.7rem; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        .user-name { font-size: 1rem; font-weight: 800; color: var(--text-main); text-transform: uppercase; }
        .user-icon { color: var(--accent); display: flex; align-items: center; }

        #display-year { 
            font-size: 6rem; font-weight: 800; color: #eceff1; 
            letter-spacing: -8px; line-height: 0.8; margin-bottom: 40px; 
            text-shadow: 1px 1px 0px #fff; 
        }

        .side-section { width: 100%; margin-bottom: 30px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; }
        .side-label { font-size: 0.7rem; font-weight: 800; color: #b2bec3; margin-bottom: 15px; text-transform: uppercase; }
        
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .color-bar { width: 4px; height: 15px; border-radius: 2px; }

        .log-entry { 
            font-size: 0.75rem; background: #fff5f9; padding: 12px; 
            border-radius: 12px 0 0 12px; position: relative;
            line-height: 1.4; color: #4b4b4b; text-align: right; width: 100%;
            border-right: 3px solid #e6007e;
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        .main-content { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            padding: 20px; height: 100vh;
        }

        .months-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            width: 100%;
            max-width: 1000px;
        }

        .month-card { 
            background: #fff; border-radius: 20px; 
            aspect-ratio: 1.2 / 1;
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1rem; color: var(--text-main);
            cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        .month-card:hover { 
            transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            color: var(--accent); border-color: var(--accent);
        }

        footer { 
            position: fixed; bottom: 0; width: 100%; padding: 10px 30px; 
            font-size: 9px; color: #b2bec3; text-align: right; 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(5px);
        }

        /* -------------------------------------------------- */
        /* !!! МОБИЛЬНАЯ АДАПТАЦИЯ: ВСЁ НА ЭКРАНЕ !!!        */
        /* -------------------------------------------------- */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            
            .sidebar { 
                width: 100%; height: auto; padding: 15px; 
                align-items: center; text-align: center; border-right: none; border-bottom: 1px solid #eee;
            }
            #display-year { font-size: 3rem; letter-spacing: -2px; margin: 5px 0 10px; line-height: 1; }
            .user-header { margin-bottom: 5px; }
            .side-section { display: none; } /* Скрываем логи для экономии места */

            .main-content { 
                padding: 10px; 
                height: calc(100vh - 160px); /* Вычитаем высоту шапки */
            }

            .months-grid { 
                grid-template-columns: repeat(3, 1fr); /* 3 колонки */
                grid-template-rows: repeat(4, 1fr);    /* 4 ряда */
                gap: 8px; 
                height: 100%;
            }

            .month-card { 
                aspect-ratio: auto; 
                height: 100%; 
                font-size: 0.8rem; 
                border-radius: 12px; 
            }
            
            footer { padding: 5px; text-align: center; position: relative; background: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-header">
            <button class="logout-btn" onclick="logout()">Exit</button>
            <div class="user-name" id="display-name">...</div>
            <div class="user-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
        </div>

        <div id="display-year">2026</div>

        <div class="side-section">
            <div class="side-label">Категории</div>
            <div class="legend-item">Работа <div class="color-bar" style="background: var(--ev-work);"></div></div>
            <div class="legend-item">Важное <div class="color-bar" style="background: var(--ev-important);"></div></div>
            <div class="legend-item">Личное <div class="color-bar" style="background: var(--ev-personal);"></div></div>
        </div>

        <div class="side-section">
            <div class="side-label">Последнее действие</div>
            <div id="logs-container">
                <div class="log-entry">Загрузка системы...</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <footer>Cloud Plan Ecosystem — Terminal 2.0</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser');
        
        if (!currentUser) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('display-name').innerText = currentUser;
        }

        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        
        monthsNames.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'month-card';
            card.innerText = m;
            card.onclick = () => { 
                localStorage.setItem('selectedMonth', i); 
                window.location.href = 'notes.html'; 
            };
            grid.appendChild(card);
        });

        // Подгрузка логов
        const qLogs = query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(1));
        onSnapshot(qLogs, (snapshot) => {
            const container = document.getElementById('logs-container');
            if (snapshot.empty) return;
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerText = `${data.user}: ${data.action}`;
                container.appendChild(div);
            });
        });

        window.logout = () => { 
            localStorage.clear(); 
            window.location.href = 'index.html'; 
        };
    </script>
</body>
</html>
