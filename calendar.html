<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 | CALENDARIUM</title>
    <style>
        :root { 
            --accent: #0984e3; 
            --bg: #f0f2f5; 
            --orange: #f39c12; 
            --text: #2d3436; 
            --card-bg: rgba(255, 255, 255, 0.85);
            --ev-work: #0984e3;
            --ev-important: #d63031;
            --ev-personal: #27ae60;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* ЛЕВЫЙ САЙДБАР */
        .sidebar { 
            width: 260px; background: #fff; padding: 40px 24px; 
            display: flex; flex-direction: column; border-right: 1px solid #e0e0e0;
            z-index: 10;
        }
        .user-profile { margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
        .user-name { font-size: 1.2rem; font-weight: 800; color: var(--text); text-transform: uppercase; }
        .user-role { font-size: 0.6rem; color: #b2bec3; letter-spacing: 1.5px; text-transform: uppercase; }

        .nav-btn { 
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: none;
            background: #f8f9fa; color: var(--text); font-weight: 600; cursor: pointer; text-align: left;
            transition: 0.2s;
        }
        .nav-btn:hover { background: #e9ecef; }
        .nav-btn.admin-only { background: var(--orange); color: white; display: none; margin-top: 10px; }
        .logout-btn { margin-top: auto; background: transparent; color: #fab1a0; border: 1px solid #fab1a0; text-align: center; }

        /* ЦЕНТРАЛЬНАЯ СЕТКА */
        .main-content { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            padding: 40px 10%; overflow-y: auto; 
        }
        .months-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 20px; width: 100%; max-width: 900px; 
        }
        .month-card { 
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 15px; height: 120px; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 1.1rem; color: #636e72;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27);
        }
        .month-card:hover { transform: scale(1.05); background: #fff; color: var(--accent); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        .event-dots { position: absolute; bottom: 15px; display: flex; gap: 5px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }

        /* ПРАВАЯ ШТОРКА (МЕГА-ПАНЕЛЬ) */
        .admin-sidebar {
            position: fixed; right: 0; top: 0; width: 400px; height: 100vh; 
            background: #2d3436; color: white; z-index: 1000;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            padding: 40px 30px; box-sizing: border-box; overflow-y: auto;
            box-shadow: -15px 0 35px rgba(0,0,0,0.2);
        }
        .admin-sidebar.active { transform: translateX(0); }

        /* ВНУТРЕННИЕ ЭЛЕМЕНТЫ ШТОРКИ */
        #side-year { font-size: 5rem; font-weight: 900; color: rgba(255,255,255,0.1); letter-spacing: -4px; line-height: 0.8; margin-bottom: 30px; }
        
        .side-section { margin-bottom: 35px; }
        .side-label { font-size: 0.7rem; font-weight: 900; color: var(--orange); margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }

        .legend-item { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 0.9rem; font-weight: 500; }
        .color-mark { width: 12px; height: 12px; border-radius: 3px; }

        /* ЛОГИ (ИЗМЕНЕНИЯ) */
        .change-log { font-size: 0.85rem; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--orange); }
        .change-user { font-weight: 800; color: var(--orange); margin-right: 5px; }
        .change-time { font-size: 0.7rem; opacity: 0.5; display: block; margin-top: 4px; }

        .close-btn { position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 24px; opacity: 0.5; }
        .close-btn:hover { opacity: 1; }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 6px 20px; font-size: 9px; color: #b2bec3; border-top: 1px solid #eee; z-index: 5; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-profile">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <div>
                <div class="user-name" id="display-name">Guest</div>
                <div class="user-role" id="display-role">Terminal User</div>
            </div>
        </div>
        
        <button class="nav-btn" onclick="toggleAdminSidebar(true)">ОТКРЫТЬ ЛОГИ / ИНФО</button>
        <button id="admin-req-btn" class="nav-btn admin-only" onclick="toggleAdminSidebar(true)">ЗАЯВКИ ПОЛЬЗОВАТЕЛЕЙ</button>
        <button class="nav-btn logout-btn" onclick="logout()">ВЫЙТИ</button>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <div id="admin-sidebar" class="admin-sidebar">
        <div class="close-btn" onclick="toggleAdminSidebar(false)">×</div>
        
        <div id="side-year">2026</div>

        <div class="side-section">
            <div class="side-label">Легенда событий</div>
            <div class="legend-item"><div class="color-mark" style="background: var(--ev-work);"></div> Работа</div>
            <div class="legend-item"><div class="color-mark" style="background: var(--ev-important);"></div> Важное</div>
            <div class="legend-item"><div class="color-mark" style="background: var(--ev-personal);"></div> Личное</div>
        </div>

        <div class="side-section">
            <div class="side-label">Последние изменения</div>
            <div id="logs-container">
                <div class="change-log">
                    <span class="change-user">admin</span> одобрил заявку "weffewf"
                    <span class="change-time">Сегодня, 14:20</span>
                </div>
                <div class="change-log">
                    <span class="change-user">user1</span> добавил заметку в Январь
                    <span class="change-time">Вчера, 18:05</span>
                </div>
            </div>
        </div>

        <div class="side-section admin-only" id="req-section" style="display:none;">
            <div class="side-label">Новые заявки</div>
            <div id="requests-list"></div>
        </div>
    </div>

    <footer>Cloud Plan Ecosystem — Secure Terminal 2.0</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = localStorage.getItem('currentUser');

        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('display-name').innerText = currentUser;
        
        if (currentUser === 'admin') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            document.getElementById('display-role').innerText = 'System Administrator';
        }

        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const grid = document.getElementById('months');
        
        months.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'month-card';
            card.innerHTML = `${m}<div class="event-dots"><div class="dot" style="background:var(--ev-work)"></div></div>`;
            card.onclick = () => {
                localStorage.setItem('selectedMonth', i);
                window.location.href = 'notes.html';
            };
            grid.appendChild(card);
        });

        const adminSidebar = document.getElementById('admin-sidebar');
        window.toggleAdminSidebar = (show) => {
            if (show) { adminSidebar.classList.add('active'); loadRequests(); }
            else { adminSidebar.classList.remove('active'); }
        };

        async function loadRequests() {
            if (currentUser !== 'admin') return;
            const list = document.getElementById('requests-list');
            list.innerHTML = 'Загрузка...';
            const querySnapshot = await getDocs(collection(db, "requests"));
            list.innerHTML = '';
            querySnapshot.forEach((documentSnap) => {
                const name = documentSnap.id;
                const data = documentSnap.data();
                const item = document.createElement('div');
                item.className = 'change-log';
                item.style.borderLeftColor = '#2ecc71';
                item.innerHTML = `Заявка: <b>${name}</b><br>
                    <button onclick="manageUser('${name}', '${data.password}', 'approve')" style="background:#2ecc71; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; margin-top:5px;">Одобрить</button>`;
                list.appendChild(item);
            });
        }

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
    </script>
</body>
</html>
