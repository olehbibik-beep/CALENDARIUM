<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="view-transition" content="same-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM</title>
   <style>
    :root { 
        --accent: #09e0e3; --bg: #71797E; --dark: #1a1d1f; --card-bg: #22272a;
        --ev-memorial: #ff7675; --ev-meeting: #09e0e3; --text-main: #e0e6ed;
        --inner-border: rgba(255, 255, 255, 0.05);
    }
    
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
        margin: 0; padding: 0; 
        background: var(--bg); color: var(--text-main); 
        display: flex; align-items: center; justify-content: center; 
        height: 100dvh; width: 100vw; 
        overflow: hidden; 
    }

    .app-container {
        width: 95vw; height: 90dvh; 
        max-width: 1400px; max-height: 900px;
        background: #0f1112;
        border-radius: 30px; 
        display: flex; flex-direction: row; 
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .sidebar { 
        width: 25%; min-width: 220px; max-width: 320px; 
        background: rgba(80,80,80,0.2); 
        padding: 3vh 2vw; 
        display: flex; flex-direction: column; 
        border-right: 1px solid var(--inner-border); 
        flex-shrink: 0;
    }

    .user-header { 
        display: flex; align-items: center; justify-content: space-between; 
        margin-bottom: 2vh; width: 100%; position: relative;
    }
    
    .header-left, .header-right { display: flex; align-items: center; gap: clamp(8px, 1.5vw, 15px); z-index: 10; }
    
    .header-center { 
        position: absolute; left: 50%; transform: translateX(-50%);
        display: flex; align-items: center; justify-content: center; 
        gap: 8px; z-index: 5; max-width: 50%;
    }

    .icon-btn { 
        background: none; border: none; padding: 5px; cursor: pointer; 
        display: flex; align-items: center; justify-content: center; outline: none;
        flex-shrink: 0; z-index: 50; 
    }
    .icon-btn img { 
        width: clamp(25px, 3.5vh, 30px); 
        height: clamp(25px, 3.5vh, 30px); 
        object-fit: contain; opacity: 0.5; transition: 0.3s; 
    }
    .icon-btn:hover img { opacity: 1; filter: brightness(0) invert(1); }

    .user-name { 
        font-weight: 700; text-transform: uppercase;
        font-size: clamp(0.75rem, 1.2vw, 1rem); color: #fff; letter-spacing: 1px; 
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .upcoming-box { margin-top: 10px; overflow-y: auto; flex: 1; padding-right: 5px; }
    .event-card-mini { background: transparent; padding: 10px; border-radius: 4px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
    .ev-title { font-size: clamp(0.7rem, 1vw, 0.85rem); font-weight: 300; color: #fff; margin-bottom: 4px; }
    .ev-date { font-size: clamp(0.6rem, 0.8vw, 0.75rem); color: #7f8fa6; }

    .main-view { flex: 1; display: flex; flex-direction: column; padding: 3vh 3vw; position: relative; }

    .year-switcher { display: flex; align-items: center; justify-content: center; gap: 2vw; margin-bottom: 2vh; flex-shrink: 0; }
    #display-year { font-size: clamp(2.5rem, 6vh, 5rem); font-weight: 300; letter-spacing: -2px; color: #fff; line-height: 1; }
    .year-side { cursor: pointer; color: #3d444b; font-weight: 300; font-size: clamp(1.2rem, 3vh, 2rem); transition: 0.2s; }
    .year-side:hover { color: var(--accent); }

    /* === СЕТКА МЕСЯЦЕВ === */
    .months-grid { 
        display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); 
        gap: clamp(8px, 1.5vh, 20px); width: 100%; height: 100%; flex: 1; min-height: 0; 
    }
    
    .month-card { 
        background: var(--dark); border-radius: 18px; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        color: #fff; font-weight: 300; cursor: pointer; position: relative; transition: 0.3s;
        text-transform: uppercase; font-size: clamp(0.7rem, 1.5vh + 0.5vw, 1.2rem); 
        height: 100%; width: 100%; border: 1px solid transparent; overflow: hidden;
    }
    .month-card:hover { background: #2b3236; box-shadow: 0 8px 15px rgba(0,0,0,0.4); }
    
    .month-card span { z-index: 5; position: relative; }

    .month-indicator { position: absolute; bottom: 8%; display: flex; gap: 4px; width: 40%; justify-content: center; z-index: 6; }
    .dot { height: 4px; width: 100%; max-width: 15px; border-radius: 8px; }
    .dot.red { background: var(--ev-memorial); }
    .dot.blue { background: var(--ev-meeting); }

    /* === ЛИНЕЙНЫЙ РЕЖИМ (С КАРТИНКАМИ) === */
    .months-grid.linear-mode {
        display: flex !important; flex-direction: row !important; gap: 6px; 
        align-items: stretch; overflow: hidden !important; touch-action: none;
    }

    .months-grid.linear-mode .month-card {
        flex: 1; min-width: 0; height: 100%; border-radius: 10px;
        background-image: var(--bg-img); background-size: cover; background-position: center;
    }

    /* Затемнение картинок в линейном режиме */
    .months-grid.linear-mode .month-card::after {
        content: ''; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 2;
    }

    .months-grid.linear-mode .month-indicator {
        flex-direction: column; width: 12px; bottom: 5%; gap: 3px;
    }

    .inner-footer {
        position: absolute; bottom: 1vh; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between;
        background: transparent; padding: 0 3vw; pointer-events: none;
    }
    .footer-text { font-size: clamp(8px, 0.8vw, 10px); color: #555; text-transform: uppercase; font-weight: 300; letter-spacing: 1px; }
    .footer-dot { width: 4px; height: 4px; background: #555; border-radius: 50%; }

    @media (orientation: portrait) {
        .app-container { width: 100vw; height: 100dvh; max-height: none; max-width: none; border-radius: 0; flex-direction: column; }
        .sidebar { width: 100%; max-width: 100%; height: auto; max-height: 35dvh; border-right: none; border-bottom: 1px solid var(--inner-border); }
        .months-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 8px; }
        .inner-footer { display: none; }
    }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="user-header">
                <div class="header-left">
                    <button class="icon-btn" onclick="localStorage.clear(); location.href='index.html'" title="Выход">
                        <img src="QUIT.png" alt="Quit">
                    </button>
                </div>
                <div class="header-center">
                    <button id="admin-btn" class="icon-btn" onclick="location.href='admin.html'" style="display:none;" title="Настройки">
                        <img src="OPTION.png" alt="Options">
                    </button>
                </div>
                <div class="header-right">
                    <div id="user-display" class="user-name">...</div>
                </div>
            </div>
            <div class="upcoming-box" id="next-event-container">
                <div style="font-size:0.6rem; color:#7f8fa6; opacity:0.3; text-align:center;">ЗАГРУЗКА...</div>
            </div>
        </div>

        <div class="main-view">
            <div class="year-switcher">
                <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
                <div id="display-year"></div>
                <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
                <button class="icon-btn" onclick="toggleCalendarView()" title="Сменить вид" style="margin-left: 15px;">
                    <img src="ORG.png" alt="View">
                </button>
            </div>
            <div class="months-grid" id="months"></div>
        </div>
    </div>

    <div class="inner-footer">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="footer-dot"></div>
            <div class="footer-text">Group 5 • v2.6.16</div>
        </div>
        <div class="footer-text">© 2026 CALENDARIUM</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const monthImages = ["led.png", "feb.jpg", "mar.jpg", "apr.jpg", "may.jpg", "jun.jpg", "jul.jpg", "aug.jpg", "sep.jpg", "oct.jpg", "nov.jpg", "dec.jpg"];

        let currentYear = parseInt(localStorage.getItem('selectedYear')) || new Date().getFullYear();
        const user = localStorage.getItem('currentUser');
        if (!user) { window.location.replace('index.html'); }
        document.getElementById('user-display').innerText = user;
        if(user && user.toLowerCase() === 'admin') document.getElementById('admin-btn').style.display = 'flex';

        function initGrid() {
            const grid = document.getElementById('months');
            const now = new Date();
            let gridHTML = '';
            monthsNames.forEach((m, i) => {
                const isToday = (i === now.getMonth() && currentYear === now.getFullYear());
                const bgStyle = `--bg-img: url('${monthImages[i]}')`;
                gridHTML += `
                    <div class="month-card ${isToday ? 'current-active' : ''}" style="${bgStyle}" onclick="goToMonth(${i})">
                        <span>${m.substring(0, 3)}</span>
                        <div class="month-indicator" id="ind-${i}"></div>
                    </div>`;
            });
            grid.innerHTML = gridHTML;
            
            const savedView = localStorage.getItem('calendarViewMode');
            if (savedView === 'linear') grid.classList.add('linear-mode');
        }

        window.toggleCalendarView = () => {
            const grid = document.getElementById('months');
            grid.classList.toggle('linear-mode');
            localStorage.setItem('calendarViewMode', grid.classList.contains('linear-mode') ? 'linear' : 'grid');
        };

        window.goToMonth = (i) => {
            localStorage.setItem('selectedMonth', i);
            localStorage.setItem('selectedYear', currentYear);
            window.location.href = 'notes.html';
        };

        window.changeYear = (dir) => {
            currentYear += dir;
            updateDisp();
            initGrid();
            loadData();
        };

        async function loadData() {
            const container = document.getElementById('next-event-container');
            container.innerHTML = '<div style="font-size:0.6rem; opacity:0.3; text-align:center; margin-top:20px;">ПОИСК...</div>';
            
            let upcomingEvents = [];
            const snapshots = await Promise.all(Array.from({length: 12}, (_, i) => getDoc(doc(db, "calendar", `${currentYear}_${i}`))));

            snapshots.forEach((snap, i) => {
                const ind = document.getElementById(`ind-${i}`);
                if (ind) ind.innerHTML = '';
                if (snap.exists()) {
                    const data = snap.data();
                    let hasRed = false, hasBlue = false;
                    Object.entries(data).forEach(([day, notes]) => {
                        notes.forEach(n => {
                            if (n.category === 'memorial' || n.category === 'congress') hasRed = true;
                            else hasBlue = true;
                            if (new Date(currentYear, i, parseInt(day)) >= new Date().setHours(0,0,0,0)) {
                                upcomingEvents.push({ text: n.text, day, mName: monthsNames[i], stamp: new Date(currentYear, i, parseInt(day)), cat: n.category });
                            }
                        });
                    });
                    if (ind) {
                        if (hasRed) ind.innerHTML += '<div class="dot red"></div>';
                        if (hasBlue) ind.innerHTML += '<div class="dot blue"></div>';
                    }
                }
            });

            upcomingEvents.sort((a, b) => a.stamp - b.stamp);
            if (upcomingEvents.length > 0) {
                let html = '<div style="font-size:0.6rem; color:#7f8fa6; margin-bottom:10px; font-weight:800; letter-spacing:1px;">АКТУАЛЬНОЕ</div>';
                upcomingEvents.slice(0, 5).forEach(ev => {
                    const color = (ev.cat === 'memorial' || ev.cat === 'congress') ? 'var(--ev-memorial)' : 'var(--ev-meeting)';
                    html += `<div class="event-card-mini" style="border-left-color: ${color}"><div class="ev-title">${ev.text}</div><div class="ev-date">${ev.day} ${ev.mName}</div></div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div style="font-size:0.6rem; opacity:0.2; text-align:center; margin-top:20px;">СОБЫТИЙ НЕТ</div>';
            }
        }

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
