<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="view-transition" content="same-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM</title>
    <style>
    :root { 
        --accent: #09e0e3; --bg: #71797E; --dark: #1a1d1f; --card-bg: #22272a;
        --ev-memorial: #ff7675; --ev-meeting: #09e0e3; --text-main: #e0e6ed;
        --inner-border: rgba(255, 255, 255, 0.05);
    }
    
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
        margin: 0; background: var(--bg); color: var(--text-main); 
        display: flex; align-items: center; justify-content: center; 
        height: 100vh; width: 100vw; overflow: hidden; 
    }

    /* === ГЛАВНАЯ ПЛИТКА (На планшетах и ПК занимает почти весь экран) === */
    .app-container {
        width: 96vw; 
        max-width: 1400px; 
        height: 94vh; 
        background: #0f1112;
        border-radius: 20px; 
        display: flex; 
        overflow: hidden;
        box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }

    /* === ЛЕВАЯ КОЛОНКА (САЙДБАР) === */
    .sidebar { 
        width: 320px; /* Фиксированная ширина, чтобы текст не зажимало */
        background: rgba(255,255,255,0.02); 
        padding: 30px 25px; 
        display: flex; 
        flex-direction: column; 
        border-right: 1px solid var(--inner-border); 
        flex-shrink: 0;
    }

    .user-header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
    .user-name { font-weight: 800; text-transform: uppercase; font-size: 0.8rem; color: #fff; letter-spacing: 1px;}
    .nav-btns { display: flex; gap: 8px; width: 100%; }
    .btn-small { 
        flex: 1; /* Кнопки занимают всю ширину поровну */
        background: #1a1d1f; color: #fff; border: 1px solid #333; 
        padding: 10px 0; border-radius: 6px; font-size: 0.7rem; 
        font-weight: 700; cursor: pointer; transition: 0.2s; 
    }
    .btn-small:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    .upcoming-box { flex: 1; overflow-y: auto; padding-right: 10px; }
    /* Тонкий скроллбар */
    .upcoming-box::-webkit-scrollbar { width: 4px; }
    .upcoming-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .event-card-mini { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
    .ev-title { font-size: 0.8rem; color: #fff; margin-bottom: 6px; font-weight: 300; line-height: 1.4; }
    .ev-date { font-size: 0.85rem; font-weight: 700; color: #fff; }

    /* === ПРАВАЯ ЧАСТЬ (КАЛЕНДАРЬ) === */
    .main-view { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        padding: 30px 40px; 
    }

    .year-switcher { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 25px; flex-shrink: 0; }
    #display-year { font-size: 4rem; font-weight: 300; letter-spacing: -2px; color: #fff; }
    .year-side { cursor: pointer; color: #3d444b; font-weight: 300; font-size: 2rem; transition: 0.3s; }
    .year-side:hover { color: var(--accent); transform: scale(1.1); }

    /* Сетка растягивается на все оставшееся место */
    .months-grid { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        grid-template-rows: repeat(3, 1fr); 
        gap: 15px; 
        flex: 1; /* Заставляет сетку занять всю высоту до низа */
    }
    
    .month-card { 
        background: var(--dark); 
        border-radius: 16px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        color: #fff; 
        font-weight: 400; 
        cursor: pointer; 
        position: relative; 
        transition: 0.3s;
        text-transform: uppercase; 
        font-size: 0.9rem; 
        letter-spacing: 1px;
        height: 100%; /* Карточка тянется на всю высоту ячейки сетки */
    }
    .month-card:hover { background: #2b3236; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

    .month-indicator { position: absolute; bottom: 12px; display: flex; gap: 6px; width: 40px; height: 4px; }
    .dot { flex: 1; border-radius: 4px; }
    .dot.red { background: var(--ev-memorial); }
    .dot.blue { background: var(--ev-meeting); }

    /* Футер убираем, чтобы не мешал сетке тянуться */
    .inner-footer { display: none; }

    /* =========================================
       МОБИЛЬНАЯ АДАПТАЦИЯ (ТЕЛЕФОНЫ)
       ========================================= */
    
    /* 1. Телефоны вертикально (Портрет) */
    @media (max-width: 768px) and (orientation: portrait) {
        body { height: 100dvh; }
        .app-container { flex-direction: column; height: 100%; width: 100vw; border-radius: 0; }
        
        .sidebar { width: 100%; height: 35%; padding: 20px; border-right: none; border-bottom: 1px solid var(--inner-border); }
        .user-header { flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        .main-view { padding: 15px; }
        .year-switcher { margin-bottom: 15px; gap: 20px; }
        #display-year { font-size: 3rem; }
        .year-side { font-size: 1.5rem; }
        
        .months-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; }
        .month-card { font-size: 0.75rem; border-radius: 12px; }
    }

    /* 2. Телефоны горизонтально (Узкая высота) */
    @media (max-height: 500px) and (orientation: landscape) {
        .app-container { width: 100vw; height: 100dvh; border-radius: 0; }
        .sidebar { width: 240px; padding: 15px; }
        .main-view { padding: 10px 15px; }
        .year-switcher { margin-bottom: 10px; gap: 20px; }
        #display-year { font-size: 2.2rem; }
        .year-side { font-size: 1.2rem; }
        .months-grid { gap: 8px; }
        .month-card { font-size: 0.7rem; border-radius: 8px; }
        .month-indicator { bottom: 6px; }
    }
</style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="user-header">
                <div id="user-display" class="user-name">...</div>
                <div class="nav-btns">
                    <button id="admin-btn" class="btn-small" onclick="location.href='admin.html'" style="display:none; color: #fff;">OPTIONS</button>
                    <button class="btn-small" onclick="localStorage.clear(); location.href='index.html'">ВЫХОД</button>
                </div>
            </div>
            
            <div class="upcoming-box" id="next-event-container">
                <div style="font-size:0.6rem; color:#7f8fa6; opacity:0.3; text-align:center;">ЗАГРУЗКА...</div>
            </div>
        </div>

        <div class="main-view">
            <div class="year-switcher">
                <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
                <div id="display-year"></div>
                <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
            </div>

            <div class="months-grid" id="months"></div>

        </div>
        
    </div>
    <div class="inner-footer">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="footer-dot"></div>
            <div class="footer-text">Group 5 • v2.6.16</div>
        </div>
        <div class="footer-text">© 2026 CALENDARIUM</div>
    </div>
    <script type="module">
        const user = localStorage.getItem('currentUser');
        if (!user) { window.location.replace('index.html'); }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || new Date().getFullYear();
        
        document.getElementById('user-display').innerText = user;
        if(user.toLowerCase() === 'admin') {
            document.getElementById('admin-btn').style.display = 'block';
        }

        function initGrid() {
            const grid = document.getElementById('months');
            const now = new Date();
            const todayMonth = now.getMonth(); 
            const todayYear = now.getFullYear();

            let gridHTML = '';
            monthsNames.forEach((m, i) => {
                const isToday = (i === todayMonth && currentYear === todayYear);
                const statusClass = isToday ? 'current-active' : '';
                gridHTML += `
                    <div class="month-card ${statusClass}" onclick="goToMonth(${i})">
                        <span>${m.substring(0, 3)}</span>
                        <div class="month-indicator" id="ind-${i}"></div>
                    </div>`;
            });
            grid.innerHTML = gridHTML;
        }

        window.goToMonth = (i) => {
            localStorage.setItem('selectedMonth', i);
            localStorage.setItem('selectedYear', currentYear);
            window.location.href = 'notes.html';
        };

        // --- ЛОГИКА ПЛАВНОГО ПЕРЕХОДА И СМЕНЫ ГОДА ---
        window.changeYear = (dir) => { 
            if (!document.startViewTransition) {
                applyYearChange(dir);
                return;
            }
            document.startViewTransition(() => {
                applyYearChange(dir);
            });
        };

        function applyYearChange(dir) {
            currentYear += dir; 
            updateDisp(); 
            initGrid(); 
            loadData();
        }

        // --- ЛОГИКА СВАЙПОВ ---
        let touchStartX = 0;
        let touchEndX = 0;
        const mainView = document.querySelector('.main-view');

        mainView.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        mainView.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const threshold = 50; // чувствительность свайпа
            if (touchEndX < touchStartX - threshold) {
                changeYear(1);
            }
            if (touchEndX > touchStartX + threshold) {
                changeYear(-1);
            }
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            if (!container) return;

            container.innerHTML = '<div style="font-size:0.6rem; opacity:0.3; text-align:center; margin-top:20px;">ПОИСК...</div>';

            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            
            let upcomingEvents = [];

            for(let i=0; i<12; i++) {
                const ind = document.getElementById(`ind-${i}`);
                if(ind) ind.innerHTML = '';
            }

            const monthPromises = Array.from({length: 12}, (_, i) => 
                getDoc(doc(db, "calendar", `${currentYear}_${i}`))
            );
            
            const snapshots = await Promise.all(monthPromises);

            snapshots.forEach((snap, i) => {
                if (snap.exists()) {
                    const data = snap.data();
                    const ind = document.getElementById(`ind-${i}`);
                    let hasRed = false;
                    let hasBlue = false;

                    Object.entries(data).forEach(([day, notes]) => {
                        if (!Array.isArray(notes)) return;

                        notes.forEach(n => {
                            if (n.category === 'memorial' || n.category === 'congress') hasRed = true;
                            else hasBlue = true;

                            const eventDate = new Date(currentYear, i, parseInt(day)).getTime();

                            if (eventDate >= todayStart) {
                                upcomingEvents.push({
                                    text: n.text,
                                    day: day,
                                    mName: monthsNames[i],
                                    stamp: eventDate,
                                    cat: n.category
                                });
                            }
                        });
                    });

                    if (ind) {
                        if (hasRed) ind.innerHTML += '<div class="dot red"></div>';
                        if (hasBlue) ind.innerHTML += '<div class="dot blue"></div>';
                    }
                }
            });

            upcomingEvents.sort((a, b) => a.stamp - b.stamp);

            if (upcomingEvents.length > 0) {
                let html = '<div style="font-size:0.6rem; color:#7f8fa6; margin-bottom:10px; font-weight:800; letter-spacing:1px;">АКТУАЛЬНОЕ</div>';
                upcomingEvents.slice(0, 5).forEach(ev => {
                    const color = (ev.cat === 'memorial' || ev.cat === 'congress') ? 'var(--ev-memorial)' : 'var(--ev-meeting)';
                    html += `
                        <div class="event-card-mini" style="border-left-color: ${color}">
                            <div class="ev-title">${ev.text}</div>
                            <div class="ev-date">${ev.day} ${ev.mName}</div>
                        </div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div style="font-size:0.6rem; opacity:0.2; text-align:center; margin-top:20px;">СОБЫТИЙ НЕТ</div>';
            }
        }

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
