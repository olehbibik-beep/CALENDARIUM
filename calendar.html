<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM Terminal</title>
    <style>
        :root { 
            --sidebar-bg: #1a1a1a; --main-bg: #f4f4f4; --card-bg: #2d3436; 
            --ev-memorial: #ff4757; --ev-meeting: #0984e3; --accent-gold: #fdcb6e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; display: flex; 
            height: 100vh; background: var(--main-bg); overflow: hidden; 
        }

        /* САЙДБАР */
        .sidebar { 
            width: 350px; background: var(--sidebar-bg); padding: 30px; 
            display: flex; flex-direction: column; color: white;
            flex-shrink: 0; z-index: 10;
        }

        .user-header { display: flex; align-items: center; width: 100%; justify-content: space-between; margin-bottom: 20px; }
        .user-name { font-weight: 800; text-transform: uppercase; font-size: 0.7rem; color: var(--accent-gold); letter-spacing: 1px; }
        .logout-btn { background: #fff; color: #000; border: none; padding: 5px 12px; border-radius: 6px; font-size: 0.6rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        .year-switcher { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 25px; }
        #display-year { font-size: 3.8rem; font-weight: 900; letter-spacing: -3px; line-height: 1; }
        .year-side { cursor: pointer; color: #444; font-weight: 900; padding: 10px; font-size: 1.3rem; transition: 0.2s; }
        .year-side:hover { color: #fff; }

        .upcoming-box { width: 100%; margin-top: auto; }
        .event-card-mini { background: #252525; padding: 15px; border-radius: 18px; border-right: 5px solid transparent; animation: fadeIn 0.5s ease; }
        .ev-title { font-size: 0.85rem; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 4px; }

        /* ОСНОВНОЙ КОНТЕНТ (СЕТКА) */
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .months-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            width: 100%; 
            max-width: 850px; 
        }
        
        .month-card { 
            background: var(--card-bg); border-radius: 20px; 
            aspect-ratio: 1 / 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; font-weight: 900; cursor: pointer; position: relative; transition: 0.2s;
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .month-card:hover { transform: translateY(-3px); background: #000; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .month-card:active { transform: scale(0.95); } /* Пульсация при нажатии */

        .month-indicator { position: absolute; top: 10px; right: 10px; display: flex; gap: 4px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.red { background: var(--ev-memorial); box-shadow: 0 0 6px var(--ev-memorial); }
        .dot.blue { background: var(--ev-meeting); box-shadow: 0 0 6px var(--ev-meeting); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 850px) {
            body { flex-direction: column; height: 100vh; }
            .sidebar { 
                width: 100%; padding: 15px 20px; height: auto; 
                align-items: center; position: relative;
            }
            .user-header { margin-bottom: 10px; }
            .year-switcher { margin-bottom: 10px; justify-content: center; gap: 40px; }
            #display-year { font-size: 2.8rem; }
            .upcoming-box { display: none; } /* Скрыто на мобилках для экономии места */
            
            .main-content { 
                padding: 10px; 
                flex: 1; 
                align-items: center; /* Центрируем сетку по вертикали */
            }
            .months-grid { 
                grid-template-columns: repeat(3, 1fr); /* 3 в ряд, 4 ряда вниз = 12 месяцев */
                gap: 8px; 
                height: 100%; 
                align-content: center;
            }
            .month-card { 
                aspect-ratio: 1 / 0.9; 
                border-radius: 15px; 
                font-size: 0.65rem; 
            }
        }

        /* Совсем маленькие экраны */
        @media (max-height: 670px) {
            #display-year { font-size: 2.2rem; }
            .month-card { aspect-ratio: auto; height: 65px; }
            .year-switcher { margin-bottom: 5px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="user-header">
            <div id="user-display" class="user-name">ГОСТЬ</div>
            <button class="logout-btn" onclick="location.href='index.html'">ВЫХОД</button>
        </div>

        <div class="year-switcher">
            <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
            <div id="display-year"></div>
            <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
        </div>
        
        <div class="upcoming-box">
            <div style="font-size: 0.6rem; opacity: 0.4; margin-bottom: 8px; letter-spacing: 2px; font-weight: 900; text-align: left;">БЛИЖАЙШЕЕ СОБЫТИЕ</div>
            <div id="next-event-container">Поиск...</div>
        </div>
    </div>

    <div class="main-content">
        <div class="months-grid" id="months"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        const user = localStorage.getItem('currentUser') || 'ГОСТЬ';
        document.getElementById('user-display').innerText = user;

        let currentYear = parseInt(localStorage.getItem('selectedYear')) || 2026;

        function initGrid() {
            const grid = document.getElementById('months');
            grid.innerHTML = '';
            monthsNames.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `<span>${m}</span><div class="month-indicator" id="ind-${i}"></div>`;
                card.onclick = () => {
                    localStorage.setItem('selectedMonth', i);
                    localStorage.setItem('selectedYear', currentYear.toString());
                    window.location.href = 'notes.html';
                };
                grid.appendChild(card);
            });
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            let firstFound = null;

            for (let j = 0; j < 12; j++) {
                const el = document.getElementById(`ind-${j}`);
                if (el) el.innerHTML = '';
            }

            for (let i = 0; i < 12; i++) {
                const docId = `${currentYear}_${i}`;
                try {
                    const snap = await getDoc(doc(db, "calendar", docId));
                    if (snap.exists()) {
                        const monthData = snap.data();
                        const ind = document.getElementById(`ind-${i}`);
                        let red = false, blue = false;

                        const days = Object.keys(monthData).map(Number).sort((a,b) => a-b);
                        days.forEach(day => {
                            const entries = monthData[day];
                            if (Array.isArray(entries)) {
                                entries.forEach(entry => {
                                    if (entry.category === 'memorial' || entry.category === 'congress') red = true;
                                    else blue = true;
                                    if (!firstFound) {
                                        firstFound = { text: entry.text, day: day, month: monthsNames[i], cat: entry.category };
                                    }
                                });
                            }
                        });

                        if (ind) {
                            if (red) ind.innerHTML += '<div class="dot red"></div>';
                            if (blue) ind.innerHTML += '<div class="dot blue"></div>';
                        }
                    }
                } catch (e) { console.error(e); }
            }

            if (firstFound) {
                const color = (firstFound.cat === 'memorial' || firstFound.cat === 'congress') ? '#ff4757' : '#0984e3';
                container.innerHTML = `
                    <div class="event-card-mini" style="border-right-color: ${color}">
                        <div class="ev-title">${firstFound.text}</div>
                        <div style="font-size:0.7rem; opacity:0.5; font-weight:700;">
                            ${firstFound.day} ${firstFound.month} ${currentYear}
                        </div>
                    </div>`;
            } else {
                container.innerHTML = '<div style="opacity:0.2; font-weight:900; font-size:0.7rem;">ПЛАНОВ НЕТ</div>';
            }
        }

        window.changeYear = (dir) => { 
            currentYear += dir; 
            updateDisp(); 
            initGrid(); 
            loadData(); 
        };

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear.toString());
        }

        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
