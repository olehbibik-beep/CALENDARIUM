<style>
    :root { 
        --accent: #0088cc; 
        --sidebar-bg: #ffffff;
        --main-bg: #f4f7f6;
        --text-main: #2d3436; 
        --text-muted: #636e72;
    }
    
    * { box-sizing: border-box; }

    body { 
        margin: 0; font-family: 'Inter', sans-serif; display: flex; 
        height: 100vh; background: var(--main-bg); overflow: hidden; 
    }

    /* --- САЙДБАР (ПК) --- */
    .sidebar { 
        width: 350px; background: var(--sidebar-bg); padding: 40px; 
        display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; 
        z-index: 10; flex-shrink: 0; align-items: flex-end; text-align: right;
    }

    .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .logout-btn { background: #000; color: #fff; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    .user-name { font-size: 1rem; font-weight: 800; color: var(--text-main); text-transform: uppercase; }

    #display-year { 
        font-size: 6rem; font-weight: 800; color: #eceff1; 
        letter-spacing: -8px; line-height: 0.8; margin-bottom: 30px; 
    }

    .side-section { width: 100%; margin-bottom: 25px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; }
    .side-label { font-size: 0.7rem; font-weight: 800; color: #b2bec3; margin-bottom: 15px; text-transform: uppercase; }
    .log-entry { font-size: 0.75rem; background: #fff5f9; padding: 12px; border-radius: 10px 0 0 10px; border-right: 3px solid #e6007e; color: #4b4b4b; }

    /* --- СЕТКА МЕСЯЦЕВ --- */
    .main-content { 
        flex: 1; display: flex; align-items: center; justify-content: center; 
        padding: 20px; height: 100vh;
    }

    .months-grid { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        gap: 15px; 
        width: 100%;
        max-width: 900px;
    }

    .month-card { 
        background: #fff; border-radius: 18px; 
        aspect-ratio: 1.2 / 1; /* Поддерживает форму карточки */
        display: flex; align-items: center; justify-content: center; 
        font-weight: 800; font-size: 1rem; color: var(--text-main);
        cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        text-align: center;
        padding: 5px;
    }

    .month-card:hover { transform: translateY(-5px); color: var(--accent); border-color: var(--accent); }

    footer { position: fixed; bottom: 0; width: 100%; padding: 8px 20px; font-size: 9px; color: #b2bec3; text-align: right; background: rgba(255,255,255,0.8); }

    /* -------------------------------------------------- */
    /* !!! ВСЁ НА ОДНОМ ЭКРАНЕ (МОБИЛКИ) !!!              */
    /* -------------------------------------------------- */
    @media (max-width: 850px) {
        body { flex-direction: column; }
        
        .sidebar { 
            width: 100%; height: auto; padding: 15px; 
            align-items: center; text-align: center; border-right: none; border-bottom: 1px solid #eee;
        }
        #display-year { font-size: 3rem; letter-spacing: -2px; margin: 5px 0; }
        .user-header { margin-bottom: 5px; }
        .side-section { display: none; } /* Прячем логи, чтобы освободить место */

        .main-content { 
            padding: 10px; 
            height: calc(100vh - 150px); /* Вычитаем высоту шапки */
        }

        .months-grid { 
            grid-template-columns: repeat(3, 1fr); /* 3 колонки */
            grid-template-rows: repeat(4, 1fr);    /* 4 ряда */
            gap: 8px; 
            height: 100%; /* Растягиваем на всё оставшееся место */
        }

        .month-card { 
            aspect-ratio: auto; /* На мобилках отключаем, чтобы влезло по высоте */
            height: 100%; 
            font-size: 0.85rem; 
            border-radius: 12px; 
        }
        
        footer { padding: 5px; text-align: center; position: relative; }
    }
</style>
