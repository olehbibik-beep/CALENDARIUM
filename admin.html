<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ADMIN | System Monitor</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Inter', sans-serif; padding: 40px; }
        .panel { max-width: 900px; margin: 0 auto; background: #252525; padding: 30px; border-radius: 30px; border: 1px solid #333; }
        h1 { color: #fdcb6e; text-transform: uppercase; letter-spacing: -1px; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #555; font-size: 0.7rem; text-transform: uppercase; padding: 10px 20px; }
        td { padding: 15px 20px; border-top: 1px solid #333; font-weight: bold; }
        .btn { border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: 900; text-transform: uppercase; font-size: 0.7rem; transition: 0.2s; }
        .btn-ok { background: #2ecc71; color: #000; margin-right: 5px; }
        .btn-no { background: #d63031; color: #fff; }
        .btn:hover { transform: scale(1.05); opacity: 0.8; }
        .empty { text-align: center; padding: 40px; color: #444; text-transform: uppercase; font-size: 0.8rem; }
        .section-title { font-size: 0.7rem; color: #fdcb6e; font-weight: 900; margin-top: 40px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="panel">
        <h1>Входящие запросы</h1>
        <table>
            <thead>
                <tr><th>Имя (ID)</th><th>Действие</th></tr>
            </thead>
            <tbody id="request-list"></tbody>
        </table>
        <div id="no-req" class="empty">Сигналов нет</div>

        <div class="section-title">Активные пользователи</div>
        <table>
            <tbody id="user-list"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        // 1. ПОЛУЧАЕМ ЗАПРОСЫ
        onSnapshot(collection(db, "requests"), (snapshot) => {
            const list = document.getElementById('request-list');
            const empty = document.getElementById('no-req');
            list.innerHTML = '';
            
            if (snapshot.empty) {
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                snapshot.forEach(res => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color:#0984e3">${res.id}</td>
                        <td>
                            <button class="btn btn-ok" onclick="approveUser('${res.id}')">Допустить</button>
                            <button class="btn btn-no" onclick="deleteDocById('requests', '${res.id}')">Удалить</button>
                        </td>
                    `;
                    list.appendChild(tr);
                });
            }
        });

        // 2. ПОЛУЧАЕМ ТЕХ КТО УЖЕ В СИСТЕМЕ
        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            snapshot.forEach(res => {
                if (res.id === 'admin') return;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${res.id}</td>
                    <td style="text-align:right">
                        <button class="btn btn-no" onclick="deleteDocById('users', '${res.id}')">Забанить</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        });

        // ЛОГИКА ОДОБРЕНИЯ
        window.approveUser = async (id) => {
            const reqRef = doc(db, "requests", id);
            const snap = await getDoc(reqRef);
            if (snap.exists()) {
                const data = snap.data();
                // Создаем в users с тем же ID и тем же паролем (ключом)
                await setDoc(doc(db, "users", id), {
                    password: data.password,
                    role: "user"
                });
                // Удаляем из запросов
                await deleteDoc(reqRef);
                alert(id + " теперь в системе!");
            }
        };

        window.deleteDocById = async (coll, id) => {
            if(confirm("Удалить " + id + "?")) {
                await deleteDoc(doc(db, coll, id));
            }
        };
    </script>
</body>
</html>
