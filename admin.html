<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Admin Panel</title>
    <style>
        :root { 
            --bg: #0a0a0a; 
            --card: #161616;
            --accent: #fdcb6e; 
            --text: #ffffff;
            --danger: #ff7675;
            --success: #55efc4;
            --muted: #444;
        }
        
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; height: 100vh;
        }

        /* ШАПКА */
        header { 
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #222; background: #000;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }
        .logo { font-size: 1rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        
        .exit-btn { 
            background: var(--accent); color: #000; border: none; padding: 10px 20px; 
            border-radius: 12px; font-weight: 900; cursor: pointer; text-decoration: none; 
            font-size: 0.75rem; text-transform: uppercase; transition: 0.3s;
        }
        .exit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(253, 203, 110, 0.3); }

        /* КОНТЕНТ */
        main { flex: 1; padding: 40px; overflow-y: auto; max-width: 1100px; margin: 0 auto; width: 100%; }
        
        .hero { margin-bottom: 40px; }
        h1 { font-size: 3rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        p.desc { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; margin-top: 5px; }

        .grid-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }

        .section-box { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #222; }
        .section-label { font-size: 0.7rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: block; }

        /* ТАБЛИЦЫ */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; color: #333; font-size: 0.65rem; text-transform: uppercase; }
        td { padding: 15px 10px; border-top: 1px solid #222; font-size: 0.9rem; font-weight: 700; }
        
        .user-id { color: var(--accent); }
        
        /* КНОПКИ */
        .actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn { 
            border: none; padding: 8px 12px; border-radius: 10px; font-weight: 900; 
            font-size: 0.65rem; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-approve { background: var(--success); color: #000; }
        .btn-delete { background: #222; color: var(--danger); }
        .btn:hover { transform: scale(1.05); }

        .empty-state { padding: 40px; text-align: center; color: var(--muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
            header { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="status-dot"></div>
            <div class="logo">Terminal_Admin v2.0</div>
        </div>
        <a href="calendar.html" class="exit-btn">← Вернуться в календарь</a>
    </header>

    <main>
        <div class="hero">
            <h1>Управление</h1>
            <p class="desc">Доступ к системе и активные сессии</p>
        </div>

        <div class="grid-layout">
            <div class="section-box">
                <span class="section-label">Ожидают подтверждения</span>
                <table id="req-table">
                    <thead>
                        <tr><th>Пользователь</th><th>Действие</th></tr>
                    </thead>
                    <tbody id="request-list"></tbody>
                </table>
                <div id="no-requests" class="empty-state">Новых запросов нет</div>
            </div>

            <div class="section-box">
                <span class="section-label">Активные профили</span>
                <table id="user-table">
                    <thead>
                        <tr><th>Имя</th><th>Статус</th><th></th></tr>
                    </thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        // 1. ПОЛУЧАЕМ ЗАПРОСЫ (requests)
        onSnapshot(collection(db, "requests"), (snapshot) => {
            const list = document.getElementById('request-list');
            const empty = document.getElementById('no-requests');
            list.innerHTML = '';
            
            if (snapshot.empty) {
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                snapshot.forEach(res => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="user-id">${res.id}</td>
                        <td class="actions">
                            <button class="btn btn-approve" onclick="approveUser('${res.id}')">Допустить</button>
                            <button class="btn btn-delete" onclick="deleteDocById('requests', '${res.id}')">Удалить</button>
                        </td>
                    `;
                    list.appendChild(tr);
                });
            }
        });

        // 2. ПОЛУЧАЕМ АКТИВНЫХ (users)
        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            snapshot.forEach(res => {
                if (res.id === 'admin') return;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${res.id}</td>
                    <td style="color:var(--muted); font-size:0.7rem; text-transform:uppercase;">Active</td>
                    <td class="actions">
                        <button class="btn btn-delete" onclick="deleteDocById('users', '${res.id}')">Блок</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        });

        // ЛОГИКА ОДОБРЕНИЯ
        window.approveUser = async (id) => {
            const reqRef = doc(db, "requests", id);
            const snap = await getDoc(reqRef);
            if (snap.exists()) {
                const data = snap.data();
                await setDoc(doc(db, "users", id), {
                    password: data.password,
                    role: "user"
                });
                await deleteDoc(reqRef);
            }
        };

        window.deleteDocById = async (coll, id) => {
            if(confirm("Удалить пользователя " + id + "?")) {
                await deleteDoc(doc(db, coll, id));
            }
        };
    </script>
</body>
</html>
