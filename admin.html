<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Admin Control</title>
    <style>
        :root { 
            --bg: #0a0a0a; 
            --card: #161616;
            --accent: #fdcb6e; 
            --orange: #f39c12; 
            --text: #ffffff;
            --muted: #555;
        }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text); 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* HEADER */
        header { 
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #222;
        }
        .logo { font-weight: 900; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        .exit-btn { 
            background: #fff; color: #000; padding: 8px 20px; border-radius: 20px; 
            text-decoration: none; font-weight: 900; font-size: 0.7rem; 
        }

        /* КОНТЕНТ */
        main { flex: 1; padding: 40px; overflow: hidden; }
        h1 { font-size: 2.5rem; font-weight: 900; margin: 0 0 30px; letter-spacing: -2px; }

        .section-label { font-size: 0.7rem; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-bottom: 15px; }

        /* ГОРИЗОНТАЛЬНЫЙ СПИСОК (БЕГУНОК) */
        .scroll-container { 
            display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px;
            scroll-snap-type: x mandatory; scrollbar-width: none; /* Скрываем стандартный скролл */
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .user-card { 
            min-width: 200px; background: var(--card); padding: 25px; border-radius: 30px;
            border: 1px solid #222; scroll-snap-align: start; flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: 0.3s;
        }
        .user-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .user-avatar { width: 60px; height: 60px; background: #222; border-radius: 50%; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--accent); }
        .user-name { font-weight: 900; font-size: 1.1rem; margin-bottom: 5px; }
        .user-status { font-size: 0.6rem; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }
        
        .card-btn { 
            margin-top: 20px; width: 100%; padding: 10px; border-radius: 15px; border: none;
            font-weight: 900; cursor: pointer; font-size: 0.7rem; text-transform: uppercase;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: #222; color: #fff; }

        /* ОРАНЖЕВАЯ ШТОРКА */
        #confirm-sidebar { 
            position: fixed; right: 0; top: 0; width: 350px; height: 100vh; 
            background: var(--orange); color: white; z-index: 1000;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            padding: 40px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        #confirm-sidebar.active { transform: translateX(0); }
        .sh-title { font-size: 2rem; font-weight: 900; margin-bottom: 10px; line-height: 1; }
        .sh-desc { font-size: 0.9rem; opacity: 0.9; margin-bottom: 40px; font-weight: 600; }
        .sh-btn { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; 
            font-weight: 900; cursor: pointer; font-size: 1rem; margin-bottom: 15px;
        }
        .sh-confirm { background: white; color: var(--orange); }
        .sh-cancel { background: rgba(0,0,0,0.1); color: white; }

    </style>
</head>
<body>

    <div id="confirm-sidebar">
        <div class="sh-title">SYSTEM<br>CONFIRM</div>
        <p class="sh-desc" id="confirm-text">Вы уверены, что хотите выполнить это действие?</p>
        
        <button class="sh-btn sh-confirm" id="main-confirm-btn">ПОДТВЕРДИТЬ</button>
        <button class="sh-btn sh-cancel" onclick="closeSidebar()">ОТМЕНА</button>
    </div>

    <header>
        <div class="logo">TERMINAL_DATABASE</div>
        <a href="calendar.html" class="exit-btn">ВЫХОД</a>
    </header>

    <main>
        <div class="section-label">Запросы на доступ</div>
        <h1>Входящие сигналы</h1>
        <div class="scroll-container" id="request-list"></div>

        <div style="margin-top: 40px;" class="section-label">Активная база</div>
        <h1>Пользователи</h1>
        <div class="scroll-container" id="user-list"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const sidebar = document.getElementById('confirm-sidebar');
        let pendingAction = null;

        // ФУНКЦИИ ШТОРКИ
        window.openConfirm = (text, action) => {
            document.getElementById('confirm-text').innerText = text;
            pendingAction = action;
            sidebar.classList.add('active');
        };

        window.closeSidebar = () => {
            sidebar.classList.remove('active');
            pendingAction = null;
        };

        document.getElementById('main-confirm-btn').onclick = () => {
            if (pendingAction) pendingAction();
            closeSidebar();
        };

        // 1. ЗАПРОСЫ (requests)
        onSnapshot(collection(db, "requests"), (snapshot) => {
            const list = document.getElementById('request-list');
            list.innerHTML = snapshot.empty ? '<div class="user-card"><p class="user-status">НЕТ ЗАПРОСОВ</p></div>' : '';
            snapshot.forEach(res => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="user-avatar">?</div>
                    <div class="user-name">${res.id}</div>
                    <div class="user-status">PENDING</div>
                    <button class="card-btn btn-primary" onclick="openConfirm('Одобрить доступ для ${res.id}?', () => approveUser('${res.id}'))">ДОПУСТИТЬ</button>
                `;
                list.appendChild(card);
            });
        });

        // 2. ПОЛЬЗОВАТЕЛИ (users)
        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            snapshot.forEach(res => {
                if (res.id === 'admin') return;
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="user-avatar">${res.id[0].toUpperCase()}</div>
                    <div class="user-name">${res.id}</div>
                    <div class="user-status">ACTIVE</div>
                    <button class="card-btn btn-secondary" onclick="openConfirm('Удалить профиль ${res.id}?', () => deleteDocById('users', '${res.id}'))">УДАЛИТЬ</button>
                `;
                list.appendChild(card);
            });
        });

        // ЛОГИКА
        window.approveUser = async (id) => {
            const snap = await getDoc(doc(db, "requests", id));
            if (snap.exists()) {
                await setDoc(doc(db, "users", id), { password: snap.data().password, role: "user" });
                await deleteDoc(doc(db, "requests", id));
            }
        };

        window.deleteDocById = async (coll, id) => {
            await deleteDoc(doc(db, coll, id));
        };
    </script>
</body>
</html>
