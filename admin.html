<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Admin Control</title>
    <style>
        :root { 
            --bg: #1a1a1a; 
            --card: #252525;
            --accent: #fdcb6e; 
            --text: #ffffff;
            --danger: #d63031;
            --success: #2ecc71;
            --muted: #555;
        }
        
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* ШАПКА */
        header { 
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333; background: #111;
        }
        .logo { font-size: 1.2rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .nav-btns { display: flex; gap: 15px; align-items: center; }
        .user-info { font-size: 0.8rem; font-weight: 700; color: var(--muted); }
        .back-btn { 
            background: #fff; color: #000; border: none; padding: 8px 18px; 
            border-radius: 20px; font-weight: 900; cursor: pointer; text-decoration: none; font-size: 0.75rem;
        }

        /* КОНТЕНТ */
        main { flex: 1; padding: 40px; overflow-y: auto; max-width: 1000px; margin: 0 auto; width: 100%; }
        h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; letter-spacing: -2px; }

        .section-header { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; 
        }
        .label { font-size: 0.7rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

        /* ТАБЛИЦА */
        .table-container { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 20px; background: #2d2d2d; color: #777; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px 20px; border-bottom: 1px solid #333; font-size: 0.9rem; font-weight: 600; }
        
        /* СТАТУСЫ */
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; }
        .status-pending { background: var(--accent); color: #000; }
        .status-approved { background: var(--success); color: #000; }
        .status-blocked { background: var(--danger); color: #fff; }

        /* КНОПКИ ДЕЙСТВИЙ */
        .actions { display: flex; gap: 8px; }
        .btn { 
            border: none; padding: 6px 12px; border-radius: 8px; font-weight: 900; 
            font-size: 0.65rem; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-ok { background: var(--success); color: #000; }
        .btn-no { background: var(--danger); color: #fff; }
        .btn-del { background: #444; color: #fff; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }

        /* ПУСТОЕ СОСТОЯНИЕ */
        .empty-msg { padding: 40px; text-align: center; color: var(--muted); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }

        @media (max-width: 600px) {
            main { padding: 20px; }
            header { padding: 15px 20px; }
            .user-info { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Terminal_Admin</div>
        <div class="nav-btns">
            <span class="user-info" id="current-user-tag">User: ---</span>
            <a href="calendar.html" class="back-btn">Exit Admin</a>
        </div>
    </header>

    <main>
        <div class="section-header">
            <div class="label">User Database Control</div>
        </div>
        <h1>Управление доступом</h1>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Имя пользователя</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    </tbody>
            </table>
            <div id="loader" class="empty-msg">Загрузка данных терминала...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Твой конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Показываем, кто зашел
        const currentUser = localStorage.getItem('currentUser') || 'Unknown';
        document.getElementById('current-user-tag').innerText = `Admin: ${currentUser}`;

        // СЛУШАЕМ ПОЛЬЗОВАТЕЛЕЙ В РЕАЛЬНОМ ВРЕМЕНИ
        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('user-list');
            const loader = document.getElementById('loader');
            list.innerHTML = '';
            
            if (snapshot.empty) {
                loader.innerText = "Пользователей не найдено";
                loader.style.display = 'block';
                return;
            }

            loader.style.display = 'none';

            snapshot.forEach((userDoc) => {
                const user = userDoc.data();
                const userId = userDoc.id;

                // Пропускаем самого админа, чтобы случайно себя не заблочить
                if (user.username.toUpperCase() === 'ADMIN') return;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.username}</td>
                    <td><span class="badge status-${user.status}">${user.status}</span></td>
                    <td class="actions">
                        ${user.status !== 'approved' ? 
                            `<button class="btn btn-ok" onclick="processUser('${userId}', 'approved')">Допустить</button>` : ''}
                        ${user.status !== 'blocked' ? 
                            `<button class="btn btn-no" onclick="processUser('${userId}', 'blocked')">Блок</button>` : ''}
                        <button class="btn btn-del" onclick="deleteUser('${userId}')">Удалить</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        });

        // ФУНКЦИИ УПРАВЛЕНИЯ
        window.processUser = async (id, newStatus) => {
            try {
                const userRef = doc(db, "users", id);
                await updateDoc(userRef, { status: newStatus });
            } catch (e) {
                alert("Ошибка доступа к базе: " + e.message);
            }
        };

        window.deleteUser = async (id) => {
            if (confirm("Удалить пользователя навсегда?")) {
                await deleteDoc(doc(db, "users", id));
            }
        };
    </script>
</body>
</html>
