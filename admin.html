<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL | Admin Panel</title>
    <style>
        :root { 
            --bg: #0a0a0a; 
            --card: #141414;
            --accent: #fdcb6e; 
            --orange: #f39c12; 
            --text: #ffffff;
            --muted: #444;
            --border: #222;
            --danger: #ff4757;
        }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header { 
            padding: 12px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); background: #000; z-index: 100;
        }
        .logo { font-weight: 900; color: var(--accent); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; }
        .exit-btn { 
            background: #fff; color: #000; padding: 5px 15px; border-radius: 15px; 
            text-decoration: none; font-weight: 900; font-size: 0.65rem; transition: 0.3s;
        }
        .exit-btn:hover { background: var(--accent); }

        /* ОСНОВНАЯ СЕТКА */
        main { 
            flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; 
            background: var(--border); overflow: hidden; 
        }

        .column { 
            background: var(--bg); padding: 25px; overflow-y: auto; 
            display: flex; flex-direction: column;
        }

        h2 { 
            font-size: 1.2rem; font-weight: 900; margin: 0 0 20px; text-transform: uppercase; letter-spacing: -1px; 
            display: flex; align-items: center;
        }
        
        /* СЧЕТЧИКИ */
        .badge {
            background: var(--orange); color: white; padding: 2px 8px; border-radius: 12px; 
            font-size: 0.7rem; margin-left: 10px; font-weight: 800;
        }

        .section-label { font-size: 0.55rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }

        /* ПОИСК */
        .search-input {
            width: 100%; padding: 12px 15px; margin-bottom: 20px; border-radius: 12px;
            border: 1px solid var(--border); background: #000; color: white;
            font-family: inherit; font-size: 0.8rem; box-sizing: border-box; outline: none;
            transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent); }

        /* СЕТКА КАРТОЧЕК */
        .cards-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; 
        }

        .user-card { 
            background: var(--card); padding: 12px; border-radius: 15px;
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
            transition: 0.2s;
        }
        .user-card:hover { border-color: #444; }
        
        .user-info { display: flex; align-items: center; gap: 10px; overflow: hidden; }
        .user-avatar { 
            width: 32px; height: 32px; min-width: 32px; background: #1a1a1a; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.8rem; color: var(--accent); font-weight: 900; border: 1px solid var(--border);
        }
        .user-name { font-weight: 800; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .card-actions { display: flex; gap: 5px; }

        .card-btn { 
            padding: 6px 10px; border-radius: 8px; border: none;
            font-weight: 900; cursor: pointer; font-size: 0.55rem; text-transform: uppercase;
        }
        .btn-approve { background: var(--accent); color: #000; }
        .btn-reject { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-reject:hover { background: var(--danger); color: white; }
        
        .btn-delete { background: transparent; color: #555; border: 1px solid #333; }
        .btn-delete:hover { color: var(--danger); border-color: var(--danger); }

        /* ШТОРКА */
        #confirm-sidebar { 
            position: fixed; right: 0; top: 0; width: 320px; height: 100vh; 
            background: #f39c12 !important; color: white; z-index: 2000;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            padding: 40px 30px; box-sizing: border-box; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        #confirm-sidebar.active { transform: translateX(0); }
        .sh-title { font-size: 2rem; font-weight: 900; margin-bottom: 10px; line-height: 0.9; }
        .sh-desc { font-size: 0.8rem; opacity: 1; margin-bottom: 30px; font-weight: 700; text-transform: uppercase; }
        .sh-btn { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            font-weight: 900; cursor: pointer; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase;
        }
        .sh-confirm { background: white; color: var(--orange); }
        .sh-cancel { background: rgba(0,0,0,0.2); color: white; }

        @media (max-width: 800px) {
            main { grid-template-columns: 1fr; overflow-y: auto; }
            .column { height: auto; overflow: visible; padding: 20px; }
            #confirm-sidebar { width: 100%; }
            .cards-grid { grid-template-columns: 1fr; }
        }
        .user-card { 
            flex-direction: column; align-items: stretch; gap: 10px; 
            padding: 15px;
        }
        .user-card-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        .user-stats {
            background: #000; padding: 10px; border-radius: 10px;
            font-size: 0.65rem; color: #888; display: flex; flex-direction: column; gap: 5px;
            border: 1px solid #1a1a1a;
        }
        .stat-line { display: flex; justify-content: space-between; }
        .stat-val { color: var(--accent); font-weight: 700; font-family: monospace; }
        .ip-warning { color: var(--danger); font-weight: 900; }
    </style>
</head>
<body>

    <div id="confirm-sidebar">
        <div class="sh-title">SYSTEM<br>CONFIRM</div>
        <p class="sh-desc" id="confirm-text">Выполнить действие?</p>
        <button class="sh-btn sh-confirm" id="main-confirm-btn">ПОДТВЕРДИТЬ</button>
        <button class="sh-btn sh-cancel" onclick="closeSidebar()">ОТМЕНА</button>
    </div>

    <header>
        <div class="logo">TERMINAL_DATABASE</div>
        <a href="calendar.html" class="exit-btn">ВЫХОД</a>
    </header>

    <main>
        <div class="column">
            <span class="section-label">Signal Inbound</span>
            <h2>Запросы <span class="badge" id="req-count">0</span></h2>
            <div class="cards-grid" id="request-list"></div>
        </div>

        <div class="column" style="border-left: 1px solid var(--border);">
            <span class="section-label">Active Users</span>
            <h2>База данных <span class="badge" id="usr-count">0</span></h2>
            
            <input type="text" id="user-search" class="search-input" placeholder="Поиск пользователя...">
            
            <div class="cards-grid" id="user-list"></div>
        </div>
    </main>

    <script type="module">
        // --- ЗАЩИТА АДМИНКИ ---
        const currentUser = (localStorage.getItem('currentUser') || '').toLowerCase();
        if (currentUser !== 'admin') {
            window.location.replace('index.html');
        }
        // ----------------------

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            messagingSenderId: "204240857105",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const sidebar = document.getElementById('confirm-sidebar');
        let pendingAction = null;
        let allActiveUsers = []; // Хранилище для поиска

        window.openConfirm = (text, action) => {
            document.getElementById('confirm-text').innerText = text;
            pendingAction = action;
            sidebar.classList.add('active');
        };

        window.closeSidebar = () => {
            sidebar.classList.remove('active');
            pendingAction = null;
        };

        document.getElementById('main-confirm-btn').onclick = async () => {
            if (pendingAction) await pendingAction();
            closeSidebar();
        };

        // --- ЗАПРОСЫ (Добавлена функция отклонения и счетчик) ---
        onSnapshot(collection(db, "requests"), (snapshot) => {
            const list = document.getElementById('request-list');
            document.getElementById('req-count').innerText = snapshot.size; // Обновляем счетчик
            
            list.innerHTML = snapshot.empty ? '<p style="color:#444; font-size:0.7rem; font-weight:900;">НЕТ НОВЫХ ЗАПРОСОВ</p>' : '';
            
            snapshot.forEach(res => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="user-info">
                        <div class="user-avatar">?</div>
                        <span class="user-name">${res.id}</span>
                    </div>
                    <div class="card-actions">
                        <button class="card-btn btn-approve" onclick="openConfirm('Одобрить ${res.id}?', () => window.approveUser('${res.id}'))">OK</button>
                        <button class="card-btn btn-reject" onclick="openConfirm('Отклонить заявку ${res.id}?', () => window.deleteDocById('requests', '${res.id}'))">✕</button>
                    </div>
                `;
                list.appendChild(card);
            });
        });

        // --- БАЗА ДАННЫХ (Добавлен поиск и счетчик) ---
        onSnapshot(collection(db, "users"), (snapshot) => {
            allActiveUsers = [];
            snapshot.forEach(res => {
                if (res.id !== 'admin') {
                    allActiveUsers.push({ id: res.id, data: res.data() });
                }
            });
            document.getElementById('usr-count').innerText = allActiveUsers.length; // Обновляем счетчик
            renderUsers(); // Отрисовываем пользователей
        });

        // Функция отрисовки пользователей (с учетом поиска)
        function renderUsers() {
            const list = document.getElementById('user-list');
            const searchQuery = document.getElementById('user-search').value.toLowerCase();
            list.innerHTML = '';

            const filteredUsers = allActiveUsers.filter(user => user.id.toLowerCase().includes(searchQuery));

            if (filteredUsers.length === 0) {
                list.innerHTML = '<p style="color:#444; font-size:0.7rem; font-weight:900;">НИЧЕГО НЕ НАЙДЕНО</p>';
                return;
            }

            filteredUsers.forEach(user => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="user-info">
                        <div class="user-avatar">${user.id[0].toUpperCase()}</div>
                        <span class="user-name">${user.id}</span>
                    </div>
                    <button class="card-btn btn-delete" onclick="openConfirm('Удалить ${user.id}?', () => window.deleteDocById('users', '${user.id}'))">DEL</button>
                `;
                list.appendChild(card);
            });
        }

        // Слушатель для строки поиска
        document.getElementById('user-search').addEventListener('input', renderUsers);

        // --- ДЕЙСТВИЯ ---
        window.approveUser = async (id) => {
            const snap = await getDoc(doc(db, "requests", id));
            if (snap.exists()) {
                await setDoc(doc(db, "users", id), { password: snap.data().password, role: "user" });
                await deleteDoc(doc(db, "requests", id));
            }
        };

        window.deleteDocById = async (coll, id) => {
            await deleteDoc(doc(db, coll, id));
        };
    </script>
</body>
</html>
